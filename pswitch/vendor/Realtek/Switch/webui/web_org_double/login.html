<html>
	<head>
		<title></title>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=EmulateIE10">
		<link href="css/login-box.css" rel="stylesheet" type="text/css">
		<link href="css/jquery.toastmessage.css" rel="stylesheet" type="text/css">
		<script src="js/jquery-1.10.2.min.js" type="text/javascript"></script>
		<script src="js/underscore-1.5.1.min.js" type="text/javascript"></script>
		<script src="js/jquery.toastmessage-min.js" type="text/javascript"></script>
		<script src="js/backbone-1.0.0.min.js" type="text/javascript"></script>
		<script src="js/fileload.js" type="text/javascript"></script>
		<script src="js/utility.js" type="text/javascript"></script>
		<script src="js/login.js" type="text/javascript"></script>
		<script type="text/javascript" src="js/crypt/jsbn.js"></script>
		<script type="text/javascript" src="js/crypt/prng4.js"></script>
		<script type="text/javascript" src="js/crypt/rng.js"></script>
		<script type="text/javascript" src="js/crypt/rsa.js"></script>
		<script type="text/javascript" src="js/crypt/base64.js"></script>
		<script src="js/ie8.js"></script>
		<script>

			var RootFrame = true;
			var MockupMode = false;
			var DebugMode = false;
			var fileVer = (new Date().getTime());
			var langMode = "defLang_ru";
			var TimeoutVal = 0;

			fileLoad("lang/defLoginLang.js", "js");
			if (MockupMode)
			  fileLoad("js/url_mockup.js", "js");
			else
			  fileLoad("js/url.js", "js");

			if (MockupMode)
			{
			  fileVer = (new Date().getTime());
			}

			var data;

			var infoMsg = '';
			var loginBanner = '';
			var isLangRender = false;

			function clickLogin()
			{
			  if (isHTTPS)
				return;

			  if (IsUndefOrNull(data.modulus) || '' == data.modulus)
				return;

			  var rsa = new RSAKey();
			  rsa.setPublic(data.modulus, '10001');
			  var pwd = $('#password').val();

			  if (pwd.length != 0)
			  {
				var newPwd = rsa.encrypt(pwd);

				if (newPwd == null)
				{
				  ShowStatusError(lang('login','errLoginUserInvalid'));
				  $('#password').val("");
				}
				else
				  $('#password').val(hex2b64(newPwd));
			  }
			}

			var oldPasswordVal;
			function checkLoginStatus()
			{
				TimeoutVal += 1;
			  DisableButton('btnLogin');
			  dataGet(url('get_loginStatus')).fetch({
				success: function(model, resp){
				  if (resp.data.status == "fail")
				  {
					var errstr = str2var(resp.data.failReason);
					ShowStatusError(errstr);
					$('#password').val("");
					EnableButton('btnLogin');
				  }
				  else if (resp.data.status == "ok")
				  {
					top.location.href="home.html?ver="+fileVer;
				  }
				  else
				  {
					if(TimeoutVal > 10)
					{
						ShowStatusError(lang('login','msgloginTimeOut'));
						window.location.reload();
					}
					setTimeout(checkLoginStatus, 1000);
				  }
				},
				error: function(model, resp){
				  setTimeout(checkLoginStatus, 1000);
				}
			  });
			}
			//
			function onLanguageChange(value)
			{
				var setLang = get_cookie("cookie_language");
				if(setLang != value){
					set_cookie("cookie_language", value);
					window.location.reload();
				}
			}
			function init() {
				
			  fileLoginLoadWait();
			  var selectedLang = get_cookie("cookie_language");

			  if(IsUndefOrNull(selectedLang))
			  {
				set_cookie("cookie_language", langMode);
			  }
			  else
			  {
				 langMode = selectedLang;
			  }	 
			 
				var mainView = Backbone.View.extend({
				  el: '#main_container',
				  template: _.template($('#main_content').html()),
				  initialize: function() {
					this.render();
				  },
				  render: function() {
					var that = this;
					dataGet(url('get_loginInfo')).fetch({
					  success: function(model, resp){
						that.$el.html( that.template(resp) );
						data = resp.data;

						if (!isLangRender)
						{
						  if (_.isEqual('logout', urlParamGetByName('reason')))
							infoMsg = lang("login", "msgLogout");
						  else if (_.isEqual('timeout', urlParamGetByName('reason')))
							infoMsg = lang("login", "msgSessionTimeout");
						}

						$(document).attr('title', show(data.title));

						showInfo();

						setUserNameFocus();
						
					  },
					  error: function(){
						console.log("render() failed.");
					  }
					});
				  },
				  events: {
					'click #btnLogin':'loginClick',
					'keypress #password':'enterClickChk',
					'keypress #username':'enterClickChk'
				  },
				  loginClick: function() {
					if ('btn_disabled' == $('#btnLogin').prop('className'))
					  return;
					infoMsg = "";
					showInfo();
					if (MockupMode)
					{
					  var username = $('#username').val();
					  var password = $('#password').val();
					  $('#lblProg').css('display', '');
					  if (username == '' && password == '')
						top.location.href="home.html?ver="+fileVer;
					  else
						ShowStatusError('password invalid');
					}
					else
					{
					  oldPasswordVal = $('#password').val();
					  clickLogin();
					  var __url = url_set_loginAuth+'&dummy='+(new Date().getTime());
					  var _data = formDataGet('setform');

					  var Datas = Backbone.Model.extend({
						url: __url,
						parse: function(resp, xhr){
						  checkLoginStatus();
						  return;
						}
					  });
					  var dataModel = new Datas();
					  dataModel.save(_data,{});
					}
				  },
				  enterClickChk: function(e){
					if(e.keyCode == '13')
					{
					  if(e.currentTarget.id == 'username')
						setPasswordFocus();
					  else
						this.loginClick();
					}
				  }
				}); 

				var mainFrame = new mainView();

			}
			 
		</script>


	</head>
	<body onload="init();">
		<div id="main_container"></div>
		<script id="main_content" type="text/template">
			<form id="setform">
			<div id="login-box" align="center">
				<div style="height: 30%;"></div>
				<table>
				  <tr>
					<td>
						<font><%= lang('login','lblUserName') %></font>
					</td>
					<td><input name="username" id="username" title="<%= lang('login','lblUserName') %>" value="" size="30" maxlength="32" /></td>
				  </tr>
				  
				  <tr>
					<td>
						<font><%= lang('login','lblPassword') %></font>
					</td>
					<td><input name="password" id="password" type="password" title="<%= lang('login','lblPassword') %>" value="" size="30" maxlength="32" /></td>
				  </tr>
				 <tr>
					  <td>
						<font><%= lang('login','lblLanguage') %></font>
					</td>
					  <td>
					<select id="language_select" onchange="onLanguageChange(this.value)" maxlength="32" >
									<%= languageInitShow(langMode) %>
					</select>
					</td>
					</tr>		 
				</table>
				<img src="images/empty.gif" style="width:10px;"></img>
				<table>
					<tr>
					  <td>
						<table class="btn_normal" id="btnLogin" onmouseout="SetNormalClass(this)" onmouseover="SetHoverClass(this)" onmouseup="SetHoverClass(this)" onmousedown="SetPressedClass(this)">
						<tbody>
						<tr>
						  <td id="btnLogin_tdNode" class="btnTD2"><a id="btnLogin_tdNode" title="<%= lang('login','tipLogin') %>" href="javascript:void(0)"><%= lang('login','btnLogin') %></a></td>
						</tr>
						</tbody>
						</table>
					  </td>
					</tr>
				</table>
			</div>
		</form>
	</script>
	</body>
</html>
