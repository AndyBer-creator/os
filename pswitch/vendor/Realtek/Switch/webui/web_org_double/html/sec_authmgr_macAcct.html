<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();
fileLoad("../js/spin.js", "js");

var data;
var valid = true;


var ctrlLang =
[
  "",
  "lang('authmgr','lblPortCtrlForceAuth')",
  "lang('authmgr','lblPortCtrlForceUnauth')"
];

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_authmgrMacAcct')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    'click #btnDel':'del'
  },
  add:function(e){
    OpenDialog('sec_authmgr_macAcctAdd.html');
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    OpenDialog(urlParamAppend('sec_authmgr_macAcctEdit.html', 'mac', GetTableSelectVal()));
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_authmgrMacAcctDel'), urlDataGen(GetTableMultiSelectVals('mac')));
  }
});

mainFrame = new mainView();
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('authmgr','titMacLocalAcctTable')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th rowspan=2><%= TableCheckboxAll() %></th>
    <th rowspan=2><%= lang('authmgr','lblMacAddr') %></th>
    <th rowspan=2><%= lang('authmgr','lblCtrl') %></th>
    <th rowspan=2><%= lang('authmgr','lblAssignVlan') %></th>
    <th colspan=2><%= lang('authmgr','lblTimeoutSec') %></th>
    <%= TableLastTh(2) %>
  </tr>
  <tr>
    <th><%= lang('authmgr','lblTimerReauth') %></th>
    <th><%= lang('authmgr','lblTimerInact') %></th>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.accts)) { %>
  <% _.each(data.accts, function(entry, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(entry.mac) %></td>
    <td class="StringCell"><%= entry.mac %></td>
    <td class="BinaryCell"><%= show(ctrlLang[entry.ctrl]) %></td>
    <td class="NumberCell"><%= IsUndefOrNull(entry.vid) ? lang('common','lblNA') : entry.vid %></td>
    <td class="NumberCell"><%= IsUndefOrNull(entry.reauth) ? lang('common','lblNA') : entry.reauth %></td>
    <td class="NumberCell"><%= IsUndefOrNull(entry.inact) ? lang('common','lblNA') : entry.inact %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>

<%= TableFoot(ButtonGroupAddEditDel('btnAdd', 'btnEdit', 'btnDel')) %>

</form>
</script>
</body>
</html>
