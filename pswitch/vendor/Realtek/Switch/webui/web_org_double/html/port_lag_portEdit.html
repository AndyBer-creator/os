<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var selVal;
var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlGetPortList('port',null,true);
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_portLAGPortEdit'), urlGetSelSouce())).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validString('descp',false,false,true);
    return valid;
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()){
      dataSet(url('set_portLAGPortEdit'), formDataGet('setform'));
    }
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('lag','titEditLAGPort')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('portList',selVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('port','lblDescription')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputText("descp", data.descp, data.maxlen_descp, 20) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <tr>
      <%= ShowFormContentGap() %>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('port','lblAdminStatus')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('adminStatus', data.adminStatus) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('port','lblSpeed'),'lblAdminSpeed') %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td>
              <%= RadioGroup('adminSpeed', data.adminSpeed, ['auto',lang('port','lblAuto')], ['auto_10',lang('port','lblAutoCapArg',['10M'])], ['auto_100',lang('port','lblAutoCapArg',['100M'])], ['auto_1000',lang('port','lblAutoCapArg',['1000M'])], ['auto_10_100',lang('port','lblAutoCapArg',['10M/100M'])]) %>
            </td>
            <td class="right" style="vertical-align:top;">
              <%= RadioGroup('adminSpeed', data.adminSpeed, ['10','10M'], ['100','100M'], ['1000','1000M'], ['10000','10G']) %>
            </td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('port','lblFlowCtrl')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('adminFlowCtrl', data.adminFlowCtrl, ['auto',lang('port','lblAuto')], ['enable',lang('common','txtEnable')], ['disable',lang('common','txtDisable')]) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
