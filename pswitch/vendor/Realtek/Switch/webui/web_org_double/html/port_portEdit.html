<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var selVal;
var data;

var treeSelColor = '#464646';
var treeSelBackground = '#ffeeb8';
var treeSelDocFontWeight = 'bold';

function portEthernetForceSpeedShow(adminspeed, TenGi, MultiGi)
{
  var txt = '';
         
  txt += '<td class="right" style="vertical-align:top;">'

  if(TenGi)
  {
	  txt += RadioGroup('adminSpeed', adminspeed, ['1000','1000M'], ['10000','10G'] );
  }
  else if(MultiGi)
  {
	  txt += RadioGroup('adminSpeed', adminspeed, ['10','10M'], ['100','100M']);
  }
  else
  {
	  txt += RadioGroup('adminSpeed', adminspeed, ['10','10M'], ['100','100M'], ['1000','1000M']);
  }
  
  txt += '</td>'

return txt;
}

function portEthernetAutoSpeedShow(adminspeed, TenGi, MultiGi)
{
  var txt = '';
         
  txt += '<td>'

  if(TenGi)
  {
	  txt += RadioGroup('adminSpeed', adminspeed, ['auto',lang('port','lblAuto')]);
  }
  else if(MultiGi)
  {
	  txt += RadioGroup('adminSpeed', adminspeed, ['auto',lang('port','lblAuto')], ['auto_10',lang('port','lblAutoCapArg',['10M'])], ['auto_100',lang('port','lblAutoCapArg',['100M'])], ['auto_1000',lang('port','lblAutoCapArg',['1000M'])] );
  }
  else
  {
	  txt += RadioGroup('adminSpeed', adminspeed, ['auto',lang('port','lblAuto')], ['auto_10',lang('port','lblAutoCapArg',['10M'])], ['auto_100',lang('port','lblAutoCapArg',['100M'])], ['auto_1000',lang('port','lblAutoCapArg',['1000M'])] );
  }
    
  txt += '</td>'

return txt;
}
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlGetPortList('port');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_portPortEdit'), urlGetSelSouce())).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
    {
      dataSet(url('set_portPortEdit'), formDataGet('setform'));
      //openTreeLink('html/port_port.html');
    }
  },
  checkValid: function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validString('descp',false,false,true);
    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('port','titEditPortSetting')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('portList',selVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('port','lblDescription')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputText("descp", data.descp, data.maxlen_descp, 20) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <tr>
      <%= ShowFormContentGap() %>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('port','lblAdminStatus')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('adminStatus', data.adminStatus) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('port','lblSpeed'),'lblAdminSpeed') %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <!--<td>
              <%= RadioGroup('adminSpeed', data.adminSpeed, ['auto',lang('port','lblAuto')], ['auto_10',lang('port','lblAutoCapArg',['10M'])], ['auto_100',lang('port','lblAutoCapArg',['100M'])], ['auto_1000',lang('port','lblAutoCapArg',['1000M'])], ['auto_10_100',lang('port','lblAutoCapArg',['10M/100M'])]) %>
            </td>-->
			<%= portEthernetAutoSpeedShow(data.adminSpeed, data.TenGi, data.MultiGi) %>
			<%= portEthernetForceSpeedShow(data.adminSpeed, data.TenGi, data.MultiGi) %>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('port','lblDuplex'),'lblAdminDuplex') %></th>
      <td class="formContentTD">
        <%= RadioGroup('adminDuplex', data.adminDuplex, ['auto',lang('port','lblAuto')], ['full',lang('port','txtDuplexFull')], ['half',lang('port','txtDuplexHalf')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('port','lblFlowCtrl')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('adminFlowCtrl', data.adminFlowCtrl, ['auto',lang('port','lblAuto')], ['enable',lang('common','txtEnable')], ['disable',lang('common','txtDisable')]) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
