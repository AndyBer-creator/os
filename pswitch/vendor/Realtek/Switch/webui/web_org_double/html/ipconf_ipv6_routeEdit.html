<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var refresh = true;
var selRoute;
var routeType = [
      "txtDefault",
      "txtDirectlyConnected",
      "txtStatic",
      "txtDHCP"
    ];

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    if (urlParamGetByName('route').length != 0)
      selRoute = urlParamGetByName('route');
    else
      CloseDialog();
    this.render();
  },
  render: function() {
    var that = this;
    if (!refresh)
        return;
    dataGet(urlParamAppend(url('get_ipconfIpv6RouteEdit'),'route',selRoute)).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;

        for (i = 0; i < data.route.length; i++)
        {
          var selVal = data.route[i].addr + '_' + data.route[i].plen + '_' + data.route[i].nextHop;
          var obj = {"name": data.route[i].addr, "val": data.route[i].addr + "_" + data.route[i].idx};
          if (selVal == selRoute)
          {
            $('#routeArray').append($('<option selected>', {value:obj.val}).text(obj.name));
            $('#plenTD').html(data.route[i].plen);
            $('#routeTypeTD').html(show(lang('ipconf', routeType[data.route[i].type])));
            $('#gwTD').html(data.route[i].nextHop);

            $('#dip').val(data.route[i].addr);
            $('#plen').val(data.route[i].plen);
            $('#nextHop').val(data.route[i].nextHop);
            $('#metric').val(data.route[i].metric);
          }
          else
          {
            $('#routeArray').append($('<option>', {value:obj.val}).text(obj.name));
          }
        }

        that.routeArrayChg();
      }
    });
  },
  events: {
    'change [name=routeArray]':'routeArrayChg',
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  routeArrayChg: function() {
    var val = GetSelectVal('routeArray');
    for (i = 0; i < data.route.length; i++)
    {
      var obj = data.route[i].addr + "_" + data.route[i].idx;
      if (val == obj)
      {
        $('#plenTD').html(data.route[i].plen);
        $('#routeTypeTD').html(show(lang('ipconf', routeType[data.route[i].type])));
        $('#gwTD').html(data.route[i].nextHop);

        $('#dip').val(data.route[i].addr);
        $('#plen').val(data.route[i].plen);
        $('#nextHop').val(data.route[i].nextHop);
        $('#metric').val(data.route[i].metric);
        break;
      }
    }
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      refresh = false;
      dataSet(url('set_ipconfIpv6RouteEdit'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    return valid;
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<%= DialogHead(lang('ipconf','titEditIPv6Route')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblDstIP'),'lblDstIP') %></th>
      <td class="formContentTD" id='routeList'>
        <%= Select('routeArray') %>
        <%= InputHidden('dip') %>
        <%= InputHidden('plen') %>
        <%= InputHidden('nextHop') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblPrefixLength')) %></th>
      <td class="formContentTD", id="plenTD">
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblRouteType')) %></th>
      <td class="formContentTD" id="routeTypeTD">
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblNextHopAddr'),'lblNextHopAddr') %></th>
      <td class="formContentTD" id="gwTD">
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblMetric'),'lblMetric') %></th>
      <td class="formContentTD">
        <%= InputTextDigit('metric',data.metric_dflt,3) %>
        <%= LabelHint(lang('common','txtRangeArgDefault',[data.metric_min,data.metric_max,data.metric_dflt])) %>
    </tr>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
