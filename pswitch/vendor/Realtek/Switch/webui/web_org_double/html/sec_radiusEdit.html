<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var selVal;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlParamGetByName('srvHost');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlParamAppend(url('get_secRadiusEdit'),'srvHost',selVal)).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();

        that.chkUseDflt();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'click input[type=checkbox]':'chkUseDflt',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
    {
      dataSet(url('set_secRadiusEdit'), formDataGet('setform'));
    }
  },
  chkUseDflt: function(){
    if(IsCheckboxChecked('keyDflt'))
      DisableInputText('key');
    else
      EnableInputText('key');

    if(IsCheckboxChecked('retryDflt'))
      DisableInputText('retry');
    else
      EnableInputText('retry');

    if(IsCheckboxChecked('timeoutDflt'))
      DisableInputText('timeout');
    else
      EnableInputText('timeout');
  },
  checkValid: function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validRange('pri', data.min_pri, data.max_pri);
    valid &= validRange('authPort', data.min_authPort, data.max_authPort);
    valid &= validRange('retry', data.min_retry, data.max_retry);
    valid &= validRange('timeout', data.min_timeout, data.max_timeout);
    valid &= validString('key');
    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('radius','titRadiusSrvEdit')) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('common','lblSrvIPHost')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('srvHost',selVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('common','lblSrvPort')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("authPort", data.authPort) %></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.min_authPort,data.max_authPort,data.dflt_authPort])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('radius','lblPri')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("pri", data.pri) %></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArg',[data.min_pri,data.max_pri])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th rowspan=2><%= LabelLeft(lang('radius','lblKeyStr')) %></th>
      <td class="formContentTD">
        <%= Checkbox("keyDflt", lang('radius','lblUseDflt'), data.keyDflt) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%= InputText("key", data.key, data.maxlen_key) %>
      </td>
    </tr>
    <tr>
      <th rowspan=2><%= LabelLeft(lang('radius','lblRetries')) %></th>
      <td class="formContentTD">
        <%= Checkbox("retryDflt", lang('radius','lblUseDflt'), data.retryDflt) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table>
          <tr>
            <td class="chkbxSpacing"><%= InputTextDigit("retry", data.retry) %></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.min_retry,data.max_retry,data.dflt_retry])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th rowspan=2><%= LabelLeft(lang('radius','lblTimeout')) %></th>
      <td class="formContentTD">
        <%= Checkbox("timeoutDflt", lang('radius','lblUseDflt'), data.timeoutDflt) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table>
          <tr>
            <td class="chkbxSpacing"><%= InputTextDigit("timeout", data.timeout) %></td>
            <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.min_timeout,data.max_timeout,data.dflt_timeout])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('radius','lblUsgType')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('usgType',data.usgType,[0,lang('radius','lblTypeLogin')],[1,lang('radius','lblTypeDot1x')],[2,lang('radius','lblTypeAll')]) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
