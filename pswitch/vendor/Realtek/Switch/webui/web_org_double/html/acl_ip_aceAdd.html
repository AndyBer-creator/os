<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var ipv4Proto =
[
    {   "name":"ICMP",        "val":1},
    {   "name":"IP in IP",    "val":4},
    {   "name":"TCP",         "val":6},
    {   "name":"EGP",         "val":8},
    {   "name":"IGP",         "val":9},
    {   "name":"UDP",         "val":17},
    {   "name":"HMP",         "val":20},
    {   "name":"RDP",         "val":27},
    {   "name":"IPV6",        "val":41},
    {   "name":"IPV6:ROUT",   "val":43},
    {   "name":"IPV6:FRAG",   "val":44},
    {   "name":"RSVP",        "val":46},
    {   "name":"IPV6:ICMP",   "val":58},
    {   "name":"OSPF",        "val":89},
    {   "name":"PIM",         "val":103},
    {   "name":"L2TP",        "val":115}
];

var ipv6Proto =
[
    {   "name":"TCP",         "val":6},
    {   "name":"UDP",         "val":17},
    {   "name":"ICMP",        "val":58}
];

var icmpv4Type =
[
    {   "name":"Echo Reply",              "val":0},
    {   "name":"Destination Unreachable", "val":3},
    {   "name":"Source Quench",           "val":4},
    {   "name":"Redirect",                "val":5},
    {   "name":"Alternate Host Address",  "val":6},
    {   "name":"Echo Request",            "val":8},
    {   "name":"Router Advertisement",    "val":9},
    {   "name":"Time exceeded",           "val":11},
    {   "name":"Timestamp",               "val":13},
    {   "name":"Timestamp Reply",         "val":14},
    {   "name":"Information Request",     "val":15},
    {   "name":"Information Reply",       "val":16},
    {   "name":"Address Mask Request",    "val":17},
    {   "name":"Address Mask Reply",      "val":18},
    {   "name":"Traceroute",                "val":30},
    {   "name":"Datagram Conversion Error", "val":31},
    {   "name":"Mobile Host Redirect",    "val":32},
    {   "name":"IPv6 Where Are You",      "val":33},
    {   "name":"IPv6 I Am Here",          "val":34},
    {   "name":"Mobile Registration Request", "val":35},
    {   "name":"Mobile Registration Reply",   "val":36},
    {   "name":"Domain Name Request",     "val":37},
    {   "name":"Domain Name Reply",       "val":38},
    {   "name":"Skip", "val":39}
];

var icmpv6Type =
[
    {   "name":"Destination Unreachable", "val":1},
    {   "name":"Packet Too Big2')",       "val":2},
    {   "name":"Time Exceeded",           "val":3},
    {   "name":"Parameter Problem",       "val":4},
    {   "name":"Echo Request",            "val":128},
    {   "name":"Echo Reply",              "val":129},
    {   "name":"MLD Query",               "val":130},
    {   "name":"MLD Report",              "val":131},
    {   "name":"MLD Done",                "val":132},
    {   "name":"Router Solicitation",     "val":133},
    {   "name":"Router Advertisement",    "val":134},
    {   "name":"ND NS",                   "val":135},
    {   "name":"ND NA",                   "val":136},
    {   "name":"MLDv2 Report",            "val":143}
];

var ipProto;
var icmpType;
var type;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    type = urlParamGetByName('type');

    if (type == 2)
    {
      ipProto = ipv4Proto;
      icmpType = icmpv4Type;
    }
    else
    {
      ipProto = ipv6Proto;
      icmpType = icmpv6Type;
    }

    this.$el.html( this.template() );
    PagePostInit();
    this.chgProtoType();
    this.any();
    this.chgSport();
    this.chgDport();
    this.chgTos();
    this.chgIcmpType();
    this.chgIcmpCode();
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'change #protocol_1':'selProto',
    'blur #protocol_2':'selProto',
    'click [name=protoType]':'chgProtoType',
    'click [name=sportType]':'chgSport',
    'click [name=dportType]':'chgDport',
    'click [name=tosType]':'chgTos',
    'click [name=icmpType]':'chgIcmpType',
    'click [name=icmpCodeType]':'chgIcmpCode',
    'click input[type=checkbox]':'any',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
    {
      var pri = $('#pri').val();
      if (!IsUndefOrNull(parent.data.aces))
      {
        for (var i = 0 ; i < parent.data.aces.length; i++)
        {
          if (pri == parent.data.aces[i].pri)
          {
            //ShowStatusWarning("Sequence is exist.");
		    ShowStatusWarning(lang('warning','warningAclsequence'));
            return;
          }
        }
      }

      dataSet(url('set_aclACE'), formDataGet('setform'), false);
    }
  },
  selProto: function() {
    var proto = 0;

    clearAllErrMsg();
    DisableInputText('sports_1');
    DisableInputText('sports_2');
    DisableInputText('sporte_2');
    DisableInputText('dports_1');
    DisableInputText('dports_2');
    DisableInputText('dporte_2');
    DisableSelect('icmpType_1');
    DisableInputText('icmpType_2');
    DisableInputText('icmpCode');

    if (GetRadioVal('protoType') == 1)
    {
      proto = GetSelectVal('protocol_1');
    }
    else if (GetRadioVal('protoType') == 2)
    {
      if (!validRange('protocol_2', 0, 255))
        return;

      proto = str2int($('#protocol_2').val());
    }

    if ((1 == proto && 2 == type) || (58 == proto && 3 == type))
    {
      DisableRadioGroup('urg');
      DisableRadioGroup('ack');
      DisableRadioGroup('psh');
      DisableRadioGroup('rst');
      DisableRadioGroup('syn');
      DisableRadioGroup('fin');
      DisableRadioGroup('sportType');
      DisableRadioGroup('dportType');
      EnableRadioGroup('icmpType');
      EnableRadioGroup('icmpCodeType');
      this.chgIcmpType();
      this.chgIcmpCode();
    }
    else if(6 == proto)
    {
      EnableRadioGroup('urg');
      EnableRadioGroup('ack');
      EnableRadioGroup('psh');
      EnableRadioGroup('rst');
      EnableRadioGroup('syn');
      EnableRadioGroup('fin');
      EnableRadioGroup('sportType');
      EnableRadioGroup('dportType');
      DisableRadioGroup('icmpType');
      DisableRadioGroup('icmpCodeType');
      this.chgSport();
      this.chgDport();
    }
    else if(17 == proto)
    {
      DisableRadioGroup('urg');
      DisableRadioGroup('ack');
      DisableRadioGroup('psh');
      DisableRadioGroup('rst');
      DisableRadioGroup('syn');
      DisableRadioGroup('fin');
      EnableRadioGroup('sportType');
      EnableRadioGroup('dportType');
      DisableRadioGroup('icmpType');
      DisableRadioGroup('icmpCodeType');
      this.chgSport();
      this.chgDport();
    }
    else
    {
      DisableRadioGroup('urg');
      DisableRadioGroup('ack');
      DisableRadioGroup('psh');
      DisableRadioGroup('rst');
      DisableRadioGroup('syn');
      DisableRadioGroup('fin');
      DisableRadioGroup('sportType');
      DisableRadioGroup('dportType');
      DisableRadioGroup('icmpType');
      DisableRadioGroup('icmpCodeType');
    }
  },
  chgProtoType:function(e){
    if (GetRadioVal('protoType') == 0)
    {
      DisableSelect('protocol_1');
      DisableInputText('protocol_2');
    }
    else if (GetRadioVal('protoType') == 1)
    {
      EnableSelect('protocol_1');
      DisableInputText('protocol_2');
    }
    else
    {
      DisableSelect('protocol_1');
      EnableInputText('protocol_2');
    }

    this.selProto();
  },
  chgSport:function(e){
    if (GetRadioVal('sportType') == 0)
    {
      DisableInputText('sports_1');
      DisableInputText('sports_2');
      DisableInputText('sporte_2');
    }
    else if (GetRadioVal('sportType') == 1)
    {
      EnableInputText('sports_1');
      DisableInputText('sports_2');
      DisableInputText('sporte_2');
    }
    else
    {
      DisableInputText('sports_1');
      EnableInputText('sports_2');
      EnableInputText('sporte_2');
    }
  },
  chgDport:function(e){
    if (GetRadioVal('dportType') == 0)
    {
      DisableInputText('dports_1');
      DisableInputText('dports_2');
      DisableInputText('dporte_2');
    }
    else if (GetRadioVal('dportType') == 1)
    {
      EnableInputText('dports_1');
      DisableInputText('dports_2');
      DisableInputText('dporte_2');
    }
    else
    {
      DisableInputText('dports_1');
      EnableInputText('dports_2');
      EnableInputText('dporte_2');
    }
  },
  chgTos:function(e){
    if (GetRadioVal('tosType') == 0)
    {
      DisableInputText('dscp');
      DisableInputText('ipp');
    }
    else if (GetRadioVal('tosType') == 1)
    {
      EnableInputText('dscp');
      DisableInputText('ipp');
    }
    else
    {
      DisableInputText('dscp');
      EnableInputText('ipp');
    }
  },
  chgIcmpType:function(e){
    if (GetRadioVal('icmpType') == 0)
    {
      DisableSelect('icmpType_1');
      DisableInputText('icmpType_2');
    }
    else if (GetRadioVal('icmpType') == 1)
    {
      EnableSelect('icmpType_1');
      DisableInputText('icmpType_2');
    }
    else
    {
      DisableSelect('icmpType_1');
      EnableInputText('icmpType_2');
    }
  },
  chgIcmpCode:function(e){
    if (GetRadioVal('icmpCodeType') == 0)
      DisableInputText('icmpCode');
    else if (GetRadioVal('icmpCodeType') == 2)
      EnableInputText('icmpCode');
  },
  any:function(e){
     if (IsCheckboxChecked('sip_any'))
    {
      DisableInputText('sip');
      DisableInputText('smask');
    }
    else
    {
      EnableInputText('sip');
      EnableInputText('smask');
    }

    if (IsCheckboxChecked('dip_any'))
    {
      DisableInputText('dip');
      DisableInputText('dmask');
    }
    else
    {
      EnableInputText('dip');
      EnableInputText('dmask');
    }

  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;

    valid &= validRange('pri', parent.data.minPri, parent.data.maxPri);
    valid &= validRange('protocol_2', 0, 255);

    if (2 == type)
    {
      valid &= validIPv4Mask('sip');
      valid &= validIPv4Mask('smask');
      valid &= validIPv4Mask('dip');
      valid &= validIPv4Mask('dmask');
    }
    else if (3 == type)
    {
      valid &= validIPv6Addr('sip');
      valid &= validRange('smask', 0, 128);
      valid &= validIPv6Addr('dip');
      valid &= validRange('dmask', 0, 128);
    }

    if (!isInputDisable('sports_2') && (parseInt($('#sports_2').val()) >= parseInt($('#sporte_2').val())))
      errMsgUpdate('sporte_2', lang('acl','errPortRange'));

    if (!isInputDisable('dports_2') && parseInt(($('#dports_2').val()) >= parseInt($('#dporte_2').val())))
      errMsgUpdate('dporte_2', lang('acl','errPortRange'));

    valid &= validRange('sports_1', 0, 65535);
    valid &= validRange('sports_2', 0, 65535);
    valid &= validRange('sporte_2', 0, 65535);
    valid &= validRange('dports_1', 0, 65535);
    valid &= validRange('dports_2', 0, 65535);
    valid &= validRange('dporte_2', 0, 65535);

    valid &= validRange('dscp', 0, 63);
    valid &= validRange('ipp', 0, 7);
    valid &= validRange('icmpType_2', 0, 255);
    valid &= validRange('icmpCode', 0, 255);
    return valid;
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('acl','titAclACEAdd')) %>
<%= InputHidden('name', parent.data.name) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th><%= LabelLeft(lang('acl','lblAclName')) %></th>
      <td class="formContentTD">
        <%= show(parent.data.name) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('acl','lblAclSequence')) %></th>
      <td class="formContentTD">
        <%= InputTextDigit('pri', '', 10, 25) %>
        <%= LabelHint(lang('common','txtRangeArg',[parent.data.minPri, parent.data.maxPri])) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('acl','lblAclAction')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('action',0 ,[0, lang('acl','lblAclPermit')], [1, lang('acl','lblAclDeny')], [2, lang('acl','lblAclShutdown')]) %>
      </td>
    </tr>
    <tr>
      <th rowspan='3'><%= LabelLeft(lang('acl','lblAclProto')) %></th>
      <td class="formContentTD">
        <%= Radio('protoType', lang('acl','lblAclAny'), 0, true) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
      <table><tr>
          <td><input type=radio name="protoType" value="1"></td>
          <td class="right"><%= lang('acl','lblAclSelctList') %></td>
          <td class="right"><%= Select('protocol_1', ipProto, '') %></td>
        </tr></table>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table><tr>
          <td><input type=radio name="protoType" value="2"></td>
          <td class="right"><%= lang('acl','lblAclIpputValue') %></td>
          <td class="right"><%= InputTextDigit('protocol_2', '', 3, 25) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArg',[0, 255])) %></td>
        </tr></table>
      </td>
    </tr>

<% if (2 == type) { %>
    <tr>
      <th rowspan='2'><%= LabelLeft(lang('acl','lblAclSource') + " " + lang('acl','lblAclIp')) %></th>
      <td class="formContentTD">
        <%= Checkbox('sip_any', lang('acl', 'lblAclAny'), true) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%= InputTextIPv4('sip', '', 17, 25) %>
        &#32;&#47;&#32;
        <%= InputTextIPv4('smask', '', 17, 25) %>
        <%= LabelHint("(" + lang('acl','lblAclAddress') + " / " + lang('acl','lblAclMask') + ")") %>
      </td>
    </tr>
    <tr>
      <th rowspan='2'><%= LabelLeft(lang('acl','lblAclDestination') + " " + lang('acl','lblAclIp')) %></th>
      <td class="formContentTD">
        <%= Checkbox('dip_any', lang('acl', 'lblAclAny'), true) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%= InputTextIPv4('dip', '', 17, 25) %>
        &#32;&#47;&#32;
        <%= InputTextIPv4('dmask', '', 17, 25) %>
        <%= LabelHint("(" + lang('acl','lblAclAddress') + " / " + lang('acl','lblAclMask') + ")") %>
      </td>
    </tr>
<% } else if (3 == type) { %>
    <tr>
      <th rowspan='2'><%= LabelLeft(lang('acl','lblAclSource') + " " + lang('acl','lblAclIp')) %></th>
      <td class="formContentTD">
        <%= Checkbox('sip_any', lang('acl', 'lblAclAny'), true) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%= InputTextIPv6('sip', '', 40, 25) %>
        &#32;&#47;&#32;
        <%= InputTextDigit('smask', '', 3, 25) %>
        <%= LabelHint("(" + lang('acl','lblAclAddress') + " / " + lang('acl','lblAclPrefix') + " " + lang('common','txtRangeArg',[0, 128])) + ")" %>
      </td>
    </tr>
    <tr>
      <th rowspan='2'><%= LabelLeft(lang('acl','lblAclDestination') + " " + lang('acl','lblAclIp')) %></th>
      <td class="formContentTD">
        <%= Checkbox('dip_any', lang('acl', 'lblAclAny'), true) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%= InputTextIPv6('dip', '', 40, 25) %>
        &#32;&#47;&#32;
        <%= InputTextDigit('dmask', '', 3, 25) %>
        <%= LabelHint("(" + lang('acl','lblAclAddress') + " / " + lang('acl','lblAclPrefix') + " " + lang('common','txtRangeArg',[0, 128]) + ")") %>
      </td>
    </tr>
<% } %>
     <tr>
      <th rowspan='3'><%= LabelLeft(lang('acl','lblAclToS')) %></th>
      <td class="formContentTD">
        <%= Radio('tosType', lang('acl','lblAclAny'), 0, true) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
      <table><tr>
          <td><input type=radio name="tosType" value="1"></td>
          <td class="right"><%= lang('acl','lblAclDSCP') %></td>
          <td class="right"><%= InputTextDigit('dscp', '', 2, 25) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArg',[0, 63])) %></td>
        </tr></table>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table><tr>
          <td><input type=radio name="tosType" value="2"></td>
          <td class="right"><%= lang('acl','lblAclIPP') %></td>
          <td class="right"><%= InputTextDigit('ipp', '', 1, 25) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArg',[0, 7])) %></td>
        </tr></table>
      </td>
    </tr>

    <tr>
      <th rowspan='3'><%= LabelLeft(lang('acl','lblAclSource') + " " + lang('acl', 'lblAclPort')) %></th>
      <td class="formContentTD">
        <%= Radio('sportType', lang('acl','lblAclAny'), 0, true) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
      <table><tr>
          <td><input type=radio name="sportType" value="1"></td>
          <td class="right"><%= lang('acl','lblAclSingle') %></td>
          <td class="right"><%= InputTextDigit('sports_1', '', 5, 25) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArg',[0, 65535])) %></td>
        </tr></table>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table><tr>
          <td><input type=radio name="sportType" value="2"></td>
          <td class="right"><%= lang('acl','lblAclRange') %></td>
          <td class="right">
            <%= InputTextDigit('sports_2', '', 5, 25) %>
            &#32;&#45;&#32;
            <%= InputTextDigit('sporte_2', '', 5, 25) %>
          </td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArg',[0, 65535])) %></td>
        </tr></table>
      </td>
    </tr>

    <tr>
      <th rowspan='3'><%= LabelLeft(lang('acl','lblAclDestination') + " " + lang('acl', 'lblAclPort')) %></th>
      <td class="formContentTD">
        <%= Radio('dportType', lang('acl','lblAclAny'), 0, true) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
      <table><tr>
          <td><input type=radio name="dportType" value="1"></td>
          <td class="right"><%= lang('acl','lblAclSingle') %></td>
          <td class="right"><%= InputTextDigit('dports_1', '', 5, 25) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArg',[0, 65535])) %></td>
        </tr></table>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table><tr>
          <td><input type=radio name="dportType" value="2"></td>
          <td class="right"><%= lang('acl','lblAclRange') %></td>
          <td class="right">
            <%= InputTextDigit('dports_2', '', 5, 25) %>
            &#32;&#45;&#32;
            <%= InputTextDigit('dporte_2', '', 5, 25) %>
          </td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArg',[0, 65535])) %></td>
        </tr></table>
      </td>
    </tr>

    <tr>
      <th rowspan='6'><%= LabelLeft(lang('acl','lblAclTcpFlag')) %></th>
      <td class="formContentTD">
        <table><tr>
        <td class="right"><%= "Urg: " %></td>
        <td class="right">
          <%= RadioGroupPlain('urg', 2, [0,lang('acl','lblAclSet')], [1,lang('acl','lblAclUnset')], [2,lang('acl','lblAclNone')]) %>
        </td>
        </tr></table>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table><tr>
        <td class="right"><%= "Ack: " %></td>
        <td class="right">
          <%= RadioGroupPlain('ack', 2, [0,lang('acl','lblAclSet')], [1,lang('acl','lblAclUnset')], [2,lang('acl','lblAclNone')]) %>
        </td>
        </tr></table>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table><tr>
        <td class="right"><%= "Psh: " %></td>
        <td class="right">
          <%= RadioGroupPlain('psh', 2, [0,lang('acl','lblAclSet')], [1,lang('acl','lblAclUnset')], [2,lang('acl','lblAclNone')]) %>
        </td>
        </tr></table>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table><tr>
        <td class="right"><%= "Rst: " %></td>
        <td class="right">
          <%= RadioGroupPlain('rst', 2, [0,lang('acl','lblAclSet')], [1,lang('acl','lblAclUnset')], [2,lang('acl','lblAclNone')]) %>
        </td>
        </tr></table>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table><tr>
        <td class="right"><%= "Syn: " %></td>
        <td class="right">
          <%= RadioGroupPlain('syn', 2, [0,lang('acl','lblAclSet')], [1,lang('acl','lblAclUnset')], [2,lang('acl','lblAclNone')]) %>
        </td>
        </tr></table>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table><tr>
        <td class="right"><%= "Fin: " %></td>
        <td class="right">
          <%= RadioGroupPlain('fin', 2, [0,lang('acl','lblAclSet')], [1,lang('acl','lblAclUnset')], [2,lang('acl','lblAclNone')]) %>
        </td>
        </tr></table>
      </td>
    </tr>

    <tr>
      <th rowspan='3'><%= LabelLeft(lang('acl','lblAclICMP') + " " + lang('acl','lblAclType')) %></th>
      <td class="formContentTD">
        <%= Radio('icmpType', lang('acl','lblAclAny'), 0, true) %>
      </td>
    </tr>
