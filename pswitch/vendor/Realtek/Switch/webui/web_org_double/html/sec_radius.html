<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_secRadius')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    'click #btnDel':'del'
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_secRadius'), formDataGet('setform'));
  },
  checkValid: function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validRange('retry', data.min_retry, data.max_retry);
    valid &= validRange('timeout', data.min_timeout, data.max_timeout);
    valid &= validString('key');
    return valid;
  },
  add:function(e){
    OpenDialog('sec_radiusAdd.html');
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    OpenDialog(urlParamAppend('sec_radiusEdit.html', 'srvHost', GetTableSelectVal()));
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_secRadiusDel'), urlDataGen(GetTableMultiSelectVals('srvHost')));
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <%= ShowFormTitle(lang('radius','lblUseDfltParam')) %>
    <tr>
      <th><%= LabelLeft(lang('radius','lblRetries')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("retry", data.retry) %></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.min_retry,data.max_retry,data.dflt_retry])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('radius','lblTimeout')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("timeout", data.timeout) %></td>
            <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.min_timeout,data.max_timeout,data.dflt_timeout])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('radius','lblKeyStr')) %></th>
      <td class="formContentTD">
        <%= InputText("key", data.key, data.maxlen_key) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

<%= TableHead(lang('radius','titRadiusSrv')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('common','lblSrvIPHost') %></th>
    <th><%= lang('common','lblSrvPort') %></th>
    <th><%= lang('radius','lblPri') %></th>
    <th><%= lang('radius','lblRetries') %></th>
    <th><%= lang('radius','lblTimeout') %></th>
    <th><%= lang('radius','lblUsgType') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.srvs)) { %>
  <% _.each(data.srvs, function(entry, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(entry.srvHost) %></td>
    <td class="StringCell"><%= entry.srvHost %></td>
    <td class="NumberCell"><%= entry.authPort %></td>
    <td class="NumberCell"><%= entry.pri %></td>
    <td class="NumberCell"><%= entry.retry %></td>
    <td class="NumberCell"><%= entry.timeout %></td>
    <td class="StringCell"><%= show(entry.usgType) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>

<%= TableFoot(ButtonGroupAddEditDel('btnAdd', 'btnEdit', 'btnDel')) %>

</form>
</script>
</body>
</html>
