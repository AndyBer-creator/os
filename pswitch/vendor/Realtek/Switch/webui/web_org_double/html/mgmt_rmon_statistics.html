<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var time;
var interval;

function reload()
{
  mainFrame.render();
}

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    if (urlParamGetByName('time').length == 0)
      time = 0;
    else
      time = str2int(urlParamGetByName('time'));

    this.render();
  },
  render: function() {
    var that = this;
    var urlFinal = urlParamAppend(url('get_mgmtRmonStats'), 'time', time);
    dataGet(urlFinal).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'change #selectRate':'selectRate',
    'click #btnView':'view',
    'click #btnRefresh':'refresh',
    'click #btnClear':'clear'
  },
  selectRate: function(e) {
    time = GetSelectVal('selectRate');
    clearInterval(interval);

    if (0 != time)
      interval = setInterval(reload, time * 1000);
  },
  view:function(e){
    if (GetTableMultiSelectNum() == 0)
    {
      ShowStatusWarning(lang('common','tipNoEntrySelected'));
      return;
    }
    else if (GetTableMultiSelectNum() > 1)
    {
      ShowStatusWarning(lang('common','tipOnlyOneCanbeEdited'));
      return;
    }
    OpenDialog(urlAppend('mgmt_rmon_statisticsIntf.html', GetTableMultiSelectVals('port')));
  },
  refresh:function(e){
    this.render();
  },
  clear:function(e){
    if (!CheckTableEdit())
      return;
    $('#portList').val(urlGetPortList('port', GetTableMultiSelectVals('port')));
    dataSet(url('set_mgmtRmonStatsClear'), formDataGet('setform'));
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<%= InputHidden('portList','') %>
<%= TableHead(lang('rmon','txtRmonStatisticsTable')) %>
<%= TableRefreshSelect('selectRate', time) %>
<table class="dataTable" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('port','lblEntryNo') %></th>
    <th><%= lang('port','lblPort') %></th>
    <th><%= lang('rmon','thBytesRec') %></th>
    <th><%= lang('rmon','thDropEvents') %></th>
    <th><%= lang('rmon','thPktsRec') %></th>
    <th><%= lang('rmon','thBPktsRec') %></th>
    <th><%= lang('rmon','thMPktsRec') %></th>
    <th><%= lang('rmon','thCRCAlignErr') %></th>
    <th><%= lang('rmon','thUndersizePkts') %></th>
    <th><%= lang('rmon','thOversizePkts') %></th>
    <th><%= lang('rmon','thFragments') %></th>
    <th><%= lang('rmon','thJabbers') %></th>
    <th><%= lang('rmon','thCollisions') %></th>
    <th><%= lang('rmon','thFrames64B') %></th>
    <th><%= lang('rmon','thFrames65127B') %></th>
    <th><%= lang('rmon','thFrames128255B') %></th>
    <th><%= lang('rmon','thFrames256511B') %></th>
    <th><%= lang('rmon','thFrames5121023B') %></th>
    <th><%= lang('rmon','thFramesOver1024B') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="NumberCell"><%= port.bytesRec %></td>
    <td class="NumberCell"><%= port.dropEvents %></td>
    <td class="NumberCell"><%= port.pktsRec %></td>
    <td class="NumberCell"><%= port.bPktsRec %></td>
    <td class="NumberCell"><%= port.mPktsRec %></td>
    <td class="NumberCell"><%= port.CRCAlignErr %></td>
    <td class="NumberCell"><%= port.undersizePkts %></td>
    <td class="NumberCell"><%= port.oversizePkts %></td>
    <td class="NumberCell"><%= port.fragments %></td>
    <td class="NumberCell"><%= port.jabbers %></td>
    <td class="NumberCell"><%= port.collisions %></td>
    <td class="NumberCell"><%= port.frames64B %></td>
    <td class="NumberCell"><%= port.frames65127B %></td>
    <td class="NumberCell"><%= port.frames128255B %></td>
    <td class="NumberCell"><%= port.frames256511B %></td>
    <td class="NumberCell"><%= port.frames5121023B %></td>
    <td class="NumberCell"><%= port.framesOver1024B %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonGroup(ButtonClear('btnClear'),ButtonRefresh('btnRefresh'),ButtonShort(lang('rmon','btnStatsIntfView'),'btnView'))) %>
</form>
</script>
</body>
</html>
