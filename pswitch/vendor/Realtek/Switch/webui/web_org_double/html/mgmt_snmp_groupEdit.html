<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var selVal;
var selIdx;
var data;
var snmpVer = "v1";
var snmpSlv = 0;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlParamGetByName('idx');
    for (i = 0; i < parent.data.groups.length; i++)
    {
      if (parent.data.groups[i].idx == selVal)
      {
        selIdx = i;
        if (str2var(parent.data.groups[i].secModel) == 'SNMPv2')
          snmpVer = "v2";
        else if (str2var(parent.data.groups[i].secModel) == 'SNMPv3')
          snmpVer = "v3";

        if (str2var(parent.data.groups[i].secLevel) == 'Authentication')
          snmpSlv = 1;
        else if (str2var(parent.data.groups[i].secLevel) == 'Authentication and Privacy')
          snmpSlv = 2;

        break;
      }
    }
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_snmpGroupEdit'), 'idx', selVal).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
        that.secModelchg();
        that.enableView();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'click [name=secModel]':'secModelchg',
    'click input[type=checkbox]':'enableView'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
      dataSet(url('set_snmpGroupEdit'), formDataGet('setform'));
  },
  secModelchg: function(){
    if ('v3' == GetRadioVal('secModel'))
    {
      EnableLabel('lblsecLevl');
      EnableRadioGroup('secLevel');
    }
    else
    {
      RadioGroup('secLevel','noAuth');
      DisableLabel('lblsecLevl');
      DisableRadioGroup('secLevel');
    }
  },
  enableView: function() {
   DisableCheckbox('isRdView');
   if(IsCheckboxChecked('isWrView'))
      EnableSelect('writeView');
    else
      DisableSelect('writeView');

    if(IsCheckboxChecked('isNotify'))
      EnableSelect('notifyView');
    else
      DisableSelect('notifyView');
  }
});

EnterKeyEvent('apply');
mainFrame = new mainView();
}

</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('snmp','titEditSnmpGroup')) %>
<%= InputHidden('idx',selVal) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">

    <tr>
      <th><%= LabelLeft(lang('snmp','lblGroupName')) %></th>
      <td class="formContentTD">
        <%= show(parent.data.groups[selIdx].groupName) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('snmp','lblSecurityModel')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('secModel',snmpVer,['v1',lang('snmp','lblSNMPv1')],['v2',lang('snmp','lblSNMPv2')],['v3',lang('snmp','lblSNMPv3')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('snmp','lblSecurityLevel'), "lblsecLevl") %></th>
      <td class="formContentTD">
        <%= RadioGroup('secLevel',snmpSlv,[0,lang('snmp','lblNoAuth')],[1,lang('snmp','lblAuth')],[2,lang('snmp','lblPriv')]) %>
      </td>
    </tr>

    <tr>
      <th rowspan=6><%= LabelLeft(lang('snmp','lblView')) %></th>
      <td class="formContentTD">
        <%= Checkbox("isRdView",'Read', true, show(parent.data.groups[selIdx].readView)) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%= SelectArry("readView", data.views,parent.data.groups[selIdx].readView) %>
      </td>
    </tr>

    <tr>
      <td class="formContentTD">
        <%= Checkbox("isWrView",'Write', (IsUndefOrNull(parent.data.groups[selIdx].writeView)) ? false : true) %>
      </td>
    </tr>

    <tr>
      <td class="formContentTD">
        <%= SelectArry("writeView", data.views,parent.data.groups[selIdx].writeView) %>
      </td>
    </tr>

    <tr>
      <td class="formContentTD">
        <%= Checkbox("isNotify",'Notify', (IsUndefOrNull(parent.data.groups[selIdx].notifyView)) ? false : true) %>
      </td>
    </tr>

    <tr>
      <td class="formContentTD">
        <%= SelectArry("notifyView", data.views,parent.data.groups[selIdx].notifyView) %>
      </td>
    </tr>

    </table>
  </td>
</tr>
</table>

<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>


</form>
</script>

</body>
</html>
