<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var lite = 1;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
<!--#ifdef CONFIG_SYS_PROTO_STP_MSTP-->
    lite = 0;
<!--#endif-->
    dataGet(url('get_stpGlobal')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'blur input[type=text]':'checkValid'
  },
  apply: function() {
    if (this.checkValid()) {
      var mode = GetRadioVal('mode');
      if (IsCheckboxChecked('enable') && data.mode != mode) {
        OpenConfirmBox(lang('stp','msgStpModeChange'),
          function(){
            dataSet(url('set_stpGlobal'), formDataGet('setform'));
          }
        );
      }
      else {
        dataSet(url('set_stpGlobal'), formDataGet('setform'));
      }
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validStpPri('pri',data.pri_min,data.pri_max, 4096);
    valid &= validRange('helloTime',data.helloTime_min,data.helloTime_max);
    valid &= validRange('age',data.age_min,data.age_max);
    valid &= validRange('fwdDelay',data.fwdDelay_min,data.fwdDelay_max);
    valid &= validRange('txCnt',data.txCnt_min,data.txCnt_max);
<!--#ifdef CONFIG_SYS_PROTO_STP_MSTP-->
    valid &= validString('regionName');
    valid &= validRange('revision',data.revision_min,data.revision_max);
    valid &= validRange('maxhop',data.maxhop_min,data.maxhop_max);
<!--#endif-->
    return valid;
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('stp','lblState')) %></th>
      <td class="formContentTD">
        <%= Checkbox('enable',lang('common','txtEnable'),data.enable) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblOperMode')) %></th>
      <td class="formContentTD">
        <% if (!lite) { %>
        <%= RadioGroup('mode',data.mode,['stp',lang('stp','txtOperModeSTP')],['rstp',lang('stp','txtOperModeRSTP')], ['mstp',lang('stp','txtOperModeMSTP')]) %>
        <% } else { %>
        <%= RadioGroup('mode',data.mode,['stp',lang('stp','txtOperModeSTP')],['rstp',lang('stp','txtOperModeRSTP')]) %>
        <% } %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPathCost')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('pathcost_method',data.pathcost_method,['long',lang('stp','txtPathCostLong')],['short',lang('stp','txtPathCostShort')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblBpduFwd')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('bpduFwd',data.bpduFwd,['filtering',lang('stp','txtBpduFwdFiltering')],['flooding',lang('stp','txtBpduFwdFlooding')]) %>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPriority')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("pri", data.pri, 5) %></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.pri_min,data.pri_max,data.pri_dflt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblHelloTime')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("helloTime", data.helloTime, 2) %></td>
            <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.helloTime_min,data.helloTime_max,data.helloTime_dflt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblMaxAge')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("age", data.age, 2) %></td>
            <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.age_min,data.age_max,data.age_dflt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblFwdDelay')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("fwdDelay", data.fwdDelay, 2) %></td>
            <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.fwdDelay_min,data.fwdDelay_max,data.fwdDelay_dflt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblTxHoldCnt')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("txCnt", data.txCnt, 2) %></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.txCnt_min,data.txCnt_max,data.txCnt_dflt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
<!--#ifdef CONFIG_SYS_PROTO_STP_MSTP-->
    <%= ShowFormContentGap() %>
    <tr>
      <th><%= LabelLeft(lang('stp','lblRegionName')) %></th>
      <td class="formContentTD">
        <input type="text" name="regionName" id="regionName" maxlength=<%= data.regionName_maxlen %> value="<%= data.regionName %>">
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblRevision')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("revision", data.revision, 5) %></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.revision_min,data.revision_max,data.revision_dflt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblMaxHop')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("maxhop", data.maxhop, 2) %></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.maxhop_min,data.maxhop_max,data.maxhop_dflt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
<!--#endif-->
    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('common','lblOperationalStatus')) %>
    <tr>
      <th><%= LabelLeft(lang('stp','lblBridgeId')) %></th>
      <td class="formContentTD">
        <%= data.bridgeId %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblRootBridgeId')) %></th>
      <td class="formContentTD">
        <%= data.rootBridgeId %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblRootPort')) %></th>
      <td class="formContentTD">
        <%= !IsUndefOrNull(data.rootPort) ? data.rootPort : lang('common','lblNA') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblRootCost')) %></th>
      <td class="formContentTD">
        <%= data.rootCost %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblTcCnt')) %></th>
      <td class="formContentTD">
        <%= data.tcCnt %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblTcLastTime')) %></th>
      <td class="formContentTD">
        <%= str2var(data.tcLastTime) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= ButtonGroupApply('btnApply') %>
</form>
</script>
</body>
</html>
