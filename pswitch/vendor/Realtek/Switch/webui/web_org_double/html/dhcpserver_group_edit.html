<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var group;
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
	group = "_src="+urlParamGetByName('idx');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_dhcpRelaygroupEdit'), group)).fetch({
      success: function(model, resp){
       logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;
		that.infShow();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid',
	'click #status':'infShow'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_dhcpRelaygroupEdit'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validIPv4Addr('groupip');
    return valid;
  },
  infShow: function()
  {
    if (IsChecked('status'))
    {
      EnableInputText('groupIntf');
    }
    else
    {
      DisableInputText('groupIntf');
    }
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<%= DialogHead(lang('dr','lblDrGroupTable')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
    	<th> <%= LabelLeft(lang('dr','lblDrVlanifGroup'), 'lblDrVlanifGroup') %></th>
		<td class="formContentTD"> <%= data.groupid %> <%= InputHidden('groupid',data.groupid) %></td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('dr','lblDrGroupIp'),'lblDrGroupIp') %></th>
      <td class='formContentTD'><%= InputTextIPv4('groupip', data.groupip) %></td>
    </tr>
	<tr>
	  <th><%= LabelLeft(lang('dr','lblGroupBindVlanIf'),'lblGroupBindVlanIf') %></th>
	  <td class="formContentTD">
		 <table>
		  <tr>
			  <!--<td><%= CheckboxTxtEnable('status',lang('common','txtEnable'), data.status) %></td>-->
			  <td><%= Checkbox('status',lang('common','txtEnable'),data.status) %></td>
		  </tr>
		  <tr>
			  <td><%= selectOption('groupIntf', data.drintf, data.groupIntf, 150) %></td>
		  </tr>
		 </table> 
	  </td>
	</tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
