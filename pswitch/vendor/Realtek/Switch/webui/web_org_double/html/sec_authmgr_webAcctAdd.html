<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_authmgrWebAcctAdd')).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();

        that.userDefined();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid',
    'blur input[type=password]':'checkValid',
    'click [type=checkbox]':'userDefined'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
    {
      if (this.passwordValid()) {
        dataSet(url('set_authmgrWebAcctAdd'), formDataGet('setform'), true);
      }
    }
  },
  passwordValid:function(){
    var username = $('#username').val();
    var pwd = $('#password').val();
    var confirmPwd = $('#confirmPassword').val();

    if (!isASCII(pwd)) {
      ShowStatusError(lang('sys','errInvalidASCII'));
      return false;
    }

    if (pwd != confirmPwd) {
      ShowStatusError(lang('sys','errConfirmPassword'));
      return false;
    }

    return true;
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validString('username',false,false,false);
    valid &= validString('password');
    valid &= validRange('reauth',data.min_reauth,data.max_reauth);
    valid &= validRange('inact',data.min_inact,data.max_inact);
    valid &= validRange('vid',1,4094);
    return valid;
  },
  userDefined:function(){
    if (IsCheckboxChecked('reauthUser'))
      EnableInputText('reauth');
    else
      DisableInputText('reauth');

    if (IsCheckboxChecked('inactUser'))
      EnableInputText('inact');
    else
      DisableInputText('inact');

    if (IsCheckboxChecked('vidUser'))
      EnableInputText('vid');
    else
      DisableInputText('vid');
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('authmgr','titAddWebLocalAcct')) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('authmgr','lblUserName')) %></th>
      <td class="formContentTD">
        <%= InputText('username', '', data.maxlen_username) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('authmgr','lblPwd')) %></th>
      <td class="formContentTD">
        <%= InputPassword('password', '', data.maxlen_password) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('authmgr','lblPwdConfirm')) %></th>
      <td class="formContentTD">
        <%= InputPassword('confirmPassword', '', data.maxlen_password) %>
      </td>
    </tr>
    <tr>
      <th rowspan=2><%= LabelLeft(lang('authmgr','lblAssignVlan')) %></th>
      <td class="formContentTD">
        <%= Checkbox("vidUser", lang('common','lblUserDefined'), false) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit("vid", _top.data.defVlan) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArg',[1,4094])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <%= ShowFormTitle(lang('authmgr','lblAssignTimer')) %>
    <tr>
      <th rowspan=2><%= LabelLeft(lang('authmgr','lblTimerReauth')) %></th>
      <td class="formContentTD">
        <%= Checkbox("reauthUser", lang('common','lblUserDefined'), false) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit("reauth", data.dflt_reauth) %></td>
          <td class="right"><%= LabelHint(lang('common','txtSecRangeArg',[data.min_reauth,data.max_reauth])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th rowspan=2><%= LabelLeft(lang('authmgr','lblTimerInact')) %></th>
      <td class="formContentTD">
        <%= Checkbox("inactUser", lang('common','lblUserDefined'), false) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit("inact", data.dflt_inact) %></td>
          <td class="right"><%= LabelHint(lang('common','txtSecRangeArg',[data.min_inact,data.max_inact])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
