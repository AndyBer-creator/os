<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var targetVal = 0;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render(url('get_mcastFilter'));
  },
  render: function(_url) {
    var that = this;
    targetVal = get_mcast_ipVersion(_url);
    dataGet(_url).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    'change #target':'selTarget',
    <!--#endif-->
    'click #btnEdit':'edit'
  },
  <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
  selTarget:function(e){
    var urlFinal;
    targetVal = GetSelectVal('target');
    urlFinal = url('get_mcastFilter');
    urlFinal = mcastUrl_append_ipVer(urlFinal, targetVal);
    this.render(urlFinal);
  },
  <!--#endif-->
  edit:function(e){
    var urlFinal;
    if(!CheckTableEdit())
      return;
    urlFinal = 'mcast_general_filterEdit.html';
    urlFinal = mcastUrl_append_ipVer(urlFinal, targetVal);
    urlFinal = urlAppend(urlFinal, GetTableMultiSelectVals('port'));
    OpenDialog(urlFinal);
  }
});

EnterKeyEvent('edit');
mainFrame = new mainView();
mainFrameGetUrl = mcastUrl_append_ipVer(url('get_mcastFilter'), targetVal);
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('mcast','titMulticastFilterTable')) %>
<!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
<table>
<tr>
    <td><%= lang('common','lblIPVersion') %></td>
    <td class="right">
    <select name="target" id="target">
       <option value=0 <%= (targetVal === 0) ? "selected" : "" %>><%= lang('mcast','txtIPv4') %></option>
       <option value=1 <%= (targetVal === 1) ? "selected" : "" %>><%= lang('mcast','txtIPv6') %></option>
    </select>
    </td>
    </tr>
</table>
<br>
<!--#endif-->
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('port','lblEntryNo') %></th>
    <th><%= lang('port','lblPort') %></th>
    <th><%= lang('mcast','lblFilterProfileIndex') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="NumberCell"><%= port.idx %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
<tbody>
</tbody>
</table>
<%= TableFoot(ButtonEdit('btnEdit')) %>
</form>
</script>
</body>
</html>
