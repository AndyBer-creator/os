<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var vlanif = 33;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlParamAppend(url('get_dhcpRelaygroupAdd'), 'vlanif', vlanif)).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;
		//console.log(data);
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
	  //console.log(formDataGet('setform'));
      dataSet(url('set_dhcpRelaygroupAdd'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validIPv4Addr('groupip');
    return valid;
  }
  
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<%= DialogHead(lang('dr','lblDrGroupTable')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
	<tr>
		<th> <%= LabelLeft(lang('dr','lblDrVlanifGroup'), 'lblDrVlanifGroup') %></th>
		<td class="formContentTD"><%= selectOption('groupid', data.drgroup, data.groupid, 150) %></td>
	</tr>
    <tr>
      <th><%= LabelLeft(lang('dr','lblDrGroupIp'),'lblDrGroupIp') %></th>
      <td class='formContentTD'><%= InputTextIPv4('groupip') %></td>
    </tr>
	</tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
