<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_vlanCreate')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp));
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnDel':'btnDel',
    'click #btnEdit':'btnEdit',
    'change #Vlans':'mbrSelected',
    'change #selVlans':'mbrSelected',
    'click #btnAdd':'mbrSelected',
    'click #btnRem':'mbrSelected'
  },
  apply: function() {
    dataMultiSelectVlanList('selVlans');
    if ($('#selVlans')[0].childElementCount > data.maxvlans)
    {
      ShowStatusWarning("The number(" + $('#selVlans')[0].childElementCount + ") of Selected VLANs exceed the limitation("+ data.maxvlans + ") of VLANs can be created");
      return;
    }
    dataSet(url('set_vlanCreate'), formDataGet('setform'));
  },
  btnEdit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    OpenDialog(urlParamAppend('vlan_vlan_edit.html', 'vlan', GetTableSelectVal('vlan')));
  },
  btnDel:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_vlanDel'), urlDataGen(dataVlanList('vlan', GetTableMultiSelectVals('vlan'))));
  },
  mbrSelected: function(e) {
    MultiSelectTransferUpdate(e.currentTarget.id, 'btnAdd', 'btnRem', 'Vlans', 'selVlans');
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>
<script id="main_content" type="text/template">
<form id="setform">
<%= InputHidden('vlanList', '') %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
        <th><%= LabelLeft(lang('common','lblVLAN')) %></th>
        <td class="formContentTD"><table><tr>
        <td><%= LabelTopMulti(lang('common','lblAvailableVlan')) %></td>
        <td></td>
        <td class='right'><%= LabelTopMulti(lang('vlan','lblCreatedVlans')) %></td>
      </tr>
      </thead >
      <tbody >
      <tr>
        <td rowspan="2">
          <select name="Vlans" id="Vlans" style="WIDTH: 90px" multiple size="8">
          <% for (var i = 1; i < 4095 ; i++) { %>
            <% if (-1 == _.indexOf(data.selVlans, i)) %>
              <option value=<%= i %>><%= "VLAN " + i %></option>
          <% } %>
          </select>
        </td>
        <td class=right>
          <%= ButtonTransferDisabled('btnAdd', 'btnRem') %>
        </td>
        <td rowspan="2" class=right>
          <select name="selVlans" id="selVlans" style="WIDTH: 90px" multiple size="8">
          <% _.each(data.selVlans, function(vlan, index) { %>
            <option value=<%= vlan %>><%= "VLAN " + vlan %></option>
          <% }); %>
          </select>
        </td></tr></table>
      </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= ButtonGroupApply('btnApply') %>
<%= TableHead(lang('vlan','titVLAN')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('common','lblVLAN') %></th>
    <th><%= lang('vlan','lblVlanName') %></th>
    <th><%= lang('vlan','lblVlanType') %></th>
    <th><%= lang('vlan','lblVlanIntfState') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.adminVlans)) { %>
  <% _.each(data.adminVlans, function(vlan, idx) { %>
  <tr>
    <td class="StringCell">
    <input type="checkbox"  name="selEntry" id=<%= "selEntry_"+ vlan.vlan %> value=<%= vlan.vlan %> <%=(vlan.type != 2)? "disabled" : "" %>></input>
    </td>
    <td class="StringCell"><%= vlan.vlan %></td>
    <td class="StringCell"><%= show(vlan.name) %></td>
    <td class="BinaryCell">
    <% if (vlan.type == 1) { %>
      <%= lang('vlan', 'lblVlanDefault') %>
    <% } else if (vlan.type == 2) { %>
      <%= lang('sys', 'lblStatic') %>
    <% } else if (vlan.type == 3) { %>
      <%= lang('sys', 'lblDynamic') %>
    <% } %>
    <td class="BinaryCell"><%= lang('common', vlan.intfState ? 'txtEnabled' : 'txtDisabled') %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>
<%= TableFoot(ButtonGroup(ButtonEdit('btnEdit'), ButtonDel('btnDel'))) %>
</form>
</script>
</body>
</html>
