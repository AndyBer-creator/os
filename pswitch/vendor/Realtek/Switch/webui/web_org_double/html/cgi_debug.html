<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var valid = true;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_cgiDbg')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnDel':'del'
  },
  del:function(e){
    dataSet(url('set_cgiDbgDel'), urlDataGen('del=1'));
  }
});

mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead("Debug Messages") %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th class="NumberCell">Entry</th>
    <th class="StringCell lastTh">Message</th>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.msgs)) { %>
  <% _.each(data.msgs, function(entry, idx) { %>
  <tr>
    <td class="NumberCell"><%= idx %></td>
    <td class="StringCell"><%= entry %></td>
  </tr>
  <% }); }%>
</tbody>
</table>

<%= TableFoot(ButtonDel('btnDel')) %>

</form>
</script>
</body>
</html>
