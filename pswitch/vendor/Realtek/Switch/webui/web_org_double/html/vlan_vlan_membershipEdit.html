<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var selVal;
var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlParamGetByName('port');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlParamAppend(url('get_vlanMembershipEdit'), 'port', selVal)).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'click [name=rdoTagging]':'rdoTagging',
    'change #vlans':'vlans',
    'change #A':'A',
    'click #btnAdd':'btnAdd',
    'click #btnRem':'btnRem',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    var existVlan = $('#A')[0].options;
    var membership = GetRadioGroupCheckedVal('rdoTagging');
    var Tcnt = 0;
    var Ucnt = 0;
    var Pcnt = 0;
    var isPvid4095 = false;

    for (var i = 0; i < existVlan.length ; i++)
    {
      if (existVlan[i].text.indexOf('T') > 0)
        Tcnt++;

      if (existVlan[i].text.indexOf('U') > 0)
        Ucnt++;

      if (existVlan[i].text == '4095P')
        isPvid4095 = true;
    }

    if (data.mode == 2) // trunk
    {
        if (Ucnt == 0)
        {
          //ShowStatusWarning("Trunk port must assign native VLAN");
		  ShowStatusWarning(lang('warning','warningTrunkPort'));
          return;
        }
    }
    if (data.mode == 1) // access
    {
      if (Ucnt == 0)
      {
        //ShowStatusWarning("Access port must assign access VLAN");
		ShowStatusWarning(lang('warning','warningAccessPort'));
        return;
      }
    }
    if (data.mode == 0) //general
    {
      if (isPvid4095)
      {
        //ShowStatusWarning("Hybrid port must assign PVID");
		ShowStatusWarning(lang('warning','warningHybridPort'));
        return;
      }
    }

    MultiSelectApplySelect('A');
    $('#A').find('option[value=4095P]').prop("disabled", false);
    DisableRadioGroup('rdoTagging');
    dataSet(url('set_vlanMembershipEdit'), formDataGet('setform'));
    MultiSelectDeselectAll('A', 'vlans');
    //if (this.checkValid())
      //dataSet(url('set_vlanMembershipEdit'), formDataGet('setform'));
  },
  rdoTagging: function(){
    if (data.mode == 0) // general
      return;

    if (GetRadioGroupCheckedVal('rdoTagging') == 'untagged')
      $('#lblVlanPVID').prop('checked', true);
    else
      $('#lblVlanPVID').prop('checked', false);
  },
  vlans: function(e) {
    var vlans = $('#vlans').val();

    if (data.mode == 3) // customer
    {
      EnableRadio('rdoTagging', 'untagged');
      for (var i = 0; i < vlans.length ; i++)
      {
        if (vlans[i] == _top.defaultVid)
        {
          DisableRadio('rdoTagging', 'untagged');
          $('#rdoTagging_forbidden').prop('checked', true);
        }
      }
    }

    this.rdoTagging();

    if('btn_disabled' == $('#btnAdd').prop('className'))
      $('#btnAdd').prop('className', 'btn_normal');
  },
  A: function(e) {
    if('btn_disabled' == $('#btnRem').prop('className'))
      $('#btnRem').prop('className', 'btn_normal');
  },
  btnAdd: function(e) {
    var membership = GetRadioGroupCheckedVal('rdoTagging');
    var pvid = IsCheckboxChecked('lblVlanPVID');

    if('btn_disabled' == $('#btnAdd_tbl').prop('className'))
      return;

    if ((data.mode != 0 && membership == 'exclude') ||
       (data.mode == 0 && membership == 'exclude' && !pvid))
      return;

    var selItems = $('#vlans').find(":selected").prop('selected', '');
    var vlans = $('#vlans').val();
    var existVlan = $('#A')[0].options;

    if (data.mode != 0 && membership == 'untagged')
    {
      if (selItems.length > 1)
      {
        for (var i = 1; i < selItems.length ; i++)
          selItems[i] = "";
      }

      for (var i = 0; i < existVlan.length ; i++)
      {
        if (existVlan[i].text.indexOf('U') >= 0)
        {
          //ShowStatusWarning('Only one untagged VLAN can be selected');
		  ShowStatusWarning(lang('warning','warningOnlyUntag'));
          return;
        }
      }
    }

    if (data.mode == 0 && pvid)
    {
      if (selItems.length > 1)
      {
        for (var i = 1; i < selItems.length ; i++)
          selItems[i] = "";
      }

      for (var i = 0; i < existVlan.length ; i++)
      {
        if (existVlan[i].text.indexOf('P') >= 0 && '4095P' != existVlan[i].text)
        {
          //ShowStatusWarning('Only One PVID can be selected');
		  ShowStatusWarning(lang('warning','warningOnlyPVID'));
          return;
        }
      }
    }

    selItems.remove();

    if (membership == 'untagged')
    {
      for (var i = 0; i < selItems.length ; i++)
      {
        selItems[i].text += 'U';
        selItems[i].value += 'U';
      }
    }
    else if (membership == 'tagged')
    {
      for (var i = 0; i < selItems.length ; i++)
      {
        selItems[i].text += 'T';
        selItems[i].value += 'T';
      }
    }
    else if (membership == 'forbidden')
    {
      for (var i = 0; i < selItems.length ; i++)
      {
        selItems[i].text += 'F';
        selItems[i].value += 'F';
      }
    }

    if (pvid)
    {
      for (var i = 0; i < selItems.length ; i++)
      {
        selItems[i].text += 'P';
        selItems[i].value += 'P';
      }

      //Remove 4095P back
      $('#A').find('option[value=4095P]').remove();
    }

    $('#A').append(selItems);

    $('#btnAdd').prop('className', 'btn_disabled');
  },
  btnRem: function(e) {
    if('btn_disabled' == $('#btnRem_tbl').prop('className'))
      return;

    var selItems = $('#A').find(":selected").prop('selected', '');

    selItems.remove();

    for (var i = 0; i < selItems.length ; i++)
    {
      selItems[i].text = selItems[i].text.replace('F', '');
      selItems[i].text = selItems[i].text.replace('U', '');
      selItems[i].text = selItems[i].text.replace('T', '');
      selItems[i].text = selItems[i].text.replace('P', '');

      selItems[i].value = selItems[i].value.replace('F', '');
      selItems[i].value = selItems[i].value.replace('U', '');
      selItems[i].value = selItems[i].value.replace('T', '');
      selItems[i].value = selItems[i].value.replace('P', '');
    }

    $('#vlans').append(selItems);
    $('#btnRem').prop('className', 'btn_disabled');

    /* Add 4095P back */
    var existVlan = $('#A')[0].options;
    for (var i = 0; i < existVlan.length ; i++)
    {
      if (existVlan[i].text.indexOf('P') >= 0)
        return;
    }

    $('#A').append('<option value="4095P" disabled>4095P</option>');
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('vlan','titVLANPortEdit')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= getPortId(selVal) %>
        <%= InputHidden('port',selVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vlan','lblVlanMode')) %></th>
      <td class="formContentTD">
      <% if (data.mode == 0) { %>
        <%= lang('vlan', 'lblVlanHybrid') %>
      <% } else if (data.mode == 1) { %>
        <%= lang('vlan', 'lblVlanAccess') %>
      <% } else if (data.mode == 2) { %>
        <%= lang('vlan', 'lblVlanTrunk') %>
      <% } else if (data.mode == 3) { %>
        <%= lang('vlan', 'lblVlanTunnel') %>
      <% } %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vlan','lblVlanMembership')) %></th>
      <td class="formContentTD">
      <table><tr><td><table><tbody>
      <tr>
        <td rowspan="2">
          <select name="vlans" id="vlans" style="WIDTH: 90px" multiple size="8">
          <% if (!IsUndefOrNull(data.vlans)) { %>
          <% _.each(data.vlans, function(entry) { %>
            <option value=<%= entry %>><%= entry %></option>
          <% }); } %>
          </select>
        </td>
        <td class=right>
          <%= ButtonTransferDisabled('btnAdd', 'btnRem') %>
        </td>
        <td rowspan="2" class=right>
          <select name="A" id="A" style="WIDTH: 90px" multiple size="8">
          <% if (!IsUndefOrNull(data.selVlans)) { %>
          <% _.each(data.selVlans, function(entry) { %>
            <option value=<%= entry %> <%= (entry =='4095P') ? 'disabled' : '' %> ><%= entry %></option>
          <% }); } %>
          </select>
        </td>
      </tr></tbody></table>
      </td></tr>
      <tr>
        <td class="ctrlSpacing" style="width:100%">
        <% if (data.mode == 0) { %>
          <%= RadioGroup('rdoTagging', 'tagged', ['forbidden',lang('vlan','lblVlanForbidden')], ['exclude',lang('vlan','lblVlanExcluded')], ['tagged',lang('vlan','lblVlanTagged')], ['untagged',lang('vlan','lblVlanUntagged')]) %>
        <% } else if (data.mode == 2) { %>
            <%= RadioGroup('rdoTagging', 'tagged', ['forbidden',lang('vlan','lblVlanForbidden')], ['exclude',lang('vlan','lblVlanExcluded'), true], ['tagged',lang('vlan','lblVlanTagged')], ['untagged',lang('vlan','lblVlanUntagged')]) %>
        <% } else { %>
            <%= RadioGroup('rdoTagging', 'untagged', ['forbidden',lang('vlan','lblVlanForbidden')], ['exclude',lang('vlan','lblVlanExcluded'), true], ['tagged',lang('vlan','lblVlanTagged'), true], ['untagged',lang('vlan','lblVlanUntagged')]) %>
        <% } %>
        </td>
      <tr>
          <tr>
            <td class="ctrlSpacing" colspan='2'>
            <% if (data.mode == 0) { %>
              <%= Checkbox('lblVlanPVID', lang('vlan','lblVlanPVID')) %>
            <% } else if (data.mode == 2) { // trunk%>
              <%= CheckboxDisabled('lblVlanPVID', lang('vlan','lblVlanPVID')) %>
            <% } else { %>
              <%= CheckboxDisabled('lblVlanPVID', lang('vlan','lblVlanPVID'), true) %>
            <% } %>
            </td>
          </tr>
        </table>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
