<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_secDaiStatistics')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'click #btnClear':'clear',
    'click #btnRefresh':'refresh'
  },
  clear:function(e){
    if(IsButtonDisabled(e.currentTarget.id))
      return;

    if(!CheckTableEdit())
      return;

    $('#portList').val(urlGetPortList('port', GetTableMultiSelectVals('port')));
    dataSet(url('set_secDaiStatistics'), formDataGet('setform'), 'status_container');
    this.render(url('get_secDaiStatistic'));
  },
  refresh:function(e){
    if(IsButtonDisabled(e.currentTarget.id))
      return;

    this.render(url('get_secDaiStatistic'));
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= InputHidden('portList','') %>
<%= TableHead(lang('dai','titTableDaiStatistic')) %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('port','lblEntryNo') %></th>
    <th><%= lang('port','lblPort') %></th>
    <th><%= lang('common','lblForward') %></th>
    <th><%= lang('dai','lblSMacErr') %></th>
    <th><%= lang('dai','lblDMacErr') %></th>
    <th><%= lang('dai','lblSIPErr') %></th>
    <th><%= lang('dai','lblDIPErr') %></th>
    <th><%= lang('dai','lblIPMACErr') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="NumberCell"><%= port.forward %></td>
    <td class="NumberCell"><%= port.smacErr %></td>
    <td class="NumberCell"><%= port.dmacErr %></td>
    <td class="NumberCell"><%= port.sipErr %></td>
    <td class="NumberCell"><%= port.dipErr %></td>
    <td class="NumberCell"><%= port.ipmacErr %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonGroupClearRefresh('btnClear', 'btnRefresh')) %>
</form>
</script>
</body>
</html>
