<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_dhcpRelayipPool')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnAdd':'add',
    'click #btnDel':'del',
	'click #btnEdit':'edit'
  },

  add:function(e){
    OpenDialog('ip_pool_add.html');
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_dhcpRelayipPoolDel'), urlDataGen(GetTableMultiSelectVals('ippool')));
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    OpenDialog(urlParamAppend('ip_pool_edit.html', 'idx', GetTableSelectVal('idx')));
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('dr','lblIPPoolTable')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th rowspan="2"><%= TableCheckboxAll() %></th>
    <th rowspan="2"><%= lang('dr','lblPoolName') %></th>
    <th colspan="3"><%= lang('dr','lblPoolSection') %></th>
    <th rowspan="2"><%= lang('dr','lblGateway') %></th>
    <th rowspan="2"><%= lang('dr','lblGatewayMask') %></th>
	<th rowspan="2"><%= lang('dr','lblDNSPrimaryIp') %></th>
	<th rowspan="2"><%= lang('dr','lblDNSSecondIp') %></th>
	<th colspan="2"><%= lang('dr','lblOption43') %></th>
	<th rowspan="2"><%= lang('dr','lblLeaseTime') %></th>
    <%= TableLastTh(2) %>
  </tr>
  <tr>
    <th><%= lang('dr','lblPoolSection') %></th>
    <th><%= lang('dr','lblPoolAddrStart') %></th>
    <th><%= lang('dr','lblPoolAddrEnd') %></th>
    <th><%= lang('dr','lblOption43Str') %></th>
    <th><%= lang('dr','lblOption43Type') %></th>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.ippool)) { %>
  <% _.each(data.ippool, function(ippool, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(ippool.ippool) %></td>
    <td class="StringCell"><%= show(ippool.ippool) %></td>
    <td class="StringCell"><%= show(ippool.section) %></td>
    <td class="StringCell"><%= show(ippool.addrstart) %></td>
    <td class="StringCell"><%= show(ippool.addrend) %></td>
    <td class="StringCell"><%= show(ippool.gateway) %></td>
    <td class="StringCell"><%= show(ippool.mask) %></td>
	<td class="StringCell"><%= show(ippool.dnsPri) %></td>
	<td class="StringCell"><%= show(ippool.dnsSec) %></td>
	<td class="StringCell"><%= show(ippool.format) %></td>
	<td class="StringCell"><%= !IsUndefOrNull(ippool.option43Ip) ? show(ippool.option43Ip) : lang('common','lblNA') %></td>
	<td class="StringCell"><%= show(ippool.lease) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); } %>
</tbody>
</table>
<%= TableFoot(ButtonGroupAddEditDel('btnAdd', 'btnEdit', 'btnDel')) %>
</form>
</script>
</body>
</html>
