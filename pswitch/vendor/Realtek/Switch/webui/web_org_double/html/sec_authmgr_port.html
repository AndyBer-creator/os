<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

var ctrlLang =
[
  "lang('authmgr','lblPortCtrlDisabled')",
  "lang('authmgr','lblPortCtrlForceAuth')",
  "lang('authmgr','lblPortCtrlForceUnauth')",
  "lang('authmgr','lblPortCtrlAuto')"
];

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_authmgrPort')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'click #btnEdit':'edit'
  },
  edit:function(e){
    if(!CheckTableEdit())
      return;
    OpenDialog(urlAppend('sec_authmgr_portEdit.html', GetTableMultiSelectVals('port')));
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('authmgr','titAuthmgrPortSettingTable')) %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th rowspan=2><%= TableCheckboxAll() %></th>
    <th rowspan=2><%= lang('port','lblEntryNo') %></th>
    <th rowspan=2><%= lang('port','lblPort') %></th>
    <th rowspan=2><%= lang('authmgr','lblPortCtrl') %></th>
    <th rowspan=2><%= lang('authmgr','lblReauth') %></th>
    <th rowspan=2><%= lang('authmgr','lblMaxHost') %></th>
    <th colspan=3><%= lang('authmgr','lblCommonTimer') %></th>
    <th colspan=4><%= lang('authmgr','lblDot1xParam') %></th>
    <th><%= lang('authmgr','lblWebParam') %></th>
    <%= TableLastTh(2) %>
  </tr>
  <tr>
    <th><%= lang('authmgr','lblTimerReauth') %></th>
    <th><%= lang('authmgr','lblTimerInact') %></th>
    <th><%= lang('authmgr','lblTimerQuiet') %></th>
    <th><%= lang('authmgr','lblTxPeriod') %></th>
    <th><%= lang('authmgr','lblSuppTimeout') %></th>
    <th><%= lang('authmgr','lblSrvTimeout') %></th>
    <th><%= lang('authmgr','lblMaxReq') %></th>
    <th><%= lang('authmgr','lblLoginAttempt') %></th>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="StringCell"><%= show(ctrlLang[port.ctrl]) %></td>
    <td class="BinaryCell"><%= (port.reauth ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>
    <td class="NumberCell"><%= port.maxHost %></td>
    <td class="NumberCell"><%= port.timeReauth %></td>
    <td class="NumberCell"><%= port.timeInact %></td>
    <td class="NumberCell"><%= port.timeQuiet %></td>
    <td class="NumberCell"><%= port.txPeriod %></td>
    <td class="NumberCell"><%= port.suppTimeout %></td>
    <td class="NumberCell"><%= port.srvTimeout %></td>
    <td class="NumberCell"><%= port.maxReq %></td>
    <td class="NumberCell"><%= (0 == port.maxLogin) ? lang('authmgr','lblInfinite') : port.maxLogin %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonEdit('btnEdit')) %>
</form>
</script>
</body>
</html>
