<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script src="js/ie8.js"></script>
<script>
fileLoadMainFrame();

var data;
var intfStatus = [
      "txtStatusTentative",
      "txtStatusValid",
      "txtStatusValidDuplicated",
      "txtStatusDuplicated",
      "txtStatusDelayed",
      "txtStatusNotReceived"
    ];
var ipType = [
      "txtDHCP",
      "txtStatic",
      "txtDefault"
    ];

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_ipconfIpv4Intf')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'click #btnAdd':'add',
    'click #btnDel':'del',
	'click #btnEdit':'edit'
  },

  add:function(e){
    OpenDialog('ipconf_ipv4_intfAdd.html');
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
	console.log(GetTableSelectVal());
    OpenDialog(urlParamAppend('ipconf_ipv4_intfEdit.html', 'intf', GetTableSelectVal()));
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_ipconfIpv4IntfDel'), urlDataGen(GetTableMultiSelectVals('intf')));
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('ipconf','lblIPv4IntfTable')) %>
<table class="dataTable" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('ipconf','lblIntf') %></th>
    <th><%= lang('ipconf','lblIPAddrType') %></th>
    <th><%= lang('ipconf','lblIPAddr') %></th>
    <th><%= lang('ipconf','lblMask') %></th>
    <th><%= lang('ipconf','lblStatus') %></th>
	<th><%= lang('ipconf','lblRoles') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.intf)) { %>
  <% _.each(data.intf, function(intf, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(intf.intf+'_'+intf.addr+'_'+intf.roles) %></td>
    <td class="StringCell"><%= show(intf.intf) %></td>
    <td class="StringCell"><%= show(lang('ipconf', ipType[intf.type])) %></td>
    <td class="StringCell"><%= show(intf.addr) %></td>
    <td class="StringCell"><%= show(intf.mask) %></td>
    <td class="StringCell"><%= show(lang('ipconf', intfStatus[intf.status])) %></td>
	<td class="StringCell"><%= show(lang('ipconf', intf.roles)) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); } %>
</tbody>
</table>
<%= TableFoot(ButtonGroupAddEditDel('btnAdd', 'btnEdit', 'btnDel')) %>
</form>
</script>
</body>
</html>
