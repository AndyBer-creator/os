<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var targetVal = 0;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render(url('get_mcastFwdAll'));
  },
  render: function(_url) {
    var that = this;
    dataGet(_url).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        targetVal = get_mcast_ipVersion(_url);
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    'change #target':'selTarget',
    <!--#endif-->
    'click #btnDel':'del'
  },
  add:function(e){
     OpenDialog('mcast_general_fwdAllAdd.html');
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    var urlFinal;
    urlFinal = urlParamAppend('mcast_general_fwdAllEdit.html', 'vid', GetTableSelectVal('vid'));
    urlFinal = mcastUrl_append_ipVer(urlFinal, targetVal);
    OpenDialog(urlFinal);
  },
  <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
  selTarget:function(e){
    var urlFinal;
    targetVal = GetSelectVal('target');
    urlFinal = urlParamAppend(url('get_mcastFwdAll'), 'ipType', targetVal);
    this.render(urlFinal);
  },
  <!--#endif-->
  del:function(e){
    var urlFinal = url('set_mcastFwdAllDel');
    urlFinal = mcastUrl_append_ipVer(urlFinal, targetVal);
    dataSet(urlFinal,urlDataGen(GetTableMultiSelectVals('vid')));
  }
});

EnterKeyEvent('edit');
mainFrame = new mainView();
mainFrameGetUrl = mcastUrl_append_ipVer(url('get_mcastFwdAll'),targetVal);
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('mcast','lblMcastFwdAllTable')) %>
<!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
<table>
<tr>
    <td><%= lang('common','lblIPVersion') %></td>
    <td class="right">
    <select name="target" id="target">
       <option value=0 <%= (targetVal === 0) ? "selected" : "" %>><%= lang('mcast','txtIPv4') %></option>
       <option value=1 <%= (targetVal === 1) ? "selected" : "" %>><%= lang('mcast','txtIPv6') %></option>
    </select>
    </td>
    </tr>
</table>
<br>
<!--#endif-->
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('common','lblVLAN') %></th>
    <th><%= lang('mcast','lblStFwdMbrPort') %></th>
    <th><%= lang('mcast','lblForbidFwdMbrPort') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.fwdAlls)) { %>
  <% _.each(data.fwdAlls, function(fwdAll, idx) { %>
    <tr>
      <td class="StringCell"><%= TableCheckbox(fwdAll.vid) %></td>
      <td class="NumberCell"><%= fwdAll.vid %></td>
      <td class="StringCell"><%= showList(fwdAll.stMbrs) %></td>
      <td class="StringCell"><%= showList(fwdAll.fbMbrs) %></td>
      <%= TableLastTd() %>
    </tr>
  <% }); } %>
</tbody>
</table>

<%= TableFoot(ButtonGroupAddEditDel('btnAdd','btnEdit','btnDel')) %>
</form>
</script>
</body>
</html>
