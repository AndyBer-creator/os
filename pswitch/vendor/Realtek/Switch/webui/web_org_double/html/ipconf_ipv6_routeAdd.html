<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var tmpHidden = true;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_ipconfIpv6RouteAdd')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;

        that.nhTypeChg();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_ipconfIpv6RouteAdd'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    var valid = true;
    var addr = $('#addr').val();
    clearAllErrMsg();
    if (addr != '::')
        valid &= validIPv6Addr('addr', false, false, true);
    valid &= validRange('plen', 0, 128);
    valid &= validIPv6Addr('nextHop');
    valid &= validRange('metric', data.metric_min, data.metric_max);
    return valid;
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<%= DialogHead(lang('ipconf','titAddIPv6Route')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblIPv6Prefix')) %></th>
      <td class="formContentTD">
        <%= InputTextIPv6('addr') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblIPv6PrefixLen')) %></th>
      <td class="formContentTD">
        <%= InputTextDigit('plen', '', 3) %>
        <%= LabelHint(lang('common','txtRangeArg',[0,128])) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblNextHopAddr'),'lblNextHopAddr') %></th>
      <td class="formContentTD">
        <%= InputTextIPv6('nextHop') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblMetric'),'lblMetric') %></th>
      <td class="formContentTD">
        <%= InputTextDigit('metric',data.metric_dflt,3) %>
        <%= LabelHint(lang('common','txtRangeArgDefault',[data.metric_min,data.metric_max,data.metric_dflt])) %>
    </tr>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
