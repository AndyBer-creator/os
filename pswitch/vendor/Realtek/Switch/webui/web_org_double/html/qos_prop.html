<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_qosProp')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
        that.chgMode();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnEdit':'edit',
    'click #mode':'chgMode'
  },
  apply: function() {
    dataSet(url('set_qosProp'), formDataGet('setform'));
  },
  edit:function(e){
    if(!CheckTableEdit())
      return;
    OpenDialog(urlAppend('qos_portEdit.html', GetTableMultiSelectVals('port')));
  },
  chgMode:function(){
    if(IsCheckboxChecked('mode'))
      EnableRadioGroup('type');
    else
      DisableRadioGroup('type');
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('qos','lblQosMode')) %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable("mode", data.mode) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('qos','lblTrustType')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('type',data.type,[1,lang('qos','lblCoS')],[2,lang('qos','lblDSCP')],[3,lang('qos','lblCosDscp')],[4,lang('qos','lblIpp')]) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

<%= TableHead(lang('qos','titQosPortSettingTable')) %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th rowspan="2"><%= TableCheckboxAll() %></th>
    <th rowspan="2"><%= lang('port','lblEntryNo') %></th>
    <th rowspan="2"><%= lang('port','lblPort') %></th>
    <th rowspan="2"><%= lang('qos','lblCoS') %></th>
    <th rowspan="2"><%= lang('qos','lblTrustState') %></th>
    <th colspan="3"><%= lang('qos','lblRemark') %></th>
    <%= TableLastTh(2) %>
  </tr>
  <tr>
    <th><%= lang('qos','lblRemarkCoS') %></th>
    <th><%= lang('qos','lblRemarkDSCP') %></th>
    <th><%= lang('qos','lblRemarkIPP') %></th>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="NumberCell"><%= port.cos %></td>
    <td class="BinaryCell"><%= (port.state ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>
    <td class="BinaryCell"><%= (port.remarkCos ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>
    <td class="BinaryCell"><%= (port.remarkDscp ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>
    <td class="BinaryCell"><%= (port.remarkIpp ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonEdit('btnEdit')) %>
</form>
</script>
</body>
</html>
