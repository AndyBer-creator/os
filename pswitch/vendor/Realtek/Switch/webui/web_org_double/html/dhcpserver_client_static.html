<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_dhcpRelayStaticBind')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnAdd':'add',
    'click #btnDel':'del',
	'click #btnEdit':'edit'
  },

  add:function(e){
    OpenDialog('dhcpserver_client_static_add.html');
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_dhcpRelayStaticBindDel'), urlDataGen(GetTableMultiSelectVals('idx')));
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    OpenDialog(urlParamAppend('dhcpserver_client_static_edit.html', 'idx', GetTableSelectVal('idx')));
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('dr','lblDrClientStatic')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th rowspan="1"><%= TableCheckboxAll() %></th>
    <th rowspan="1"><%= lang('mac','titMacAddressTable') %></th>
    <th rowspan="1"><%= lang('sys','lblIPv4Addr') %></th>
    <th rowspan="1"><%= lang('dr','lblDrVlanid') %></th>
    <th rowspan="1"><%= lang('dr','lblDrUserName') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.clientList)) { %>
  <% _.each(data.clientList, function(client, idx) { %>
  <tr>
    <!--<td class="StringCell"><%= TableCheckbox(client.macAddr) %></td>-->
	<td class="StringCell">
	<input type="checkbox"  name="selEntry" id=<%= "selEntry_"+ (idx+1) %> value=<%= client.macAddr + '_' + client.vlan + '_' + client.ipaddr + '_' + client.username %>></input>
	</td>
    <td class="StringCell"><%= show(client.macAddr) %></td>
	<td class="StringCell"><%= show(client.ipaddr) %></td>
	<td class="NumberCell"><%= client.vlan  %></td>
    <td class="StringCell"><%= show(client.username) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); } %>
</tbody>
</table>
<%= TableFoot(ButtonGroupAddDel('btnAdd', 'btnDel')) %>
</form>
</script>
</body>
</html>
