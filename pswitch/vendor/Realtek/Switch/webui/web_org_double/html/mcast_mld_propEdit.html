<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var selVal;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlParamGetByName('vlanList');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_mcastMldPropEdit'),urlGetSelSouce())).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
    {
      dataSet(url('set_mcastMldPropEdit'), formDataGet('setform'));
    }
  },
  checkValid: function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validRange('robust',data.min_robust,data.max_robust);
    valid &= validRange('interval',data.min_interval,data.max_interval);
    valid &= validRange('maxRespInterval',data.min_maxRespInterval,data.max_maxRespInterval);
    valid &= validRange('lastMbrCnt',data.min_lastMbrCnt,data.max_lastMbrCnt);
    valid &= validRange('lastMbrInterval',data.min_lastMbrInterval,data.max_lastMbrInterval);
    return valid;
  }
});
EnterKeyEvent('apply');
mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('mcast','titEditMcastVlan')) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('common','lblVLAN')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('vlanList',selVal) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('mcast','lblMcastState')) %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('adminStatus',data.adminStatus) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('mcast','lblMRouterPortsAutoLearn')) %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('autoLearn',data.autoLearn) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('mcast','lblImmediateleave')) %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('immedLeave',data.immedLeave) %>
      </td>
    </tr>

    <%= ShowFormContentGap() %>

    <tr>
      <th><%= LabelLeft(lang('mcast','lblQueryRobustness')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("robust", data.robust) %></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.min_robust,data.max_robust,data.dflt_robust])) %></td>
          </tr>
        </table>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('mcast','lblQueryInterval')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("interval", data.interval) %></td>
            <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.min_interval,data.max_interval,data.dflt_interval])) %></td>
          </tr>
        </table>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('mcast','lblQueryMaxResponseInterval')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("maxRespInterval", data.maxRespInterval) %></td>
            <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.min_maxRespInterval,data.max_maxRespInterval,data.dflt_maxRespInterval])) %></td>
          </tr>
        </table>
      </td>
    </tr>

    <%= ShowFormContentGap() %>

     <tr>
      <th><%= LabelLeft(lang('mcast','lblLastMemberQueryCounter')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("lastMbrCnt", data.lastMbrCnt) %></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.min_lastMbrCnt,data.max_lastMbrCnt,data.dflt_lastMbrCnt])) %></td>
          </tr>
        </table>
      </td>
    </tr>

     <tr>
      <th><%= LabelLeft(lang('mcast','lblLastMemberQueryInterval')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("lastMbrInterval", data.lastMbrInterval) %></td>
            <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.min_lastMbrInterval,data.max_lastMbrInterval,data.dflt_lastMbrInterval])) %></td>
          </tr>
        </table>
      </td>
    </tr>

    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('common','lblOperationalStatus')) %>
    <tr>
      <th><%= LabelLeft(lang('mcast','lblOperStatus')) %></th>
      <td class="formContentTD">
        <%= lang('common',(data.operStatus)?'txtEnabled':'txtDisabled') %>
      </td>
    </tr>

     <tr>
      <th><%= LabelLeft(lang('mcast','lblOperationalQueryRobustness')) %></th>
      <td class="formContentTD">
        <%= data.operRobust %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('mcast','lblOperationalQueryInterval')) %></th>
      <td class="formContentTD">
        <%= lang('mcast','lblSecArg',[data.operInterval]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('mcast','lblOperationalQueryMaxResponseInterval')) %></th>
      <td class="formContentTD">
        <%= lang('mcast','lblSecArg',[data.operMaxRespInterval]) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('mcast','lblOperationalLastMemberQueryCounter')) %></th>
      <td class="formContentTD">
        <%= data.operLastMbrCnt %>
      </td>
    </tr>
     <tr>
      <th><%= LabelLeft(lang('mcast','lblOperationalLastMemberQueryInterval')) %></th>
      <td class="formContentTD">
        <%= lang('mcast','lblSecArg',[data.operLastMbrInterval]) %>
      </td>
    </tr>

    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
