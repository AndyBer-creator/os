<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var refresh = true;

function disResult(resp) {
  if (resp.status == "ok" && !IsUndefOrNull(resp.copperResult)) {
    $('#result').html(show(resp.copperResult));
    if (IsUndefOrNull(resp.copperLength))
      $('#length').html(lang('diag','lblNA'));
    else
      $('#length').html(resp.copperLength + " " + lang('diag','lblMeter'));
  }
  else {
    $('#result').html(lang('diag','lblNA'));
    $('#length').html(lang('diag','lblNA'));
  }
}

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    if (!refresh)
        return;
    dataGet(url('get_diagCopper')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;
      }
    });
  },
  events: {
    'click #btnApply':'apply'
  },
  apply: function() {
    refresh = false;
    $('#portSel').html(getPortId($('#port').val()));
    dataSet(url('set_diagCopper'), formDataGet('setform'), false, disResult);
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('diag','lblPortSelect')) %></th>
      <td class="formContentTD">
		<%= selectOption('port', data.ports, data.selPort, 100) %></td>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<table class="formButtons">
  <tr><tbody>
    <td><%= ButtonShort(lang('diag','btnCopperTest'), 'btnApply') %></td>
  </tbody></tr>
</table>

<br>
<%= TableHead(lang('diag','lblCopperTestResult')) %>
<br>

<table>
<tr>
  <td class="formBody">
    <table class="formContent">
      <tbody>
      <%= ShowFormTitle(lang('diag','lblCopperTestStatus')) %>
      <tr>
        <th><%= LabelLeft(lang('port','lblPort')) %></th>
        <td class="formContentTD" id="portSel"><%= lang('diag', 'lblNA') %></td>
      </tr>
      <tr>
        <th><%= LabelLeft(lang('diag','lblCopperResult')) %></th>
        <td class="formContentTD" id="result"><%= lang('diag', 'lblNA') %></td>
      </tr>
      <tr>
        <th><%= LabelLeft(lang('diag','lblCopperLength')) %></th>
        <td class="formContentTD" id="length"><%= lang('diag', 'lblNA') %></td>
      </tr>
      </tbody>
    </table>
  </td>
</tr>
</table>
</form>
</script>
</body>
</html>
