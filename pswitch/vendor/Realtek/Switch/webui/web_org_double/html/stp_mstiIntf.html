<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var mstiVal;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    if (urlParamGetByName('msti').length == 0)
      mstiVal = 0;
    else
      mstiVal = str2int(urlParamGetByName('msti'));
    this.render();
  },
  render: function() {
    var that = this;
    var urlFinal = urlParamAppend(url('get_stpMstiIntf'), 'msti', mstiVal);
    dataGet(urlFinal).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnEdit':'edit',
    'change #msti':'selMsti'
  },
  edit:function(e){
    var urlFinal;
    if(!CheckTableEdit())
      return;
    urlFinal = urlParamAppend('stp_mstiIntfEdit.html', 'msti', mstiVal);
    urlFinal = urlAppend(urlFinal, GetTableMultiSelectVals('port'));
    OpenDialog(urlFinal);
  },
  selMsti:function(e){
    mstiVal = str2int(GetSelectVal('msti'));
    this.render();
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('stp','txtMstIntfSettingTable')) %>
<table>
<tr>
  <td><%= lang('stp','lblMsti')%></td>
  <td class="right">
    <select name="msti" id="msti">
    <% for (i = data.msti_min; i <= data.msti_max; i++) { %>
      <option value=<%= i %> <%= (i == mstiVal) ? "selected" : "" %>><%= i %></option>
    <% }%>
    </select>
  </td>
</tr>
</table>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('port','lblEntryNo') %></th>
    <th><%= lang('port','lblPort') %></th>
    <th><%= lang('stp','lblPortPathCost') %></th>
    <th><%= lang('stp','lblPortPriority') %></th>
    <th><%= lang('stp','lblPortRole') %></th>
    <th><%= lang('stp','lblPortState') %></th>
    <th><%= lang('stp','lblPortMode') %></th>
    <th><%= lang('stp','lblPortType') %></th>
    <th><%= lang('stp','lblPortDesignatedBridge') %></th>
    <th><%= lang('stp','lblPortDesignatedPortId') %></th>
    <th><%= lang('stp','lblPortDesignatedCost') %></th>
    <th><%= lang('stp','lblRemainingHop') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="NumberCell"><%= port.pathcost %></td>
    <td class="NumberCell"><%= port.pri %></td>
    <td class="StringCell"><%= !IsUndefOrNull(port.role) ? show(port.role) : lang('common','txtDisalle') %></td>
    <td class="StringCell"><%= !IsUndefOrNull(port.state) ? show(port.state) : lang('common','txtDisable') %></td>
    <td class="StringCell"><%= !IsUndefOrNull(port.mode) ? show(port.mode) : lang('common','txtDisable') %></td>
    <td class="StringCell"><%= !IsUndefOrNull(port.type) ? show(port.type) : lang('common','lblNA') %></td>
    <td class="StringCell"><%= !IsUndefOrNull(port.desgBridge) ? port.desgBridge : lang('common','lblNA') %></td>
    <td class="StringCell"><%= !IsUndefOrNull(port.desgPortId) ? port.desgPortId : lang('common','lblNA') %></td>
    <td class="NumberCell"><%= port.desgCost %></td>
    <td class="NumberCell"><%= port.remainingHop %></td>

    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
<tbody>
</tbody>
</table>
<%= TableFoot(ButtonEdit('btnEdit')) %>
</form>
</script>
</body>
</html>
