<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_mcastProfilesAdd')).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
        that.chgType();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    'change #ipType':'chgType',
    <!--#endif-->
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
      if (this.checkValid())
      {
       var urlFinal = url('set_mcastProfilesAdd');
       <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
       urlFinal = urlParamAppend(urlFinal,'ipType',GetSelectVal('ipType'));
       <!--#endif-->
       dataSet(urlFinal, formDataGet('setform'));
      }
  },
  <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
  chgType: function() {
    if ('IPv4' == GetSelectVal('ipType'))
    {
      $('#showStartIpv4').css('display','');
      $('#showEndIpv4').css('display','');
      $('#showStartIpv6').css('display','none');
      $('#showEndIpv6').css('display','none');
    }
    else
    {
      $('#showStartIpv4').css('display','none');
      $('#showEndIpv4').css('display','none');
      $('#showStartIpv6').css('display','');
      $('#showEndIpv6').css('display','');
    }
  },
  <!--#endif-->
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    var ipVer = 'IPv4';
    <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    ipVer = GetSelectVal('ipType');
    <!--#endif-->
    if ('IPv4'== ipVer)
    {
      valid &= validIPv4McastAddr('mcastAddrStartv4');
      valid &= validIPv4McastAddr('mcastAddrEndv4');
    }
    <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    else
    {
      valid &= validIPv6McastAddr('mcastAddrStartv6');
      valid &= validIPv6McastAddr('mcastAddrEndv6');
    }
    <!--#endif-->
    valid &= validRange('idx',data.min_idx,data.max_idx);
    return valid;
  }
});

EnterKeyEvent('apply');
mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('mcast','titAddProfiles')) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>

    <tr>
      <th><%= LabelLeft(lang('mcast','lblProfileIndex')) %></th>
      <td class="formContentTD">
        <%= InputTextDigit('idx','', 3) %>
        <%= LabelHint(lang('common', 'txtRangeArg', [1, data.max_idx])) %>
      </td>
    </tr>

	 <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    <tr>
      <th><%= LabelLeft(lang('common','lblIPVersion')) %></th>
      <td class="formContentTD">
        <%= SelectArry("ipType", data.iptypes) %>
      </td>
    </tr>
    <!--#endif-->

    <tr id = "showStartIpv4">
      <th><%= LabelLeft(lang('mcast','lblStartMulticastAddr')) %></th>
      <td class="formContentTD">
      <%= InputTextIPv4('mcastAddrStartv4', '') %>
      </td>
    </tr>

    <tr id = "showEndIpv4">
      <th><%= LabelLeft(lang('mcast','lblEndMulticastAddr')) %></th>
      <td class="formContentTD">
      <%= InputTextIPv4('mcastAddrEndv4', '') %>
      </td>
    </tr>

    <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    <tr id = "showStartIpv6">
      <th><%= LabelLeft(lang('mcast','lblStartMulticastAddr')) %></th>
      <td class="formContentTD">
      <%= InputTextIPv6('mcastAddrStartv6', '') %>
      </td>
    </tr>

    <tr id = "showEndIpv6">
      <th><%= LabelLeft(lang('mcast','lblEndMulticastAddr')) %></th>
      <td class="formContentTD">
      <%= InputTextIPv6('mcastAddrEndv6', '') %>
      </td>
    </tr>
    <!--#endif-->

    <tr>
      <th><%= LabelLeft(lang('mcast','lblAction')) %></th>
      <td class="formContentTD">
         <%= RadioGroup('act','Allow',['Allow',lang('mcast','lblAllow')],['Deny',lang('mcast','lblProfDeny')]) %>
      </td>
    </tr>

    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
