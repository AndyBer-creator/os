<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var data;
var selVal;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    if (urlParamGetByName('msti').length != 0)
        selVal = urlParamGetByName('msti');
    else
      CloseDialog();
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlParamAppend(url('get_stpMstiEdit'),'msti',selVal)).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid',
    'change #availVlans':'mbrSelected',
    'change #selVlans':'mbrSelected',
    'click #btnAdd':'mbrSelected',
    'click #btnRem':'mbrSelected'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      dataMultiSelectVlanList('selVlans');
      dataSet(url('set_stpMstiEdit'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validStpPri('pri',data.pri_min,data.pri_max, 4096);
    return valid;
  },
  mbrSelected: function(e) {
    MultiSelectTransferUpdate(e.currentTarget.id, 'btnAdd', 'btnRem', 'availVlans', 'selVlans');

  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('stp','titStpMstiEdit')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('stp','lblMsti')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('msti',selVal) %>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <% if (selVal != 0) { %>
    <tr>
      <th><%= LabelLeft(lang('common','lblVLAN')) %></th>
      <td class="formContentTD">
        <%= InputHidden('vlanList', '') %>
        <table>
        <tr>
          <td><%= LabelTopMulti(lang('common','lblAvailableVlan')) %></td>
          <td></td>
          <td class='right'><%= LabelTopMulti(lang('common','lblSelVlan')) %></td>
        </tr>
          <td>
            <select name="availVlans" id="availVlans" style="WIDTH: 90px" multiple size="8">
            <% _.each(data.availVlans, function(vlan, index) { %>
              <option value=<%= vlan %>><%= vlan %></option>
            <% }); %>
            </select>
          </td>
          <td class=right>
            <%= ButtonTransferDisabled('btnAdd', 'btnRem') %>
          </td>
          <td class=right>
            <select name="selVlans" id="selVlans" style="WIDTH: 90px" multiple size="8">
            <% _.each(data.selVlans, function(vlan, index) { %>
              <option value=<%= vlan %>><%= vlan %></option>
            <% }); %>
            </select>
          </td>
        </tr>
        </table>
      </td>
    </tr>
    <% } %>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPriority')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("pri", data.pri, 5) %></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.pri_min,data.pri_max,data.pri_dflt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <tr>
      <th><%= LabelLeft(lang('stp','lblBridgeId')) %></th>
      <td class="formContentTD">
        <%= !IsUndefOrNull(data.bridgeId) ? data.bridgeId : lang('common','lblNA') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblRootBridgeId')) %></th>
      <td class="formContentTD">
        <%= !IsUndefOrNull(data.rootBridgeId) ? data.rootBridgeId : lang('common','lblNA') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblRootPort')) %></th>
      <td class="formContentTD">
        <%= !IsUndefOrNull(data.rootPort) ? data.rootPort : "" %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblRootCost')) %></th>
      <td class="formContentTD">
        <%= data.rootCost %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblRemainingHop')) %></th>
      <td class="formContentTD">
        <%= data.remainingHop %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
