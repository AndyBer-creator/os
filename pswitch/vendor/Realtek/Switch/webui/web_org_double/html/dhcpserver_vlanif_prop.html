<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var vlanif = 33;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;	 
    dataGet(url('get_dhcpRelayvlanifPool')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
		//console.log(data);
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnEdit':'edit',
	'click #btnAdd':'add',
	'click #btnDel':'del'
  },
  apply: function() {
	//console.log(formDataGet('setform'));
    dataSet(url('set_dhcpRelayvlanifPool'), formDataGet('setform'));
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    OpenDialog(urlParamAppend('dhcpserver_group_edit.html', 'idx', GetTableSelectVal('idx')));
  },
  add:function(e){
    OpenDialog('dhcpserver_group_add.html');
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_dhcpRelaygroupDel'), urlDataGen("groupid=" + GetTableSelectVal('idx')));
  }  
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>
<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('dr','lblVlanIfPoolTable')) %>
<table>
<tr>
	<th> <%= LabelLeft(lang('common','lblIntf'), 'lblIntf') %></th>
	<td class="formContentTD"><%= selectOption('groupIntf', data.drintf, data.intf, 100) %></td>
</tr>
<tr>
	<th> <%= LabelLeft(lang('dr','lblDrVlanifGroup'), 'lblDrVlanifGroup') %></th>
	<td class="formContentTD"><%= selectOption('groupid', data.drgroup, data.groupid, 100) %></td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>
<%= TableHead(lang('dr','lblDrGroupTable')) %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><img src="../images/empty.gif"></img></th>
    <th><%= lang('dr','lblDrGroupId') %></th>
    <th><%= lang('dr','lblDrGroupIp') %></th>
    <th><%= lang('dr','lblGroupBindVlanIf') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.drgrouplist, function(groupindex, idx) { %>
  <tr>
    <!--<td class="StringCell"><%= TableCheckbox(groupindex.groupid) %></td>-->
	<td class="StringCell">
	<input type="radio"  name="selEntry" id=<%= "selEntry_"+ groupindex.groupid %> value=<%= groupindex.groupid %>></input>
    </td>
	<td class="NumberCell"><%= groupindex.groupid %></td>
    <td class="StringCell"> <%= groupindex.groupip %></td>
    <td class="StringCell"> <%= groupindex.groupIntf %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonGroupAddEditDel('btnAdd', 'btnEdit', 'btnDel')) %>
</form>
</script>
</body>
</html>
