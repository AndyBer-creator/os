<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_diagLogRemote')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    'click #btnDel':'del'
  },
  add:function(e){
    if(IsButtonDisabled(e.currentTarget.id))
      return;
    OpenDialog('diag_log_remoteAdd.html');
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    OpenDialog(urlParamAppend('diag_log_remoteEdit.html', 'host', GetTableSelectVal()));
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_diagLogRemoteDel'), urlDataGen(GetTableMultiSelectVals('host')));
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('log','lblRemoteLogServerTable')) %>
<table class="dataTable" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('port','lblEntryNo') %></th>
    <th><%= lang('common','lblSrvIPHost') %></th>
    <th><%= lang('common','lblSrvPort') %></th>
    <th><%= lang('log','lblFacility') %></th>
    <th><%= lang('log','lblMinSev') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.hosts)) { %>
  <% _.each(data.hosts, function(host, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(host.host) %></td>
    <td class="NumberCell"><%= idx + 1 %></td>
    <td class="StringCell"><%= host.host %></td>
    <td class="NumberCell"><%= host.udp_port %></td>
    <td class="StringCell"><%= lang('log','lblLocalArg',[host.facility]) %></td>
    <td class="StringCell"><%= str2var(host.remote_sev) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); } %>
</tbody>
</table>
<%= TableFoot(ButtonGroupAddEditDel('btnAdd', 'btnEdit', 'btnDel')) %>
</form>
</script>
</body>
</html>
