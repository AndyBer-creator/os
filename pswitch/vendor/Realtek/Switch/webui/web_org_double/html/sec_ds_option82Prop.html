<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_secDsOption82Prop')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
        that.rid_use_static();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnEdit':'edit',
    'click #rid_use_static':'rid_use_static',
    'blur input[type=text]':'checkValid'
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_secDsOption82Prop'), formDataGet('setform'));
  },
  edit:function(e){
    if(!CheckTableEdit())
      return;
    OpenDialog(urlAppend('sec_ds_option82PortEdit.html', GetTableMultiSelectVals('port')));
  },
  rid_use_static:function(e){
    if (IsCheckboxChecked('rid_use_static'))
      EnableInputText('rid_static');
    else
      DisableInputText('rid_static');
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validString('rid_static', false, false);
    return valid;
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>
<script id="main_content" type="text/template">
<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th rowspan='2'><%= LabelLeft(lang('ds','lblRemoteId')) %></th>
      <td class="formContentTD">
        <%= Checkbox('rid_use_static', lang('common', 'lblUserDefined'), (data.rid_static.length != 0)) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%= InputText('rid_static', data.rid_static, data.maxlen_remoteID, data.maxlen_remoteID) %>
      </td>
    </tr>

    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('common','lblOperationalStatus')) %>
    <tr>
      <th><%= LabelLeft(lang('ds','lblRemoteId')) %></th>
      <td class="formContentTD">
        <%= show(data.rid_oper) %>
      </td>
     </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= ButtonGroupApply('btnApply') %>

<%= TableHead(lang('ds','titDs82PortSettingTable')) %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('port','lblEntryNo') %></th>
    <th><%= lang('port','lblPort') %></th>
    <th><%= lang('ds','lblOption82Status') %></th>
    <th><%= lang('ds','lblOption82Action') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="BinaryCell"><%= (port.state ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>

    <% if (port.allowUntrusted == 0){ %>
      <td class="BinaryCell"><%= lang('ds', "lblKeep") %></td>
    <% }else if (port.allowUntrusted == 1) { %>
      <td class="BinaryCell"><%= lang('ds', "lblDrop") %></td>
    <% }else if (port.allowUntrusted == 2) { %>
      <td class="BinaryCell"><%= lang('ds', "lblReplace") %></td>
    <% } %>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonEdit('btnEdit')) %>
</form>
</script>
</body>
</html>
