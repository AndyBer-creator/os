<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var selEntries = new Array();

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    for (var i = 0 ; i < parent.data.maxlen; i++)
    {
      selEntries[i] = i + 1;
    }

    this.render();
  },
  render: function() {
    this.$el.html(this.template());
    PagePostInit();
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_networkHostAdd'), formDataGet('setform'));
  },
  checkValid:function(){
    clearAllErrMsg();
    var hostname = $('#hostname').val();
    var ip = $('#ip').val();

    if (0 == hostname.length || !checkDns(hostname))
    {
      ShowStatusWarning(lang('error', 'errDNSDomainErr'));
      return false;
    }

    if (0 == ip.length)
    {
        ShowStatusWarning(lang('error', 'errDNSIPaddr'));
        return false;
    }

    if (!checkIPv4Addr(ip, false, false, false) && !checkIPv6Addr(ip))
    {
      ShowStatusWarning(lang('error', 'errDNSIPaddr'));
      return;
    }

    return true;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead("Add " + lang('dns','txtHost')) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('dns','txtHost')) %></th>
      <td class="formContentTD">
        <%= InputTextHost('hostname', "", 255,50) %>
        <%= lang('dns','txtDnsDftNameLimit') %>
      </td>

    </tr>
    <tr>
      <th><%= LabelLeft(lang('dns','txtIpv4AndIpv6')) %></th>
      <td class="formContentTD">
        <%= InputTextIPv6("ip", "", 255, 50) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
