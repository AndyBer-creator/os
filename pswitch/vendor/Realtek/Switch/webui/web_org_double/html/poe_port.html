<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var time = 10;
var intervalId;

function TemperatureShow(temperature)
{     
  if(temperature)
  {
	  var txt = '';
	  txt += '<tr><th>';
	  txt += LabelLeft(lang('poe','lblPoeDevTemp'));
	  txt += '</th><td class="formContentTD">'+temperature+'</td></tr>';
	  return txt;
  }
}

function PoeWatchDogHeadShow(watchDog)
{     
  if(watchDog)
  {
	  var txt = '';
	  txt += '<th>';
	  txt += lang('poe','lblPoePortWatchDog');
	  txt += '</th>'
	  return txt;
  }
}

function PoeWatchDogConfigShow(watchDog, portWD)
{     
  if(watchDog)
  {
	  var txt = '';
	  txt += '<td class="BinaryCell">';
	  txt += (portWD ? lang('common','txtEnabled') : lang('common','txtDisabled'));
	  txt += '</td>';
	  return txt;
  }
}

function reload()
{
  mainFrame.render();
}
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_poePort')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
		
        that.refresh();
      }
    });
  },
  events: {
    'click #btnEdit':'edit',
	'click [name=refreshRate]':'refresh'

  },
  edit:function(e){
    if(!CheckTableEdit())
      return;
    OpenDialog(urlAppend('poe_portEdit.html', GetTableMultiSelectVals2('port')));
  },
  refresh: function(){
    clearInterval(intervalId);

    time = GetRadioVal('refreshRate');

    if (0 != time)
      intervalId = setInterval(reload, time * 1000);
  }
});

mainFrame = new mainView();

EnterKeyEvent('edit');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('poe','titPoeSummary')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('poe','lblPoeDevPower')) %></th>
      <td class="formContentTD">
        <%= (data.devPower / 1000) %>
      </td>
    </tr>
    <!--<tr>
      <th><%= LabelLeft(lang('poe','lblPoeDevTemp')) %></th>
      <td class="formContentTD">
        <%= data.devTemp %>
      </td>
    </tr>-->
	<%= TemperatureShow(data.devTemp) %>
    <tr>
      <th><%= LabelLeft(lang('common','lblRefreshRate')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('refreshRate',time,[0,lang('common','lblRefreshRateNone')],[5,lang('common','lblRefreshRate5s')],[10,lang('common','lblRefreshRate10s')],[30,lang('common','lblRefreshRate30s')]) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= ShowFormContentGap() %>

<%= TableHead(lang('poe','titPoePortSettingTable')) %>
<table class="dataTable" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('port','lblEntryNo') %></th>
    <th><%= lang('port','lblPort') %></th>
    <th><%= lang('poe','lblPoePortEnable') %></th>
    <th><%= lang('poe','lblPoePortStatus') %></th>
    <th><%= lang('poe','lblPoePortType') %></th>
    <th><%= lang('poe','lblPoePortLevel') %></th>
    <th><%= lang('poe','lblPoePortPower') %></th>
    <th><%= lang('poe','lblPoePortVoltage') %></th>
    <th><%= lang('poe','lblPoePortCurrent') %></th>
	<%= PoeWatchDogHeadShow(data.watchDog) %>
    <!--<th><%= lang('poe','lblPoePortWatchDog') %></th>-->
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="BinaryCell"><%= (port.portEnable ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>
    <td class="BinaryCell"><%= (port.portStatus ? lang('poe','txtOn') : lang('poe','txtOff')) %></td>
    <!-- <td class="StringCell"><%= show(port.portType) + (IsUndefOrNull(port.portType)?lang('common','lblNA'):' (' + show(port.portType) + ')') %></td> -->
    <td class="StringCell"><%= show(port.portType) %></td>
    <td class="NumberCell"><%= IsUndefOrNull(port.portLevel)?lang('common','lblNA'):port.portLevel %></td>
    <td class="NumberCell"><%= IsUndefOrNull(port.portPower)?lang('common','lblNA'):(port.portPower / 1000) %></td>
    <td class="NumberCell"><%= IsUndefOrNull(port.portVoltage)?lang('common','lblNA'):port.portVoltage %></td>
    <td class="NumberCell"><%= IsUndefOrNull(port.portCurrent)?lang('common','lblNA'):port.portCurrent %></td>
    <!--<td class="BinaryCell"><%= (port.portWatchDog ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>-->
	<%= PoeWatchDogConfigShow(data.watchDog, data.portWatchDog) %>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonEdit('btnEdit')) %>
</form>
</script>
</body>
</html>
