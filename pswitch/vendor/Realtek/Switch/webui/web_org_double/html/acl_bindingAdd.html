<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var selVal;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlGetPortList('port');
    this.render();
  },
  render: function() {
    this.$el.html(this.template());
    PagePostInit();
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'change #mac':'mac',
    'change #ipv4':'ip',
    'change #ipv6':'ip'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    dataSet(url('set_aclBinding'), formDataGet('setform'));
  },
  ip: function(e) {

    if (GetSelectVal('ipv4') != "None")
      DisableSelect('ipv6');
    else
      EnableSelect('ipv6');

    if (GetSelectVal('ipv6') != "None")
      DisableSelect('ipv4');
    else
      EnableSelect('ipv4');
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('acl','titAclBindingAdd')) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th rowspan='2'><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('portList',selVal) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%= LabelHint(lang('acl','msgAclEmptyACL')) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('acl','lblAclMac')) %></th>
      <td class="formContentTD">
        <%= Select('mac', parent.data.mac) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('acl','lblAclIpv4')) %></th>
      <td class="formContentTD">
        <%= Select('ipv4', parent.data.ipv4) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('acl','lblAclIpv6')) %></th>
      <td class="formContentTD">
        <%= Select('ipv6', parent.data.ipv6) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
