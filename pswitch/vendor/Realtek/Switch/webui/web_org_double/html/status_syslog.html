<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var targetVal;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    if (urlParamGetByName('target').length == 0)
      targetVal = 0;
    else
      targetVal = str2int(urlParamGetByName('target'));
    this.render();
  },
  render: function(_url) {
    var that = this;
    var urlFinal = urlParamAppend(url('get_statusSyslog'), 'target', targetVal);
    dataGet(urlFinal).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnClear':'clear',
    'click #btnRefresh':'refresh',
    'change #target':'selTarget'
  },
  clear:function(e){
    dataSet(url('set_statusSyslogClear'), formDataGet('setform'));
  },
  refresh:function(e){
    this.render();
  },
  selTarget:function(e){
    targetVal = str2int(GetSelectVal('target'));
    this.render();
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('log','lblLoggingTable')) %>
<table>
<tr>
  <td><%= lang('log','lblLoggingType')%></td>
  <td class="right">
    <select name="target" id="target">
      <option value=0 <%= (targetVal == 0) ? "selected" : "" %>><%= lang('log','txtRam') %></option>
      <option value=1 <%= (targetVal == 1) ? "selected" : "" %>><%= lang('log','txtFile') %></option>
    </select>
  </td>
</tr>
</table>
<br>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= lang('log','lblLogIdx') %></th>
    <th><%= lang('log','lblLogTime') %></th>
    <th><%= lang('log','lblLogSev') %></th>
    <th><%= lang('log','lblLogDesc') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.logs)) { %>
  <% _.each(data.logs, function(log, idx) { %>
    <tr>
      <td class="NumberCell"><%= log.idx %></td>
      <td class="StringCell"><%= log.time %></td>
      <td class="StringCell"><%= log.sev %></td>
      <td class="StringCell"><%= log.desc %></td>
      <%= TableLastTd() %>
    </tr>
  <% }); } %>
</tbody>
</table>
<%= TableFoot(ButtonGroupClearRefresh('btnClear', 'btnRefresh')) %>
</form>
</script>
</body>
</html>
