<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_secMgmtACL')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp));
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnDel':'del',
    'click #btnActive':'active',
    'click #btnDeactive':'deactive'
  },
  apply: function() {

    if (this.checkValid())
      dataSet(url('set_secMgmtACL'), formDataGet('setform'));
  },
  del:function(e){
    if (GetTableMultiSelectNum() == 0)
    {
      //ShowStatusWarning("No entry selected");
	  ShowStatusWarning(lang('common','tipNoEntrySelected'));
      return;
    }

    var vals = sliceString(GetTableMultiSelectVals('selEntry'), 'selEntry=');
    var val;

    for (var i = 0; i < vals.length ; i++)
    {
      if (0 != vals[i].length)
      {
        if (-1 != vals[i].indexOf('&'))
          val = vals[i].substring(0, vals[i].indexOf('&'));
        else
          val = vals[i];
      }

      for( var j = 0; j < data.mgmtACLs.length; j++)
      {
        if (data.mgmtACLs[j].name == val && data.mgmtACLs[j].active == true)
        {
          //ShowStatusWarning("Cannot delete active management ACL");
		  ShowStatusWarning(lang('warning','warningAcldelate'));
          return;
        }
      }
    }

    dataSet(url('set_secMgmtACLDel'), urlDataGen(GetTableMultiSelectVals('name')));
  },
  active:function(e){
    var cnt = GetTableMultiSelectNum();

    if (cnt == 0)
    {
      //ShowStatusWarning("No entry selected");
	  ShowStatusWarning(lang('common','tipNoEntrySelected'));
      return;
    }
    else if (cnt > 1)
    {
      //ShowStatusWarning("Please select only one entry to active");
	  ShowStatusWarning(lang('warning','warningSelectActive'));
      return;
    }

    dataSet(url('set_secMgmtACLActive'), urlDataGen(GetTableMultiSelectVals('name')));
  },
  deactive:function(e){
    var cnt = GetTableMultiSelectNum();

    if (cnt == 0)
    {
      //ShowStatusWarning("No entry selected");
	  ShowStatusWarning(lang('common','tipNoEntrySelected'));
      return;
    }
    else if (cnt > 1)
    {
      //ShowStatusWarning("Please select only one entry to deactive");
	  ShowStatusWarning(lang('warning','warningSelectDeactive'));	
      return;
    }

    var vals = sliceString(GetTableMultiSelectVals('selEntry'), 'selEntry=');
    var val;

    for (var i = 0; i < vals.length ; i++)
    {
      if (0 != vals[i].length)
      {
        if (-1 != vals[i].indexOf('&'))
          val = vals[i].substring(0, vals[i].indexOf('&'));
        else
          val = vals[i];
      }

      for( var j = 0; j < data.mgmtACLs.length; j++)
      {
        if (data.mgmtACLs[j].name == val && data.mgmtACLs[j].active != true)
        {
          ShowStatusWarning("Management ACL " + val + " is not activeated");
          return;
        }
      }
    }
    dataSet(url('set_secMgmtACLDeactive'), urlDataGen(GetTableMultiSelectVals('name')));
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    var val = $('#name').val();
    valid &= validRequireName('name');

    if (!IsUndefOrNull(data.mgmtACLs))
    {
      for( var i = 0; i < data.mgmtACLs.length; i++)
      {
        if (data.mgmtACLs[i].name == val)
        {
          //ShowStatusWarning("Name " + val + " has existed");
		  ShowStatusWarning(lang('warning','warningAclName', val)); 
          valid &= false;
          break;
        }
      }
    }
    return valid;
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>
<script id="main_content" type="text/template">
<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('acl_mgmt','lblMgmtACLName')) %></th>
      <td class="formContentTD">
        <%= InputText('name', '', data.maxlen, data.maxlen) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= ButtonGroupApply('btnApply') %>
<%= TableHead(lang('acl_mgmt','titMgmtACLTable')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('acl_mgmt','lblMgmtACLName') %></th>
    <th><%= lang('acl_mgmt','lblMgmtACLActive') %></th>
    <th><%= lang('acl_mgmt','lblMgmtACENUM') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.mgmtACLs)) { %>
  <% _.each(data.mgmtACLs, function(acl, idx) { %>
  <tr>

    <td class="StringCell">
    <input type="checkbox"  name="selEntry" id=<%= "selEntry_"+ idx %> value="<%= acl.name %>"></input>
    </td>
    <td class="StringCell"><%= show(acl.name) %></td>
    <td class="BinaryCell"><%= ((acl.active) ? lang('common','btnActive') : lang('common','btnDeactive')) %></td>
    <td class="NumberCell"><%= acl.acenum %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>
<%= TableFoot(ButtonGroup(ButtonActive('btnActive'), ButtonDeactive('btnDeactive'), ButtonDel('btnDel'))) %>
</form>
</script>
</body>
</html>
