function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
	pollname = "_src="+urlParamGetByName('idx');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_dhcpRelayipPoolEdit'), pollname)).fetch({
      success: function(model, resp){
       logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;
		//console.log(data);
		that.dnsShow();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid',
	'click #dnsPristate':'dnsShow',
	'click #dnsSecstat':'dnsShow'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
	  var setday= $('#day').val();
	  data.leasedays = setday;
	  //console.log(formDataGet('setform'));
      dataSet(url('set_dhcpRelayipPoolEdit'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validIPv4Addr('addrstart');
    valid &= validIPv4Mask('addrend');
    valid &= validIPv4Addr('gateway');
    valid &= validIPv4Mask('mask');
	valid &= validIPv4Addr('dnsPri');
	valid &= validIPv4Addr('dnsSec');
    return valid;
  },
  
  dnsShow: function()
  {
    if (IsChecked('dnsPristate'))
    {
      EnableInputText('dnsPri');
    }
    else
    {
      DisableInputText('dnsPri');
    }
	if (IsChecked('dnsSecstat'))
	{
	  EnableInputText('dnsSec');
	}
	else
	{
	  DisableInputText('dnsSec');
	}
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');

<table id="main_table"><tbody>

<script id="main_content" type="text/template">

<form id="setform">
<%= DialogHead(lang('dr','lblIPPoolTable')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('dr','lblPoolName')) %></th>
      <td class="formContentTD">
        <!--<%= InputText('ippool',data.ippool,data.ippoolLen) %>-->
		<%= data.ippool %> <%= InputHidden('ippool',data.ippool) %>
      </td>
    </tr>
	<tr>
	  <th><%= LabelLeft(lang('dr','lblGateway'),'lblGateway') %></th>
	  <td class='formContentTD'>
	    <%= InputTextIPv4('gateway', data.gateway) %>
	  </td>
	</tr>
	<tr>
	  <th><%= LabelLeft(lang('dr','lblGatewayMask'),'lblGatewayMask') %></th>
	  <td class='formContentTD'>
	    <%= InputTextIPv4('mask', data.mask) %>
	  </td>
	</tr>
    <tr>
      <th><%= LabelLeft(lang('dr','lblIPSectionTable')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
			<td <%= LabelLeft(lang('dr','lblPoolSection'), 'lblPoolSection') %></td>
			<td class="formContentTD"><%= selectOption('section', ipsection, data.section, 150) %></td>
          </tr>
		  <tr>
		    <td <%= LabelLeft(lang('dr','lblPoolAddrStart'), 'lblPoolAddrStart') %></td>
		    <td class="formContentTD">
		      <%= InputTextIPv4('addrstart', data.addrstart) %>
		    </td>
		  </tr>
		  <tr>
			<td <%= LabelLeft(lang('dr','lblPoolAddrEnd'), 'lblPoolAddrEnd') %></td>
		    <td class="formContentTD">
		      <%= InputTextIPv4('addrend', data.addrend) %>
		    </td>
		  </tr>
        </table>
      </td>
    </tr>
	<tr>
	  <th><%= LabelLeft(lang('dr','lblDNSPrimaryIp'),'lblDNSPrimaryIp') %></th>
	  <td class="formContentTD">
		  <table>
		  	<tr>
				<td><%= Checkbox('dnsPristate',lang('common','txtEnable'), data.dnsPristat) %></td>
				<td><%= InputTextIPv4('dnsPri', data.dnsPri) %></td>
			</tr>
		  </table>
	  </td>  
	</tr>
	<tr>
	  <th><%= LabelLeft(lang('dr','lblDNSSecondIp'),'lblDNSSecondIp') %></th>
	  <td class="formContentTD">
		  <table>
		  	<tr>
				<td><%= Checkbox('dnsSecstat', lang('common','txtEnable'), data.dnsSecstat) %></td>
				<td><%= InputTextIPv4('dnsSec', data.dnsSec) %></td>
			</tr>
		  </table>
	  </td>  
	</tr>

	<tr>
	  <th><%= LabelLeft(lang('dr','lblOption43'),'lblOption43') %></th>
	  <td class="formContentTD">
		  <table>
		  	<tr>
		  	  <td><%= RadioGroup('format',data.format,['ascii',lang('dr','txtAscii')],['hex',lang('dr','txtHex')]) %></td>
			  <td><%= InputText('option43Ip', data.option43Ip) %></td>
			</tr>
		  </table>
	  </td>
	</tr>

	<tr>
	  <th><%= LabelLeft(lang('dr','lblLeaseTime')) %></th>

		<table>
			<tr>
			  <td><%= InputTextHex('leasedays', data.leasedays, 3, 3)%></td>
			  <td <%= LabelLeft(lang('time','lblDay'), 'lblDay') %></td>
			  <td><%= selectOption('leasehours', hour, data.leasehours) %></td>
			  <td><%= LabelLeft(lang('time','lblHour'), 'lblHour') %></td>  
			  <td><%= selectOption('leaseminutes', minute, data.leaseminutes) %></td>
			  <td><%= LabelLeft(lang('time','lblMinute'), 'lblMinute') %></td>
