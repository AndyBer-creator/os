<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_secAaaLoginAuth')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'change select':'showMethods'
  },
  apply: function() {
    dataSet(url('set_secAaaLoginAuth'), formDataGet('setform'));
  },
  showMethods: function(e){
    var currSelList = GetSelectVal(e.currentTarget.id);
    var lineIdx = e.currentTarget.id.split('_')[1];
    var txt = '';
    for (var i = 0; i < data.lists.length; i++) {
      if (data.lists[i].list == currSelList) {
        for (var j = 0; j < data.lists[i].methods.length; j++) {
          txt += '(' + (j + 1) + ') ' + show(data.lists[i].methods[j]) + '<br>';
        }
      }
    }
    $('#lineMethods_'+lineIdx).html(txt);
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <% _.each(data.lines, function(entry, idx) { %>
    <tr>
      <th><%= LabelLeft(show(entry.name)) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td>
              <select name=<%= "list_"+entry.val%> id=<%= "line_"+idx%>>
                <% for (var i = 0; i < data.lists.length; i++) { %>
                <option value="<%= data.lists[i].list %>" <%= (data.lists[i].list == entry.list) ? "selected": "" %>> <%= show(data.lists[i].list) %> </option>
                <% } %>
              </select>
            </td>
            <td class="right" id=<%="lineMethods_"+idx%>>
              <% for (var i = 0; i < data.lists.length; i++) { %>
                <% if (data.lists[i].list == entry.list) { %>
                  <% for (var j = 0; j < data.lists[i].methods.length; j++) { %>
                    <%= '(' + (j + 1) + ') ' + show(data.lists[i].methods[j]) + '<br>'  %>
                  <% } %>
                <% } %>
              <% } %>
            </td>
          </tr>
        </table>
      </td>
    </tr>
    <% });%>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

</form>
</script>
</body>
</html>
