<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();
var data;

var bistate =
[
    "lang('udld', 'lblUdldBiState_0')",
    "lang('udld', 'lblUdldBiState_1')",
    "lang('udld', 'lblUdldBiState_2')",
    "lang('udld', 'lblUdldBiState_3')",
    "lang('udld', 'lblUdldBiState_4')",
    "lang('udld', 'lblUdldBiState_5')"
];

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_diagUDLDNeighbor')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnRefresh':'refresh'
  },
  refresh:function(e){
    if(IsButtonDisabled(e.currentTarget.id))
      return;

    this.render();
  }
});

mainFrame = new mainView();
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('udld','titTableUdldNeighbor')) %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= lang('port','lblEntryNo') %></th>
    <th><%= lang('udld','lblUdldExpirationTime') %></th>
    <th><%= lang('udld','lblUdldcurNeistate') %></th>
    <th><%= lang('udld','lblUdldDeviceID') %></th>
    <th><%= lang('udld','lblUdldDeviceName') %></th>
    <th><%= lang('udld','lblUdldPortID') %></th>
    <th><%= lang('udld','lblUdldMsgInterval') %></th>
    <th><%= lang('udld','lblUdldTimeoutInterval') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.neighbors, function(neighbor, idx) { %>
  <tr>
    <td class="NumberCell"><%= idx + 1 %></td>
    <td class="NumberCell"><%= neighbor.exptime %></td>
    <td class="StringCell"><%= show(bistate[neighbor.curneiState]) %></td>
    <td class="StringCell"><%= neighbor.devId %></td>
    <td class="StringCell"><%= neighbor.devName %></td>
    <td class="StringCell"><%= neighbor.portId %></td>
    <td class="NumberCell"><%= neighbor.msgInterval %></td>
    <td class="NumberCell"><%= neighbor.timeoutInterval %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonGroup(ButtonRefresh('btnRefresh'))) %>
</form>
</script>
</body>
</html>
