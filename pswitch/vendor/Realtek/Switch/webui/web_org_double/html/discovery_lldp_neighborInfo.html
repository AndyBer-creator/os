<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_discoveryLldpNeighbor')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'click #btnDetail':'detail',
    'click #btnRefresh':'refresh',
    'click #btnClear':'del'
  },
  detail:function(e){
    if (GetTableMultiSelectNum() == 0)
    {
      //ShowStatusWarning("No entry selected");
	  ShowStatusWarning(lang('common','tipNoEntrySelected'));
      return ;
    }
    else if (GetTableMultiSelectNum() > 1)
    {
      //ShowStatusWarning("Please select only one entry to view");
	  ShowStatusWarning(lang('warning','warningSelectEntry'));  
      return ;
    }
    OpenDialog(urlParamAppend('discovery_lldp_neighborDetail.html','port', GetTableSelectVal()));
  },
  refresh:function(e){
    dataSet(url('set_discoveryLldpNeighborRefresh'), formDataGet('setform'));
  },
  del:function(e){
    if (GetTableMultiSelectNum() == 0)
    {
      //ShowStatusWarning("No entry selected");
	  ShowStatusWarning(lang('common','tipNoEntrySelected'));
      return ;
    }
    dataSet(url('set_discoveryLldpNeighborClear'), urlDataGen(GetTableMultiSelectVals('selEntry')));
  }
});

mainFrame = new mainView();

EnterKeyEvent('detail');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('lldp','btnNeighborTable')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('lldp','lblLocalPort') %></th>
    <th><%= lang('lldp','lblChassisIDSubtype') %></th>
    <th><%= lang('lldp','lblChassisID') %></th>
    <th><%= lang('lldp','lblPortIDSubtype') %></th>
    <th><%= lang('lldp','lblPortID') %></th>
    <th><%= lang('lldp','lblSysName') %></th>
    <th><%= lang('lldp','lblTTL') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.neighbors)) { %>
  <% _.each(data.neighbors, function(entry, idx) { %>
  <tr>
    <td class="StringCell"><input type="checkbox" name="selEntry" id=<%= "selEntry_" + idx %> value="<%= entry.localPort+'_'+entry.index %>"></input></td>
    <td class="StringCell"><%= entry.localPort %></td>
    <td class="StringCell"><%= show(entry.chassisType) %></td>
    <td class="StringCell"><%= entry.chassisId %></td>
    <td class="StringCell"><%= show(entry.portIdType) %></td>
    <td class="StringCell"><%= entry.portId %></td>
    <td class="StringCell"><%= entry.sysName %></td>
    <td class="NumberCell"><%= entry.ttl %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); } %>
</tbody>
</table>
<%= TableFoot(ButtonGroup(ButtonClear('btnClear'),ButtonRefresh('btnRefresh'),ButtonDetail('btnDetail'))) %>
</form>
</script>
</body>
</html>
