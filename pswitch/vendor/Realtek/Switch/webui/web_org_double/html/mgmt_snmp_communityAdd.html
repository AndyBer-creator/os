<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_snmpCommunityAdd')).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
        $('#grpName').addClass('inputTextErrMsg');
        that.comtype();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'click [name=commType]':'comtype',
    'blur input':'checkValid'
  },
  checkSelValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validSelString('grpName');
    return valid;
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
    {
      if (this.checkSelValid())
        dataSet(url('set_snmpCommunityAdd'), formDataGet('setform'));
    }
  },
  comtype: function(){
    SelectRadio('accessMode','Read-Only');
    if ('Basic' == GetRadioVal('commType')) {
      DisableLabel('lblgrpName');
      DisableSelect('grpName');
      EnableLabel('lblviewName');
      EnableLabel('lblaccess');
      EnableRadioGroup('accessMode');
      EnableSelect('viewName');
      $('#grpName').addClass('inputTextErrMsg');
    } else {
      EnableLabel('lblgrpName');
      EnableSelect('grpName');
      DisableLabel('lblviewName');
      DisableLabel('lblaccess');
      DisableRadioGroup('accessMode');
      DisableSelect('viewName');
    }
    this.checkSelValid();
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validString('commStr', false, true);
    return valid;
  }
});

EnterKeyEvent('apply');
mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('snmp','titAddSnmpCommunity')) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('snmp','lblCommunityName')) %></th>
      <td class="formContentTD">
        <%= InputText('commStr', '', data.maxlen_commStr) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('snmp','lblcommType')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('commType','Basic',['Basic',lang('snmp','lblBasic')],['Advanced',lang('snmp','lblAdvanced')]) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('snmp','lblViewName'), 'lblviewName') %></th>
      <td class="formContentTD">
        <%= SelectArry("viewName", data.views, "all") %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('snmp','lblAccess'), 'lblaccess') %></th>
      <td class="formContentTD">
        <%= RadioGroup('accessMode','Read-Only',['Read-Only',lang('snmp','lblReadOnly')],['Read-Write',lang('snmp','lblReadWrite')]) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('snmp','lblGroupName'), "lblgrpName") %></th>
      <td class="formContentTD">
        <%= SelectArry("grpName", data.grps) %>
      </td>
    </tr>

    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
