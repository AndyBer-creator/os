<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_ripConfig')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
		//console.log(data);
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnAdd':'add',
    'click #btnDel':'del'
  },
  apply: function() {
    dataSet(url('set_ripConfig'), formDataGet('setform'));
  },
  add:function(e){
    OpenDialog('route_rip_add.html');
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_ripNetworkDel'), urlDataGen(GetTableMultiSelectVals('networkAddr')));
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    OpenDialog(urlParamAppend('route_rip_edit.html', 'idx', GetTableSelectVal('idx')));
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>
<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('rip','lblRipSettingInfo')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('rip','lblRipStatus')) %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('state', data.state) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= ButtonGroupApply('btnApply') %>

<%= TableHead(lang('rip','lblRipNetworkTable')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><img src="../images/empty.gif"></img></th>
    <th><%= lang('rip','lblRipNetworkAddr') %></th>
    <th><%= lang('rip','lblRipNetworkMask') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.networks, function(network, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(network.networkAddr+'_'+network.networkMask) %></td>
    <td class="StringCell"><%= show(network.networkAddr) %></td>
    <td class="StringCell"><%= show(network.networkMask) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonGroupAddDel('btnAdd','btnDel')) %>
</form>
</script>
</body>
</html>
