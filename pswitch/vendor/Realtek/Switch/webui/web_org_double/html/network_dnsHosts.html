<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var selMode = 0;

function add()
{

}

function init()
{
  fileLoadWait();

var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_networkHost')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data = resp.data;
        that.$el.html( that.template(resp));
        tblDataAry = data.hosts;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnAdd':'add',
    'click #btnDel':'del',
    'click #btnClear':'clear'
  },
  add: function(e) {
    OpenDialog('network_dnsHostsAdd.html');
  },
  del: function(e) {
    if (GetTableMultiSelectNum() == 0)
    {
      //ShowStatusWarning("No entry selected");
	  ShowStatusWarning(lang('common','tipNoEntrySelected'));
      return;
    }

    dataSet(url('set_networkHostDel'), formDataGet('setform'));
  },
  clear: function() {
    dataSet(url('set_networkHost'), formDataGet('setform'));
  }
});

mainFrame = new mainView();
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>
<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('dns','titDnsHostConf')) %>
<table class="dataTable" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('dns','txtHost') %></th>
    <th><%= lang('dns','txtIpv4AndIpv6') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.hosts)) { %>
  <% _.each(data.hosts, function(host, idx) { %>
  <tr>
    <td class="StringCell">
    <input type="checkbox"  name="hosts" id=<%= "hosts_"+ idx %> value="<%= host.hostname+'-'+host.ip %>"></input>
    </td>
    <td class="StringCell"><%= host.hostname %></td>
    <td class="NumberCell"><%= host.ip %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>
<%= TableFoot(ButtonGroupAddDel('btnAdd', 'btnDel')) %>


<%= TableHead(lang('dns','titDynamicHostMapping')) %>
<table class="dataTable" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= lang('dns','txtHost') %></th>
    <th><%= lang('dns','txtTotal') %></th>
    <th><%= lang('dns','txtElapsed') %></th>
    <th><%= lang('dns','txtType') %></th>
    <th><%= lang('dns','txtIpv4AndIpv6') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.dhosts)) { %>
  <% _.each(data.dhosts, function(host, idx) { %>
  <tr>
    <td class="StringCell"><%= host.hostname %></td>
    <td class="NumberCell"><%= host.total %></td>
    <td class="StringCell"><%= host.elapsed %></td>
    <td class="StringCell"><%= (host.type == "0") ? "IPv4": "IPv6" %></td>
    <td class="StringCell"><%= host.ip %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>
<%= TableFoot(ButtonClear('btnClear')) %>
</form>
</script>
</body>
</html>
