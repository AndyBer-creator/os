<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<style>
	.dataTable th,.dataTable td{
		   padding: 0px 0px !important;
    	text-align: center !important;
	}
</style>
<script>
fileLoadMainFrame();

var data;
var selVal = 0;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
      selVal = urlParamGetVals('port');
    if (selVal == '')
      selVal = 0;
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlParamAppend(url('get_poePortTimer'), 'selPort', selVal)).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp));
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'change #selPort':'selPort'
  },
  apply: function() {
    dataSet(url('set_poePortTimer'), formDataGet('setform'));
  },
  selPort: function(){
    selVal = GetSelectVal('selPort');
    this.render();
  },
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<table>
<tr>
	<th> <%= LabelLeft(lang('port','lblPort'), 'lblPort') %></th>
	<td class="formContentTD"><%= selectOption('selPort', data.ports, data.selPort, 100) %></td>
</tr>
</table>

<table class="dataTable" cellspacing="0" cellpadding="0">
	<thead>
	  <tr>
	  	<th style="display:none">index</th>
	  	<th><%= TableCheckboxAll() %></th>
	    <th>00</th>
	    <th>01</th>
	    <th>02</th>
	    <th>03</th>
	    <th>04</th>
	    <th>05</th>
	    <th>06</th>
	    <th>07</th>
	    <th>08</th>
	    <th>09</th>
	    <th>10</th>
	    <th>11</th>
	    <th>12</th>
	    <th>13</th>
	    <th>14</th>
	    <th>15</th>
	    <th>16</th>
	    <th>17</th>
	    <th>18</th>
	    <th>19</th>
	    <th>20</th>
	    <th>21</th>
	    <th>22</th>
	    <th>23</th>

	  </tr>
	</thead>
	<tbody>
	  <% _.each(data.weeks, function(week, idx) { %>
	  <tr>
	   <td class="StringCell" style="display:none"><%= idx %></td>
		<% if (week.week == 1) { %>
        <td class="StringCell"><%= lang('time','lblMon') %></td>
		<% } else if (week.week == 2) { %>
        <td class="StringCell"><%= lang('time','lblTue') %></td>
		<% } else if (week.week == 3) { %>
        <td class="StringCell"><%= lang('time','lblWed') %></td>
		<% } else if (week.week == 4) { %>
        <td class="StringCell"><%= lang('time','lblThu') %></td>
		<% } else if (week.week== 5) { %>
        <td class="StringCell"><%= lang('time','lblFri') %></td>
		<% } else if (week.week == 6) { %>
        <td class="StringCell"><%= lang('time','lblSat') %></td>
		<% } else if (week.week == 0) { %>
        <td class="StringCell"><%= lang('time','lblSun') %></td>
        <% } %>
	    <td class="BinaryCell"><%= Checkbox('hour0_'+ week.week, '', (((week.hour >> 0) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour1_'+ week.week, '', (((week.hour >> 1) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour2_'+ week.week, '', (((week.hour >> 2) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour3_'+ week.week, '', (((week.hour >> 3) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour4_'+ week.week, '', (((week.hour >> 4) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour5_'+ week.week, '', (((week.hour >> 5) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour6_'+ week.week, '', (((week.hour >> 6) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour7_'+ week.week, '', (((week.hour >> 7) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour8_'+ week.week, '', (((week.hour >> 8) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour9_'+ week.week, '', (((week.hour >> 9) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour10_'+ week.week, '', (((week.hour >> 10) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour11_'+ week.week, '', (((week.hour >> 11) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour12_'+ week.week, '', (((week.hour >> 12) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour13_'+ week.week, '', (((week.hour >> 13) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour14_'+ week.week, '', (((week.hour >> 14) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour15_'+ week.week, '', (((week.hour >> 15) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour16_'+ week.week, '', (((week.hour >> 16) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour17_'+ week.week, '', (((week.hour >> 17) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour18_'+ week.week, '', (((week.hour >> 18) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour19_'+ week.week, '', (((week.hour >> 19) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour20_'+ week.week, '', (((week.hour >> 20) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour21_'+ week.week, '', (((week.hour >> 21) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour22_'+ week.week, '', (((week.hour >> 22) & 0x1) ? true : false)) %></td>
	    <td class="BinaryCell"><%= Checkbox('hour23_'+ week.week, '', (((week.hour >> 23) & 0x1) ? true : false)) %></td>

	  </tr>
    <% }); %>
	</tbody>
</table>
<%= TableFoot(ButtonGroupApply('btnApply')) %>
</form>
</script>
</body>
</html>
