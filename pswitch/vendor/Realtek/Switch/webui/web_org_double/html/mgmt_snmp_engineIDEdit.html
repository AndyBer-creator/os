<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var selVal;
var selIdx;
var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlParamGetByName('srvHost');
    for (i = 0; i < parent.data.engines.length; i++)
    {
      if (parent.data.engines[i].srvHost == selVal)
      {
        selIdx = i;
        break;
      }
    }
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_snmpEngineIDEdit'),'srvHost', selVal).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
    {
      dataSet(url('set_snmpEngineIDEdit'), formDataGet('setform'));
    }
  },
  checkValid: function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validSnmpEngineId('engineId');
    return valid;
  }
});

EnterKeyEvent('apply');
mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('snmp','titEditRemtEngineID')) %>
<%= InputHidden('srvHost',selVal) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>

    <tr>
      <th><%= LabelLeft(lang('common','lblSrvIPHost')) %></th>
      <td class="formContentTD">
        <%= show(selVal) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('snmp','lblEngineID')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextHex('engineId', parent.data.engines[selIdx].engineId, data.maxlen_engineId) %></td>
            <td class="right"><%= LabelHint(lang('common','txtHexRangeArg',[data.minlen_engineId,data.maxlen_engineId])) %></td>
          </tr>
        </table>
      </td>
    </tr>

    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
