<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();
fileLoad("../js/spin.js", "js");

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_mcastIgmpQuerier')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnEdit':'edit'
  },
  edit:function(e){
    if(!CheckTableEdit())
      return;

    OpenDialog(urlAppend('mcast_igmp_querierEdit.html', dataVlanListSrc('vlan', GetTableMultiSelectVals('vlan'))));
  }
});

EnterKeyEvent('edit');
mainFrame = new mainView();
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('mcast','titQuerierTable')) %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('common','lblVLAN') %></th>
    <th><%= lang('mcast','tblIGMPQuerierState') %></th>
    <th><%= lang('mcast','tblIGMPQuerierStatus') %></th>
    <th><%= lang('mcast','tblIGMPQuerierVersion') %></th>
    <th><%= lang('mcast','tblQuerierIPAddress') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.vlans)) { %>
  <% _.each(data.vlans, function(vlan, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(vlan.vid) %></td>
    <td class="NumberCell"><%= vlan.vid %></td>
    <td class="BinaryCell"><%= lang('common',(vlan.qryState)?'txtEnabled':'txtDisabled') %></td>
    <td class="BinaryCell"><%= lang('common',(vlan.querierStatus)?'txtEnabled':'txtDisabled') %></td>
    <td class="StringCell"><%= (!IsUndefOrNull(vlan.querierVer)) ? lang('mcast','lblIGMPv'+vlan.querierVer) : "" %></td>
    <td class="StringCell"><%= vlan.querierIp %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>
<%= TableFoot(ButtonGroup(ButtonEdit('btnEdit'))) %>

</form>
</script>
</body>
</html>
