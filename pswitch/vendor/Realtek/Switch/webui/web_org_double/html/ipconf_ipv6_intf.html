<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var intfStatus = [
      "txtStatusTentative",
      "txtStatusValid",
      "txtStatusValidDuplicated",
      "txtStatusDuplicated",
      "txtStatusDelayed",
      "txtStatusNotReceived"
    ];

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_ipconfIpv6Intf')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    'click #btnDel':'del'
  },
  apply:function(e){
    dataSet(url('set_ipconfIpv6Intf'), formDataGet('setform'));
  },
  add:function(e){
    OpenDialog('ipconf_ipv6_intfAdd.html');
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    if (IsChecked('selEntry_'+'loopback'))
    {
      //ShowStatusWarning("Loopback interface cannot be edited");
	  ShowStatusWarning(lang('warning','warningLoopback'));
      return;
    }
    OpenDialog(urlParamAppend('ipconf_ipv6_intfEdit.html', 'intf', GetTableSelectVal()));
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_ipconfIpv6IntfDel'), urlDataGen(GetTableMultiSelectVals('intf')));
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblIPv6Routing')) %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('fwd', data.fwd) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= ButtonGroupApplyCancel('btnApply', 'btnCancel') %>

<%= TableHead(lang('ipconf','lblIPv6IntfTable')) %>
<table class="dataTable" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th rowspan=2><%= TableCheckboxAll() %></th>
    <th rowspan=2><%= lang('ipconf','lblIntf') %></th>
    <th colspan=3><%= lang('ipconf','lblDhcpv6Client') %></th>
    <th rowspan=2><%= lang('ipconf','lblAutoConf') %></th>
    <th rowspan=2><%= lang('ipconf','lblDadAttemps') %></th>
    <%= TableLastTh(2) %>
  </tr>
  <tr>
    <th><%= lang('ipconf','lblStateless') %></th>
    <th><%= lang('ipconf','tblRefresh') %></th>
    <th><%= lang('ipconf','tblRefreshMin') %></th>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.intf)) { %>
  <% _.each(data.intf, function(intf, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(intf.intf) %></td>
    <td class="StringCell"><%= show(intf.intf) %></td>
    <td class="StringCell"><%= (IsUndefOrNull(intf.stateless) ? "" : (show(lang('common', intf.stateless ? 'txtEnabled' : 'txtDisabled')))) %></td>
    <td class="StringCell"><%= IsUndefOrNull(intf.refresh) ? "" : intf.refresh %></td>
    <td class="StringCell"><%= IsUndefOrNull(intf.minrefresh) ? "" : intf.minrefresh %></td>
    <td class="StringCell"><%= (IsUndefOrNull(intf.autoconf) ? "" : (show(lang('common', intf.autoconf ? 'txtEnabled' : 'txtDisabled')))) %></td>
    <td class="StringCell"><%= IsUndefOrNull(intf.dadAttempt) ? "" : intf.dadAttempt %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); } %>
</tbody>
</table>
<%= TableFoot(ButtonGroupAddEditDel('btnAdd', 'btnEdit', 'btnDel')) %>
</form>
</script>
</body>
</html>
