<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var tmpVal;
var refresh = true;
var severities = ["txtEmergency","txtAlert","txtCritical","txtError","txtWarning","txtNotice","txtInformational","txtDebug"];

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    if (!refresh)
        return;
    dataGet(url('get_diagLogRemoteAdd')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'change select[name=remote_sev]':'sevlist',
    'click input[name=srvDef]':'chgSrvDef',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      refresh = false;
      dataSet(url('set_diagLogRemoteAdd'), formDataGet('setform'));
    }
  },
  sevlist: function(e) {
    var target = e.currentTarget.id + '_list';
    var txt = '';

    for (i = 0; i <= GetSelectVal(e.currentTarget.id); i++)
      txt = txt + (txt.length ? ', ' : '') + show(lang('log',severities[i]));

    $('#' + target).html('Note: ' + txt);
  },
  chgSrvDef:function(){
    ChageServerInputType('srvHost', GetRadioGroupCheckedVal('srvDef'));
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validSrvAddr('srvHost', GetRadioGroupCheckedVal('srvDef'));
    valid &= validRange('udp_port', data.udp_min, data.udp_max);
    return valid;
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<%= DialogHead(lang('log','titAddRemoteLogServer')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('common','lblSrvAddrType')) %></th>
      <td class="formContentTD">
        <%= RadioGroupSrvAddrType('host','ipv4','ipv6') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('common','lblSrvIPHost')) %></th>
      <td class="formContentTD">
        <%= InputTextHost("srvHost", "", data.maxlen_srvHost) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('common','lblSrvPort')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><input type="text" digitonly name="udp_port" id="udp_port" value=<%= data.udp_dflt %>></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.udp_min,data.udp_max,data.udp_dflt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('log','lblFacility')) %></th>
      <td class="formContentTD">
        <select name="facility">
        <% for (i = data.facility_min; i <= data.facility_max; i++) { %>
          <option value=<%= i %> <%= (data.facility === i) ? "selected" : "" %>><%= lang('log','lblLocalArg',[i]) %></option>
        <% } %>
        </select>
      </td>
    </tr>
    <tr>
      <th rowspan=2><%= LabelLeft(lang('log','lblMinSev')) %></th>
      <td class="formContentTD">
        <select name="remote_sev" id="remote_sev">
        <% _.each(severities, function(sev, idx) { %>
        <option value=<%= idx %> <%= (idx === data.remote_sev) ? "selected" : "" %>><%= lang('log',sev) %></option>
        <% }); %>
        </select>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <% for (i = 0, tmpVal = ''; i <= data.remote_sev; i++) { %>
          <% tmpVal = tmpVal + (tmpVal.length ? ', ' : '') + show(lang('log',severities[i])); %>
        <% } %>
        <%= LabelHint('Note: ' + tmpVal, 'remote_sev_list') %>
      </td>
    </tr>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
