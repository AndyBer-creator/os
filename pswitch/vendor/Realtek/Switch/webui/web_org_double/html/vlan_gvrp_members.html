<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_gvrpMember')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp));
        PagePostInit();
      }
    });
  }
});

mainFrame = new mainView();
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>
<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('gvrp','titGVRPVlanTable')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= lang('common','lblVLAN') %></th>
    <th><%= lang('gvrp','lblMemberPort') %></th>
    <th><%= lang('gvrp','lblDynMemberPort') %></th>
    <th><%= lang('vlan','lblVlanType') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.dbvlans)) { %>
  <% _.each(data.dbvlans, function(vlan, idx) { %>
  <tr>
    <td class="NumberCell"><%= vlan.vlan %></td>
    <td class="StringCell"><%= showList(vlan.mbr) %></td>
    <td class="StringCell"><%= showList(vlan.dynMbr) %></td>
    <td class="BinaryCell">
    <% if (vlan.type == 1) { %>
      <%= lang('sys', 'lblStatic') %>
    <% } else if (vlan.type == 2) { %>
      <%= lang('sys', 'lblDynamic') %>
    <% } %>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>

</form>
</script>
</body>
</html>
