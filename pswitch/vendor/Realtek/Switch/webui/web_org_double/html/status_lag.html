<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_statusLag')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  }
});

mainFrame = new mainView();

EnterKeyEvent('applyClick');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">

<%= TableHead(lang('lag','titMgmtTbl')) %>
<table class="dataTable" cellspacing="0" cellpadding="0" id="tblLagMgmt">
<thead>
  <tr>
    <th>LAG</th>
    <th><%= lang('common', 'lblName') %></th>
    <th><%= lang('lag', 'lblType') %></th>
    <th><%= lang('lag', 'lblLinkState') %></th>
    <th><%= lang('lag', 'lblLagActiveMbrs') %></th>
    <th><%= lang('lag', 'lblLagInactiveMbrs') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.lags, function(lag, idx) { %>
  <tr>
    <td class="StringCell"><%= 'LAG '+getLagId(idx) %></td>
    <td class="StringCell"><%= show(lag.lagname) %></td>
    <td class="BinaryCell"><%= lag.active ? ( lag.lacpState ? lang('lag','lblLACP'): lang('lag','lblStatic')) : '---'  %></td>
    <td class="BinaryCell"><%= lag.active ? (lag.linkUp ? lang('port','txtUp') : lang('port','txtDown')) : '---' %></td>
    <td class="StringCell"><%= lag.activeMbr %></td>
    <td class="StringCell"><%= lag.standbyMbr %></td>
    <%= TableLastTd() %>
  </tr>
<% }); %>
</tbody>
</table>
<%= TableFoot() %>
</form>
</script>
</body>
</html>
