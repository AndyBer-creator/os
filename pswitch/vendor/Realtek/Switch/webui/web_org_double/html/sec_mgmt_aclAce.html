<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var name = '';

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlParamAppend(url('get_secMgmtACE'), 'name', name)).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        name = data.name;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'change #name':'name',
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    'click #btnDel':'del'
  },
  name:function(e){
    name = GetSelectVal('name');
    this.render(url('get_secMgmtACE'));
  },
  add:function(e){
    if (data.active)
    {
      //ShowStatusWarning("Active ACL can not be modified");
	  ShowStatusWarning(lang('warning','warningAclNotMod'));
      return;
    }

    OpenDialog('sec_mgmt_aclAceAdd.html');
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;

    if (data.active)
    {
      //ShowStatusWarning("Active ACL can not be modified");
	  ShowStatusWarning(lang('warning','warningAclNotMod'));
      return;
    }

    OpenDialog(urlParamAppend('sec_mgmt_aclAceEdit.html', 'pri', GetTableSelectVal('pri')));
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;

    if (data.active)
    {
      //ShowStatusWarning("Active ACL can not be modified");
	  ShowStatusWarning(lang('warning','warningAclNotMod'));
      return;
    }

    dataSet(url('set_secMgmtACEDel'), urlDataGen(GetTableMultiSelectVals('pri') + "&name=" + encodeURIComponent(name)));
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>
<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('acl_mgmt','titMgmtACETable')) %>
<table>
  <tr>
      <td><%= lang('acl_mgmt','lblMgmtACLName') %></td>
      <td class='right'>
        <% if (!IsUndefOrNull(data.mgmtACLs)) { %>
        <%= selectOption('name', data.mgmtACLs, data.name) %>
        <% } %>
        <% if (data.active) { %>
        <%= "(" + Label(lang('common', 'btnActive')) + ")" %>
        <% } %>
      </td>
  </tr>
</table>
</br>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('acl_mgmt','lblMgmtACLPri') %></th>
    <th><%= lang('acl_mgmt','lblMgmtACLAction') %></th>
    <th><%= lang('acl_mgmt','lblMgmtACLService') %></th>
    <th><%= lang('port','lblPort') %></th>
    <th><%= lang('acl_mgmt','lblMgmtACLSrcIp') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.mgmtACLs)) { %>
  <% _.each(data.mgmtACEs, function(ace, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(ace.pri) %></td>
    <td class="NumberCell"><%= ace.pri %></td>
    <td class="StringCell"><%= ((ace.action -1) ? lang('acl_mgmt','lblMgmtACLDeny') : lang('acl_mgmt','lblMgmtACLPermit')) %></td>
    <td class="StringCell">
    <% if (ace.service == 1) { %>
      <%= lang('acl_mgmt', 'lblMgmtACLHTTP') %>
    <% } else if (ace.service == 2) { %>
      <%= lang('acl_mgmt', 'lblMgmtACLHTTPS') %>
    <% } else if (ace.service == 3) { %>
      <%= lang('acl_mgmt', 'lblMgmtACLSNMP') %>
    <% } else if (ace.service == 4) { %>
      <%= lang('acl_mgmt', 'lblMgmtACLSSH') %>
    <% } else if (ace.service == 5) { %>
      <%= lang('acl_mgmt', 'lblMgmtACLTelnet') %>
    <% } else { %>
      <%= lang('acl_mgmt', 'lblMgmtACLAll') %>
    <% } %>
    </td>
    <td class="StringCell"><%= showList(ace.portList, 20) %></td>

    <% if (3 == ace.ipType) { %>
      <td class="StringCell"><%= lang('common', 'lblNA') %></td>
    <% } else { %>
      <td class="StringCell"><%= ace.ip + " / " +  ace.mask %></td>
    <% } %>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>
<% if (data.mgmtACLs[0].name != 'None') { %>
<%= TableFoot(ButtonGroupAddEditDel('btnAdd', 'btnEdit', 'btnDel')) %>
<% } %>
</form>
</script>
</body>
</html>
