<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_portJumbo')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();

        that.jumboChk();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'blur input[type=text]':'checkValid',
    'click input[type=checkbox]':'jumboChk'
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_portJumbo'), formDataGet('setform'));
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validRange('jumbo',data.min_jumbo,data.max_jumbo);
    return valid;
  },
  jumboChk:function(){
    if (IsCheckboxChecked('jumboEnbl'))
      EnableInputText('jumbo');
    else
      DisableInputText('jumbo');
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th rowspan=2><%= LabelLeft(lang('port','lblJumboSize')) %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('jumboEnbl', (data.dflt_jumbo != data.jumbo)) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("jumbo", (data.dflt_jumbo == data.jumbo) ? data.max_jumbo : data.jumbo, 5) %></td>
            <td class="right"><%= LabelHint(lang('common','txtByteRangeArgDefault',[data.min_jumbo,data.max_jumbo,data.dflt_jumbo])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

</form>
</script>
</body>
</html>
