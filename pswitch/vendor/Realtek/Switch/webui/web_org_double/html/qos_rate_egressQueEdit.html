<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var selVal;
var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlGetPortList('port');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_qosRateEgressQueEdit'), urlGetSelSouce())).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
        that.enblClick();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid',
    'click input[type=checkbox]':'enblClick'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_qosRateEgressQueEdit'), formDataGet('setform'));
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    for (i = 1; i <= 8; i++)
      valid &= validRange('rate_'+i,data.min_rate,data.max_rate);
    return valid;
  },
  enblClick:function(){
    for (i = 1; i <= 8; i++)
    {
      if (IsCheckboxChecked('state_'+i)){
        EnableInputText('rate_'+i);
      } else {
        DisableInputText('rate_'+i);
      }
    }
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('qos','titEditEgrBwQueCtrl')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('portList',selVal) %>
      </td>
    </tr>
    <% _.each(data.queues, function(queue, idx) { %>
    <tr>
      <th rowspan=2><%= LabelLeft(lang('qos','lblQueueNumArg', [idx + 1])) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('state_'+(idx+1), queue.state) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit('rate_'+(idx+1), IsUndefOrNull(queue.rate) ? data.max_rate : queue.rate) %></td>
            <td class="right"><%= LabelHint(lang('common','txtKbpsRangeArg',[data.min_rate,data.max_rate])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <% }); %>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
