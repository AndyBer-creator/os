<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var selVal;
var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlGetPortList('port');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_secDaiPortEdit'), urlGetSelSouce())).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
        that.verifyip();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'click [name=verifyIP]':'verifyip',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_secDaiPortEdit'), formDataGet('setform'));
  },
  verifyip: function(){
    if (IsCheckboxChecked('verifyIP')) {
      EnableCheckbox('verifyIPAllowZero');
    } else {
      DisableCheckbox('verifyIPAllowZero');
    }
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validRange('rate',data.minRate ,data.maxRate);
    valid |= ($('#rate').val() == 0); // unlimit

    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('dai','titDaiEditPortSetting')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('portList',selVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('dai','lblTrusted')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('trusted', data.trusted) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('dai','lblVerifySrcMac')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('verifySMac', data.verifySMac) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('dai','lblVerifyDstMac')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('verifyDMac', data.verifyDMac) %>
      </td>
    </tr>
    <tr>
      <th rowspan='2'><%= LabelLeft(lang('dai','lblVerifyIP')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('verifyIP', data.verifyIP) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%=  Checkbox('verifyIPAllowZero', lang('dai','lblIPAllowZero') + LabelHint(" (0.0.0.0) "), data.verifyIPAllowZero) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('common','lblRateLimit')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit("rate", data.rate, 2, 10) %></td>
          <td class="right"><%= LabelHint(lang('common','txtUnitRangeArgDefault',['pps', data.minRate, data.maxRate, data.defRate]) + ", " + lang('common','lblHintUnLimited')) %></td>
        </tr>
        </table>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
