<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();
fileLoad("../js/spin.js", "js");

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_vlanIpsubnetGroup')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();

        if (!IsUndefOrNull(data.groups) && data.groups.length == 8)
          DisableButton("btnAdd");
      }
    });
  },
  events: {
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    'click #btnDel':'del'
  },
  add:function(e){
    if (!IsUndefOrNull(data.groups) && data.groups.length == 8)
      return;
    OpenDialog('vlan_ipsubnet_groupAdd.html');
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    OpenDialog(urlParamAppend('vlan_ipsubnet_groupEdit.html', 'gid', GetTableSelectVal('gid')));
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_vlanIpsubnetGroupDel'), urlDataGen(GetTableMultiSelectVals('gid')));
  }
});

mainFrame = new mainView();
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>
<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('vlanIPsubnet','titIPsubnetGroupTable')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('vlanIPsubnet','lblIPSubGroup') %></th>
    <th><%= lang('vlanIPsubnet','lblIPSubAddr') %></th>
    <th><%= lang('vlanIPsubnet','lblIPSubMask') %></th>
    <th><%= lang('vlanIPsubnet','lblIPSubVlanId') %></th>
    <th><%= lang('vlanIPsubnet','lblIPSubPri') %></th>
    <th><%= lang('vlanIPsubnet','lblIPSubBindPort') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.groups)) { %>
  <% _.each(data.groups, function(group, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(group.gid) %></td>
    <td class="NumberCell"><%= group.gid %></td>
    <td class="StringCell"><%= group.addr %></td>
    <td class="StringCell"><%= group.mask %></td>
    <td class="NumberCell"><%= group.vlan %></td>
    <td class="NumberCell"><%= group.priority %></td>
    <td class="StringCell"><%= group.ports %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>
<%= TableFoot(ButtonGroupAddDel('btnAdd', 'btnDel')) %>

</form>
</script>
</body>
</html>
