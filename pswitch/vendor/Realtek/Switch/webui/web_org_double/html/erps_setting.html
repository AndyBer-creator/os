<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_valErpsStatus')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
	'click #btnDel':'del',
    'click #btnEdit':'edit',
    'blur input[type=text]':'checkValid'
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_valErpsInstanceId'), formDataGet('setform'));
  },
  del:function(e){
    if(!CheckTableEdit())
      return;
	var vals = sliceString(GetTableMultiSelectVals('ring'), 'ring=');
    var val;
	for (var i = 0; i < vals.length ; i++)
    {
      if (0 != vals[i].length)
      {
        if (-1 != vals[i].indexOf('&'))
          val = vals[i].substring(0, vals[i].indexOf('&'));
        else
          val = vals[i];

      }
		
      for( var j = 0; j < data.rings.length; j++)
      {
 
        if (data.rings[j].erpsInstance == val && data.rings[j].erpsInstanceExist != true)
        {
          ShowStatusWarning(" Erps instance:" + val + " is not existed");
          return;
        }
      }
		
    }


	dataSet(url('del_valErpsInstance'), urlDataGen(GetTableMultiSelectVals('ring')));
  },
  edit:function(e){
    if(!CheckTableEdit())
      return;
    var vals = sliceString(GetTableMultiSelectVals('ring'), 'ring=');
    var val;
	for (var i = 0; i < vals.length ; i++)
    {
      if (0 != vals[i].length)
      {
        if (-1 != vals[i].indexOf('&'))
          val = vals[i].substring(0, vals[i].indexOf('&'));
        else
          val = vals[i];
	
      }
		
      for( var j = 0; j < data.rings.length; j++)
      {
  
        if (data.rings[j].erpsInstance == val && data.rings[j].erpsInstanceExist != true)
        {
          ShowStatusWarning(" Erps instance:" + val + " is not existed");
          return;
        }
      }
		
    }


    OpenDialog(urlParamAppend('erps_instance_edit.html','ring', GetTableSelectVal()));
  },
  checkValid: function() {
    clearAllErrMsg();
    var valid;
    valid = true;
    valid &= validRange('instance',data.instance_min,data.instance_max);
    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">

<form id="setform">

<table>
<tr>
  <th><%= LabelLeft(lang('ring','ringErpsInstances')) %></th>
  <td class="formContentTD">
    <table>
      <tr>
        <td><%= InputTextDigit("instance", data.instance, 2) %></td>
        <td class="right"><%= LabelHint(lang('common','txtRangeArg',[data.instance_min,data.instance_max])) %></td>
      </tr>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

<%= TableHead(lang('ring','erpsGlobalConfig')) %>
<table class="dataTable copy" cellpadding="0" cellspacing="0">
<thead>
<tr>
  <th><%= TableCheckboxAll() %></th>
  <th><%= lang('ring','erpsInstance') %></th>
  <th><%= lang('ring','erpsRingStatus') %></th>
  <th><%= lang('ring','erpsRingMel') %></th>
  <th><%= lang('ring','erpsRingControlVlan') %></th>
  <th><%= lang('ring','erpsRingWtrTime') %></th>
  <th><%= lang('ring','erpsRingGuardTime') %></th>
  <th><%= lang('ring','erpsRingWorkingMode') %></th>
  <th><%= lang('ring','erpsRingId') %></th>
  <th><%= lang('ring','erpsRingRingLevel') %></th>
  <th><%= lang('ring','erpsRingRingProtectedInstance') %></th>
  <th><%= lang('ring','erpsRingPort0') %></th>
  <th><%= lang('ring','erpsRingPort0Role') %></th>
  <th><%= lang('ring','erpsRingPort0Status') %></th>
  <th><%= lang('ring','erpsRingPort1') %></th>
  <th><%= lang('ring','erpsRingPort1Role') %></th>
  <th><%= lang('ring','erpsRingPort1Status') %></th>
  <th><%= lang('ring','erpsRingNodeStatus') %></th>
  <%= TableLastTh() %>
</tr>
</thead>
<tbody>
  <% _.each(data.rings, function(ring, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(ring.erpsInstance) %></td>
    <td class="StringCell"><%=  "Ins" + ring.erpsInstance %></td>
    <td class="BinaryCell"><%= ring.erpsInstanceEnable ? (ring.erpsRingStatus ? lang('common','txtEnabled') : lang('common','txtDisabled')) : '---'%></td>
    <td class="NumberCell"><%= ring.erpsRingMel %></td>
	<td class="NumberCell"><%= ring.erpsRingControlVlan %></td>
	<td class="NumberCell"><%= ring.erpsRingWtrTime %></td>
	<td class="NumberCell"><%= ring.erpsRingGuardTime %></td>
	<td class="BinaryCell"><%= ring.erpsInstanceEnable ? (ring.erpsRingWorkingMode ? "non_revertive" : "revertive") : '---' %></td>
	<td class="NumberCell"><%= ring.erpsRingId %></td>
	<td class="NumberCell"><%= ring.erpsRingRingLevel %></td>
	<td class="BinaryCell"><%= ring.erpsRingRingProtectedInstance %></td>
	<td class="StringCell"><%= show(ring.erpsRingPort0) %></td>
	<td class="StringCell"><%= show(ring.erpsRingPort0Role) %></td>
	<td class="StringCell"><%= show(ring.erpsRingPort0Status) %></td>
	<td class="StringCell"><%= show(ring.erpsRingPort1) %></td>
	<td class="StringCell"><%= show(ring.erpsRingPort1Role) %></td>
	<td class="StringCell"><%= show(ring.erpsRingPort1Status) %></td>
	<td class="StringCell"><%= show(ring.erpsRingNodeStatus) %></td>

    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonGroup(ButtonEdit('btnEdit'), ButtonDel('btnDel'))) %>

</form>
</script>
</body>
</html>
