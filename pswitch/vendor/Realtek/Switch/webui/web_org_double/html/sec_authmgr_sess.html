<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

var typeLang =
[
  "",
  "lang('authmgr','lblDot1x')",
  "lang('authmgr','lblMac')",
  "lang('authmgr','lblWeb')"
];

var statusLang =
[
  "",
  "lang('authmgr','lblStsRunning')",
  "lang('authmgr','lblStsAuthorized')",
  "lang('authmgr','lblStsUnAuthorized')",
  "lang('authmgr','lblStsLocked')",
  "lang('authmgr','lblStsGuest')"
];

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_authmgrSess')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnClear':'clear',
    'click #btnRefresh':'refresh'
  },
  refresh:function(){
    this.render();
  },
  clear:function(e){
    if(!CheckTableEdit(e.currentTarget.id))
      return;
    dataSet(url('set_authmgrSessClear'), urlDataGen(GetTableMultiSelectVals('s')));
  }
});

mainFrame = new mainView();
EnterKeyEvent('refresh');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('authmgr','titSessTable')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th rowspan=2><%= TableCheckboxAll() %></th>
    <th rowspan=2><%= lang('authmgr','lblSessId') %></th>
    <th rowspan=2><%= lang('common','lblPort') %></th>
    <th rowspan=2><%= lang('authmgr','lblMacAddr') %></th>
    <th rowspan=2><%= lang('authmgr','lblCurrType') %></th>
    <th rowspan=2><%= lang('authmgr','lblStatus') %></th>
    <th colspan=4><%= lang('authmgr','lblOperInfo') %></th>
    <th colspan=3><%= lang('authmgr','lblAuhotrInfo') %></th>
    <%= TableLastTh(2) %>
  </tr>
  <tr>
    <th><%= lang('common','lblVLAN') %></th>
    <th><%= lang('authmgr','lblSessTime') %></th>
    <th><%= lang('authmgr','lblInactedTime') %></th>
    <th><%= lang('authmgr','lblQuietTime') %></th>
    <th><%= lang('common','lblVLAN') %></th>
    <th><%= lang('authmgr','lblReauthPeriod') %></th>
    <th><%= lang('authmgr','lblInactTimeout') %></th>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.sessions)) { %>
  <% _.each(data.sessions, function(sess, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(sess.sessId) %></td>
    <td class="StringCell"><%= sess.sessId %></td>
    <td class="StringCell"><%= _top.data.ports[sess.port].port %></td>
    <td class="StringCell"><%= sess.mac %></td>
    <td class="StringCell"><%= show(typeLang[sess.type]) %></td>
    <td class="StringCell"><%= show(statusLang[sess.status]) %></td>
    <td class="NumberCell"><%= IsUndefOrNull(sess.operVid)?lang('common','lblNA'):sess.operVid %></td>
    <td class="NumberCell"><%= IsUndefOrNull(sess.operSess)?lang('common','lblNA'):sess.operSess %></td>
    <td class="NumberCell"><%= IsUndefOrNull(sess.operInact)?lang('common','lblNA'):sess.operInact %></td>
    <td class="NumberCell"><%= IsUndefOrNull(sess.operQuiet)?lang('common','lblNA'):sess.operQuiet %></td>
    <td class="NumberCell"><%= IsUndefOrNull(sess.authVid)?lang('common','lblNA'):sess.authVid %></td>
    <td class="NumberCell"><%= IsUndefOrNull(sess.authReauth)?lang('common','lblNA'):sess.authReauth %></td>
    <td class="NumberCell"><%= IsUndefOrNull(sess.authInact)?lang('common','lblNA'):sess.authInact %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>

<%= TableFoot(ButtonGroup(ButtonClear('btnClear'), ButtonRefresh('btnRefresh'))) %>
</form>
</script>
</body>
</html>
