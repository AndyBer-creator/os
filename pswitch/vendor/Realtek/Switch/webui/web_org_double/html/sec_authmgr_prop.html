<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

var typeLang =
[
  "",
  "lang('authmgr','lblDot1x')",
  "lang('authmgr','lblMac')",
  "lang('authmgr','lblWeb')"
];

var modeLang =
[
  "lang('authmgr','lblHostModeMultiAuth')",
  "lang('authmgr','lblHostModeMultiHost')",
  "lang('authmgr','lblHostModeSingleHost')"
];

var methodLang =
[
  "",
  "lang('authmgr','lblMethodRadius')",
  "lang('authmgr','lblMethodLocal')"
];

var vlanAssignLang =
[
  "lang('authmgr','lblVlanAssignDisable')",
  "lang('authmgr','lblVlanAssignReject')",
  "lang('authmgr','lblVlanAssignStatic')"
];

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_authmgrProp')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
        that.guest();
      }
    });
  },
  events: {
    'click #guest':'guest',
    'click #btnApply':'apply',
    'click #btnEdit':'edit'
  },
  guest:function(){
    if (IsCheckboxChecked('guest'))
      EnableSelect('guestVid')
    else
      DisableSelect('guestVid')
  },
  apply: function() {
    dataSet(url('set_authmgrProp'), formDataGet('setform'));
  },
  edit:function(e){
    if(!CheckTableEdit())
      return;
    OpenDialog(urlAppend('sec_authmgr_propEdit.html', GetTableMultiSelectVals('port')));
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th rowspan=3><%= LabelLeft(lang('authmgr','lblAuthType')) %></th>
      <td class="formContentTD">
        <%= Checkbox('stateDot1x',lang('authmgr','lblDot1x'),data.stateDot1x) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%= Checkbox('stateMac',lang('authmgr','lblMac'),data.stateMac) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%= Checkbox('stateWeb',lang('authmgr','lblWeb'),data.stateWeb) %>
      </td>
    </tr>
    <tr>
      <th rowspan=2><%= LabelLeft(lang('authmgr','lblGuestVlan')) %></th>
      <td class="formContentTD">
        <%= Checkbox('guest',lang('common','txtEnable'),(data.guestVid != 0)?true:false) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%= Select('guestVid',data.vlans,data.guestVid) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('authmgr','lblMacRadiusUser')) %></th>
      <td class="formContentTD">
        <%= Select('selFmt',data.fmts,data.selFmt) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

<%= TableHead(lang('authmgr','titAuthmgrPortModeTable')) %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th rowspan=2><%= TableCheckboxAll() %></th>
    <th rowspan=2><%= lang('port','lblEntryNo') %></th>
    <th rowspan=2><%= lang('port','lblPort') %></th>
    <th colspan=3><%= lang('authmgr','lblAuthType') %></th>
    <th rowspan=2><%= lang('authmgr','lblHostMode') %></th>
    <th rowspan=2><%= lang('authmgr','lblOrder') %></th>
    <th rowspan=2><%= lang('authmgr','lblMethod') %></th>
    <th rowspan=2><%= lang('authmgr','lblGuestVlan') %></th>
    <th rowspan=2><%= lang('authmgr','lblVlanAssign') %></th>
    <%= TableLastTh(2) %>
  </tr>
  <tr>
    <th><%= lang('authmgr','lblDot1x') %></th>
    <th><%= lang('authmgr','lblMac') %></th>
    <th><%= lang('authmgr','lblWeb') %></th>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="BinaryCell"><%= (port.stateDot1x ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>
    <td class="BinaryCell"><%= (port.stateMac ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>
    <td class="BinaryCell"><%= (port.stateWeb ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>
    <td class="StringCell"><%= show(modeLang[port.mode]) %></td>
    <td class="StringCell">
      <% for (var i = 0; i < port.order.length; i++) { %>
        <% if(i != 0) { %>
          <%= ',' %>
        <% } %>
        <%= show(typeLang[port.order[i]]) %>
      <% } %>
    </td>
    <td class="StringCell">
      <% for (var i = 0; i < port.method.length; i++) { %>
        <% if(i != 0) { %>
          <%= ',' %>
        <% } %>
        <%= show(methodLang[port.method[i]]) %>
      <% } %>
    </td>
    <td class="BinaryCell"><%= (port.guest ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>
    <td class="BinaryCell"><%= show(vlanAssignLang[port.vlanAssign]) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonEdit('btnEdit')) %>
</form>
</script>
</body>
</html>
