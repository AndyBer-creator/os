<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_discoveryLldpMedPolicyAdd')).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
    {
        dataSet(url('set_discoveryLldpMedPolicyAdd'), formDataGet('setform'), true);
    }
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validRange('vid', 1, 4095);
    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('lldp','titAddLLDPMEDNetworkPolicy')) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
	<tr>
      <th><%= LabelLeft(lang('lldp','lblNetworkPolicyNum')) %></th>
      <td class="formContentTD">
        <select name="policyNum" id="policyNum">
        <% for (i = 1; i <= data.max_policiesNum; i++){ %>
          <option value=<%= i %>><%= i %></option>
        <% } %>
        </select>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblApp')) %></th>
      <td class="formContentTD">
          <select name="app" id="app">
          <% _.each(data.apps, function(entry,idx){ %>
            <option value=<%= entry.val %>><%= show(entry.app) %></option>
          <% }); %>
          </select>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblVlanID')) %></th>
      <td class="formContentTD">
        <%= InputTextDigit("vid", "") %>
        <class="right"><%= LabelHint(lang('common','txtUnitRangeArg',["Range",data.min_vid,data.max_vid])) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblVlanTag')) %></th>
      <td class="formContentTD">
	    <%= RadioGroup('vlanTag','tag',['tag',lang('lldp','lblTagged')],['untag',lang('lldp','lblUntagged')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblUserPriority')) %></th>
      <td class="formContentTD">
          <select name="pri" id="pri">
          <% for (i = 0; i <= 7; i++){ %>
            <option value=<%= i %>><%= i %></option>
          <% } %>
          </select>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblDSCPValue')) %></th>
      <td class="formContentTD">
          <select name="dscp" id="dscp">
          <% for (i = 0; i <= 63; i++){ %>
            <option value=<%= i %>><%= i %></option>
          <% } %>
          </select>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
