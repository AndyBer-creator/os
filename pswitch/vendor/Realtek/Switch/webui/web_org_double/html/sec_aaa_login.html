<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_secAaaLogin')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    'click #btnDel':'del'
  },
  add:function(e){
    OpenDialog('sec_aaa_loginAdd.html');
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    OpenDialog(urlParamAppend('sec_aaa_loginEdit.html', 'list', encodeURIComponent(GetTableSelectVal())));
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    if(IsCheckboxChecked('selEntry_default')) {
      ShowStatusWarning(lang('aaa','errDfltListDel'));
      return;
    }

    dataSet(url('set_secAaaLoginDel'), urlDataGen(GetTableMultiSelectVals('list')));
  }
});

mainFrame = new mainView();
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('aaa','titLoginLists')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('aaa','lblListName') %></th>
    <th><%= lang('aaa','lblMethodList') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.lists)) { %>
  <% _.each(data.lists, function(entry, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(entry.list) %></td>
    <td class="StringCell"><%= show(entry.list) %></td>
    <td class="StringCell">
    <%  _.each(entry.methods, function(method, idx) { %>
      <%= '(' + (idx + 1) + ') ' + show(method) + '<br>' %>
    <% });%>
    </td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>

<%= TableFoot(ButtonGroupAddEditDel('btnAdd', 'btnEdit', 'btnDel')) %>

</form>
</script>
</body>
</html>
