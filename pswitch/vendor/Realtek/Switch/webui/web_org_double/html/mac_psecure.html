<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();
fileLoad("../js/spin.js", "js");

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_macPsecure')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    'click #btnDel':'del'
  },
  add:function(e){
    OpenDialog('mac_psecureAdd.html');
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    OpenDialog(urlParamAppend('mac_psecureEdit.html', 'idx', GetTableSelectVal('idx')));
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_macPsecureDel'), urlDataGen(GetTableMultiSelectVals('idx')));
  }
});

mainFrame = new mainView();

EnterKeyEvent('edit');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('psecure','titPsecureMacTable')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('common','lblVLAN') %></th>
    <th><%= lang('mac','lblMac') %></th>
    <th><%= lang('mac','lblType') %></th>
    <th><%= lang('common','lblPort') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.entries)) { %>
  <% _.each(data.entries, function(entry, idx) { %>
  <% if (entry.macAddr != '')  { %>
  <tr>
    <td class="StringCell">
    <input type="checkbox"  name="selEntry" id=<%= "selEntry_"+ (idx+1) %> value=<%= entry.vlan + '_' + entry.macAddr + '_' + entry.port %>></input>
	</td>
    <td class="NumberCell"><%= entry.vlan %></td>
    <td class="StringCell"><%= entry.macAddr %></td>
    <td class="StringCell"><%= show(entry.type) %></td>
    <td class="StringCell"><%= entry.port %></td>
    <%= TableLastTd() %>
  </tr>
  <% }}); }%>
</tbody>
</table>
<%= TableFoot(ButtonGroupAddEditDel('btnAdd', 'btnEdit', 'btnDel')) %>

</form>
</script>
</body>
</html>
