<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_networkIp')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
        that.type();
        that.dhcpv6();
		that.subipv4();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click [name=type]':'type',
    'blur input[type=text]':'checkValid',
    'click #dhcpv6':'dhcpv6',
    'click #ipv6AutoAddr':'dhcpv6',
    'click [name=minRefreshType]':'refreshType',
    'click [name=refreshType]':'refreshType',
	'click #substaticIpStatus':'subipv4'
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_networkIp'), formDataGet('setform'));
    }
  },
  type: function(){
    if ('dynamic' == GetRadioVal('type')) {
      DisableLabel('lblIPAddr');
      DisableLabel('lblMask');
      DisableLabel('lblAdminDfltGw');
      DisableInputText('staticIp');
      DisableInputText('staticMask');
      DisableInputText('adminGw');
    } else {
      EnableLabel('lblIPAddr');
      EnableLabel('lblMask');
      EnableLabel('lblAdminDfltGw');
      EnableInputText('staticIp');
      EnableInputText('staticMask');
      EnableInputText('adminGw');
    }
    this.checkValid();
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validIPv4Addr('staticIp');
    valid &= validIPv4Mask('staticMask');
    valid &= validIPv4Addr('adminGw');
    if (!IsChecked('dhcpv6')) {
      valid &= validIPv6Addr('staticIpv6', false, true);
      valid &= validRange('prefix',0,128);
      valid &= validIPv6Addr('staticIpv6Gateway', false, true);
    }
	valid &= validIPv4Addr('substaticIp');
	valid &= validIPv4Mask('substaticMask');
    return valid;
  },
  dhcpv6: function()
  {
    if (!IsChecked('dhcpv6') && !IsChecked('ipv6AutoAddr'))
    {
      EnableLabel('lblIPv6Addr');
      EnableLabel('lblPrefixLength');
      EnableLabel('lblIPv6Gateway');
      EnableInputText('staticIpv6');
      EnableInputText('prefix');
      EnableInputText('staticIpv6Gateway');
    }
    else
    {
      DisableLabel('lblIPv6Addr');
      DisableLabel('lblPrefixLength');
      DisableLabel('lblIPv6Gateway');
      DisableInputText('staticIpv6');
      DisableInputText('prefix');
      DisableInputText('staticIpv6Gateway');
    }
    this.checkValid();
  },
  refreshType:function(){
    if ('user' == GetRadioVal('minRefreshType')) {
      EnableInputText('minRefreshTime');
    } else {
      DisableInputText('minRefreshTime');
    }

    if ('user' == GetRadioVal('refreshType')) {
      EnableInputText('refreshTime');
    } else {
      DisableInputText('refreshTime');
    }
  },
  subipv4: function()
  {
    if (IsChecked('substaticIpStatus'))
    {
		EnableLabel('lblSubIPAddress');
		EnableLabel('lblSubMask');
        EnableInputText('substaticIp');
        EnableInputText('substaticMask');
    }
    else
    {
		DisableLabel('lblSubIPAddress');
		DisableLabel('lblSubMask');
		DisableInputText('substaticIp');
		DisableInputText('substaticMask');
    }
    this.checkValid();
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <%= ShowFormTitle(lang('sys','lblNetworkIPv4')) %>
    <tr>
      <th><%= LabelLeft(lang('sys','lblIPAddressType')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('type',data.type,['static',lang('sys','lblStatic')],['dynamic',lang('sys','lblDynamic')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('sys','lblIPAddress'),'lblIPAddr') %></th>
      <td class="formContentTD">
        <%= InputTextIPv4('staticIp', data.staticIp) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('sys','lblMask'),'lblMask') %></th>
      <td class='formContentTD'>
        <%= InputTextIPv4('staticMask', data.staticMask) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('sys','lblAdminGateway'),'lblAdminDfltGw') %></th>
      <td class="formContentTD">
        <%= InputTextIPv4('adminGw', data.adminGw) %>
      </td>
    </tr>
	<%= ShowFormContentGap() %>
	<%= ShowFormTitle(lang('sys','lblNetworkSubIPv4')) %>
	<tr>
	  <th><%= LabelLeft(lang('common','txtEnabled')) %></th>
	  <td class="formContentTD">
	    <%= Checkbox('substaticIpStatus', lang('common','txtEnable'), data.substaticIpStatus) %>
	  </td>
	</tr>
	<tr>
	  <th><%= LabelLeft(lang('sys','lblSubIPAddress'),'lblSubIPAddress') %></th>
	  <td class="formContentTD">
	    <%= InputTextIPv4('substaticIp', data.substaticIp) %>
	  </td>
	</tr>
	<tr>
	  <th><%= LabelLeft(lang('sys','lblSubMask'),'lblSubMask') %></th>
	  <td class='formContentTD'>
	    <%= InputTextIPv4('substaticMask', data.substaticMask) %>
	  </td>
	</tr>
    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('sys','lblNetworkIPv6')) %>
    <tr>
      <th><%= LabelLeft(lang('sys','lblIPv6AddrAutoConfig')) %></th>
      <td class="formContentTD">
        <%= Checkbox('ipv6AutoAddr',lang('common','txtEnable'),data.ipv6AutoAddr) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('sys','lblDHCPv6Client')) %></th>
      <td class="formContentTD">
        <%= Checkbox('dhcpv6',lang('common','txtEnable'),data.dhcpv6) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('sys','lblIPv6Addr'),'lblIPv6Addr') %></th>
      <td class="formContentTD">
          <%= InputTextIPv6('staticIpv6', (data.staticIpv6 != "::" ) ? data.staticIpv6 : "") %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('sys','lblPrefixLength'),'lblPrefixLength') %></th>
      <td class="formContentTD">
        <table>
        <tr>
            <td><%= InputTextDigit("prefix", data.prefix, 3) %></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArg',[0,128])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('sys','lblIPv6Gateway'),'lblIPv6Gateway') %></th>
      <td class="formContentTD">
          <%= InputTextIPv6('staticIpv6Gateway', (data.staticIpv6Gateway != "::" ) ? data.staticIpv6Gateway : "") %>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('common','lblOperationalStatus')) %>
    <tr>
      <th><%= LabelLeft(lang('sys','lblIPv4Addr')) %></th>
      <td class="formContentTD"><%= data.ip %></td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('sys','lblIPv4Gateway')) %></th>
      <td class="formContentTD"><%= data.operGw %></td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('sys','lblNetworkSubIPv4')) %></th>
      <td class="formContentTD"><%= data.substaticIp %></td>
    </tr>
    <% if (!IsUndefOrNull(data.currIpv6)) { %>
    <tr>
      <th rowspan=<%= data.currIpv6.length %>><%= LabelLeft(lang('sys','lblIPv6Addr')) %></th>
      <td class="formContentTD">
        <%= data.currIpv6[0] %>
      </td>
    </tr>
    <% for (var i = 1; i < data.currIpv6.length; i++) { %>
    <tr>
      <td class="formContentTD">
        <%= data.currIpv6[i] %>
      </td>
    </tr>
    <% } %>
    <% } else { %>
    <tr>
      <th><%= LabelLeft(lang('sys','lblIPv6Addr')) %></td>
      <td class="formContentTD">::</td>
    </tr>
    <% } %>

    <% if (!IsUndefOrNull(data.currIpv6Gw)) { %>
    <tr>
      <th rowspan=<%= data.currIpv6Gw.length %>><%= LabelLeft(lang('sys','lblIPv6Gateway')) %></th>
      <td class="formContentTD">
        <%= data.currIpv6Gw[0] %>
      </td>
    </tr>
      <% for (var i = 1; i < data.currIpv6Gw.length; i++) { %>
      <tr>
        <td class="formContentTD">
          <%= data.currIpv6Gw[i] %>
        </td>
      </tr>
    <% } %>
    <% } else { %>
    <tr>
      <th><%= LabelLeft(lang('sys','lblIPv6Gateway')) %></td>
      <td class="formContentTD">::</td>
    </tr>
    <% } %>

    <tr>
      <th><%= LabelLeft(lang('sys','lblLinkLocalAddress')) %></th>
      <td class="formContentTD"><%= data.linkLocalAddr %></td>
    </tr>

    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

</form>
</script>
</body>
</html>
