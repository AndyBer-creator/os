<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_secIpsgDatabase')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
        that.bkdbType();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click [name=bkdbType]':'bkdbType',
    'click input[name=srvDef]':'chgSrvDef',
    'blur input:text':'checkValid'
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_secIpsgDatabase'), formDataGet('setform'));
  },
  bkdbType: function() {
    if (2 != GetRadioVal('bkdbType'))
    {
      DisableInputText('filename');
      DisableRadioGroup('srvDef');
      DisableInputText('srvHost');
    }
    else
    {
      EnableInputText('filename');
      EnableRadioGroup('srvDef');
      EnableInputText('srvHost');

      if (data.isv4)
        SelectRadio('srvDef', 'ipv4');
      else
        SelectRadio('srvDef', 'host');

      this.chgSrvDef();
    }
    this.checkValid();
  },
  chgSrvDef:function(){
    ChageServerInputType('srvHost', GetRadioGroupCheckedVal('srvDef'));
  },
  checkValid: function() {
    clearAllErrMsg();
    var valid = true;
    valid &= validSrvAddr('srvHost', GetRadioGroupCheckedVal('srvDef'));
    valid &= validString('filename', true);
    valid &= validRange('writeDelay', data.minWriteDealy, data.maxWriteDealy);
    valid &= validRange('timeout', data.minTimeout, data.maxTimeout);
    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>
<script id="main_content" type="text/template">
<form id="setform">

<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('ipsg','lblBKDBType')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('bkdbType', data.bkdbType, [0,lang('ipsg','lblBKDBTypeNone')], [1,lang('ipsg','lblBKDBTypeFlash')], [2,lang('ipsg','lblBKDBTypeTFTP')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipsg','lblBKDBFileName')) %></th>
      <td class="formContentTD">
        <%= InputText('filename', data.filename, data.maxlen) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('common','lblSrvAddrType')) %></th>
      <td class="formContentTD">
        <%= RadioGroupSrvAddrType('host','ipv4') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('common','lblSrvIPHost')) %></th>
      <td class="formContentTD">
        <%= InputTextIPv4("srvHost", data.srvHost, data.maxlen_srvHost) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipsg','lblBKDBWriteDelay')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit('writeDelay', data.writeDelay, 5) %></td>
          <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.minWriteDealy, data.maxWriteDealy, data.defWriteDealy])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipsg','lblBKDBTimeout')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit('timeout', data.timeout, 5) %></td>
          <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.minTimeout, data.maxTimeout, data.defTimeout])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

</form>
</script>
</body>
</html>
