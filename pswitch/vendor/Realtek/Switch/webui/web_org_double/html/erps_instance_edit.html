<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var selVal;
var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlParamGetByName('ring');
    this.render();
  },
  render: function() {
    var that = this;
    var urlFinal = urlParamAppend(url('get_valErpsStatusEdit'), 'ring', selVal)
    dataGet(urlFinal).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'change #selRing':'selRing',
    'click #btnApply':'applyClick',
    'click #btnClose':'closeClick',
    'blur input':'checkValid'
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
	valid &= validRange('erpsRingMel', 0, 7);
	if(valid == false)
	{
		return valid;
	}
	valid &= validRange('erpsRingControlVlan', 1, 4094);
	if(valid == false)
	{
		return valid;
	}
	valid &= validRange('erpsRingWtrTime', 1, 12);
	if(valid == false)
	{
		return valid;
	}
	valid &= validRange('erpsRingGuardTime', 100, 2000);
	if(valid == false)
	{
		return valid;
	}
	valid &= validRange('erpsRingId', 1, 239);
	if(valid == false)
	{
		return valid;
	}
	valid &= validRange('erpsRingRingLevel', 0, 1);
	if(valid == false)
	{
		return valid;
	}
	valid &= validRange('erpsRingRingProtectedInstance', 0, 15);
	if(valid == false)
	{
		return valid;
	}
    //valid &= validString('ringname',false,false,true);
    return valid;
  },
  selRing:function(e){
    selVal = e.currentTarget.value;
    this.render();
  },
  closeClick: function() {
    CloseDialog();
  },
  applyClick: function() {
   if (this.checkValid()){
      dataSet(url('set_valErpsStatusEdit'), formDataGet('setform'));
   }
  }

});

mainFrame = new mainView();

EnterKeyEvent('applyClick');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('ring','titEditRingInstance')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th><%= LabelLeft(lang('ring','erpsInsName')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('selRing',selVal) %>
      </td>
    </tr>
    <!-- 
    <tr>
      <th><%= LabelLeft(lang('ring','erpsInstanceAddOrDel')) %></th>
      <td class="formContentTD">
		<%= RadioGroup('erpsInstanceAddOrDel', data.erpsInstanceAddOrDel, [0, lang('ring','erpsInstanceDelte')], [1, lang('ring','erpsInstanceAdd')]) %>
      </td>
    </tr>
    -->
    
    <tr>
      <th><%= LabelLeft(lang('ring','erpsRingStatus')) %></th>
      <td class="formContentTD">
		<%= RadioGroup('erpsRingStatus', data.erpsRingStatus, [0, lang('common','txtDisable')], [1, lang('common','txtEnable')]) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('ring','erpsRingMel')) %></th>
      <td class="formContentTD">
        <%= InputText('erpsRingMel', data.erpsRingMel, 25) +'(Valid range is 0-7)'%>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('ring','erpsRingRingProtectedInstance')) %></th>
      <td class="formContentTD">
        <%= InputText('erpsRingRingProtectedInstance', data.erpsRingRingProtectedInstance, 25) +'(Valid range is 0-15)'%>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('ring','erpsRingControlVlan')) %></th>
      <td class="formContentTD">
        <%= InputText('erpsRingControlVlan', data.erpsRingControlVlan, 25) +'(Valid range is 1-4094)' %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('ring','erpsRingWtrTime')) %></th>
      <td class="formContentTD">
        <%= InputText('erpsRingWtrTime', data.erpsRingWtrTime, 25)+'(Valid range is 1-12 Min Default is 5 Min)' %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('ring','erpsRingGuardTime')) %></th>
      <td class="formContentTD">
        <%= InputText('erpsRingGuardTime', data.erpsRingGuardTime, 25) +'( Valid range is 100-2000 ms. Default is 500 ms)'%>
      </td>
    </tr>



    <tr>
      <th><%= LabelLeft(lang('ring','erpsRingWorkingMode')) %></th>
      <td class="formContentTD">
		<%= RadioGroup('erpsRingWorkingMode', data.erpsRingWorkingMode, [0, lang('ring','erpsRingModeRevertive')], [1, lang('ring','erpsRingModeNoRevertive')]) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('ring','erpsRingId')) %></th>
      <td class="formContentTD">
        <%= InputText('erpsRingId', data.erpsRingId, 25)+'(Valid range is 1-239)'%>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('ring','erpsRingRingLevel')) %></th>
      <td class="formContentTD">
        <%= InputText('erpsRingRingLevel', data.erpsRingRingLevel, 25)+'(0-master ring, 1-sub ring)' %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('ring','erpsRingPort0')) %></th>
      <td class="formContentTD">
		<%= selectOption('erpsRingPort0', data.ports, data.erpsRingPort0, 100) %></td>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('ring','erpsRingPort0RoleValue')) %></th>
      <td class="formContentTD">
		<%= RadioGroup('erpsRingPortRoleValue0', data.erpsRingPortRoleValue0, [0, lang('ring','erpsInstanceRingPortRoleRpl0')], [1, lang('ring','erpsInstanceRingPortRoleOwner0')], [2, lang('ring','erpsInstanceRingPortRoleNeighbour0')], [3, lang('ring','erpsInstanceRingPortRoleNextNeighbour0')]) %>
      </td>
    </tr>
    
    <tr>
      <th><%= LabelLeft(lang('ring','erpsRingPort1')) %></th>
      <td class="formContentTD">
		<%= selectOption('erpsRingPort1', data.ports, data.erpsRingPort1, 100) %></td>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('ring','erpsRingPort1RoleValue')) %></th>
      <td class="formContentTD">
	    <%= RadioGroup('erpsRingPortRoleValue1', data.erpsRingPortRoleValue1, [0, lang('ring','erpsInstanceRingPortRoleRpl1')], [1, lang('ring','erpsInstanceRingPortRoleOwner1')], [2, lang('ring','erpsInstanceRingPortRoleNeighbour1')], [3, lang('ring','erpsInstanceRingPortRoleNextNeighbour1')]) %>
      </td>
    </tr>


    </table>
  </td>
</tr>
</table>

<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
