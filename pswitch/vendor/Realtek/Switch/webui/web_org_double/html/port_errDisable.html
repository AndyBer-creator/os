<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_portErrDisable')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'blur input:text':'checkValid'
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_portErrDisable'), formDataGet('setform'));
    }
  },
  checkValid: function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validRange('interval',data.min_interval,data.max_interval);
    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">

<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('port','lblRecoveryInterval')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td> <%= InputTextDigit("interval", data.interval, 5) %></td>
          <td class="right"><%= LabelHint(lang('common','txtSecRangeArg',[data.min_interval,data.max_interval])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
  <% if (!IsUndefOrNull(data.reasons)) { %>
  <% _.each(data.reasons, function(reason, idx) { %>
  <% if (reason.name != '')  { %>
    <tr>
      <th><%= LabelLeft(show(reason.txt)) %></th>
      <td class="formContentTD">
        <%= Checkbox(reason.name, lang('common','txtEnable'), reason.enable) %>
      </td>
    </tr>
  <% }}); }%>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= ButtonGroupApply('btnApply') %>

</form>
</script>
</body>
</html>
