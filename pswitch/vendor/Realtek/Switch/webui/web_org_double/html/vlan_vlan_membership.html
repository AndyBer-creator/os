<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_vlanMembership')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnEdit':'edit'
  },
  edit:function(e){
    if ('' != GetTableSelectVal())
      OpenDialog(urlParamAppend('vlan_vlan_membershipEdit.html', 'port', GetTableSelectVal()));
  }
});

mainFrame = new mainView();
EnterKeyEvent('edit');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>
<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('vlan','titVLANMembershipSettingTable')) %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><img src="../images/empty.gif"></th>
    <th><%= lang('port','lblEntryNo') %></th>
    <th><%= lang('port','lblPort') %></th>
    <th><%= lang('vlan','lblVlanMode') %></th>
    <th><%= lang('vlan','lblVlanAdmin') %></th>
    <th><%= lang('vlan','lblVlanOper') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><input type="radio" name="rdoPort" id=<%= "rdoPort" + idx %> value=<%= idx %>></input></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="StringCell">
    <% if (port.mode == 0) { %>
      <%= lang('vlan', 'lblVlanHybrid') %>
    <% } else if (port.mode == 1) { %>
      <%= lang('vlan', 'lblVlanAccess') %>
    <% } else if (port.mode == 2) { %>
      <%= lang('vlan', 'lblVlanTrunk') %>
    <% } else if (port.mode == 3) { %>
      <%= lang('vlan', 'lblVlanTunnel') %>
    <% } %>
    </td>
    <td class="StringCell"><%= showList(port.adminVlans, 15) %></td>
    <td class="StringCell"><%= showList(port.operVlans, 15) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonEdit('btnEdit')) %>
</form>
</script>
</body>
</html>
