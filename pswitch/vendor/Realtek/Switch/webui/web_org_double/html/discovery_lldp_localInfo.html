<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_discoveryLldpLocal')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'click #btnDetail':'detail'
  },
  detail:function(e){
    if(!CheckTableEdit())
      return;
    OpenDialog(urlParamAppend('discovery_lldp_localInfoDetail.html','port', GetTableSelectVal()));
  }
});

mainFrame = new mainView();

EnterKeyEvent('detail');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('lldp','titLocalSummary')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblChassisIDSubtype')) %></th>
      <td class="formContentTD">
        <%= show(data.chassisType) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblChassisID')) %></th>
      <td class="formContentTD">
        <%= data.chassisId %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblSysName')) %></th>
      <td class="formContentTD">
        <%= data.sysName %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblSysDescription')) %></th>
      <td class="formContentTD">
        <%= data.sysDescp %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblSupportedSysCapabilities')) %></th>
      <td class="formContentTD">
        <%= show(data.supportCap) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblEnabledSysCapabilities')) %></th>
      <td class="formContentTD">
        <%= show(data.enableCap) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblPortIDSubtype')) %></th>
      <td class="formContentTD">
        <%= show(data.portIdType) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ShowFormContentGap() %>

<%= TableHead(lang('lldp',' btnLLDPPortStatusTable')) %>
<table class="dataTable" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><img src="../images/empty.gif"/></th>
    <th class=NumberCell><%= lang('port','lblEntryNo') %></th>
    <th class=StringCell><%= lang('port','lblPort') %></th>
    <th class="BinaryCell"><%= lang('lldp','lblLLDPState') %></th>
<!--#ifdef CONFIG_SYS_PROTO_LLDP_MED-->
    <th class="BinaryCell"><%= lang('lldp','lblLLDPMEDState') %></th>
<!--#endif-->
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><input type="radio" name="selPort" id=<%= "selPort_" + getPortEntry(idx) %> value=<%= getPortId(idx) %>></input></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="StringCell"><%= show(port.status) %></td>
<!--#ifdef CONFIG_SYS_PROTO_LLDP_MED-->
    <td class="BinaryCell"><%= show(port.medStatus) %></td>
<!--#endif-->
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonDetail('btnDetail')) %>
</form>
</script>
</body>
</html>
