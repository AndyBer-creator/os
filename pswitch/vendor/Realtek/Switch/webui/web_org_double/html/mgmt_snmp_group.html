<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();
fileLoad("../js/spin.js", "js");

var data;
var valid = true;
var treeSelColor = '#F1F1F1';
var treeSelBackground = '#3c64a0';
var treeSelDocFontWeight = 'bold';

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_snmpGroup')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    'click #btnDel':'del'
  },
  add:function(e){
    OpenDialog('mgmt_snmp_groupAdd.html');
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    OpenDialog(urlParamAppend('mgmt_snmp_groupEdit.html', 'idx', GetTableSelectVal('idx')));
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_snmpGroupDel'), urlDataGen(GetTableMultiSelectVals('idx')));
  }
});

EnterKeyEvent('edit');
mainFrame = new mainView();
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('snmp','titSnmpGroupTable')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th rowspan="2"><%= TableCheckboxAll() %></th>
    <th rowspan="2"><%= lang('snmp','lblGroupName') %></th>
    <th rowspan="2"><%= lang('snmp','lblSecurityModel') %></th>
    <th rowspan="2"><%= lang('snmp','lblSecurityLevel') %></th>
    <th colspan="3"><%= lang('snmp','lblViewName') %></th>
    <%= TableLastTh(2) %>
  </tr>
  <tr>
    <th><%= lang('snmp','lblRead') %></th>
    <th><%= lang('snmp','lblWrite') %></th>
    <th><%= lang('snmp','lblNotify') %></th>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.groups)) { %>
  <% _.each(data.groups, function(entry, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(entry.idx) %></td>
    <td class="StringCell"><%= show(entry.groupName) %></td>
    <td class="StringCell"><%= str2var(entry.secModel) %></td>
    <td class="StringCell"><%= str2var(entry.secLevel) %></td>
    <td class="StringCell"><%= show(entry.readView) %></td>
    <td class="StringCell"><%= show(entry.writeView) %></td>
    <td class="StringCell"><%= show(entry.notifyView) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>

<br>
<table>
<tbody>
  <tr>
    <td>
      <%= LabelHint(lang('snmp','txtGrpNeedViewInfo',["<a class='BottomLinkItem' href=javascript:openTreeLink('html/mgmt_snmp_view.html');>","</a>"])) %>
    </td>
  </tr>
</tbody>
</table>

<%= TableFoot(ButtonGroupAddEditDel('btnAdd', 'btnEdit','btnDel')) %>

</form>
</script>
</body>
</html>
