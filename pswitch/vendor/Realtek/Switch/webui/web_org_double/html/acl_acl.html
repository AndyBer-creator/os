<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var type;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    type = urlParamGetByName('type');
    var that = this;
    dataGet(urlParamAppend(url('get_aclACL'), 'type', type)).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp));
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnDel':'del'
  },
  apply: function() {

    if (this.checkValid())
      dataSet(url('set_aclACL'), formDataGet('setform'));
  },
  del:function(e){
    if (GetTableMultiSelectNum() == 0)
    {
      //ShowStatusWarning("No entry selected");
	  ShowStatusWarning(lang('common','tipNoEntrySelected'));
      return;
    }

    var vals = sliceString(GetTableMultiSelectVals('selEntry'), 'selEntry=');
    var val;

    for (var i = 0; i < vals.length ; i++)
    {
      if (0 != vals[i].length)
      {
        if (-1 != vals[i].indexOf('&'))
          val = vals[i].substring(0, vals[i].indexOf('&'));
        else
          val = vals[i];
      }

      for( var j = 0; j < data.acls.length; j++)
      {
        if (data.acls[j].name == val && data.acls[j].binding != "")
        {
          //ShowStatusWarning("Cannot delete under binding management ACL");
		  ShowStatusWarning(lang('warning','warningAclunderBind'));
          return;
        }
      }
    }
    dataSet(url('set_aclACLDel'), urlDataGen(GetTableMultiSelectVals('name')));
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    var val = $('#name').val();
    valid &= validString('name');

    if (!IsUndefOrNull(data.acls))
    {
      for( var i = 0; i < data.acls.length; i++)
      {
        if (data.acls[i].name == val)
        {
          //ShowStatusWarning("Name " + val + " has existed");
		  ShowStatusWarning(lang('warning', 'warningAclName', val));
          valid &= false; 
          break;
        }
      }
    }
    return valid;
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>
<script id="main_content" type="text/template">
<form id="setform">
<%= InputHidden('type', type) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('acl','lblAclName')) %></th>
      <td class="formContentTD">
        <%= InputText('name', '', data.maxlen, data.maxlen) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= ButtonGroupApply('btnApply') %>
<%= TableHead(lang('acl','titAclTable')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('acl','lblAclName') %></th>
    <th><%= lang('acl','lblAclAceCnts') %></th>
    <th><%= lang('acl','lblAclBindingPorts') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.acls)) { %>
  <% _.each(data.acls, function(acl, idx) { %>
  <tr>

    <td class="StringCell">
    <input type="checkbox"  name="selEntry" id=<%= "selEntry_"+ idx %> value="<%= acl.name %>" <%= (acl.binding.length != 0) ? "disabled" : "" %>></input>
    </td>
    <td class="StringCell"><%= show(acl.name) %></td>
    <td class="NumberCell"><%= acl.acenum %></td>
    <td class="StringCell"><%= showList(acl.binding, 20) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>
<%= TableFoot(ButtonGroup(ButtonDel('btnDel'))) %>
</form>
</script>
</body>
</html>
