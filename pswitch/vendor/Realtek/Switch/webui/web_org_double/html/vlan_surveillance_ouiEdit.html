<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();
var idx;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    idx = urlParamGetByName('idx');
    this.$el.html(this.template());
    PagePostInit();
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
        dataSet(url('set_vlanSurveillanceOui'), formDataGet('setform'));
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validString('desp', false, false, true);
    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('vlansurveillance','titSVOUIEdit')) %>
<%= InputHidden('idx', idx) %>
<%= InputHidden('oui1', parent.data.ouis[idx].oui1) %>
<%= InputHidden('oui2', parent.data.ouis[idx].oui2) %>
<%= InputHidden('oui3', parent.data.ouis[idx].oui3) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('vlansurveillance','lblSVOUIAddress')) %></th>
      <td class="formContentTD">
        <%= parent.data.ouis[idx].oui1 + ":" + parent.data.ouis[idx].oui2 + ":" + parent.data.ouis[idx].oui3 %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vlansurveillance','lblSVDescription')) %></th>
      <td class="formContentTD">
        <%= InputText('desp', parent.data.ouis[idx].desp, parent.data.maxlen, parent.data.maxlen) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
