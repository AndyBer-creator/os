<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var portType = 'port';

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_stpIntf')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'click #btnEdit':'edit',
    'click #btnMigrate':'migrate'
  },
  edit:function(e){
    if(!CheckTableEdit())
      return;
    OpenDialog(urlAppend('stp_intfEdit.html', GetTableMultiSelectVals('port')));
  },
  migrate:function(e){
    if(!CheckTableEdit())
      return;
    $('#portList').val(urlGetPortList('port', GetTableMultiSelectVals('port')));
    dataSet(url('set_stpIntfMigrate'), formDataGet('setform'));
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<%= InputHidden('portList','') %>
<%= TableHead(lang('stp','txtStpIntfSettingTable')) %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('port','lblEntryNo') %></th>
    <th><%= lang('port','lblPort') %></th>
    <th><%= lang('stp','lblPortAdminStatus') %></th>
    <th><%= lang('stp','lblPortPathCost') %></th>
    <th><%= lang('stp','lblPortPriority') %></th>
<!--#ifdef CONFIG_SYS_STP_BPDU_FILTER-->
    <th><%= lang('stp','lblPortBpduFilter') %></th>
<!--#endif-->
<!--#ifdef CONFIG_SYS_STP_BPDU_GUARD-->
    <th><%= lang('stp','lblPortBpduGuard') %></th>
<!--#endif-->
    <th><%= lang('stp','lblPortEdgeOper') %></th>
    <th><%= lang('stp','lblPortP2POper') %></th>
    <th><%= lang('stp','lblPortRole') %></th>
    <th><%= lang('stp','lblPortState') %></th>
    <th><%= lang('stp','lblPortDesignatedBridge') %></th>
    <th><%= lang('stp','lblPortDesignatedPortId') %></th>
    <th><%= lang('stp','lblPortDesignatedCost') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="BinaryCell"><%= lang('common',(port.enable ? "txtEnabled" : "txtDisabled")) %></td>
    <td class="NumberCell"><%= port.pathcost %></td>
    <td class="NumberCell"><%= port.pri %></td>
<!--#ifdef CONFIG_SYS_STP_BPDU_FILTER-->
    <td class="BinaryCell"><%= lang('common',(port.bpduFilter ? "txtEnabled" : "txtDisabled")) %></td>
<!--#endif-->
<!--#ifdef CONFIG_SYS_STP_BPDU_GUARD-->
    <td class="BinaryCell"><%= lang('common',(port.bpduGuard ? "txtEnabled" : "txtDisabled")) %></td>
<!--#endif-->
    <td class="BinaryCell"><%= lang('common',(port.edge_oper ? "txtEnabled" : "txtDisabled")) %></td>
    <td class="BinaryCell"><%= lang('common',(port.p2p_oper ? "txtEnabled" : "txtDisabled")) %></td>
    <td class="StringCell"><%= !IsUndefOrNull(port.role) ? show(port.role) : lang('common','txtDisable') %></td>
    <td class="StringCell"><%= !IsUndefOrNull(port.state) ? show(port.state) : lang('common','txtDisable') %></td>
    <td class="StringCell"><%= !IsUndefOrNull(port.desgBridge) ? port.desgBridge : lang('common','lblNA') %></td>
    <td class="StringCell"><%= !IsUndefOrNull(port.desgPortId) ? port.desgPortId : lang('common','lblNA') %></td>
    <td class="NumberCell"><%= port.desgCost %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<div class="tblButtonGroup">
  <table>
    <tr>
      <td><%= ButtonEdit('btnEdit') %></td>
      <td><%= ButtonLong(lang('stp','btnProtocolMigration'),'btnMigrate') %></td>
    </tr>
  </table>
</dvi>
<h1 class="table_foot"></h1>
</form>
</script>
</body>
</html>
