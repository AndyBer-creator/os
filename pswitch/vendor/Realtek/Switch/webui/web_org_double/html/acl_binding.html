<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_aclBinding')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnBind':'bind',
    'click #btnUnbind':'unbind',
    'click #btnEdit':'edit'
  },
  bind:function(e){
    if (GetTableMultiSelectNum() == 0)
    {
      //ShowStatusWarning("No entry selected");
	  ShowStatusWarning(lang('common','tipNoEntrySelected'));
      return;
    }

    OpenDialog(urlAppend('acl_bindingAdd.html', GetTableMultiSelectVals('port')));
  },
  unbind:function(e){
    if (GetTableMultiSelectNum() == 0)
    {
      //ShowStatusWarning("No entry selected");
	  ShowStatusWarning(lang('common','tipNoEntrySelected'));
      return;
    }

    $('#portList').val(urlGetPortList('port', GetTableMultiSelectVals('port')));
    dataSet(url('set_aclBindingDel'), formDataGet('setform'));
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;

    OpenDialog(urlAppend('acl_bindingEdit.html', GetTableMultiSelectVals('port')));
  }

});

mainFrame = new mainView();
EnterKeyEvent('edit');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('acl','titAclBindingTable')) %>
<%= InputHidden('portList', '') %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('port','lblEntryNo') %></th>
    <th><%= lang('port','lblPort') %></th>
    <th><%= lang('acl','lblAclMac') %></th>
    <th><%= lang('acl','lblAclIpv4') %></th>
    <th><%= lang('acl','lblAclIpv6') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="StringCell"><%= show(port.mac) %></td>
    <td class="StringCell"><%= show(port.ipv4) %></td>
    <td class="StringCell"><%= show(port.ipv6) %></td>
    <%= TableLastTd() %>
  <% }); %>
  </tr>
</tbody>
</table>
<%= TableFoot(ButtonGroup(ButtonBind('btnBind'), ButtonUnbind('btnUnbind'), ButtonEdit('btnEdit'))) %>
</form>
</script>
</body>
</html>
