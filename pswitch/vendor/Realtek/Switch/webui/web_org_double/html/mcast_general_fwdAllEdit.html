<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var data;
var selVal;
var ipType = 0;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlParamGetByName('vid');
    ipType = get_mcastEdit_ipVersion();
    this.render();
  },
  render: function() {
    var that = this;
    var urlFinal = urlParamAppend(url('get_mcastFwdAllEdit'), 'vid', selVal);
        urlFinal = mcastUrl_append_ipVer(urlFinal, ipType);
    dataGet(urlFinal).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
        that.chgPortType();
      }
    });
  },
  events: {
    'click #btnApply':'applyClick',
    'click #btnClose':'closeClick',
    'click input[name=fwdPortType]':'chgPortType',
    'change #notStMbrs':'stMbrSelected',
    'change #stMbrs':'stMbrSelected',
    'click #btnStAdd':'stMbrSelected',
    'click #btnStRem':'stMbrSelected',
    'change #notFbMbrs':'fbMbrSelected',
    'change #fbMbrs':'fbMbrSelected',
    'click #btnFbAdd':'fbMbrSelected',
    'click #btnFbRem':'fbMbrSelected'
  },
  closeClick: function() {
    CloseDialog();
  },
  applyClick: function() {
    MultiSelectApplySelect('stMbrs');
    MultiSelectApplySelect('fbMbrs');
    dataSet(url('set_mcastFwdAllEdit'), formDataGet('setform'));
    MultiSelectDeselectAll('stMbrs', 'notStMbrs');
    MultiSelectDeselectAll('fbMbrs', 'notFbMbrs');
  },
  chgPortType: function() {
    if ('static' == GetRadioVal('fwdPortType'))
    {
      $('#showStMbr').css('display','');
      $('#showFbMbr').css('display','none');
    }
    else
    {
      $('#showFbMbr').css('display','');
      $('#showStMbr').css('display','none');
    }
  },
  stMbrSelected: function(e) {
    MultiSelectTransferUpdate(e.currentTarget.id, 'btnStAdd', 'btnStRem', 'notStMbrs', 'stMbrs');
  },
  fbMbrSelected: function(e) {
    MultiSelectTransferUpdate(e.currentTarget.id, 'btnFbAdd', 'btnFbRem', 'notFbMbrs', 'fbMbrs');
  }
});
EnterKeyEvent('applyClick');
mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('mcast','titEditFwdAll')) %>
<%= InputHidden('vid',selVal) %>
<%= InputHidden('ipType',ipType) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">

    <tr>
      <th><%= LabelLeft(lang('common','lblVLAN')) %></th>
      <td class="formContentTD">
        <%= selVal %>
      </td>
    </tr>

    <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    <tr>
      <th><%= LabelLeft(lang('common','lblIPVersion')) %></th>
      <td class="formContentTD">
        <%= (0 == ipType) ? lang('mcast','txtIPv4') : lang('mcast','txtIPv6')  %>
      </td>
    </tr>
    <!--#endif-->

    <tr>
      <th><%= LabelLeft(lang('mcast','lblRtMbrPortType')) %></th>
      <td class="formContentTD">
         <%= RadioGroup('fwdPortType','static',['static',lang('mcast','lblStatic')],['forbid',lang('mcast','lblForbid')]) %>
      </td>
    </tr>

    <tr id = "showStMbr">
      <th><%= LabelLeft(lang('common','lblPort')) %></th>
      <td class="formContentTD">
        <table>
        <thead>
        <tr>
          <td class='ctrlSpacing'><%= LabelTopMulti(lang('common','lblAvailablePort')) %></td>
          <td class='ctrlSpacing'></td>
          <td class='ctrlSpacing right'><%= LabelTopMulti(lang('common','lblSelPort')) %></td>
        </tr>
        </thead >
        <tbody >
        <tr>
          <td rowspan="2">
            <select name="notStMbrs" id="notStMbrs" style="WIDTH: 90px" multiple size="8">
            <% _.each(data.notStMbrs, function(port, index) { %>
              <option value=<%= port.port %>><%= port.port %></option>
            <% }); %>
            </select>
          </td>
          <td class=right>
            <%= ButtonTransferDisabled('btnStAdd', 'btnStRem') %>
          </td>
          <td rowspan="2" class=right>
            <select name="stMbrs" id="stMbrs" style="WIDTH: 90px" multiple size="8">
            <% _.each(data.stMbrs, function(port, index) { %>
              <option value=<%= port.port %>><%= port.port %></option>
            <% }); %>
            </select>
          </td>
        </tr>
        </tbody >
        </table>
      </td>
    </tr>

    <tr id = "showFbMbr">
      <th><%= LabelLeft(lang('common','lblPort')) %></th>
      <td class="formContentTD">
        <table>
        <thead>
        <tr>
          <td class='ctrlSpacing'><%= LabelTopMulti(lang('common','lblAvailablePort')) %></td>
          <td class='ctrlSpacing'></td>
          <td class='ctrlSpacing right'><%= LabelTopMulti(lang('common','lblSelPort')) %></td>
        </tr>
        </thead >
        <tbody >
        <tr>
          <td rowspan="2">
            <select name="notFbMbrs" id="notFbMbrs" style="WIDTH: 90px" multiple size="8">
            <% _.each(data.notFbMbrs, function(port, index) { %>
              <option value=<%= port.port %>><%= port.port %></option>
            <% }); %>
            </select>
          </td>
          <td class=right>
            <%= ButtonTransferDisabled('btnFbAdd', 'btnFbRem') %>
          </td>
          <td rowspan="2" class=right>
            <select name="fbMbrs" id="fbMbrs" style="WIDTH: 90px" multiple size="8">
            <% _.each(data.fbMbrs, function(port, index) { %>
              <option value=<%= port.port %>><%= port.port %></option>
            <% }); %>
            </select>
          </td>
        </tr>
        </tbody >
        </table>
      </td>
    </tr>

    </table>
  </td>
</tr>
</table>

<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>


</form>
</script>

</body>
</html>
