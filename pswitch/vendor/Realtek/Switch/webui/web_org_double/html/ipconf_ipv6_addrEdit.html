<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var selIntf;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    if (urlParamGetByName('intf').length != 0)
      selIntf = urlParamGetByName('intf');
    else
      CloseDialog();
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlParamAppend(url('get_ipconfIpv6IntfEdit'),'intf',selIntf)).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;

        that.addrTypeChg();
      }
    });
  },
  events: {
    'change [name=addrType]':'addrTypeChg',
    'change [name=maskType]':'maskTypeChg',

    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  addrTypeChg: function() {
    if (1 == GetRadioVal('addrType')) {
      DisableLabel('lblIPAddr');
      DisableLabel('lblMask');
      DisableInputText('addr');
      DisableInputText('mask');
      DisableInputText('prefix');
      DisableLabel('lblNetworkMask');
      DisableLabel('lblPrefixLength');
      DisableRadio('maskType', 'network');
      DisableRadio('maskType', 'prefix');
    } else {
      EnableLabel('lblIPAddr');
      EnableLabel('lblMask');
      EnableInputText('addr');
      EnableLabel('lblNetworkMask');
      EnableLabel('lblPrefixLength');
      EnableRadio('maskType', 'network');
      EnableRadio('maskType', 'prefix');
      this.maskTypeChg();
    }
    if (!first)
      this.checkValid();
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_ipconfIpv4IntfEdit'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validIPv4Addr('addr');
    valid &= validIPv4Mask('mask');
    valid &= validRange('prefix', 8, 30);
    return valid;
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<%= DialogHead(lang('ipconf','titEditIPv6Intf')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblIntf')) %></th>
      <td class="formContentTD"> <%= selIntf %>
      <%= InputHidden('intf', selIntf) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblAutoConf'), 'lblAutoConf') %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('autoconf', data.autoconf) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblDadAttemps'), 'lblDadAttemps') %></th>
      <td class="formContentTD">
        <%= InputTextDigit('dadAttempt', data.dadAttempt, 3) %>
        <%= LabelHint(lang('common','txtRangeArgDefault',[data.dadAttempt_min, data.dadAttempt_max, data.dadAttempt_dflt])) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblSendICMPUnreachMsg'), 'lblSendICMPUnreachMsg') %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('sendUnreach', data.sendUnreach) %>
      </td>
    </tr>
    <%= ShowFormTitle(show(lang('ipconf','lblDhcpv6Client'))) %>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblStateless'),'lblStateless') %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('stateless', data.stateless) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblInfoTime'),'lblInfoTime') %></th>
      <td class="formContentTD">
        <%= InputTextDigit('infotime', data.infotime, 10) %>
        <%= LabelHint(lang('common','txtRangeArgDefault',[data.infotime_min, data.infotime_max, data.infotime_dflt])) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblInfoTimeMin'),'lblInfoTimeMin') %></th>
      <td class="formContentTD">
        <%= InputTextDigit('mininfotime', data.mininfotime, 10) %>
        <%= LabelHint(lang('common','txtRangeArgDefault',[data.mininfotime_min, data.mininfotime_max, data.mininfotime_dflt])) %>
      </td>
    </tr>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
