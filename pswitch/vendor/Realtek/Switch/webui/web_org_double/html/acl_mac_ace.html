<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var name = '';
var type = 1;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    var _url = urlParamAppend(url('get_aclMacACE'), 'name', name);
    _url = urlParamAppend(_url, 'type', type);
    dataGet(_url).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        name = data.name;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'change #name':'name',
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    'click #btnDel':'del'
  },
  name:function(e){
    name = GetSelectVal('name');
    this.render();
  },
  add:function(e){
    if (data.binding)
    {
      //ShowStatusWarning("Active ACL can not be modified");
	  ShowStatusWarning(lang('warning','warningAclNotMod'));
      return;
    }

    OpenDialog('acl_mac_aceAdd.html');
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;

    OpenDialog(urlParamAppend('acl_mac_aceEdit.html', 'pri', GetTableSelectVal('pri')));
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;

    if (data.binding)
    {
      //ShowStatusWarning("Active ACL can not be modified");
	  ShowStatusWarning(lang('warning','warningAclNotMod'));
      return;
    }

    dataSet(url('set_aclACEDel'), urlDataGen(GetTableMultiSelectVals('pri') + "&name=" + encodeURIComponent(name)));
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>
<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('acl','titAceTable')) %>
<table>
<tr>
      <td><%= lang('acl','lblAclName') %></td>
      <td class='right'>
        <% if (!IsUndefOrNull(data.acls)) { %>
        <%= selectOption('name', data.acls, data.name) %>
        <% } %>
      </td>
    </tr>
</table>
<br>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th rowspan='2'><%= TableCheckboxAll() %></th>
    <th rowspan='2'><%= lang('acl','lblAclSequence') %></th>
    <th rowspan='2'><%= lang('acl','lblAclAction') %></th>
    <th colspan='2'><%= lang('acl','lblAclSource') + " MAC" %></th>
    <th colspan='2'><%= lang('acl','lblAclDestination') + " MAC" %></th>
    <th rowspan='2'><%= lang('acl','lblAclEth') %></th>
    <th rowspan='2'><%= lang('common','lblVLAN') %></th>
    <th colspan='2'><%= lang('acl','lblAcl8021p') %></th>
    <%= TableLastTh(2) %>
  </tr>
  <tr>
  <th><%= lang('acl','lblAclAddress') %></th>
  <th><%= lang('acl','lblAclMask') %></th>
  <th><%= lang('acl','lblAclAddress') %></th>
  <th><%= lang('acl','lblAclMask') %></th>
  <th><%= lang('acl','lblAclValue') %></th>
  <th><%= lang('acl','lblAclMask') %></th>
</tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.acls)) { %>
  <% _.each(data.aces, function(ace, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(ace.pri) %></td>
    <td class="NumberCell"><%= ace.pri %></td>
    <td class="StringCell">
    <% if (ace.action == 0) { %>
      <%= lang('acl', 'lblAclPermit') %>
    <% } else if (ace.action == 1) { %>
      <%= lang('acl', 'lblAclDeny') %>
    <% } else { %>
      <%= lang('acl', 'lblAclShutdown') %>
    <% } %>
    </td>
    <td class="StringCell"><%= ace.smac %></td>
    <td class="StringCell"><%= ace.smask %></td>
    <td class="StringCell"><%= ace.dmac %></td>
    <td class="StringCell"><%= ace.dmask %></td>
    <td class="StringCell"><%= ((ace.eth == "Any") ? "": "0x") + ace.eth %></td>
    <td class="NumberCell"><%= ace.vlan %></td>
    <td class="NumberCell"><%= ace.dot1p %></td>
    <td class="NumberCell"><%= ace.dot1pmask %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>
<% if (data.acls[0].name != 'None' && !data.binding) { %>
<%= TableFoot(ButtonGroupAddEditDel('btnAdd', 'btnEdit', 'btnDel')) %>
<% } else if (data.binding) { %>
<%= TableFoot("(" + Label(lang('acl', 'msgAclBindingPorts')) + ")") %>
<% } %>
</form>
</script>
</body>
</html>
