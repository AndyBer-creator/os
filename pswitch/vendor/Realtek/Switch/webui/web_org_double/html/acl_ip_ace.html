<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var ipv4Proto =
[
    {   "name":"ICMP",        "val":1},
    {   "name":"IP in IP",    "val":4},
    {   "name":"TCP",         "val":6},
    {   "name":"EGP",         "val":8},
    {   "name":"IGP",         "val":9},
    {   "name":"UDP",         "val":17},
    {   "name":"HMP",         "val":20},
    {   "name":"RDP",         "val":27},
    {   "name":"IPV6",        "val":41},
    {   "name":"IPV6:ROUT",   "val":43},
    {   "name":"IPV6:FRAG",   "val":44},
    {   "name":"RSVP",        "val":46},
    {   "name":"IPV6:ICMP",   "val":58},
    {   "name":"OSPF",        "val":89},
    {   "name":"PIM",         "val":103},
    {   "name":"L2TP",        "val":115}
];

var ipv6Proto =
[
    {   "name":"TCP",         "val":6},
    {   "name":"UDP",         "val":17},
    {   "name":"ICMP",        "val":58}
];

var icmpv4Type =
[
    {   "name":"Echo Reply",              "val":0},
    {   "name":"Destination Unreachable", "val":3},
    {   "name":"Source Quench",           "val":4},
    {   "name":"Redirect",                "val":5},
    {   "name":"Alternate Host Address",  "val":6},
    {   "name":"Echo Request",            "val":8},
    {   "name":"Router Advertisement",    "val":9},
    {   "name":"Time exceeded",           "val":11},
    {   "name":"Timestamp",               "val":13},
    {   "name":"Timestamp Reply",         "val":14},
    {   "name":"Information Request",     "val":15},
    {   "name":"Information Reply",       "val":16},
    {   "name":"Address Mask Request",    "val":17},
    {   "name":"Address Mask Reply",      "val":18},
    {   "name":"Traceroute",                "val":30},
    {   "name":"Datagram Conversion Error", "val":31},
    {   "name":"Mobile Host Redirect",    "val":32},
    {   "name":"IPv6 Where Are You",      "val":33},
    {   "name":"IPv6 I Am Here",          "val":34},
    {   "name":"Mobile Registration Request", "val":35},
    {   "name":"Mobile Registration Reply",   "val":36},
    {   "name":"Domain Name Request",     "val":37},
    {   "name":"Domain Name Reply",       "val":38},
    {   "name":"Skip", "val":39}
];

var icmpv6Type =
[
    {   "name":"Destination Unreachable", "val":1},
    {   "name":"Packet Too Big2')",       "val":2},
    {   "name":"Time Exceeded",           "val":3},
    {   "name":"Parameter Problem",       "val":4},
    {   "name":"Echo Request",            "val":128},
    {   "name":"Echo Reply",              "val":129},
    {   "name":"MLD Query",               "val":130},
    {   "name":"MLD Report",              "val":131},
    {   "name":"MLD Done",                "val":132},
    {   "name":"Router Solicitation",     "val":133},
    {   "name":"Router Advertisement",    "val":134},
    {   "name":"ND NS",                   "val":135},
    {   "name":"ND NA",                   "val":136},
    {   "name":"MLDv2 Report",            "val":143}
];

var ipProto;
var icmpType;

var data;
var name = '';
var type;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    type = urlParamGetByName('type');
    var _url;
    if (type == 2)
    {
      ipProto = ipv4Proto;
      icmpType = icmpv4Type;
      _url = url('get_aclIpv4ACE');
    }
    else
    {
      ipProto = ipv6Proto;
      icmpType = icmpv6Type;
      _url = url('get_aclIpv6ACE');
    }

    var that = this;
    _url = urlParamAppend(_url, 'name', name);
    _url = urlParamAppend(_url, 'type', type);
    dataGet(_url).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        name = data.name;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'change #name':'name',
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    'click #btnDel':'del'
  },
  name:function(e){
    name = GetSelectVal('name');
    this.render();
  },
  add:function(e){
    if (data.binding)
    {
      //ShowStatusWarning("Active ACL can not be modified");
	  ShowStatusWarning(lang('warning','warningAclNotMod'));
      return;
    }

    OpenDialog(urlParamAppend('acl_ip_aceAdd.html', 'type', type));
  },
  edit:function(e){
    var _url;
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;

    _url = urlParamAppend('acl_ip_aceEdit.html', 'pri', GetTableSelectVal('pri'));
    _url = urlParamAppend(_url, 'type', type);
    OpenDialog(_url);
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;

    if (data.binding)
    {
      //ShowStatusWarning("Active ACL can not be modified");
	  ShowStatusWarning(lang('warning','warningAclNotMod'));
      return;
    }

    dataSet(url('set_aclACEDel'), urlDataGen(GetTableMultiSelectVals('pri') + "&name=" + encodeURIComponent(name)));
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}

function printName(proto, options, flag)
{
  var msg = proto;

  if (proto == 'Any')
    msg = lang('acl', 'lblAclAny') + (flag ? " (IP)": "");
  else
  {
    for (var i = 0 ; i < options.length; i++)
    {
      if (proto == options[i].val)
      {
        msg = options[i].name;
        break;
      }
    }
  }

  return msg;
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>
<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('acl','titAceTable')) %>
<table>
<tr>
      <td><%= lang('acl','lblAclName') %></td>
      <td class='right'>
        <% if (!IsUndefOrNull(data.acls)) { %>
        <%= selectOption('name', data.acls, data.name) %>
        <% } %>
      </td>
    </tr>
</table>
<br>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th rowspan='2'><%= TableCheckboxAll() %></th>
    <th rowspan='2'><%= lang('acl','lblAclSequence') %></th>
    <th rowspan='2'><%= lang('acl','lblAclAction') %></th>
    <th rowspan='2'><%= lang('acl','lblAclProto') %></th>
    <th colspan='2'><%= lang('acl','lblAclSource') + " " + lang('acl','lblAclIp') %></th>
    <th colspan='2'><%= lang('acl','lblAclDestination')  + " " + lang('acl','lblAclIp') %></th>
    <th rowspan='2'><%= lang('acl','lblAclSource') + " " + lang('acl','lblAclPort') %></th>
    <th rowspan='2'><%= lang('acl','lblAclDestination')  + " " + lang('acl','lblAclPort') %></th>
    <th rowspan='2'><%= lang('acl','lblAclTcpFlag') %></th>
    <th colspan='2'><%= lang('acl','lblAclToS') %></th>
    <th colspan='2'><%= lang('acl','lblAclICMP') %></th>
    <%= TableLastTh(2) %>
  </tr>
  <tr>
  <th><%= lang('acl','lblAclAddress') %></th>
<% if (2 == type) { %>
  <th><%= lang('acl','lblAclMask') %></th>
<% } else if (3 == type) { %>
  <th><%= lang('acl','lblAclPrefix') %></th>
<% } %>
  <th><%= lang('acl','lblAclAddress') %></th>
<% if (2 == type) { %>
  <th><%= lang('acl','lblAclMask') %></th>
<% } else if (3 == type) { %>
  <th><%= lang('acl','lblAclPrefix') %></th>
<% } %>
  <th><%= lang('acl','lblAclDSCP') %></th>
  <th><%= lang('acl','lblAclIPP') %></th>
  <th><%= lang('acl','lblAclType') %></th>
  <th><%= lang('acl','lblAclCode') %></th>
</tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.acls)) { %>
  <% _.each(data.aces, function(ace, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(ace.pri) %></td>
    <td class="NumberCell"><%= ace.pri %></td>
    <td class="StringCell">
    <% if (ace.action == 0) { %>
      <%= lang('acl', 'lblAclPermit') %>
    <% } else if (ace.action == 1) { %>
      <%= lang('acl', 'lblAclDeny') %>
    <% } else { %>
      <%= lang('acl', 'lblAclShutdown') %>
    <% } %>
    </td>
    <td class="StringCell"><%= printName(ace.protocol, ipProto, true) %></td>
    <td class="StringCell"><%= ace.sip %></td>
    <td class="StringCell"><%= ace.smask %></td>
    <td class="StringCell"><%= ace.dip %></td>
    <td class="StringCell"><%= ace.dmask %></td>
    <td class="BinaryCell"><%= (ace.sports == ace.sporte) ? ace.sports : ace.sports + " - " + ace.sporte  %></td>
    <td class="BinaryCell"><%= (ace.dports == ace.dporte) ? ace.dports : ace.dports + " - " + ace.dporte %></td>
    <td class="StringCell"><%= ace.tcpflag %></td>
    <td class="NumberCell"><%= ace.dscp %></td>
    <td class="NumberCell"><%= ace.ipp %></td>
    <td class="NumberCell"><%= printName(ace.icmpType, icmpType, false)  %></td>
    <td class="NumberCell"><%= ace.icmpCode %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>
<% if (data.acls[0].name != 'None' && !data.binding) { %>
<%= TableFoot(ButtonGroupAddEditDel('btnAdd', 'btnEdit', 'btnDel')) %>
<% } else if (data.binding) { %>
<%= TableFoot("(" + Label(lang('acl', 'msgAclBindingPorts')) + ")") %>
<% } %>
</form>
</script>
</body>
</html>
