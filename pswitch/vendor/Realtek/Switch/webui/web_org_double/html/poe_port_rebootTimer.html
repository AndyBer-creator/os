<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var time = 10;
var intervalId;

function reload()
{
  mainFrame.render();
}
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_poePortRebootTimer')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
		
        //that.refresh();
      }
    });
  },
  events: {
    'click #btnEdit':'edit',
	'click [name=refreshRate]':'refresh'

  },
  edit:function(e){
    if(!CheckTableEdit())
      return;
    OpenDialog(urlAppend('poe_portTimerEdit.html', GetTableMultiSelectVals2('port')));
  },
  refresh: function(){
    clearInterval(intervalId);

    time = GetRadioVal('refreshRate');

    if (0 != time)
      intervalId = setInterval(reload, time * 1000);
  }
});

mainFrame = new mainView();

EnterKeyEvent('edit');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<%= ShowFormContentGap() %>

<%= TableHead(lang('poe','titPoePortSettingTable')) %>
<table class="dataTable" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('port','lblEntryNo') %></th>
    <th><%= lang('port','lblPort') %></th>
    <th><%= lang('poe','lblPoePortRebootTime') %></th>
    <th><%= lang('poe','lblPoePortDelayTime') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="StringCell"><%= port.portrebootTime%></td>
    <td class="StringCell"><%= port.portdelayTime %></td>   
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonEdit('btnEdit')) %>
</form>
</script>
</body>
</html>
