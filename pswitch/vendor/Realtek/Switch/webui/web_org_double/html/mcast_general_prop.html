<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_mcastProp')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply'
  },
  apply: function() {
      dataSet(url('set_mcastProp'), formDataGet('setform'));
  }
});
EnterKeyEvent('apply');
mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>

    <tr>
      <th><%= LabelLeft(lang('mcast','lblUnknownMcastAct')) %></th>
      <td class="formContentTD">
         <%= RadioGroup('unknownMcastAct',data.unknownMcastAct,['flood',lang('mcast','lblFlood')],['drop',lang('mcast','lblDrop')],['fwd2Router',lang('mcast','lblForwardToRouterPort')]) %>
      </td>
    </tr>
    <%= ShowFormContentGap() %>

    <%= ShowFormTitle(lang('mcast','lblFwdMethod')) %>
    <tr>
      <th><%= LabelLeft(lang('common','lblIPv4')) %></th>
      <td class="formContentTD">
         <%= RadioGroup('ipv4FwdMeth',data.ipv4FwdMeth,['dmac',lang('mcast','lblDmac')],['dip',lang('mcast','lblDip')]) %>
      </td>
    </tr>

    <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    <tr>
      <th><%= LabelLeft(lang('common','lblIPv6')) %></th>
      <td class="formContentTD">
         <%= RadioGroup('ipv6FwdMeth',data.ipv6FwdMeth,['dmac',lang('mcast','lblDmac')],['dip',lang('mcast','lblDip')]) %>
      </td>
    </tr>
    <!--#endif-->

    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

</form>
</script>
</body>
</html>
