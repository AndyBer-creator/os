<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var counters = ["lblDropEvents", "lblBytesRec", "lblPktsRec", "lblBPktsRec", "lblMPktsRec", "lblCRCAlignErr", "lblUndersizePkts", "lblOversizePkts", "lblFragments", "lblJabbers", "lblCollisions", "lblFrames64B", "lblFrames65127B", "lblFrames128255B", "lblFrames256511B", "lblFrames5121023B", "lblFramesOver1024B"];

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_mgmtRmonAlarmAdd')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_mgmtRmonAlarmAdd'), formDataGet('setform'));
    }
  },
  checkValid: function() {
    var valid = true;
    clearAllErrMsg();
    valid &= validRange('risingThreshold', data.risingThreshold_min, data.risingThreshold_max);
    valid &= validRange('fallingThreshold', data.fallingThreshold_min, $('#risingThreshold').val());
    valid &= validRange('interval', data.interval_min, data.interval_max);
    valid &= validString('owner', false, false, true);
    return valid;
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<%= DialogHead(lang('rmon','titAddAlarm')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblNewAlarmIdx')) %></th>
      <td class="formContentTD" id="idx">
        <%= data.idx %>
        <%= InputHidden('idx', data.idx) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblIntf')) %></th>
      <td class="formContentTD">
        <%= printPortSelectOption('port') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblCntName')) %></th>
      <td class="formContentTD">
        <select name="cntName">
        <% _.each(counters, function(element, idx) { %>
        <option value=<%= idx %> <%= (idx === data.cntName) ? "selected" : "" %>><%= lang('rmon',element) %></option>
        <% }); %>
        </select>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblSampleType')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('sampleType', 0, ['0',lang('rmon','lblAbsolute')], ['1',lang('rmon','lblDelta')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblInterval')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("interval", data.interval) %></td>
            <td class='right'><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.interval_min,data.interval_max,data.interval_dflt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblOwner')) %></th>
      <td class="formContentTD">
        <%= InputText("owner", data.owner, data.owner_maxlen) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblStartupAlarm')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('startupAlarm', 0, ['0',lang('rmon','lblRising')], ['1',lang('rmon','lblFalling')], ['2',lang('rmon','lblRisingAndFalling')]) %>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('rmon','thAlarmRising')) %>
    <tr>
      <th><%= LabelLeft(lang('rmon','thAlarmThreshold')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("risingThreshold", data.risingThreshold) %></td>
            <td class='right'><%= LabelHint(lang('common','txtRangeArgDefault',[data.risingThreshold_min,data.risingThreshold_max,data.risingThreshold_dflt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','thAlarmEvent')) %></th>
      <td class="formContentTD">
        <%= selectOption('risingEvent', data.events) %>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('rmon','thAlarmFalling')) %>
    <tr>
      <th><%= LabelLeft(lang('rmon','thAlarmThreshold')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("fallingThreshold", data.fallingThreshold) %></td>
            <td class='right'><%= LabelHint(lang('common','txtRangeArgDefault',[data.fallingThreshold_min,data.fallingThreshold_max,data.fallingThreshold_dflt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','thAlarmEvent')) %></th>
      <td class="formContentTD">
        <%= selectOption('fallingEvent', data.events) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
