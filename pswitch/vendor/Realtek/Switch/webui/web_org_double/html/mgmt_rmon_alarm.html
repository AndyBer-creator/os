<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var treeSelColor = '#F1F1F1';
var treeSelBackground = '#3c64a0';
var treeSelDocFontWeight = 'bold';

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_mgmtRmonAlarm')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    'click #btnDel':'del'
  },
  add:function(e){
    if (!data.hasEvent)
    {
      ShowStatusError(lang('rmon','txtRmonEventDisabledInfo',["<a class='BottomLinkItem' href=javascript:openTreeLink('html/mgmt_rmon_event.html');>","</a>"]), true);
      return;
    }
    OpenDialog('mgmt_rmon_alarmAdd.html');
  },
  edit:function(e){
    if (!data.hasEvent && GetTableMultiSelectNum() > 0)
    {
      ShowStatusError(lang('rmon','txtRmonEventDisabledInfo',["<a class='BottomLinkItem' href=javascript:openTreeLink('html/mgmt_rmon_event.html');>","</a>"]), true);
      return;
    }
    if (!CheckTableAddEditDel(e.currentTarget.id))
      return;
    OpenDialog(urlParamAppend('mgmt_rmon_alarmEdit.html', 'entry', GetTableSelectVal()));
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_mgmtRmonAlarmDel'), urlDataGen(GetTableMultiSelectVals('entry')));
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('rmon','txtAlarmControlTable')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th rowspan=2 ><%= TableCheckboxAll() %></th>
    <th rowspan=2 class=NumberCell><%= lang('rmon','thAlarmIdx') %></th>
    <th rowspan=2 class=StringCell><%= lang('port','lblPort') %></th>
    <th colspan=2 ><%= lang('rmon','thAlarmCnt') %></th>
    <th rowspan=2 class=StringCell><%= lang('rmon','thSampleType') %></th>
    <th rowspan=2 class=NumberCell><%= lang('rmon','thInterval') %></th>
    <th rowspan=2 class=StringCell><%= lang('rmon','thOwner') %></th>
    <th rowspan=2 class=StringCell><%= lang('rmon','thStartupAlarm') %></th>
    <th colspan=2 ><%= lang('rmon','thAlarmRising') %></th>
    <th colspan=2 ><%= lang('rmon','thAlarmFalling') %></th>
    <%= TableLastTh(2) %>
  </tr>
  <tr>
    <th class=StringCell><%= lang('rmon','thCntName') %></th>
    <th class=NumberCell><%= lang('rmon','thCntValue') %></th>
    <th class=NumberCell><%= lang('rmon','thAlarmThreshold') %></th>
    <th class=StringCell><%= lang('rmon','thAlarmEvent') %></th>
    <th class=NumberCell><%= lang('rmon','thAlarmThreshold') %></th>
    <th class=StringCell><%= lang('rmon','thAlarmEvent') %></th>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.entries)) { %>
  <% _.each(data.entries, function(entry, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(entry.idx) %></td>
    <td class="NumberCell"><%= entry.idx %></td>
    <td class="StringCell"><%= entry.intf %></td>
    <td class="StringCell"><%= entry.cntName %></td>
    <td class="NumberCell"><%= entry.cntValue %></td>
    <td class="StringCell"><%= show(entry.sampleType) %></td>
    <td class="NumberCell"><%= entry.interval %></td>
    <td class="StringCell"><%= show(entry.owner) %></td>
    <td class="StringCell"><%= show(entry.startupAlarm) %></td>
    <td class="NumberCell"><%= entry.risingThreshold %></td>
    <td class="StringCell"><%= show(entry.risingEvent) %></td>
    <td class="NumberCell"><%= entry.fallingThreshold %></td>
    <td class="StringCell"><%= show(entry.fallingEvent) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); } %>
</tbody>
</table>
<%  if (data.snmpEnable == false) { %>
</br>
<table>
<tbody>
  <tr>
    <td>
      <%= LabelHint(lang('rmon','txtRmonSnmpDisabledInfo',["<a class='BottomLinkItem' href=javascript:openTreeLink('html/sec_mgmt_method.html');>","</a>"])) %>
    </td>
  </tr>
</tbody>
</table>
<%  } %>
<%= TableFoot(ButtonGroup(ButtonAdd('btnAdd'),ButtonEdit('btnEdit'),ButtonDel('btnDel'))) %>
</form>
</script>
</body>
</html>
