<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var tmpVal;
var severities = ["txtEmergency","txtAlert","txtCritical","txtError","txtWarning","txtNotice","txtInformational","txtDebug"];

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_diagLogGlobal')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;

        if (!IsCheckboxChecked('consoleState'))
          DisableSelect('console_sev');
        if (!IsCheckboxChecked('ramState'))
          DisableSelect('ram_sev');
        if (!IsCheckboxChecked('fileState'))
          DisableSelect('file_sev');
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'change select':'sevlist',
    'change input[type=checkbox]':'logstate',
    'blur input[type=text]':'checkValid'
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_diagLogGlobal'), formDataGet('setform'));
    }
  },
  sevlist: function(e) {
    var target = e.currentTarget.id + '_list';
    var txt = '';

    for (i = 0; i <= GetSelectVal(e.currentTarget.id); i++)
      txt = txt + (txt.length ? ', ' : '') + show(lang('log',severities[i]));

    $('#' + target).html('Note: ' + txt);
  },
  logstate: function(e) {
    var sev = '';
    switch (e.currentTarget.id)
    {
        case 'consoleState':
            sev = 'console_sev';
            break;
        case 'ramState':
            sev = 'ram_sev';
            break;
        case 'fileState':
            sev = 'file_sev';
            break;
        default:
            sev = '';
            break;
    }

    if (sev.length)
    {
      if (IsCheckboxChecked(e.currentTarget.id))
        EnableSelect(sev);
      else
        DisableSelect(sev);
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validRange('aggAgingTime',data.aggAgingTime_min,data.aggAgingTime_max);
    return valid;
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('log','lblState')) %></th>
      <td class="formContentTD">
        <%= Checkbox('logState',lang('common','txtEnable'),data.logState) %>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <tr>
      <th><%= LabelLeft(lang('log','lblAggregation')) %></th>
      <td class="formContentTD">
        <%= Checkbox('aggState',lang('common','txtEnable'),data.aggState) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('log','lblAggAgingTime')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("aggAgingTime", data.aggAgingTime, 4) %></td>
            <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.aggAgingTime_min,data.aggAgingTime_max,data.aggAgingTime_dflt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('log','lblConsoleLogging')) %>
    <tr>
      <th><%= LabelLeft(lang('log','lblState')) %></th>
      <td class="formContentTD">
        <%= Checkbox('consoleState',lang('common','txtEnable'),data.consoleState) %>
      </td>
    </tr>
    <tr>
      <th rowspan=2><%= LabelLeft(lang('log','lblMinSev')) %></th>
      <td class="formContentTD">
        <select name="console_sev" id="console_sev">
        <% _.each(severities, function(sev, idx) { %>
        <option value=<%= idx %> <%= (idx === data.console_sev) ? "selected" : "" %>><%= lang('log',sev) %></option>
        <% }); %>
        </select>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <% for (i = 0, tmpVal = ''; i <= data.console_sev; i++) { %>
          <% tmpVal = tmpVal + (tmpVal.length ? ', ' : '') + show(lang('log',severities[i])); %>
        <% } %>
        <%= LabelHint('Note: ' + tmpVal, 'console_sev_list') %>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('log','lblRamLogging')) %>
    <tr>
      <th><%= LabelLeft(lang('log','lblState')) %></th>
      <td class="formContentTD">
        <%= Checkbox('ramState',lang('common','txtEnable'),data.ramState) %>
      </td>
    </tr>
    <tr>
      <th rowspan=2><%= LabelLeft(lang('log','lblMinSev')) %></th>
      <td class="formContentTD">
        <select name="ram_sev" id="ram_sev">
        <% _.each(severities, function(sev, idx) { %>
        <option value=<%= idx %> <%= (idx === data.ram_sev) ? "selected" : "" %>><%= lang('log',sev) %></option>
        <% }); %>
        </select>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <% for (i = 0, tmpVal = ''; i <= data.ram_sev; i++) { %>
          <% tmpVal = tmpVal + (tmpVal.length ? ', ' : '') + show(lang('log',severities[i])); %>
        <% } %>
        <%= LabelHint('Note: ' + tmpVal, 'ram_sev_list') %>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('log','lblFileLogging')) %>
    <tr>
      <th><%= LabelLeft(lang('log','lblState')) %></th>
      <td class="formContentTD">
        <%= Checkbox('fileState',lang('common','txtEnable'),data.fileState) %>
      </td>
    </tr>
    <tr>
      <th rowspan=2><%= LabelLeft(lang('log','lblMinSev')) %></th>
      <td class="formContentTD">
        <select name="file_sev" id="file_sev">
        <% _.each(severities, function(sev, idx) { %>
        <option value=<%= idx %> <%= (idx === data.file_sev) ? "selected" : "" %>><%= lang('log',sev) %></option>
        <% }); %>
        </select>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <% for (i = 0, tmpVal = ''; i <= data.file_sev; i++) { %>
          <% tmpVal = tmpVal + (tmpVal.length ? ', ' : '') + show(lang('log',severities[i])); %>
        <% } %>
        <%= LabelHint('Note: ' + tmpVal, 'file_sev_list') %>
      </td>
    </tr>

    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

</form>
</script>
</body>
</html>
