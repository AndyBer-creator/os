<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_gvrpProp')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
		data = resp.data;
      }
    });
  },
  events: {
    'click #btnApply':'applyClick',
	'click #btnEdit':'editClick',
	'blur input[type=text]':'checkValid'
  },
  applyClick: function() {
    dataSet(url('set_gvrpProp'), formDataGet('setform'));
  },
  editClick: function(e) {
    if(!CheckTableEdit())
      return;
    OpenDialog(urlAppend('vlan_gvrp_propertyEdit.html', GetTableMultiSelectVals('port')));
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validRange('joinTime',data.joinTime_min,data.joinTime_max);
    valid &= validRange('leaveTime',data.leaveTime_min,data.leaveTime_max);
    valid &= validRange('leaveAllTime',data.leaveAllTime_min,data.leaveAllTime_max);
    return valid;
  }

});

EnterKeyEvent('applyClick');
mainFrame = new mainView();
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">

<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('gvrp','lblGvrpGlobalStatus')) %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('globalStatus',data.globalStatus) %>
      </td>
    </tr>

    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('gvrp','lblTimeParm')) %>
    <tr>
      <th><%= LabelLeft(lang('gvrp','lblJoin')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("joinTime", data.joinTime, 5) %></td>
            <td class="right"><%= LabelHint(lang('common','txtMSRangeArgDefault',[data.joinTime_min,data.joinTime_max,data.joinTime_dflt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('gvrp','lblLeave')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("leaveTime", data.leaveTime, 5) %></td>
            <td class="right"><%= LabelHint(lang('common','txtMSRangeArgDefault',[data.leaveTime_min,data.leaveTime_max,data.leaveTime_dflt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('gvrp','lblLeaveAll')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("leaveAllTime", data.leaveAllTime, 5) %></td>
            <td class="right"><%= LabelHint(lang('common','txtMSRangeArgDefault',[data.leaveAllTime_min,data.leaveAllTime_max,data.leaveAllTime_dflt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= ButtonGroupApply('btnApply') %>

<%= TableHead(lang('gvrp','titGVRPPortTbl')) %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('port','lblEntryNo') %></th>
    <th><%= lang('port','lblPort') %></th>
    <th><%= lang('gvrp','lblGvrpState') %></th>
    <th><%= lang('gvrp','lblGvrpDynamicVlan') %></th>
    <th><%= lang('gvrp','lblGvrpRegist') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="BinaryCell"><%= (port.state ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>
    <td class="BinaryCell"><%= (port.dynamicVlan ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>
    <td class="StringCell"><%= str2var(port.Registration) %></td>
    <%= TableLastTd() %>
  </tr>
<% }); %>
</tbody>
</table>
<%= TableFoot(ButtonEdit('btnEdit')) %>
</form>
</script>
</body>
</html>
