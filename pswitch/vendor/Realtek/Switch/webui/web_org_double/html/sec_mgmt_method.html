<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_secMgmtMethod')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'blur input[type=text]':'checkValid'
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_secMgmtMethod'), formDataGet('setform'));
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;

    for (var i = 0; i < data.timeouts.length; i++) {
      valid &= validRange('timeout_'+data.timeouts[i].val,data.min_timeout,data.max_timeout);
    }

<!--#ifdef CONFIG_SYS_UI_CLI_PASSRETRY_SILENT-->
    for (var i = 0; i < data.retries.length; i++) {
      valid &= validRange('retry_'+data.retries[i].val,data.min_retry,data.max_retry);
    }

    for (var i = 0; i < data.silents.length; i++) {
      valid &= validRange('silent_'+data.silents[i].val,data.min_silent,data.max_silent);
    }
<!--#endif-->
    return valid;
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <%= ShowFormTitle(lang('line','lblMgmtService')) %>
  <% _.each(data.methods, function(entry, idx) { %>
    <tr>
      <th><%= LabelLeft(show(entry.txt)) %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('state_'+entry.val, entry.state) %>
      </td>
    </tr>
  <% });%>
    <%= ShowFormContentGap() %>

    <%= ShowFormTitle(lang('line','lblSessTimeout')) %>
  <% _.each(data.timeouts, function(entry, idx) { %>
    <tr>
      <th><%= LabelLeft(show(entry.txt)) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit('timeout_'+entry.val, entry.timeout) %></td>
            <td class="right"><%= LabelHint(lang('common','txtMinRangeArgDefault',[data.min_timeout,data.max_timeout,entry.dflt_timeout])) %></td>
          </tr>
        </table>
      </td>
    </tr>
  <% });%>
<!--#ifdef CONFIG_SYS_UI_CLI_PASSRETRY_SILENT-->
    <%= ShowFormContentGap() %>

    <%= ShowFormTitle(lang('line','lblPassRetryCnt')) %>
  <% _.each(data.retries, function(entry, idx) { %>
    <tr>
      <th><%= LabelLeft(show(entry.txt)) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit('retry_'+entry.val, entry.retry) %></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.min_retry,data.max_retry,entry.dflt_retry])) %></td>
          </tr>
        </table>
      </td>
    </tr>
  <% });%>
    <%= ShowFormContentGap() %>

    <%= ShowFormTitle(lang('line','lblSilentTime')) %>
  <% _.each(data.silents, function(entry, idx) { %>
    <tr>
      <th><%= LabelLeft(show(entry.txt)) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit('silent_'+entry.val, entry.silent) %></td>
            <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.min_silent,data.max_silent,entry.dflt_silent])) %></td>
          </tr>
        </table>
      </td>
    </tr>
  <% });%>
<!--#endif-->
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

</form>
</script>
</body>
</html>
