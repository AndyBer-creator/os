<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var selVal = 0;
var time = 10;
var intervalId;

function reload()
{
  mainFrame.render();
}

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlParamGetVals('port');
    if (selVal == '')
      selVal = 0;
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlParamAppend(url('get_gvrpPortCnt'), 'selPort', selVal)).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();

        that.refresh();
      }
    });
  },
  events: {
    'click #btnClear':'clear',
    'change #selPort':'selPort',
    'click [name=cntType]':'cntType',
    'click [name=refreshRate]':'refresh'
  },
  clear: function() {
    dataSet(url('set_gvrpPortCntClear'), formDataGet('setform'));
  },
  selPort: function(){
    selVal = GetSelectVal('selPort');
    this.render();
  },
  cntType: function(){
    var typeVal = GetRadioVal('cntType');
    if (-1 == typeVal) {
      $('#type_0').css('display','');
      $('#type_1').css('display','');
      $('#type_2').css('display','');
    } else if (0 == typeVal) {
      $('#type_0').css('display','');
      $('#type_1').css('display','none');
      $('#type_2').css('display','none');
    } else if (1 == typeVal) {
      $('#type_0').css('display','none');
      $('#type_1').css('display','');
      $('#type_2').css('display','none');
    } else if (2 == typeVal) {
      $('#type_0').css('display','none');
      $('#type_1').css('display','none');
      $('#type_2').css('display','');
    }
  },
  refresh: function(){
    clearInterval(intervalId);

    time = GetRadioVal('refreshRate');

    if (0 != time)
      intervalId = setInterval(reload, time * 1000);
  }
});
EnterKeyEvent('refresh');
mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <select id="selPort" name="selPort">
        <% _.each(_top.data.ports, function(port, idx) { %>
          <option value=<%= idx %> <%= selVal == idx ? "selected" : ""%>><%= port.port %></option>
        <% }); %>
        </select>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('gvrp','lblcntType')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('cntType',-1,[-1,lang('gvrp','lblAll')],[0,lang('gvrp','lblRxCnt')],[1,lang('gvrp','lblTxCnt')],[2,lang('gvrp','lblErrCnt')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('common','lblRefreshRate')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('refreshRate',time,[0,lang('common','lblRefreshRateNone')],[5,lang('common','lblRefreshRate5s')],[10,lang('common','lblRefreshRate10s')],[30,lang('common','lblRefreshRate30s')]) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroup(ButtonClear('btnClear')) %>

<table>
<tr>
  <td>
    <table >
    <tbody>
    <tr><td class="formBody">
    <% _.each(data.cnts, function(type, idx) { %>
      <table class="formContent" id=<%= "type_"+idx %>>
      <%= ShowFormTitle(show(type.type)) %>
      <% _.each(type.cnts, function(cnt, idx) { %>
        <tr>
          <th><%= LabelLeft(cnt.name) %></th>
          <td class="formContentTD"><%=cnt.val%></td>
        </tr>
      <% }); %>
      <%= ShowFormContentGap() %>
      </table>
    <% }); %>
    </td></tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

</form>
</script>
</body>
</html>
