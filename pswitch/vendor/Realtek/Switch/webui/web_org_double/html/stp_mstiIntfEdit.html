<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var data;
var portVal;
var mstiVal;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    if (urlParamGetByName('msti').length != 0)
      mstiVal = str2int(urlParamGetByName('msti'));
    else
      CloseDialog();
    portVal = urlGetPortList('port');
    this.render();
  },
  render: function() {
    var that = this;
    var urlFinal;
    urlFinal = urlParamAppend(url('get_stpMstiIntfEdit'), 'msti', mstiVal);
    urlFinal = urlAppend(urlFinal, urlGetSelSouce());
    dataGet(urlFinal).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_stpMstiIntfEdit'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validStpPri('pri',data.pri_min,data.pri_max, 16);
    valid &= validRange('pathcost',data.pathcost_min,data.pathcost_max);
    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('stp','titStpMstiIntfEdit')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('stp','lblMsti')) %></th>
      <td class="formContentTD">
        <%= mstiVal %>
        <%= InputHidden('msti',mstiVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= portVal %>
        <%= InputHidden('portList',portVal) %>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortPathCost')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("pathcost", data.pathcost, 9) %></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArg',[data.pathcost_min,data.pathcost_max])) %> (0 = Auto)</td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortPriority')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td>
              <select name="pri" id="pri">
              <% for(i = data.pri_min; i <= data.pri_max; i+= 16){ %>
              <option value=<%= i %> <%= i === data.pri ? "selected" : "" %>><%= i %></option>
              <% } %>
            </td>
          </tr>
        </table>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortRole')) %></th>
      <td class="formContentTD">
        <%= !IsUndefOrNull(data.role) ? show(data.role) : lang('common','txtDisable') %>
      </td>
    </td>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortState')) %></th>
      <td class="formContentTD">
        <%= !IsUndefOrNull(data.state) ? show(data.state) : lang('common','txtDisable') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortMode')) %></th>
      <td class="formContentTD">
        <%= !IsUndefOrNull(data.mode) ? show(data.mode) : lang('common','txtDisable') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortType')) %></th>
      <td class="formContentTD">
        <%= !IsUndefOrNull(data.type) ? show(data.type) : lang('common','lblNA') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortDesignatedBridge')) %></th>
      <td class="formContentTD">
        <%= !IsUndefOrNull(data.desgBridge) ? data.desgBridge : lang('common','lblNA') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortDesignatedPortId')) %></th>
      <td class="formContentTD">
        <%= !IsUndefOrNull(data.desgPortId) ? data.desgPortId : lang('common','lblNA') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortDesignatedCost')) %></th>
      <td class="formContentTD">
        <%= data.desgCost %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblRemainingHop')) %></th>
      <td class="formContentTD">
        <%= data.remainingHop %></td>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
