<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_valErpsGlobalStatus')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'blur input[type=text]':'checkValid'
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_valErpsStatus'), formDataGet('setform'));
  },
  checkValid: function() {
    clearAllErrMsg();
    var valid;
    valid = true;
    //valid &= validRange('sysPri',data.min_sysPri,data.max_sysPri);
    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">

<form id="setform">

<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
      <tr>
      <th><%= LabelLeft(lang('ring','ringErpsStatuss')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('state', data.state, [0, lang('common','txtDisable')], [1, lang('common','txtEnable')]) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

</form>
</script>
</body>
</html>
