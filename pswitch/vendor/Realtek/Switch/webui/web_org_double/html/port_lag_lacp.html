<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_portLAGLacp')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnEdit':'edit',
    'blur input[type=text]':'checkValid'
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_portLAGLacp'), formDataGet('setform'));
  },
  edit:function(e){
    if(!CheckTableEdit())
      return;
    OpenDialog(urlAppend('port_lag_lacpEdit.html', GetTableMultiSelectVals('port')));
  },
  checkValid: function() {
    clearAllErrMsg();
    var valid;
    valid = true;
    valid &= validRange('sysPri',data.min_sysPri,data.max_sysPri);
    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">

<form id="setform">

<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('lag','lblLACPSysPriority')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit('sysPri',data.sysPri,5) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.min_sysPri,data.max_sysPri, data.dflt_sysPri])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

<%= TableHead(lang('lag','titLACPPortTbl')) %>
<table class="dataTable copy" cellpadding="0" cellspacing="0">
<thead>
<tr>
  <th><%= TableCheckboxAll() %></th>
  <th><%= lang('port','lblEntryNo') %></th>
  <th><%= lang('port','lblPort') %></th>
  <th><%= lang('lag','lblPortPriority') %></th>
  <th><%= lang('lag','lblLACPTimeout') %></th>
  <%= TableLastTh() %>
</tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="NumberCell"><%= port.pri %></td>
    <td class="BinaryCell"><%= show(port.timeout) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonEdit('btnEdit')) %>

</form>
</script>
</body>
</html>
