<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var targetVal = 0;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render(url('get_mcastRouter'));
  },
  render: function(_url) {
    var that = this;
    dataGet(_url).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        targetVal = get_mcast_ipVersion(_url);
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    <!--#ifdef CONFIG_SYS_PROTO_IGMP_STATIC_ROUTER-->
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    <!--#endif-->
    <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    'change #target':'selTarget',
    <!--#endif-->
    'click #btnRefresh':'refresh'
  },
  <!--#ifdef CONFIG_SYS_PROTO_IGMP_STATIC_ROUTER-->
  add:function(e){
     OpenDialog('mcast_general_routerAdd.html');
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    var urlFinal;
    urlFinal = urlParamAppend('mcast_general_routerEdit.html', 'idx', GetTableSelectVal('idx'));
    OpenDialog(mcastUrl_append_ipVer(urlFinal,targetVal));
  },
  <!--#endif-->
  <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
  selTarget:function(e){
    var urlFinal;
    targetVal = GetSelectVal('target');
    urlFinal = urlParamAppend(url('get_mcastRouter'), 'ipType', targetVal);
    this.render(urlFinal);
  },
  <!--#endif-->
  refresh:function(e){
    var urlFinal;
    urlFinal = mcastUrl_append_ipVer(url('get_mcastRouter'),targetVal);
    this.render(urlFinal);
  }
});

EnterKeyEvent('refresh');
mainFrame = new mainView();
mainFrameGetUrl = mcastUrl_append_ipVer(url('get_mcastRouter'),targetVal);
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('mcast','lblMcastRouterTable')) %>

<!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
<table>
<tr>
    <td><%= lang('common','lblIPVersion') %></td>
    <td class="right">
    <select name="target" id="target">
       <option value=0 <%= (targetVal === 0) ? "selected" : "" %>><%= lang('mcast','txtIPv4') %></option>
       <option value=1 <%= (targetVal === 1) ? "selected" : "" %>><%= lang('mcast','txtIPv6') %></option>
    </select>
    </td>
    </tr>
</table>
<br>
<!--#endif-->

<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('common','lblVLAN') %></th>
    <th><%= lang('mcast','lblMemberPort') %></th>
    <!--#ifdef CONFIG_SYS_PROTO_IGMP_STATIC_ROUTER-->
    <th><%= lang('mcast','lblStRtMbrPort') %></th>
    <th><%= lang('mcast','lblForbidRtMbrPort') %></th>
    <!--#endif-->
    <th><%= lang('mcast','lblLifeSec') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.routers)) { %>
  <% _.each(data.routers, function(router, idx) { %>
    <tr>
      <td class="StringCell"><%= TableCheckbox(router.vid) %></td>
      <td class="NumberCell"><%= router.vid %></td>
      <td class="StringCell"><%= showList(router.mbrPort) %></td>
      <!--#ifdef CONFIG_SYS_PROTO_IGMP_STATIC_ROUTER-->
      <td class="StringCell"><%= showList(router.stMbrs) %></td>
      <td class="StringCell"><%= showList(router.fbMbrs) %></td>
      <!--#endif-->
      <td class="NumberCell"><%= router.lifeTime %></td>
      <%= TableLastTd() %>
    </tr>
  <% }); } %>
</tbody>
</table>
<%=  (IsUndefOrNull(data.isStRouter)) ? TableFoot(ButtonRefresh('btnRefresh')) : TableFoot(ButtonGroup(ButtonAdd('btnAdd'),ButtonEdit('btnEdit'),ButtonRefresh('btnRefresh'))) %>

</form>
</script>
</body>
</html>
