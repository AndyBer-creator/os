<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_secStormControl')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnEdit':'edit'
  },
  apply: function() {
    dataSet(url('set_secStormControl'), formDataGet('setform'));
  },
  edit:function(e){
    if(!CheckTableEdit())
      return;
    OpenDialog(urlAppend('sec_stormControlEdit.html', GetTableMultiSelectVals('port')));
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('storm','lblUnit')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('unit',data.unit,[0,lang('storm','lblpps')],[1,lang('storm','lblbps')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('storm','lblIFG')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('type',data.type,[0,lang('storm','txtExclude')],[1,lang('storm','txtInclude')]) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

<%= TableHead(lang('storm','titStormPortSettingTable')) %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th rowspan=2><%= TableCheckboxAll() %></th>
    <th rowspan=2><%= lang('port','lblEntryNo') %></th>
    <th rowspan=2><%= lang('port','lblPort') %></th>
    <th rowspan=2><%= lang('storm','lblState') %></th>
    <th colspan=2><%= lang('storm','lblBroadcast') %></th>
    <th colspan=2><%= lang('storm','lblUnknownMul') %></th>
    <th colspan=2><%= lang('storm','lblUnknownUni') %></th>
    <th rowspan=2><%= lang('storm','lblAction') %></th>
    <%= TableLastTh(2) %>
  </tr>
  <tr>
    <th><%= lang('storm','lblState') %></th>
    <th><%= lang('storm','lblRate') + ' (' + (data.unit ? lang('storm','txtbps') : lang('storm','txtpps')) + ')' %></th>
    <th><%= lang('storm','lblState') %></th>
    <th><%= lang('storm','lblRate') + ' (' + (data.unit ? lang('storm','txtbps') : lang('storm','txtpps')) + ')' %></th>
    <th><%= lang('storm','lblState') %></th>
    <th><%= lang('storm','lblRate') + ' (' + (data.unit ? lang('storm','txtbps') : lang('storm','txtpps')) + ')' %></th>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="BinaryCell"><%= (port.state ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>
    <td class="BinaryCell"><%= (port.bcEnable ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>
    <td class="NumberCell"><%= port.broadcast %></td>
    <td class="BinaryCell"><%= (port.umcEnable ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>
    <td class="NumberCell"><%= port.unknownMC %></td>
    <td class="BinaryCell"><%= (port.uncEnable ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>
    <td class="NumberCell"><%= port.unknownUC %></td>
    <td class="BinaryCell"><%= (port.action ?  lang('storm','txtShutdown') : lang('storm','txtDrop')) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonEdit('btnEdit')) %>
</form>
</script>
</body>
</html>
