<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var selVal;
var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlGetPortList('port');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_secPortEdit'), urlGetSelSouce())).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input:text':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_secPortEdit'), formDataGet('setform'));
    }
  },
  checkValid: function(){
	clearAllErrMsg();
	var valid = true;
	valid &= validRange('addrLimit',data.addrLimit_min,data.addrLimit_max);
	return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('psecure','titEditPsecure')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('portList',selVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('psecure','lblState')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('state', data.state) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('psecure','lblAddrLimit')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit("addrLimit", data.addrLimit, 20) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.addrLimit_min,data.addrLimit_max,data.addrLimit_dflt])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('psecure','lblViolateAction')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('violate', data.violate, [0,lang('psecure','lblViolateProtect')], [1,lang('psecure','lblViolateRestrict')], [2,lang('psecure','lblViolateShutdown')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('psecure','lblSticky')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('sticky', data.sticky) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>

</body>
</html>
