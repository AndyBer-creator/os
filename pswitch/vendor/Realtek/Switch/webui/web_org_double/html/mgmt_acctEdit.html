<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script type="text/javascript" src="../js/crypt/jsbn.js"></script>
<script type="text/javascript" src="../js/crypt/prng4.js"></script>
<script type="text/javascript" src="../js/crypt/rng.js"></script>
<script type="text/javascript" src="../js/crypt/rsa.js"></script>
<script type="text/javascript" src="../js/crypt/base64.js"></script>
<script>
fileLoadMainFrame();

var data;
var selVal;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = decodeURIComponent(urlParamGetByName('user'));
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlParamAppend(url('get_mgmtAcctEdit'),'user',selVal)).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
    {
      if (this.passwordValid())
      {
        if (_top.data.modulus.length != 0)
        {
          var rsa = new RSAKey();
          rsa.setPublic(_top.data.modulus, '10001');
          var pwd = $('#password').val();
          if (pwd.length != 0)
            $('#password').val(hex2b64(rsa.encrypt(pwd)));
        }

        $('#confirmPassword').val("");
        dataSet(url('set_mgmtAcctEdit'), formDataGet('setform'));
      }
    }
  },
  passwordValid:function(){
    var username = $('#userName').val();
    var pwd = $('#password').val();
    var confirmPwd = $('#confirmPassword').val();

    if (!isASCII(pwd)) {
      ShowStatusError(lang('sys','errInvalidASCII'));
      return false;
    }

    if (pwd != confirmPwd) {
      ShowStatusError(lang('sys','errConfirmPassword'));
      return false;
    }

    return true;
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validString('password',false,false,true);
    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('sys','titEditUserAccount')) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('sys','lblUserName')) %></th>
      <td class="formContentTD">
        <%= show(selVal) %>
        <%= InputHidden('userName',selVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('sys','lblPwd')) %></th>
      <td class="formContentTD">
        <%= InputPassword('password', '', data.maxlen_password) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('sys','lblPwdConfirm')) %></th>
      <td class="formContentTD">
        <%= InputPassword('confirmPassword', '', data.maxlen_password) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('sys','lblPriv')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('priv',data.priv,[15,lang('sys','lblPrivTypeAdmin')],[1,lang('sys','lblPrivTypeUser')]) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
