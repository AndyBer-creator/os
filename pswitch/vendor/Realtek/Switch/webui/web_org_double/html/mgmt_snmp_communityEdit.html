<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var selVal;
var selIdx;
var comType = "Basic";
var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = decodeURIComponent(urlParamGetByName('commStr'));
    for (i = 0; i < parent.data.communities.length; i++)
    {
      if (parent.data.communities[i].commStr == selVal)
      {
        selIdx = i;
        if (IsUndefOrNull(parent.data.communities[i].grpName))
          comType = "Basic";
        else
          comType = "Advanced";
        break;
      }
    }
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_snmpCommunityEdit'),'commStr', encodeURIComponent(selVal)).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
        that.comtype();
        $('#grpName').addClass('inputTextErrMsg');
        that.checkValid();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click [name=commType]':'comtype',
    'click #btnClose':'close',
    'change #grpName':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_snmpCommunityEdit'), formDataGet('setform'));
  },
  comtype: function(){
    if (comType == 'Advanced')
      SelectRadio('accessMode','Read-Only');
    if ('Basic' == GetRadioVal('commType')) {
      DisableLabel('lblgrpName');
      DisableSelect('grpName');
      EnableLabel('lblviewName');
      EnableLabel('lblaccess');
      EnableRadioGroup('accessMode');
      EnableSelect('viewName');
      $('#grpName').addClass('inputTextErrMsg');
    } else {
      EnableLabel('lblgrpName');
      EnableSelect('grpName');
      DisableLabel('lblviewName');
      DisableLabel('lblaccess');
      DisableRadioGroup('accessMode');
      DisableSelect('viewName');
    }
    this.checkValid();
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validSelString('grpName');
    return valid;
  }
});

EnterKeyEvent('apply');
mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('snmp','titEditSnmpCommunity')) %>
<%= InputHidden('commStr',selVal) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('snmp','lblCommunityName')) %></th>
      <td class="formContentTD">
        <%= show(parent.data.communities[selIdx].commStr) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('snmp','lblcommType')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('commType',str2var(parent.data.communities[selIdx].commType),['Basic',lang('snmp','lblBasic')],['Advanced',lang('snmp','lblAdvanced')]) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('snmp','lblViewName'), 'lblviewName') %></th>
      <td class="formContentTD">
        <%= SelectArry("viewName", data.views, parent.data.communities[selIdx].viewName) %>
      </td>
    </tr>

   <tr>
      <th><%= LabelLeft(lang('snmp','lblAccess'), 'lblaccess') %></th>
      <td class="formContentTD">
        <%= RadioGroup('accessMode', str2var(parent.data.communities[selIdx].accessMode),['Read-Only',lang('snmp','lblReadOnly')],['Read-Write',lang('snmp','lblReadWrite')]) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('snmp','lblGroupName'), "lblgrpName") %></th>
      <td class="formContentTD">
        <%= SelectArry("grpName", data.grps, parent.data.communities[selIdx].grpName) %>
      </td>
    </tr>

    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
