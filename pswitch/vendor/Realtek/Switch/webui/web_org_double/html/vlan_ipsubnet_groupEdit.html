<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();


var group;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var gid = urlParamGetByName('gid');

    if (!IsUndefOrNull(parent.data.groups))
    {
      for (var i = 0 ; i < parent.data.groups.length; i++)
      {
        if (parent.data.groups[i].gid == gid)
        {
          group = parent.data.groups[i];
          break;
        }
      }
    }

    this.$el.html(this.template());
    PagePostInit();
    DisableSelect('gid');
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
    {
        EnableSelect('gid');
        dataSet(url('set_vlanIpsubnetGroup'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validRange('vlan', 1, 4094);
    return valid;
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('vlanIPsubnet','titIpSubnetEditGroup')) %>
<%= InputHidden('gid', group.gid) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('vlanIPsubnet','lblIPSubGroup')) %></th>
      <td class="formContentTD">
        <%= group.gid %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vlanIPsubnet','lblIPSubAddr')) %></th>
      <td class="formContentTD">
        <%= InputTextIPv4('addr') %>
      </td>
    </tr>
    <tr>
      <th rowspan=2><%= LabelLeft(lang('ipconf','lblMask'),'lblMask') %></th>
      <td class='formContentTD'>
        <table><tr>
          <td><input type=radio name="maskType" value="network" checked></td>
          <td style="width:80px" class="right"><%= Label(lang('ipconf','lblNetworkMask'), 'lblNetworkMask') %></td>
          <td class="right"><%= InputTextIPv4('mask') %></td>
        </tr></table>
      </td>
    </tr>
    <tr>
      <td class='formContentTD'>
        <table><tr>
          <td><input type=radio name="maskType" value="plen"></td>
          <td style="width:80px" class="right"><%= Label(lang('ipconf','lblPrefixLength'), 'lblPrefixLength') %></td>
          <td class="right">
            <%= InputTextDigit('plen', '', 2) %>
            <%= LabelHint(lang('common','txtRangeArg',[8, 30])) %>
          </td>
        </tr></table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('common','lblVLAN')) %></th>
      <td class="formContentTD">
        <%= InputTextDigit('vlan', '', 4) %>
        <%= LabelHint(lang('common', 'txtRangeArg', [1, 4094])) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vlanIPsubnet','lblIPSubPri')) %></th>
      <td class="formContentTD">
        <%= InputTextDigit('priority', '', 4) %>
        <%= LabelHint(lang('common', 'txtRangeArg', [0, 7])) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
