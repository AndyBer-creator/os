<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_discoveryLldpMedPolicy')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    'click #btnDel':'del'
  },
  apply: function() {
      dataSet(url('set_discoveryLldpMedPolicy'), formDataGet('setform'));
  },
  add:function(e){
    OpenDialog('discovery_lldp_medPolicyAdd.html');
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    OpenDialog(urlParamAppend('discovery_lldp_medPolicyEdit.html', 'policyNum', GetTableSelectVal()));
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_discoveryLldpMedPolicyDel'), urlDataGen(GetTableMultiSelectVals('policyNum')));
  }
});

mainFrame = new mainView();

EnterKeyEvent('add');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('lldp','lblLLDPMEDNetworkPolicyTable')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('lldp','lblNetworkPolicyNum') %></th>
    <th><%= lang('lldp','lblApp') %></th>
    <th><%= lang('lldp','lblVlanID') %></th>
    <th><%= lang('lldp','lblVlanTag') %></th>
    <th><%= lang('lldp','lblUserPriority') %></th>
    <th><%= lang('lldp','lblDSCPValue') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.policies)) { %>
  <% _.each(data.policies, function(entry, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(entry.policyNum) %></td>
    <td class="NumberCell"><%= entry.policyNum %></td>
    <td class="StringCell"><%= show(entry.app) %></td>
    <td class="NumberCell"><%= entry.vid %></td>
    <td class="BinaryCell"><%= show(entry.vlanTag) %></td>
    <td class="NumberCell"><%= entry.pri %></td>
    <td class="NumberCell"><%= entry.dscp %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>

<%= TableFoot(ButtonGroupAddEditDel('btnAdd', 'btnEdit', 'btnDel')) %>

</form>
</script>
</body>
</html>
