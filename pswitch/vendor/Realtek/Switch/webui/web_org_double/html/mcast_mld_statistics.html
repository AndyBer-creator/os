<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_mcastMldStatic')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;
      }
    });
  },
  events: {
    'click #btnRefresh':'refresh',
    'click #btnClear':'clear'
  },
  refresh:function(e){
    this.render();
  },
  clear: function() {
    dataSet(url('set_mcastMldStaticClear'), formDataGet('setform'));
  }
});
EnterKeyEvent('refresh');
mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>

    <%= ShowFormTitle(lang('mcast','lblRX')) %>
    <tr>
      <th><%= LabelLeft(lang('mcast','lblTotal')) %></th>
      <td class="formContentTD">
        <%= data.totalRx %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('mcast','lblValid')) %></th>
      <td class="formContentTD">
        <%= data.validRx %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('mcast','lblInValid')) %></th>
      <td class="formContentTD">
        <%= data.inValidRx %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('mcast','lblOther')) %></th>
      <td class="formContentTD">
        <%= data.otherRx %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('mcast','lblLeave')) %></th>
      <td class="formContentTD">
        <%= data.leaveRx %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('mcast','lblReport')) %></th>
      <td class="formContentTD">
        <%= data.reportRx %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('mcast','lblGenQry')) %></th>
      <td class="formContentTD">
        <%= data.generalQryRx %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('mcast','lblSpecGryQry')) %></th>
      <td class="formContentTD">
        <%= data.SpecGrpQryRx %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('mcast','lblSpecGrySrcQry')) %></th>
      <td class="formContentTD">
        <%= data.SpecGrpSrcQryRx %>
      </td>
    </tr>

    <%= ShowFormContentGap() %>

    <%= ShowFormTitle(lang('mcast','lblTX')) %>
    <tr>
      <th><%= LabelLeft(lang('mcast','lblLeave')) %></th>
      <td class="formContentTD">
        <%= data.leaveTx %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('mcast','lblReport')) %></th>
      <td class="formContentTD">
        <%= data.reportTx %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('mcast','lblGenQry')) %></th>
      <td class="formContentTD">
        <%= data.generalQryTx %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('mcast','lblSpecGryQry')) %></th>
      <td class="formContentTD">
        <%= data.SpecGrpQryTx %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('mcast','lblSpecGrySrcQry')) %></th>
      <td class="formContentTD">
        <%= data.SpecGrpSrcQryTx %>
      </td>
    </tr>

    </tbody>
    </table>
  </td>
</tr>
</table>

<%= TableFoot(ButtonGroup(ButtonClear('btnClear'),ButtonRefresh('btnRefresh'))) %>

</form>
</script>
</body>
</html>
