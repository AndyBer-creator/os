<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_ripConfig')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
		//console.log(formDataGet('setform'));
      dataSet(url('set_ripNetworkAdd'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validIPv4Addr('networkAddr',false, false, true);
    valid &= validIPv4Mask('networkMask');
    return valid;
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<%= DialogHead(lang('rip','lblRipNetworkTable')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
	<tr>
	  <th><%= LabelLeft(lang('rip','lblRipNetworkAddr'),'lblRipNetworkAddr') %></th>
	  <td class='formContentTD'>
	    <%= InputTextIPv4('networkAddr') %>
	  </td>
	</tr>
	<tr>
	  <th><%= LabelLeft(lang('rip','lblRipNetworkMask'),'lblRipNetworkMask') %></th>
	  <td class='formContentTD'>
	    <%= InputTextIPv4('networkMask') %>
	  </td>
	</tr>
	</tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
