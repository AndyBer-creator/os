<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var port;
var mac;
var vlan;
var ip;
var ipmask;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var key = urlParamGetByName('idx');
    var strTok = key.split("_");
    port = getPortId(strTok[0]);
    mac = strTok[1];
    vlan = strTok[2];
    ip = strTok[3];
    ipmask = strTok[4];

    this.$el.html(this.template());
    PagePostInit();
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
    {
        EnableInputText('ipmask');
        EnableInputText('ip');
        EnableInputText('mac');
        EnableInputText('vlan');
        dataSet(url('set_secIpsgBinding'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;

    if (mac.length != 0)
      valid &= validIPv4Addr('ip');
    else
      valid &= validRange('vlan',1 ,4094);

    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('ipsg','titBindingEntryEdit')) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
         <%= printPortSelectOption('port', port) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('common','lblVLAN')) %></th>
      <td class="formContentTD">
      <% if (mac.length != 0) { %>
        <%= InputHidden('vlan', vlan) %>
        <%= vlan %>
      <% } else { %>
        <%= InputTextDigit('vlan', vlan, 4) %>
        <%= LabelHint(lang('common', 'txtRangeArg', [1, 4094])) %>
      <% } %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipsg','lblIPSGBinding')) %></th>
      <td class="formContentTD">
        <%= (mac.length != 0) ? lang('ipsg','lblIPMacPort') : lang('ipsg','lblIPPort') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipsg','lblMACAddr')) %></th>
      <td class="formContentTD">
      <% if (mac.length != 0) { %>
        <%= InputHidden('mac', mac) %>
        <%= mac %>
      <% } else { %>
        <%= "N/A" %>
      <% } %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipsg','lblIPAddr')) %></th>
      <td class="formContentTD">
        <% if (mac.length != 0) { %>
          <%= InputTextIPv4('ip', ip) %>
            &#32;&#47;&#32;
          <%= ipmask %>
        <% } else { %>
          <%= InputHidden('ip', ip) %>
          <%= InputHidden('ipmask', ipmask) %>
          <%= ip + " / " + ipmask %>
        <% } %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
