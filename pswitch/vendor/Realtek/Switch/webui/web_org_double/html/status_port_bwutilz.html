<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script src="../js/flot/excanvas.min.js" type="text/javascript"></script>
<script src="../js/flot/jquery.flot.min.js" type="text/javascript"></script>
<script src="../js/flot/jquery.flot.axislabels.min.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var plotHeight = 500;
var time = 5;
var intervalId;
var previousPoint = null;
var previousLabel = null;
var optionsTx;
var optionsRx;

function reload()
{
  mainFrame.render();
}

function init(){
  fileLoadWait();

optionsTx = {
    series: {
        bars: {
            show: true
        }
    },
    bars: {
        align: "center",
        barWidth: 0.5,
        horizontal: true,
        fillColor: { colors: [{ opacity: 0.5 }, { opacity: 1}] },
        lineWidth: 1
    },
    xaxis: {
        //axisLabel: "TX (%)",
        axisLabelUseCanvas: true,
        axisLabelFontSizePixels: 12,
        axisLabelFontFamily: 'Verdana, Arial',
        axisLabelPadding: 10,
        max: 100,
        tickColor: "#5E5E5E",
        tickFormatter: function (v, axis) {
            return v+'%';
        },
        color: "black"
    },
    yaxis: {
        axisLabel: "",
        axisLabelUseCanvas: true,
        axisLabelFontSizePixels: 12,
        axisLabelFontFamily: 'Verdana, Arial',
        axisLabelPadding: 3,
        tickColor: "#5E5E5E",
        //ticks: ticks,
        color: "black"
    },
    legend: {
        noColumns: 0,
        labelBoxBorderColor: "#858585",
        position: "ne"
    },
    grid: {
        hoverable: true,
        borderWidth: 2,
        backgroundColor: { colors: ["#171717", "#4F4F4F"] }
    }
};
//optionsRx = JSON.parse(JSON.stringify(optionsTx));
optionsRx = {
    series: {
        bars: {
            show: true
        }
    },
    bars: {
        align: "center",
        barWidth: 0.5,
        horizontal: true,
        fillColor: { colors: [{ opacity: 0.5 }, { opacity: 1}] },
        lineWidth: 1
    },
    xaxis: {
        //axisLabel: "TX (%)",
        axisLabelUseCanvas: true,
        axisLabelFontSizePixels: 12,
        axisLabelFontFamily: 'Verdana, Arial',
        axisLabelPadding: 10,
        max: 100,
        tickColor: "#5E5E5E",
        tickFormatter: function (v, axis) {
            return v+'%';
        },
        color: "black"
    },
    yaxis: {
        axisLabel: "",
        axisLabelUseCanvas: true,
        axisLabelFontSizePixels: 12,
        axisLabelFontFamily: 'Verdana, Arial',
        axisLabelPadding: 3,
        tickColor: "#5E5E5E",
        //ticks: ticks,
        color: "black"
    },
    legend: {
        noColumns: 0,
        labelBoxBorderColor: "#858585",
        position: "ne"
    },
    grid: {
        hoverable: true,
        borderWidth: 2,
        backgroundColor: { colors: ["#171717", "#4F4F4F"] }
    }
};

$.fn.UseTooltip = function () {
    $(this).bind("plothover", function (event, pos, item) {
        if (item) {
            if ((previousLabel != item.series.label) ||
         (previousPoint != item.dataIndex)) {
                previousPoint = item.dataIndex;
                previousLabel = item.series.label;
                $("#tooltip").remove();

                var x = item.datapoint[0];
                var y = item.datapoint[1];

                var color = item.series.color;
                //alert(color)
                //console.log(item.series.xaxis.ticks[x].label);

                showTooltip(item.pageX,
                item.pageY,
                color,
                "" + item.series.label + "<br><strong>" + item.series.yaxis.ticks[y].label +
                "</strong> : <strong>" + x+ "%" + "</strong>");
            }
        } else {
            $("#tooltip").remove();
            previousPoint = null;
            //$("#tmp-holder").html('');
        }
    });
};

function showTooltip(x, y, color, contents) {
    $('<div id="tooltip">' + contents + '</div>').css({
        position: 'absolute',
        display: 'none',
        top: y - 10,
        left: x + 10,
        border: '2px solid ' + color,
        padding: '3px',
        'font-size': '9px',
        'border-radius': '5px',
        'background-color': '#fff',
        'font-family': 'Verdana, Arial, Helvetica, Tahoma, sans-serif',
        opacity: 0.9
    }).appendTo("body").fadeIn(200);
    //$.plot($("#tmp-holder"), plotData, options);
}

if (_top.devPortNum < 20)
  plotHeight = 400;
else if (_top.devPortNum < 50)
  plotHeight = 600;
else if (_top.devPortNum < 60)
  plotHeight = 800;

var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_statusPortBwutilz')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();

        optionsTx.xaxis.axisLabel=lang('port','lblTxPercent');
        optionsRx.xaxis.axisLabel=lang('port','lblRxPercent');
        optionsTx.yaxis.ticks = data.ticks;
        optionsRx.yaxis.ticks = data.ticks;

        $.plot($("#bw_tx"), data.plotDataTx, optionsTx);
        $("#bw_tx").UseTooltip();
        $.plot($("#bw_rx"), data.plotDataRx, optionsRx);
        $("#bw_rx").UseTooltip();

        that.refresh();
      }
    });
  },
  events: {
    'change [name=refreshRate]':'refresh'
  },
  refresh: function(){
    clearInterval(intervalId);

    time = GetSelectVal('refreshRate');

    intervalId = setInterval(reload, time * 1000);
  }
});
mainFrame = new mainView();

}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<table>
<tr>
  <td colspan=2>
    <%= TableRefreshSelect("refreshRate", time, [[2,'2'],[5,'5'],[10,'10']]) %>
  </td>
</tr>
<tr>
  <td>
    <div style="width:500px;height:<%=plotHeight%>px;text-align:center;margin:10px">
        <div id="bw_tx" style="width:100%;height:100%;"></div>
    </div>
  </td>

  <td>
    <div style="width:500px;height:<%=plotHeight%>px;text-align:center;margin:10px">
        <div id="bw_rx" style="width:100%;height:100%;"></div>
    </div>
  </td>
</tr>
</table>
</form>
</script>


</body>
</html>
