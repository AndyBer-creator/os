<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_mvrProp')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;
        that.chgState();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click input[name=state]':'chgState',
    'blur input[type=text]':'checkValid'
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_mvrProp'), formDataGet('setform'));
    }
  },
  chgState: function() {
    if(IsCheckboxChecked('state'))
    {
      EnableLabel('lblVlans');
      EnableLabel('lblGroupStart');
      EnableLabel('lblGroupSeq');
      EnableLabel('lblQryTime');
      EnableLabel('lblMode');
      EnableSelect('mvrVid');
      EnableInputText('grpStart');
      EnableInputText('seqNum');
      EnableInputText('qryTime');
      EnableRadioGroup('mode');
    }
    else
    {
      DisableLabel('lblVlans');
      DisableLabel('lblGroupStart');
      DisableLabel('lblGroupSeq');
      DisableLabel('lblQryTime');
      DisableLabel('lblMode');
      DisableSelect('mvrVid');
      DisableInputText('grpStart');
      DisableInputText('seqNum');
      DisableInputText('qryTime');
      DisableRadioGroup('mode');
    }
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validIPv4McastAddr('grpStart');
    valid &= validRange('seqNum',1,data.max_num);
    valid &= validRange('qryTime',1,data.max_qryTime);
    return valid;
  }
});
EnterKeyEvent('apply');
mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('mvr','lblState')) %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('state',data.state) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('common','lblVLAN'), 'lblVlans') %></th>
      <td class="formContentTD">
        <%= SelectArry('mvrVid',data.vlans, data.mvrVid) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('mvr','lblMVRMode'), 'lblMode') %></th>
      <td class="formContentTD">
        <%= RadioGroup('mode',data.mode,['Compatible',lang('mvr','txtComp')],['Dynamic',lang('mvr','txtDyn')]) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('mvr','lblMVRGroupStart'),'lblGroupStart') %></th>
      <td class="formContentTD">
        <%= InputTextIPv4('grpStart',data.grpStart) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('mvr','lblMVRGroupSeq'), 'lblGroupSeq') %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><input type="text" digitonly name="seqNum" id="seqNum" value=<%= data.seqNum %>></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArg',[1,data.max_num])) %> </td>
          </tr>
        </table>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('mvr','lblMVRQryTime'), 'lblQryTime') %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><input type="text" digitonly name="qryTime" id="qryTime" value=<%= data.qryTime %>></td>
            <td class="right"><%= LabelHint(lang('common','txtSecRangeArg',[1,data.max_qryTime])) %> </td>
          </tr>
        </table>
      </td>
    </tr>

    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('mvr','lblOperationalGroupNum')) %>
    <tr>
      <th><%= LabelLeft(lang('mvr','lblMaxGroupNum')) %></th>
      <td class="formContentTD">
        <%= data.max_num %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('mvr','lblCurGroupNum')) %></th>
      <td class="formContentTD">
        <%= data.cur_num %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= ButtonGroupApply('btnApply') %>
</form>
</script>
</body>
</html>
