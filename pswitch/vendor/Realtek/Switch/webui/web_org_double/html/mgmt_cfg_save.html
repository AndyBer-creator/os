<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var mainView;
var data;
var sts
var statusFile;
var bakCfg = false;
var restoreStatus = -1;

function checkSaveStatus()
{
  dataGet(urlParamAppend(url('get_mgmtSavecfgStatus'),'statusFile',statusFile)).fetch({
    success: function(model, resp){
      logoutCheck(resp);
      sts = resp.data;
      if ('uploading' == data.status) {
        $('#statusDiv').html(lang('file','txtUploadInProgress'));
        $('#mainDiv').css('display','none');
        $('#statusDiv').css('display','');
        setTimeout(checkSaveStatus, 2000);
      } else if ('fail' == data.status) {
        _top.progressDisable();
        ShowStatusError(sts.msg);
        $('#mainDiv').css('display','');
        $('#statusDiv').css('display','none');
      } else {
        _top.progressDisable();
        ShowStatusSuccess(lang('common','msgSuccess'));
        $('#mainDiv').css('display','');
        $('#statusDiv').css('display','none');
      }
    }
  });
}

function doSaveFile()
{
  $('#mainDiv').prop('style').display = 'none';
  _top.progressEnable();

  if (_top.MockupMode) {
    $('#mainDiv').css('display','none');
    $('#statusDiv').css('display','');
    setTimeout(saveDone, 1000);
    $('#lblTdState').html(lang('file','txtUploadInProgress'));
  } else {
    var Datas = Backbone.Model.extend({
      url: url('set_mgmtSavecfg'),
      parse: function(resp, xhr){
        statusFile = resp.statusFile;
        setTimeout(checkSaveStatus, 1000);
        return;
      }
    });
    var dataModel = new Datas();
    dataModel.save(formDataGet('setform'), {});
  }
}

function saveDone()
{
  if (_top.MockupMode)
  {
    _top.progressDisable();
    ShowStatusSuccess(lang('common','msgSuccess'));
    $('#mainDiv').css('display','');
    $('#statusDiv').css('display','none');
  }
}

function genSrcFile()
{
<!--#ifdef CONFIG_SYS_BACKUP_CONFIGURATION-->
    if (bakCfg)
    {
      txt = RadioGroup('srcFile', 'running', ['running',lang('file','lblRunningCfg')], ['startup',lang('file','lblStartupCfg')], ['backup',lang('file','lblBackupCfg')])
    }
    else
<!--#endif-->
    {
      txt = RadioGroup('srcFile', 'running', ['running',lang('file','lblRunningCfg')], ['startup',lang('file','lblStartupCfg')]);
    }

  return txt;
}

function genDstFile(srcFile)
{
  var txt = ''
  if ('running' == srcFile) {
<!--#ifdef CONFIG_SYS_BACKUP_CONFIGURATION-->
    if (bakCfg)
    {
      txt = RadioGroup('dstFile', 'startup', ['startup',lang('file','lblStartupCfg')], ['backup',lang('file','lblBackupCfg')]);
    }
    else
<!--#endif-->
    {
      txt = RadioGroup('dstFile', 'startup', ['startup',lang('file','lblStartupCfg')]);
    }
  } else if ('startup' == srcFile) {
<!--#ifdef CONFIG_SYS_BACKUP_CONFIGURATION-->
    if (bakCfg)
    {
      txt = RadioGroup('dstFile', 'running', ['running',lang('file','lblRunningCfg')], ['backup',lang('file','lblBackupCfg')]);
    }
    else
<!--#endif-->
    {
      txt = RadioGroup('dstFile', 'running', ['running',lang('file','lblRunningCfg')]);
    }
  }
<!--#ifdef CONFIG_SYS_BACKUP_CONFIGURATION-->
  else if (bakCfg && 'backup' == srcFile) {
    txt = RadioGroup('dstFile', 'running', ['running',lang('file','lblRunningCfg')], ['startup',lang('file','lblStartupCfg')]);
  }
<!--#endif-->

  return txt;
}

function rebooting(resp) {
  if (resp.status == "ok") {
     _top.progressEnable();
     $('#mainDiv').css('display','none');
     $('#statusDiv').css('display','');
     $('#statusDiv').html(lang('sys','msgRebooting'));
  }
}

function reboot(resp)
{
  if (resp.status == "ok")
    restoreStatus = 1;
  else
    restoreStatus = 0;
}

function waitRestoreStatus(){
  if (-1 == restoreStatus) {
    setTimeout(waitRestoreStatus, 500);
  } else if (restoreStatus) {
    OpenConfirmBox(lang('sys','msgConfirmRestoreReboot'),
      function(){
        dataSet(url('set_diagReboot'), formDataGet('setform'), false, rebooting);
      }
    );
  }
}

function init(){
  fileLoadWait();
mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_mgmtSavecfg')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        bakCfg = (!IsUndefOrNull(resp.data.bakCfg) && resp.data.bakCfg) ? true : false;
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click [name=srcFile]':'chgDstFile',
    'click #btnApply':'apply',
    'click #btnRestore':'restore',
    'click #btnDone':'btnDone'
  },
  chgDstFile: function(e){
    $('#tdDstFile').html(genDstFile(e.currentTarget.value));
  },
  apply: function() {
    doSaveFile();
  },
  restore: function() {
    OpenConfirmBox(lang('sys','msgConfirmRestore'),
      function(){
        dataSet(url('set_diagRestore'), formDataGet('setform'), false, reboot);
        waitRestoreStatus();
      }
    );
  },
  btnDone:function(){
    $('#mainDiv').prop('style').display = '';
    $('#statusDiv').prop('style').display = 'none';
    $('#statusBtnDiv').prop('style').display = 'none';
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">

<div id="mainDiv">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th><%= LabelLeft(lang('file', 'lblSrcFile')) %></th>
      <td class="formContentTD">
        <%= genSrcFile() %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('file','lblDstFile')) %></th>
      <td class="formContentTD" id="tdDstFile">
        <%= genDstFile('running') %>
      </td>
    </tr>
    </table>
  </td>
</tr>
</table>

<%=  ButtonGroup(ButtonApply('btnApply'), ButtonShort(lang('sys','btnRestore'), 'btnRestore')) %>
</div>

<div id="statusDiv" class="statusDiv" style="display:none;"></div>

</form>
</script>
</body>
</html>
