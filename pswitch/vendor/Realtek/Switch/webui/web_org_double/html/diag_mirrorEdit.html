<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var selVal;
var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlParamGetByName('mirror');
    this.render();
  },
  render: function() {
    var that = this;
    var urlFinal = urlParamAppend(url('get_diagMirrorEdit'), 'mirror', selVal)
    dataGet(urlFinal).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'change #selMirror':'selMirror',
    'click #btnApply':'applyClick',
    'click #btnClose':'closeClick',
    'change #rxNotMbrs':'rxMbrSelected',
    'change #rxMbrs':'rxMbrSelected',
    'change #txNotMbrs':'txMbrSelected',
    'change #txMbrs':'txMbrSelected',
    'click #btnRxAdd':'rxMbrSelected',
    'click #btnRxRem':'rxMbrSelected',
    'click #btnTxAdd':'txMbrSelected',
    'click #btnTxRem':'txMbrSelected'
  },
  selMirror:function(e){
    selVal = e.currentTarget.value;
    this.render();
  },
  closeClick: function() {
    CloseDialog();
  },
  applyClick: function() {
    MultiSelectApplySelect('rxMbrs');
    MultiSelectApplySelect('txMbrs');
    dataSet(url('set_diagMirrorEdit'), formDataGet('setform'));
    MultiSelectDeselectAll('rxMbrs', 'rxNotMbrs', 'txMbrs', 'txNotMbrs');
  },
  rxMbrSelected: function(e) {
    MultiSelectTransferUpdate(e.currentTarget.id, 'btnRxAdd', 'btnRxRem', 'rxNotMbrs', 'rxMbrs');
  },
  txMbrSelected: function(e) {
    MultiSelectTransferUpdate(e.currentTarget.id, 'btnTxAdd', 'btnTxRem', 'txNotMbrs', 'txMbrs');
  }
});

mainFrame = new mainView();

EnterKeyEvent('applyClick');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('mirror','titEditMirroring')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th><%= LabelLeft(lang('mirror','lblMirrorSessionId')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('selMirror',selVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('common','lblState')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('state', data.state) %>
      </td>
    </tr>

    <tr>
     <th rowspan='2'><%= LabelLeft(lang('mirror','lblMirrorDestPort')) %></th>
       <td class="formContentTD">
         <%= printNormalPortSelectOption('dstPort', data.dstPort) %>
       </td>
    </tr>
    <tr>
	  <td class="formContentTD">
        <%=  Checkbox('ingressState', lang('mirror','lblMirrorIngressStateLabel'), data.ingressState) %>
	  </td>
	</tr>

    <tr>
      <th><%= LabelLeft(lang('mirror','lblMirrorSourceRXPort')) %></th>
      <td class="formContentTD">
        <table>
        <thead>
        <tr>
          <td class='ctrlSpacing'><%= LabelTopMulti(lang('common','lblAvailablePort')) %></td>
          <td class='ctrlSpacing'></td>
          <td class='ctrlSpacing right'><%= LabelTopMulti(lang('common','lblSelPort')) %></td>
        </tr>
        </thead >
        <tbody >
        <tr>
          <td rowspan="2">
            <select name="rxNotMbrs" id="rxNotMbrs" style="WIDTH: 90px" multiple size="8">
            <% _.each(data.rxNotMbrs, function(port, index) { %>
              <option value=<%= port.port %>><%= port.port %></option>
            <% }); %>
            </select>
          </td>
          <td class=right>
            <%= ButtonTransferDisabled('btnRxAdd', 'btnRxRem') %>
          </td>
          <td rowspan="2" class=right>
            <select name="rxMbrs" id="rxMbrs" style="WIDTH: 90px" multiple size="8">
            <% _.each(data.rxMbrs, function(port, index) { %>
              <option value=<%= port.port %>><%= port.port %></option>
            <% }); %>
            </select>
          </td>
        </tr>
        </tbody >
        </table>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('mirror','lblMirrorSourceTXPort')) %></th>
      <td class="formContentTD">
        <table>
        <thead>
        <tr>
          <td class='ctrlSpacing'><%= LabelTopMulti(lang('common','lblAvailablePort')) %></td>
          <td class='ctrlSpacing'></td>
          <td class='ctrlSpacing right'><%= LabelTopMulti(lang('common','lblSelPort')) %></td>
        </tr>
        </thead >
        <tbody >
        <tr>
          <td rowspan="2">
            <select name="txNotMbrs" id="txNotMbrs" style="WIDTH: 90px" multiple size="8">
            <% _.each(data.txNotMbrs, function(port, index) { %>
              <option value=<%= port.port %>><%= port.port %></option>
            <% }); %>
            </select>
          </td>
          <td class=right>
            <%= ButtonTransferDisabled('btnTxAdd', 'btnTxRem') %>
          </td>
          <td rowspan="2" class=right>
            <select name="txMbrs" id="txMbrs" style="WIDTH: 90px" multiple size="8">
            <% _.each(data.txMbrs, function(port, index) { %>
              <option value=<%= port.port %>><%= port.port %></option>
            <% }); %>
            </select>
          </td>
        </tr>
        </tbody >
        </table>
      </td>
    </tr>

    </table>
  </td>
</tr>
</table>

<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
