<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var selVal;
var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlGetPortList('port');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_qosPortEdit'), urlGetSelSouce())).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_qosPortEdit'), formDataGet('setform'));
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validRange('cos',0,7);
    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('qos','titQosEditPortSetting')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('portList',selVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('qos','lblCoS')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit("cos", data.cos, 1, 10) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArg',[0,7])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('qos','lblTrustState')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('state', data.state) %>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('qos','lblRemark')) %>
    <tr>
      <th><%= LabelLeft(lang('qos','lblRemarkCoS')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('remarkCos', data.remarkCos) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('qos','lblRemarkDSCP')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('remarkDscp', data.remarkDscp) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('qos','lblRemarkIPP')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('remarkIpp', data.remarkIpp) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
