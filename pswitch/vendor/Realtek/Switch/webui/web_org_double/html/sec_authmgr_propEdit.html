<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var selVal;
var data;

var typeLang =
[
  "",
  "lang('authmgr','lblDot1x')",
  "lang('authmgr','lblMac')",
  "lang('authmgr','lblWeb')"
];

var methodLang =
[
  "",
  "lang('authmgr','lblMethodRadius')",
  "lang('authmgr','lblMethodLocal')"
];

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlGetPortList('port');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_authmgrPropEdit'), urlGetSelSouce())).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid',
    'change #avlType':'orderSelected',
    'change #selType':'orderSelected',
    'click #btnAdd':'orderSelected',
    'click #btnRem':'orderSelected',
    'change #avlMethod':'methodSelected',
    'change #selMethod':'methodSelected',
    'click #btnAdd2':'methodSelected',
    'click #btnRem2':'methodSelected'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      MultiSelectApplySelect('selType');
      MultiSelectApplySelect('selMethod');
      dataSet(url('set_authmgrPropEdit'), formDataGet('setform'));
      MultiSelectDeselectAll('selType', 'avlType');
      MultiSelectDeselectAll('selMethod', 'avlMethod');
    }
  },
  checkValid:function(){
    clearAllErrMsg();
    var typeLast = 0;
    var typeWebSel = false;
    var typeNum = 0;
    var methodNum = 0;
    $('#selType').find("option").each(function(idx){
      typeLast = this.value;
      typeNum++;
      if (3 == this.value)
        typeWebSel = true;
    });
    $('#selMethod').find("option").each(function(idx){
      methodNum++;
    });
    if (typeNum == 0) {
      ShowStatusWarning(lang('authmgr','errTypeOrderEmpty'));
      return false;
    } else if (typeWebSel && typeLast != 3) {
      ShowStatusWarning(lang('authmgr','errTypeOrderWebNotLast'));
      return false;
    }

    if (methodNum == 0) {
      ShowStatusWarning(lang('authmgr','errMethodEmpty'));
      return false;
    }
    return true;
  },
  orderSelected: function(e) {
    MultiSelectTransferUpdate(e.currentTarget.id, 'btnAdd', 'btnRem', 'avlType', 'selType');
  },
  methodSelected: function(e) {
    MultiSelectTransferUpdate(e.currentTarget.id, 'btnAdd2', 'btnRem2', 'avlMethod', 'selMethod');
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('authmgr','titAuthmgrEditPortMode')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('portList',selVal) %>
      </td>
    </tr>
    <tr>
      <th rowspan=3><%= LabelLeft(lang('authmgr','lblAuthType')) %></th>
      <td class="formContentTD">
        <%=  Checkbox('stateDot1x',lang('authmgr','lblDot1x'),data.stateDot1x) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%=  Checkbox('stateMac',lang('authmgr','lblMac'),data.stateMac) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%=  Checkbox('stateWeb',lang('authmgr','lblWeb'),data.stateWeb) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('authmgr','lblHostMode')) %></th>
      <td class="formContentTD">
        <%=  RadioGroup('mode', data.mode, [0,lang('authmgr','lblHostModeMultiAuth')],[1,lang('authmgr','lblHostModeMultiHost')],[2,lang('authmgr','lblHostModeSingleHost')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('authmgr','lblOrder')) %></th>
      <td class="formContentTD">
        <table>
        <thead>
        <tr>
          <td class='ctrlSpacing'><%= LabelTopMulti(lang('authmgr','lblAvailType')) %></td>
          <td class='ctrlSpacing'></td>
          <td class='ctrlSpacing right'><%= LabelTopMulti(lang('authmgr','lblSelType')) %></td>
        </tr>
        </thead >
        <tbody >
        <tr>
          <td rowspan="2">
            <select name="avlType" id="avlType" style="WIDTH: 90px" multiple size="5">
            <% _.each(data.avlType, function(type, index) { %>
              <option value=<%= type %>><%= show(typeLang[type]) %></option>
            <% }); %>
            </select>
          </td>
          <td class=right>
            <%= ButtonTransferDisabled('btnAdd', 'btnRem') %>
          </td>
          <td rowspan="2" class=right>
            <select name="selType" id="selType" style="WIDTH: 90px" multiple size="5">
            <% _.each(data.selType, function(type, index) { %>
              <option value=<%= type %>><%= show(typeLang[type]) %></option>
            <% }); %>
            </select>
          </td>
        </tr>
        </tbody >
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('authmgr','lblMethod')) %></th>
      <td class="formContentTD">
        <table>
        <thead>
        <tr>
          <td class='ctrlSpacing'><%= LabelTopMulti(lang('authmgr','lblAvailMethod')) %></td>
          <td class='ctrlSpacing'></td>
          <td class='ctrlSpacing right'><%= LabelTopMulti(lang('authmgr','lblSelMethod')) %></td>
        </tr>
        </thead >
        <tbody >
        <tr>
          <td rowspan="2">
            <select name="avlMethod" id="avlMethod" style="WIDTH: 90px" multiple size="5">
            <% _.each(data.avlMethod, function(method, index) { %>
              <option value=<%= method %>><%= show(methodLang[method]) %></option>
            <% }); %>
            </select>
          </td>
          <td class=right>
            <%= ButtonTransferDisabled('btnAdd2', 'btnRem2') %>
          </td>
          <td rowspan="2" class=right>
            <select name="selMethod" id="selMethod" style="WIDTH: 90px" multiple size="5">
            <% _.each(data.selMethod, function(method, index) { %>
              <option value=<%= method %>><%= show(methodLang[method]) %></option>
            <% }); %>
            </select>
          </td>
        </tr>
        </tbody >
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('authmgr','lblGuestVlan')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('guest', data.guest) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('authmgr','lblVlanAssign')) %></th>
      <td class="formContentTD">
        <%=  RadioGroup('vlanAssign', data.vlanAssign, [0,lang('authmgr','lblVlanAssignDisable')],[1,lang('authmgr','lblVlanAssignReject')],[2,lang('authmgr','lblVlanAssignStatic')]) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
