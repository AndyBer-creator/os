<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var selVal;
var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlGetPortList('port');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_authmgrPortEdit'), urlGetSelSouce())).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();

        that.infiMaxLogin();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'click #infiMaxLogin':'infiMaxLogin',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_authmgrPortEdit'), formDataGet('setform'));
  },
  infiMaxLogin: function(){
    if (IsCheckboxChecked('infiMaxLogin'))
      DisableInputText('maxLogin');
    else
      EnableInputText('maxLogin');
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validRange('maxHost',data.min_maxHost,data.max_maxHost);
    valid &= validRange('timeReauth',data.min_timeReauth,data.max_timeReauth);
    valid &= validRange('timeInact',data.min_timeInact,data.max_timeInact);
    valid &= validRange('timeQuiet',data.min_timeQuiet,data.max_timeQuiet);
    valid &= validRange('txPeriod',data.min_txPeriod,data.max_txPeriod);
    valid &= validRange('suppTimeout',data.min_suppTimeout,data.max_suppTimeout);
    valid &= validRange('srvTimeout',data.min_srvTimeout,data.max_srvTimeout);
    valid &= validRange('maxReq',data.min_maxReq,data.max_maxReq);
    valid &= validRange('maxLogin',data.min_maxLogin,data.max_maxLogin);
    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('authmgr','titAuthmgrEditPortSetting')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('portList',selVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('authmgr','lblPortCtrl')) %></th>
      <td class="formContentTD">
        <%=  RadioGroup('ctrl', data.ctrl, [0,lang('authmgr','lblPortCtrlDisabled')], [1,lang('authmgr','lblPortCtrlForceAuth')],[2,lang('authmgr','lblPortCtrlForceUnauth')],[3,lang('authmgr','lblPortCtrlAuto')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('authmgr','lblReauth')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('reauth', data.reauth) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('authmgr','lblMaxHost')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit("maxHost", data.maxHost) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.min_maxHost,data.max_maxHost,data.dflt_maxHost])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <%= ShowFormTitle(lang('authmgr','lblCommonTimer')) %>
    <tr>
      <th><%= LabelLeft(lang('authmgr','lblTimerReauth')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit("timeReauth", data.timeReauth) %></td>
          <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.min_timeReauth,data.max_timeReauth,data.dflt_timeReauth])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('authmgr','lblTimerInact')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit("timeInact", data.timeInact) %></td>
          <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.min_timeInact,data.max_timeInact,data.dflt_timeInact])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('authmgr','lblTimerQuiet')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit("timeQuiet", data.timeQuiet) %></td>
          <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.min_timeQuiet,data.max_timeQuiet,data.dflt_timeQuiet])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <%= ShowFormTitle(lang('authmgr','lblDot1xParam')) %>
    <tr>
      <th><%= LabelLeft(lang('authmgr','lblTxPeriod')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit("txPeriod", data.txPeriod) %></td>
          <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.min_txPeriod,data.max_txPeriod,data.dflt_txPeriod])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('authmgr','lblSuppTimeout')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit("suppTimeout", data.suppTimeout) %></td>
          <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.min_suppTimeout,data.max_suppTimeout,data.dflt_suppTimeout])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('authmgr','lblSrvTimeout')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit("srvTimeout", data.srvTimeout) %></td>
          <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.min_srvTimeout,data.max_srvTimeout,data.dflt_srvTimeout])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('authmgr','lblMaxReq')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit("maxReq", data.maxReq) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.min_maxReq,data.max_maxReq,data.dflt_maxReq])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <%= ShowFormTitle(lang('authmgr','lblWebParam')) %>
    <tr>
      <th rowspan=2><%= LabelLeft(lang('authmgr','lblLoginAttempt')) %></th>
      <td class="formContentTD">
        <%= Checkbox('infiMaxLogin', lang('authmgr','lblInfinite'), (data.maxLogin == 0) ? true : false) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit("maxLogin", (data.maxLogin == 0) ? data.dflt_maxLogin : data.maxLogin) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.min_maxLogin,data.max_maxLogin,data.dflt_maxLogin])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
