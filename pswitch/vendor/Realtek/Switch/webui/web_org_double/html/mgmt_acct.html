<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();
fileLoad("../js/spin.js", "js");

var data;
var valid = true;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_mgmtAcct')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    'click #btnDel':'del'
  },
  add:function(e){
    OpenDialog('mgmt_acctAdd.html');
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    OpenDialog(urlParamAppend('mgmt_acctEdit.html', 'user', encodeURIComponent(GetTableSelectVal())));
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_mgmtAcctDel'), urlDataGen(GetTableMultiSelectVals('user')));
  }
});

mainFrame = new mainView();
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('sys','titUserAccountTable')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('sys','lblUserName') %></th>
    <th><%= lang('sys','lblPriv') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.users)) { %>
  <% _.each(data.users, function(entry, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(entry.user) %></td>
    <td class="StringCell"><%= show(entry.user) %></td>
    <td class="StringCell">
    <% if (1 === entry.priv) { %>
    <%= lang('sys','lblPrivTypeUser') %>
    <% } else if (15 === entry.priv) { %>
    <%= lang('sys','lblPrivTypeAdmin') %>
    <% } else { %>
    <%= entry.priv %>
    <% } %>
    </td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>

<%= TableFoot(ButtonGroupAddEditDel('btnAdd', 'btnEdit', 'btnDel')) %>

</form>
</script>
</body>
</html>
