<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_snmpEngineID')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
        that.userdflt();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    'click [name=userDef]':'userdflt',
    'click #btnDel':'del'
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_snmpEngineID'), formDataGet('setform'));
  },
  checkValid: function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validSnmpEngineId('engineId');
    return valid;
  },
  add:function(e){
    OpenDialog('mgmt_snmp_engineIDAdd.html');
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    OpenDialog(urlParamAppend('mgmt_snmp_engineIDEdit.html', 'srvHost', GetTableSelectVal('idx')));
  },
  userdflt:function(){
      if (IsCheckboxChecked('userDef'))
      {
        EnableInputText('engineId');
      }
      else
      {
        DisableInputText('engineId');
      }
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_snmpEngineIDDel'), urlDataGen(GetTableMultiSelectVals('srvHost')));
  }
});

EnterKeyEvent('edit');
mainFrame = new mainView();
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <%= ShowFormTitle(lang('snmp','lbllocalEngineID')) %>
    <tr>
      <th rowspan='2'><%= LabelLeft(lang('snmp','lblEngineID')) %></th>
      <td class="formContentTD">
        <%= Checkbox('userDef', lang('common', 'lblUserDefined'), data.userDefState) %>
      </td>
    </tr>

    <tr>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextHex('engineId', data.engineId, data.maxlen_engineId) %></td>
            <td class="right"><%= LabelHint(lang('common','txtHexRangeArg',[data.minlen_engineId,data.maxlen_engineId])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

<%= TableHead(lang('snmp','titRemtEngineID')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('common','lblSrvIPHost') %></th>
    <th><%= lang('snmp','lblEngineID') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.engines)) { %>
  <% _.each(data.engines, function(entry, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(entry.srvHost) %></td>
    <td class="StringCell"><%= show(entry.srvHost) %></td>
    <td class="StringCell"><%= entry.engineId %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>

<%= TableFoot(ButtonGroupAddEditDel('btnAdd', 'btnEdit','btnDel')) %>

</form>
</script>
</body>
</html>
