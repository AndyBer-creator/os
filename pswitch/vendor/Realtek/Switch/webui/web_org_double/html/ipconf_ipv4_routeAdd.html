<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var tmpHidden = true;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_ipconfIpv4RouteAdd')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;

        that.routeTypeChg();
        that.maskTypeChg();
      }
    });
  },
  events: {
    'change [name=routeType]':'routeTypeChg',
    'change [name=maskType]':'maskTypeChg',
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  routeTypeChg: function() {
    if ('reject' == GetRadioVal('routeType')) {
      DisableInputText('nextHop');
      DisableInputText('metric');
    } else {
      EnableInputText('nextHop');
      EnableInputText('metric');
    }
  },
  maskTypeChg: function() {
    if ('network' == GetRadioVal('maskType')) {
      DisableInputText('plen');
      EnableInputText('mask');
    } else {
      DisableInputText('mask');
      EnableInputText('plen');
    }
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_ipconfIpv4RouteAdd'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validIPv4Addr('addr', false, false, true);
    valid &= validIPv4Mask('mask');
    valid &= validRange('plen', 0, 32);
    valid &= validIPv4Addr('nextHop');
    valid &= validRange('metric', data.metric_min, data.metric_max);
    return valid;
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<%= DialogHead(lang('ipconf','titAddIPv4Route')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblIPAddr'),'lblIPAddr') %></th>
      <td class="formContentTD">
        <%= InputTextIPv4('addr') %>
      </td>
    </tr>
    <tr>
      <th rowspan=2><%= LabelLeft(lang('ipconf','lblMask'),'lblMask') %></th>
      <td class='formContentTD'>
        <table><tr>
          <td><input type=radio name="maskType" value="network" checked></td>
          <td style="width:80px" class="right"><%= Label(lang('ipconf','lblNetworkMask'), 'lblNetworkMask') %></td>
          <td class="right"><%= InputTextIPv4('mask') %></td>
        </tr></table>
      </td>
    </tr>
    <tr>
      <td class='formContentTD'>
        <table><tr>
          <td><input type=radio name="maskType" value="plen"></td>
          <td style="width:80px" class="right"><%= Label(lang('ipconf','lblPrefixLength'), 'lblPrefixLength') %></td>
          <td class="right">
            <%= InputTextDigit('plen', '', 2) %>
            <%= LabelHint(lang('common','txtRangeArg',[0, 32])) %>
          </td>
        </tr></table>
      </td>
    </tr>
<% if (!tmpHidden) { %>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblRouteType')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('routeType','remote',['reject',lang('ipconf','txtReject')],['remote',lang('ipconf','txtRemote')]) %>
      </td>
    </tr>
<% } %>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblNextHopAddr'),'lblNextHopAddr') %></th>
      <td class="formContentTD">
        <%= InputTextIPv4('nextHop') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblMetric'),'lblMetric') %></th>
      <td class="formContentTD">
        <%= InputTextDigit('metric',data.metric_dflt,3) %>
        <%= LabelHint(lang('common','txtRangeArgDefault',[data.metric_min,data.metric_max,data.metric_dflt])) %>
    </tr>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
