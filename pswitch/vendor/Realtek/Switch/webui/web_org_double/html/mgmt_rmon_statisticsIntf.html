<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var data;
var portVal;
var time = 0;
var interval;

function reload()
{
  mainFrame.render();
}

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    if (urlParamGetByName('port').length != 0)
      portVal = urlGetPortList('port');
    else
      CloseDialog();

    this.render();
  },
  render: function() {
    var that = this;
    var urlFinal = urlAppend(url('get_mgmtRmonStatsIntf'), urlGetSelSouce());
    urlFinal = urlParamAppend(urlFinal, 'time', time);
    dataGet(urlFinal).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'click #btnRefresh':'refresh',
    'click #btnClear':'clear',
    'click #btnClose':'close',
    'click [name=refreshRate]':'refreshRate'
  },
  refresh:function(e){
    this.render();
  },
  clear:function(e){
    dataSet(url('set_mgmtRmonStatsClear'), formDataGet('setform'), true);
  },
  close: function() {
    CloseDialog();
  },
  refreshRate: function(e) {
    time = GetRadioVal('refreshRate');
    clearInterval(interval);

    if (0 != time)
      interval = setInterval(reload, time * 1000);
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('rmon','txtRmonStatisticsIntf')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD" id="port">
        <%= portVal %>
        <%= InputHidden('portList',portVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('common', 'lblRefreshRate')) %></th>
      <td class="formContentTD">
      <%= RadioGroup('refreshRate',time,[0,lang('common','lblRefreshRateNone')],[5,lang('common','lblRefreshRate5s')],[10,lang('common','lblRefreshRate10s')],[30,lang('common','lblRefreshRate30s')]) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('rmon','lblBytesRec')) %></th>
      <td class="formContentTD" id="byteRec">
        <%= data.bytesRec %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblDropEvents')) %></th>
      <td class="formContentTD" id="dropEvents">
        <%= data.dropEvents %>
      </td>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblPktsRec')) %></th>
      <td class="formContentTD" id="pktsRec">
        <%= data.pktsRec %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblBPktsRec')) %></th>
      <td class="formContentTD" id="bPktsRec">
        <%= data.bPktsRec %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblMPktsRec')) %></th>
      <td class="formContentTD" id="mPktsRec">
        <%= data.mPktsRec %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblCRCAlignErr')) %></th>
      <td class="formContentTD" id="CRCAlignErr">
        <%= data.CRCAlignErr %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblUndersizePkts')) %></th>
      <td class="formContentTD" id="undersizePkts">
        <%= data.undersizePkts %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblOversizePkts')) %></th>
      <td class="formContentTD" id="oversizePkts">
        <%= data.oversizePkts %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblFragments')) %></th>
      <td class="formContentTD" id="fragments">
        <%= data.fragments %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblJabbers')) %></th>
      <td class="formContentTD" id="jabbers">
        <%= data.jabbers %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblCollisions')) %></th>
      <td class="formContentTD" id="collisions">
        <%= data.collisions %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblFrames64B')) %></th>
      <td class="formContentTD" id="frames64B">
        <%= data.frames64B %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblFrames65127B')) %></th>
      <td class="formContentTD" id="frames65127B">
        <%= data.frames65127B %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblFrames128255B')) %></th>
      <td class="formContentTD" id="frames128255B">
        <%= data.frames128255B %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblFrames256511B')) %></th>
      <td class="formContentTD" id="frames256511B">
        <%= data.frames256511B %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblFramesOver1024B')) %></th>
      <td class="formContentTD" id="gramesOver1024B">
        <%= data.framesOver1024B %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroup(ButtonClear('btnClear'),ButtonRefresh('btnRefresh'),ButtonClose('btnClose'))) %>
</form>
</script>
</body>
</html>
