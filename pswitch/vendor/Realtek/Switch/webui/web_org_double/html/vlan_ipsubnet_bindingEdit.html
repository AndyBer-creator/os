<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var port;
var gid;
var vlan;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var key = urlParamGetByName('idx');
    var strTok = key.split("_");
    port = getPortId(strTok[0]);
    gid = strTok[1];
    vlan = strTok[2];

    this.$el.html(this.template());
    PagePostInit();
    DisableSelect('mbrs');
    DisableSelect('gid');
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
    {
      EnableSelect('mbrs');
      EnableSelect('gid');
      dataSet(url('set_vlanIpsubnetBinding'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validVlanRange('vlan');
    return valid;
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('vlanprotocol','titPVEditBinding')) %>
<%= InputHidden('mbrs', port) %>
<%= InputHidden('gid', gid) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
         <%= port %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vlanprotocol','lblPVGroup')) %></th>
      <td class="formContentTD">
        <%= gid %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('common','lblVLAN')) %></th>
      <td class="formContentTD">
        <%= InputTextDigit('vlan', vlan, 4, 10) %>
        <%= LabelHint(lang('common','txtRangeArg',[1, 4094])) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
