<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_secDosprop')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        that.tcpMinHdrSize();
        that.ipv6MinFragment();
        that.smurfAttack();
        that.ipPingMaxSize();
        data = resp.data;

        that.updateCharsUsed();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
	'click #ipv4PingMaxSize':'ipPingMaxSize',
	'click #ipv6PingMaxSize':'ipPingMaxSize',
    'click #tcpMinHdrSize':'tcpMinHdrSize',
    'click #ipv6MinFragment':'ipv6MinFragment',
    'click #smurfAttack':'smurfAttack',
    'blur input[type=text]':'checkValid'
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_secDosprop'), formDataGet('setform'));
    }
  },
  ipPingMaxSize:function(e){
    if (IsCheckboxChecked('ipv4PingMaxSize')||IsCheckboxChecked('ipv6PingMaxSize'))
      EnableInputText('pingMaxSizeSetting');
    else
      DisableInputText('pingMaxSizeSetting');
  },
  tcpMinHdrSize:function(e){
    if (IsCheckboxChecked('tcpMinHdrSize'))
      EnableInputText('tcpMinHdrSizeByte');
    else
      DisableInputText('tcpMinHdrSizeByte');
  },
  ipv6MinFragment:function(e){
    if (IsCheckboxChecked('ipv6MinFragment'))
      EnableInputText('ipv6MinFragmentByte');
    else
      DisableInputText('ipv6MinFragmentByte');
  },
  smurfAttack:function(e){
    if (IsCheckboxChecked('smurfAttack'))
      EnableInputText('smurfAttackNetmaskLen');
    else
      DisableInputText('smurfAttackNetmaskLen');
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validRange('pingMaxSizeSetting',data.pingMaxSizeSetting_min,data.pingMaxSizeSetting_max);
    valid &= validRange('ipv6MinFragmentByte',data.ipv6MinFragmentByte_min,data.ipv6MinFragmentByte_max);
    valid &= validRange('tcpMinHdrSizeByte',data.tcpMinHdrSizeByte_min,data.tcpMinHdrSizeByte_max);
    valid &= validRange('smurfAttackNetmaskLen',data.smurfAttackNetmaskLen_min,data.smurfAttackNetmaskLen_max);
    return valid;
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('dos','lblPod')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('pod', data.pod) %>
      </td>
    </tr>    <tr>
      <th><%= LabelLeft(lang('dos','lblLand')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('land', data.land) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('dos','lblUdpBlat')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('udpBlat', data.udpBlat) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('dos','lblTcpBlat')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('tcpBlat', data.tcpBlat) %>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <tr>
      <th><%= LabelLeft(lang('dos','lblDmacEqSmac')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('dmacEqSmac', data.dmacEqSmac) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('dos','lblNullScanAttack')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('nullScanAttack', data.nullScanAttack) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('dos','lblXMasScanAttack')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('xMasScanAttack', data.xMasScanAttack) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('dos','lblTcpSynFinAttack')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('tcpSynFinAttack', data.tcpSynFinAttack) %>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <tr>
      <th><%= LabelLeft(lang('dos','lblTcpSynRstAttack')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('tcpSynRstAttack', data.tcpSynRstAttack) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('dos','lblIcmpFragment')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('icmpFragment', data.icmpFragment) %>
      </td>
    </tr>
    <tr>
      <th rowspan='2'><%= LabelLeft(lang('dos','lblTcpSynSport')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%=  CheckboxTxtEnable('tcpSynSport', data.tcpSynSport) %></td>
        </tr>
        </table>
        <tr>
          <td class="formContentTD"><%= LabelHint(lang('dos','txtTcpSynSport')) %></td>
        </tr>
      </td>
    </tr>
    <tr>
      <th rowspan='2'><%= LabelLeft(lang('dos','lblTcpFragmentOffset')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%=  CheckboxTxtEnable('tcpFragmentOffset', data.tcpFragmentOffset) %></td>
        </tr>
        </table>
        <tr>
          <td class="formContentTD"><%= LabelHint(lang('dos','txtTcpFragmentOffset')) %></td>
        </tr>
      </td>
    </tr>
    <%= ShowFormContentGap() %>

    <tr>
     <th rowspan='3'><%= LabelLeft(lang('dos','lblPingMaxSizeSetting')) %></th>
      <td class="formContentTD">
        <%=  Checkbox('ipv4PingMaxSize', lang('dos','lblipv4PingMaxSizeEnable'), data.ipv4PingMaxSize) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%=  Checkbox('ipv6PingMaxSize', lang('dos','lblipv6PingMaxSizeEnable'), data.ipv6PingMaxSize) %>
      </td>
	</tr>
    <tr>
      <td class="formContentTD">
		<%= InputTextDigit("pingMaxSizeSetting", data.pingMaxSizeSetting, 20) %>
  		<class="right"><%= LabelHint(lang('common','txtUnitRangeArgDefault',[lang('dos','lblByte'), data.pingMaxSizeSetting_min,data.pingMaxSizeSetting_max,data.pingMaxSizeSetting_dflt])) %>
      </td>
	</tr>

    <tr>
     <th rowspan='2'><%= LabelLeft(lang('dos','lblTcpMinHdrSize')) %></th>
       <td class="formContentTD">
         <%=  CheckboxTxtEnable('tcpMinHdrSize', data.tcpMinHdrSize) %>
       </td>
    </tr>
    <tr>
	  <td class="formContentTD">
		<%= InputTextDigit("tcpMinHdrSizeByte", data.tcpMinHdrSizeByte, 20) %>
  		<class="right"><%= LabelHint(lang('common','txtUnitRangeArgDefault',[lang('dos','lblByte'), data.tcpMinHdrSizeByte_min,data.tcpMinHdrSizeByte_max,data.tcpMinHdrSizeByte_dflt])) %>
	  </td>
	</tr>

    <tr>
     <th rowspan='2'><%= LabelLeft(lang('dos','lblIpv6MinFragment')) %></th>
       <td class="formContentTD">
         <%=  CheckboxTxtEnable('ipv6MinFragment', data.ipv6MinFragment) %>
       </td>
    </tr>
    <tr>
	  <td class="formContentTD">
		<%= InputTextDigit("ipv6MinFragmentByte", data.ipv6MinFragmentByte, 20) %>
  		<class="right"><%= LabelHint(lang('common','txtUnitRangeArgDefault',[lang('dos','lblByte'), data.ipv6MinFragmentByte_min,data.ipv6MinFragmentByte_max,data.ipv6MinFragmentByte_dflt])) %>
	  </td>
	</tr>

    <tr>
     <th rowspan='2'><%= LabelLeft(lang('dos','lblSmurfAttack')) %></th>
       <td class="formContentTD">
         <%=  CheckboxTxtEnable('smurfAttack', data.smurfAttack) %>
       </td>
    </tr>
    <tr>
	  <td class="formContentTD">
		<%= InputTextDigit("smurfAttackNetmaskLen", data.smurfAttackNetmaskLen, 20) %>
  		<class="right"><%= LabelHint(lang('common','txtUnitRangeArgDefault',[lang('dos','lblNetmaskLen'), data.smurfAttackNetmaskLen_min,data.smurfAttackNetmaskLen_max,data.smurfAttackNetmaskLen_dflt])) %>
	  </td>
	</tr>

    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

</form>
</script>
</body>
</html>
