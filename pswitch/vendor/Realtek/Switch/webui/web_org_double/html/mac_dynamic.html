<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_macDynamic')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        if (isIE() && isIE() < 9 && !IsUndefOrNull(data.entries) && data.entries.length > 2000)
        {
          $('.dataTable').find('tbody').find('tr').each(function(idx){
            if (idx % 2 == 0) {
              $(this).prop('className','odd');
            } else {
              $(this).prop('className','even');
            }
          });
          _top.progressDisable();
        }
        else
        {
          PagePostInit();
        }
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnAddToStatic':'addToStatic',
    'click #btnRefresh':'refresh',
    'blur input:text':'checkValid'
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validRange('aging_time', data.aging_time_min, data.aging_time_max);
    return valid;
  },
  apply:function() {
    if (this.checkValid()) {
      dataSet(url('set_macDynamicAging'), formDataGet('setform'));
    }
  },
  refresh:function(){
    this.render();
  },
  addToStatic:function(e){
    if(!CheckTableEdit(e.currentTarget.id))
      return;
    dataSet(url('set_macDynamicToStatic'), urlDataGen(GetTableMultiSelectVals('i')));
  }
});

mainFrame = new mainView();
EnterKeyEvent('refresh');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('mac','lblAgingTime')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("aging_time", data.aging_time) %></td>
            <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.aging_time_min,data.aging_time_max,data.aging_time_dflt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>


<%= TableHead(lang('mac','titDynamicAddressTable')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('common','lblVLAN') %></th>
    <th><%= lang('mac','lblMac') %></th>
    <th><%= lang('common','lblPort') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.entries)) { %>
  <% _.each(data.entries, function(entry, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(entry.key) %></td>
    <td class="NumberCell"><%= entry.vlan %></td>
    <td class="StringCell"><%= entry.macAddr %></td>
    <td class="StringCell"><%= entry.port %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>

<%= TableFoot(ButtonGroup(ButtonRefresh('btnRefresh'), Button(lang('mac','lblAddToStatic'),'btnAddToStatic'))) %>
</form>
</script>
</body>
</html>
