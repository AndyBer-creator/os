<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

var mode =
[
    "lang('udld', 'lblUdldPortDisable')",
    "lang('udld', 'lblUdldPortNormal')",
    "lang('udld', 'lblUdldPortAggresive')"
];

var bistate =
[
    "lang('udld', 'lblUdldBiState_0')",
    "lang('udld', 'lblUdldBiState_1')",
    "lang('udld', 'lblUdldBiState_2')",
    "lang('udld', 'lblUdldBiState_3')",
    "lang('udld', 'lblUdldBiState_4')",
    "lang('udld', 'lblUdldBiState_5')"
];

var operstate =
[
    "lang('udld', 'lblUdldOperState_0')",
    "lang('udld', 'lblUdldOperState_1')",
    "lang('udld', 'lblUdldOperState_2')",
    "lang('udld', 'lblUdldOperState_3')",
    "lang('udld', 'lblUdldOperState_4')",
    "lang('udld', 'lblUdldOperState_5')",
    "lang('udld', 'lblUdldOperState_6')",
    "lang('udld', 'lblUdldOperState_7')",
    "lang('udld', 'lblUdldOperState_8')",
    "lang('udld', 'lblUdldOperState_9')"
];

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_diagUDLDProp')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnEdit':'edit',
    'blur input[type=text]':'checkValid'
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_diagUDLDProp'), formDataGet('setform'));
  },
  edit:function(e){
    if(!CheckTableEdit())
      return;
    OpenDialog(urlAppend('diag_udld_portEdit.html', GetTableMultiSelectVals('port')));
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validRange('msgTime', data.minMsgTime, data.maxMsgTime);
    return valid;
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('udld','lblUdldMsgTime')) %></th>
      <td class="formContentTD">
        <%= InputTextDigit('msgTime', data.msgTime, 2) %>
        <%= LabelHint(lang('common','txtSecRangeArgDefault',[data.minMsgTime, data.maxMsgTime, data.defMsgTime])) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

<%= TableHead(lang('udld','titUdldPortSettingTable')) %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('port','lblEntryNo') %></th>
    <th><%= lang('port','lblPort') %></th>
    <th><%= lang('udld','lblPortMode') %></th>
    <th><%= lang('udld','lblUdldBidirectionalState') %></th>
    <th><%= lang('udld','lblUdldOperState') %></th>
    <th><%= lang('udld','lblUdldNeighbors') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="StringCell"><%= show(mode[port.mode]) %></td>
    <td class="StringCell"><%= show(bistate[port.bistate]) %></td>
    <td class="StringCell"><%= show(operstate[port.operState]) %></td>
    <td class="StringCell"><%= port.neighbors %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonEdit('btnEdit')) %>
</form>
</script>
</body>
</html>
