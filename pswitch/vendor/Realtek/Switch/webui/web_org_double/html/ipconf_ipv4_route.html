<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var routeType = [
      "txtDefault",
      "txtDHCP",
      "txtDirectlyConnected",
      "txtStatic",
	  "txtRip",
	  "txtRipng",
	  "txtOspf",
	  "txtOspf6",
	  "txtIsis",
	  "txtBgp"
    ];

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_ipconfIpv4Route')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    'click #btnDel':'del'
  },

  add:function(e){
    OpenDialog('ipconf_ipv4_routeAdd.html');
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    OpenDialog(urlParamAppend('ipconf_ipv4_routeEdit.html', 'route', GetTableSelectVal()));
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_ipconfIpv4RouteDel'), urlDataGen(GetTableMultiSelectVals('route')));
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('ipconf','lblIPv4RouteTable')) %>
<table class="dataTable" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('ipconf','lblDstIPPrefix') %></th>
    <th><%= lang('ipconf','lblPrefixLength') %></th>
    <th><%= lang('ipconf','lblRouteType') %></th>
    <th><%= lang('ipconf','lblNextHopAddr') %></th>
    <th><%= lang('ipconf','lblMetric') %></th>
    <th><%= lang('ipconf','lblAdminDistance') %></th>
    <th><%= lang('ipconf','lblOutIntf') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.route)) { %>
  <% _.each(data.route, function(route, idx) { %>
  <tr>
    <td class="StringCell"><%= route.type == 3 ? TableCheckbox(route.dip+'_'+route.plen+'_'+route.nextHop) : TableCheckboxDisable(route.dip+'_'+route.plen+'_'+route.nextHop) %></td>
    <td class="StringCell"><%= show(route.dip) %></td>
    <td class="NumberCell"><%= route.plen %></td>
    <td class="StringCell"><%= ('0.0.0.0'==route.dip) ? show(lang('ipconf', routeType[0])) : show(lang('ipconf', routeType[route.type])) %></td>
    <td class="StringCell"><%= !IsUndefOrNull(route.nextHop) ? route.nextHop : '' %></td>
    <td class="NumberCell"><%= !IsUndefOrNull(route.metric) ? route.metric : '' %></td>
    <td class="NumberCell"><%= !IsUndefOrNull(route.adminDistance) ? route.adminDistance : '' %></td>
    <td class="StringCell"><%= show(route.intf) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); } %>
</tbody>
</table>
<%= TableFoot(ButtonGroupAddEditDel('btnAdd', 'btnEdit', 'btnDel')) %>
</form>
</script>
</body>
</html>
