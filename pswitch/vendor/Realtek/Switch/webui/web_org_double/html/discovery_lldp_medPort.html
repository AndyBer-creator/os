<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_discoveryLldpMedPort')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'click #btnEdit':'edit'
  },
  edit:function(e){
    if(!CheckTableEdit())
      return;
    OpenDialog(urlAppend('discovery_lldp_medPortEdit.html', GetTableMultiSelectVals('port')));
  }
});

mainFrame = new mainView();

EnterKeyEvent('edit');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('lldp','lblLLDPMEDPortSettingTable')) %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th rowspan=2><%= TableCheckboxAll() %></th>
    <th rowspan=2><%= lang('port','lblEntryNo') %></th>
    <th rowspan=2><%= lang('port','lblPort') %></th>
    <th rowspan=2><%= lang('lldp','lblLLDPMEDStatus') %></th>
    <th colspan=2><%= lang('lldp','lblUserDefinedNetworkPolicy') %></th>
    <th rowspan=2><%= lang('lldp','lblLocation') %></th>
    <th rowspan=2><%= lang('lldp','lblInventory') %></th>
    <%= TableLastTh(2) %>
  </tr>
  <tr>
    <th><%= lang('lldp','lblActive') %></th>
    <th><%= lang('lldp','lblApp') %></th>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="BinaryCell"><%= lang('common',(port.medStatus)?'txtEnabled':'txtDisabled') %></td>
    <td class="BinaryCell"><%= lang('lldp',(port.active)?'lblYes':'lblNo') %></td>
    <td class="StringCell">
      <% if (!IsUndefOrNull(port.apps)) { %>
      <% _.each(port.apps, function(entry,idx){ %>
      <%= show(entry.app) %>
      <%= (port.apps.length != (idx + 1)) ? ',' : '' %>
      <% }); }%>
    </td>
    <td class="BinaryCell"><%= lang('lldp',(port.location)?'lblYes':'lblNo') %></td>
    <td class="BinaryCell"><%= lang('lldp',(port.inventory)?'lblYes':'lblNo') %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonEdit('btnEdit')) %>
</form>
</script>
</body>
</html>
