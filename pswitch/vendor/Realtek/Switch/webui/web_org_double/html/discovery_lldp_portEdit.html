<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var selVal;
var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlGetPortList('port');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_discoveryLldpPortEdit'), urlGetSelSouce())).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'change #avaiOpts':'mbrSelected',
    'change #selOpts':'mbrSelected',
    'click #btnAdd':'mbrSelected',
    'click #btnRem':'mbrSelected',
    'change #avaiVlans':'vlanSelected',
    'change #selVlans':'vlanSelected',
    'click #btnAddVlan':'vlanSelected',
    'click #btnRemVlan':'vlanSelected'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    MultiSelectApplySelect('selOpts');
    dataMultiSelectVlanList('selVlans');
    dataSet(url('set_discoveryLldpPortEdit'), formDataGet('setform'));
    MultiSelectDeselectAll('selOpts', 'avaiOpts');
  },
  mbrSelected: function(e) {
    MultiSelectTransferUpdate(e.currentTarget.id, 'btnAdd', 'btnRem', 'avaiOpts', 'selOpts');
  },
  vlanSelected: function(e) {
    MultiSelectTransferUpdate(e.currentTarget.id, 'btnAddVlan', 'btnRemVlan', 'avaiVlans', 'selVlans');
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('lldp','titEditLLDPPortSettings')) %>
<%= InputHidden('vlanList', '') %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('portList',selVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblAdminStatus')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('adminStatus',data.adminStatus,['tx',lang('lldp','lblTxOnly')],['rx',lang('lldp','lblRxOnly')],['txrx',lang('lldp','lblTxAndRx')],['disable',lang('common','txtDisable')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblTLVs')) %></th>
      <td class="formContentTD">
        <table>
        <thead>
        <tr>
          <td class='ctrlSpacing'><%= LabelTopMulti(lang('lldp','lblAvailableOptionTLVs')) %></td>
          <td class='ctrlSpacing'></td>
          <td class='ctrlSpacing right'><%= LabelTopMulti(lang('lldp','lblSelOptionTLVs')) %></td>
        </tr>
        </thead >
        <tbody >
        <tr>
          <td rowspan="2">
            <select name="avaiOpts" id="avaiOpts" style="WIDTH: 180px" multiple size="5">
            <% _.each(data.availTlvs, function(entry, idx) { %>
              <option value=<%= entry.val %>><%= show(entry.tlv)  %></option>
            <% }); %>
            </select>
          </td>
          <td valign="middle" class=right>
            <%= ButtonTransferDisabled('btnAdd', 'btnRem') %>
          </td>
          <td rowspan="2" class=right>
            <select name="selOpts" id="selOpts" style="WIDTH: 180px" multiple size="5">
            <% _.each(data.selTlvs, function(entry, index) { %>
              <option value=<%= entry.val %>><%= show(entry.tlv) %></option>
            <% }); %>
            </select>
          </td>
        </tr>
        </tbody >
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblVLANTLV')) %></th>
      <td class="formContentTD">
        <table>
        <thead>
        <tr>
          <td class='ctrlSpacing'><%= LabelTopMulti(lang('common','lblAvailableVlan')) %></td>
          <td class='ctrlSpacing'></td>
          <td class='ctrlSpacing right'><%= LabelTopMulti(lang('common','lblSelVlan')) %></td>
        </tr>
        </thead >
        <tbody >
        <tr>
        <td rowspan="2">
          <select name="avaiVlans" id="avaiVlans" style="WIDTH: 180px" multiple size="5">
          <% _.each(data.avaVlans, function(vlan, index) { %>
            <option value=<%= vlan.id %>><%= vlan.name %></option>
          <% }); %>
          </select>
        </td>
        <td class=right>
          <%= ButtonTransferDisabled('btnAddVlan', 'btnRemVlan') %>
        </td>
        <td rowspan="2" class=right>
          <select name="selVlans" id="selVlans" style="WIDTH: 180px" multiple size="5">
          <% _.each(data.selVlans, function(vlan, index) { %>
            <option value=<%= vlan.id %>><%= vlan.name %></option>
          <% }); %>
          </select>
        </td>
        </tr>
        </tbody >
        </table>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
