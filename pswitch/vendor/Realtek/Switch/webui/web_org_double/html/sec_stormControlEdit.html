<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var selVal;
var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlGetPortList('port');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_secStormControlEdit'), urlGetSelSouce())).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_secStormControlEdit'), formDataGet('setform'));
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validRange('broadcast',data.min_rate, data.max_rate);
    valid &= validRange('unknownMC',data.min_rate, data.max_rate);
    valid &= validRange('unknownUC',data.min_rate, data.max_rate);

    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('storm','titStormEditPortSetting')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('portList',selVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('storm','lblState')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('state', data.state) %>
      </td>
    </tr>

    <tr>
      <th rowspan='2'><%= LabelLeft(lang('storm','lblBroadcast')) %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('bcEnable', data.bcEnable) %>
      </td>
    </tr>
    <tr>
    <td class="formContentTD">
    <%= InputTextDigit("broadcast", data.broadcast) %>
      <class="right"><%= LabelHint(lang('common','txtUnitRangeArgDefault',[(data.unit ? lang('storm','txtbps') : lang('storm','txtpps')),data.min_rate,data.max_rate, data.dflt_rate])) %>
    </td>
    </tr>

    <tr>
     <th rowspan='2'><%= LabelLeft(lang('storm','lblUnknownMul')) %></th>
       <td class="formContentTD">
         <%= CheckboxTxtEnable('umcEnable', data.umcEnable) %>
       </td>
    </tr>
    <tr>
    <td class="formContentTD">
    <%= InputTextDigit("unknownMC", data.unknownMC) %>
      <class="right"><%= LabelHint(lang('common','txtUnitRangeArgDefault',[(data.unit ? lang('storm','txtbps') : lang('storm','txtpps')),data.min_rate,data.max_rate, data.dflt_rate])) %>
    </td>
    </tr>
    <tr>
     <th rowspan='2'><%= LabelLeft(lang('storm','lblUnknownUni')) %></th>
       <td class="formContentTD">
         <%= CheckboxTxtEnable('uncEnable', data.uncEnable) %>
       </td>
    </tr>
    <tr>
    <td class="formContentTD">
    <%= InputTextDigit("unknownUC", data.unknownUC) %>
      <class="right"><%= LabelHint(lang('common','txtUnitRangeArgDefault',[(data.unit ? lang('storm','txtbps') : lang('storm','txtpps')),data.min_rate,data.max_rate, data.dflt_rate])) %>
    </td>
    </tr>
    <th><%= LabelLeft(lang('storm','lblAction')) %></th>
    <td class="formContentTD">
      <%= RadioGroup('action',data.action,[0,lang('storm','txtDrop')],[1,lang('storm','txtShutdown')]) %>
    </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
