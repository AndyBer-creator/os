<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var selIntf;
var first = true;
var refresh = true;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    if (urlParamGetByName('intf').length != 0)
      selIntf = urlParamGetByName('intf');
    else
      CloseDialog();
    this.render();
  },
  render: function() {
    var that = this;
    if (!refresh)
        return;
    dataGet(urlParamAppend(url('get_ipconfIpv4IntfEdit'),'intf',selIntf)).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;

        that.addrTypeChg();
        first = false;
      }
    });
  },
  events: {
    'change [name=addrType]':'addrTypeChg',
    'change [name=maskType]':'maskTypeChg',

    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  addrTypeChg: function() {
    if (1 == GetRadioVal('addrType')) {
      DisableLabel('lblIPAddr');
      DisableLabel('lblMask');
	  DisableLabel('lblRoles');
      DisableInputText('addr');
      DisableInputText('mask');
      DisableInputText('plen');
      DisableLabel('lblNetworkMask');
      DisableLabel('lblPrefixLength');
      DisableRadio('maskType', 'network');
      DisableRadio('maskType', 'plen');
	  DisableRadio('addrRoles');
    } else {
      EnableLabel('lblIPAddr');
      EnableLabel('lblMask');
	  EnableLabel('lblRoles');
      EnableInputText('addr');
      EnableLabel('lblNetworkMask');
      EnableLabel('lblPrefixLength');
      EnableRadio('maskType', 'network');
      EnableRadio('maskType', 'plen');
	  EnableRadio('addrRoles');
      this.maskTypeChg();
    }
    if (!first)
      this.checkValid();
  },
  maskTypeChg: function() {
    if ('network' == GetRadioVal('maskType')) {
      DisableInputText('plen');
      EnableInputText('mask');
    } else {
      DisableInputText('mask');
      EnableInputText('plen');
    }
    this.checkValid();
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      refresh = false;
      dataSet(url('set_ipconfIpv4IntfEdit'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validIPv4Addr('addr');
    valid &= validIPv4Mask('mask');
    valid &= validRange('plen', 8, 30);
    return valid;
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<%= DialogHead(lang('ipconf','titEditIPv4Intf')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblIntf')) %></th>
      <td class="formContentTD"> <%= data.intf %>
      <%= InputHidden('intf', data.intf) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblAddressType')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('addrType',data.type,[1,lang('ipconf','txtDynamic')],[0,lang('ipconf','txtStatic')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblIPAddr'),'lblIPAddr') %></th>
      <td class="formContentTD">
        <%= InputTextIPv4('addr', data.addr) %>
      </td>
    </tr>
    <tr>
      <th rowspan=2><%= LabelLeft(lang('ipconf','lblMask'),'lblMask') %></th>
      <td class='formContentTD'>
        <table><tr>
          <td><input type=radio name="maskType" value="network" checked></td>
          <td style="width:80px" class="right"><%= Label(lang('ipconf','lblNetworkMask'), 'lblNetworkMask') %></td>
          <td class="right"><%= InputTextIPv4('mask',data.mask) %></td>
        </tr></table>
      </td>
    </tr>
    <tr>
      <td class='formContentTD'>
        <table><tr>
          <td><input type=radio name="maskType" value="plen"></td>
          <td style="width:80px" class="right"><%= Label(lang('ipconf','lblPrefixLength'), 'lblPrefixLength') %></td>
          <td class="right">
            <%= InputTextDigit('plen', data.plen, 2) %>
            <%= LabelHint(lang('common','txtRangeArg',[8, 30])) %>
          </td>
        </tr></table>
      </td>
    </tr>
	<tr>
	  <th><%= LabelLeft(lang('ipconf','lblRoles'),'lblRoles') %></th>
	  <td class="formContentTD">
	    <%= RadioGroup('addrRoles', 1,[1,lang('ipconf','txtIpPrimary')], [0,lang('ipconf','txtIpSub')]) %>
	  </td>
	</tr>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
