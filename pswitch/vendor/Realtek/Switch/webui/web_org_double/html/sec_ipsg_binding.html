<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();
fileLoad("../js/spin.js", "js");

var data;
var valid = true;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_secIpsgBinding')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'change #btnAdd':'add',
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    'click #btnDel':'del'
  },
  add:function(e){
    OpenDialog('sec_ipsg_bindingAdd.html');
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    OpenDialog(urlParamAppend('sec_ipsg_bindingEdit.html', 'idx', GetTableSelectVal('idx')));
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_secIpsgBindingDel'), urlDataGen(GetTableMultiSelectVals('idx')));
  }
});

mainFrame = new mainView();
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('ipsg','titIPSGBinding')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('port','lblPort') %></th>
    <th><%= lang('common','lblVLAN') %></th>
    <th><%= lang('ipsg','lblMACAddr') %></th>
    <th><%= lang('ipsg','lblIPAddr') %></th>
    <th><%= lang('ipsg','lblIPSGBinding') %></th>
    <th><%= lang('ipsg','lblType') %></th>
    <th><%= lang('ipsg','lblLeaseTime') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.entry)) { %>
  <% _.each(data.entry, function(entry, idx) { %>
  <tr>
    <td class="StringCell">
    <input type="checkbox"  name="selEntry" id=<%= "selEntry_"+ idx %> value=<%= entry.port + "_" + entry.mac + "_" + entry.vlan + "_" + entry.ip + "_" + entry.ipmask %> <%= entry.type ? "disabled" : "" %>></input>
    </td>
    <td class="StringCell"><%= getPortId(entry.port) %></td>
    <td class="NumberCell"><%= entry.vlan %></td>
    <td class="StringCell"><%= (entry.mac.length == 0 ? lang('common','lblNA') : entry.mac) %></td>
    <td class="StringCell"><%= entry.ip + " / " + entry.ipmask %></td>
    <td class="StringCell"><%= (entry.mac.length == 0 ? lang('ipsg','lblIPPort') : lang('ipsg','lblIPMacPort')) %></td>
    <td class="BinaryCell"><%= (entry.type ? lang('ipsg','lblTypeDynamic') : lang('ipsg','lblTypeStatic')) %></td>
    <td class="StringCell"><%= (entry.type ? entry.time : lang('common','lblNA')) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>

<%= TableFoot(ButtonGroupAddEditDel('btnAdd', 'btnEdit', 'btnDel')) %>

</form>
</script>
</body>
</html>
