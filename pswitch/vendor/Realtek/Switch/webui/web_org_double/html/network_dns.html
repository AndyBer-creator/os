<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init()
{
  fileLoadWait();

var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_networkDns')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data = resp.data;
        that.$el.html( that.template(resp));
        tblDataAry = data.dnss;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnAdd':'add',
    'click #btnDel':'del'
  },
  apply: function() {
    var hostname = $('#hostname').val();

    if (0 != hostname.length && !checkDns(hostname))
    {
      ShowStatusWarning(lang('error', 'errDNSDomainErr'));
      return;
    }

    dataSet(url('set_networkDns'), formDataGet('setform'));
  },
  add: function(e) {
    OpenDialog('network_dnsAdd.html');
  },
  del: function(e) {
    if (GetTableMultiSelectNum() == 0)
    {
      //ShowStatusWarning("No entry selected");
	  ShowStatusWarning(lang('common','tipNoEntrySelected'));
      return;
    }

    dataSet(url('set_networkDnsDel'), formDataGet('setform'));
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>
<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('dns','titDnsConf')) %>
<table>
  <tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('dns','txtDnsStatus')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('state', data.state, [0, lang('common','txtDisable')], [1, lang('common','txtEnable')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('dns','txtDnsDftName')) %></th>
      <td class="formContentTD">
        <%= InputTextHost("hostname", data.hostname, 255) %>
        <span class="argHelp"><%= lang('dns','txtDnsDftNameLimit') %></span>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
 </tr>
</table>
<%= ButtonGroupApply('btnApply') %>

<%= TableHead(lang('dns','titDnsSrvConf')) %>
<table class="dataTable" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('dns','txtPreference') %></th>
    <th><%= lang('dns','txtDnsServer') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.dnss)) { %>
  <% _.each(data.dnss, function(dns, idx) { %>
  <tr>
    <td class="StringCell">
    <input type="checkbox"  name="dnss" id=<%= "dnss_"+ dns.idx %> value="<%= dns.idx %>"></input>
    </td>
    <td class="StringCell"><%= dns.pref + 1%></td>
    <td class="NumberCell"><%= dns.ip %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>
<%= TableFoot(ButtonGroupAddDel('btnAdd', 'btnDel')) %>
</form>
</script>
</body>
</html>
