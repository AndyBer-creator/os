<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var selVal;
var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlGetPortList('port');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_stpIntfEdit'), urlGetSelSouce())).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_stpIntfEdit'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validRange('pathcost',data.pathcost_min,data.pathcost_max);
    return valid;
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('stp','titStpIntfEdit')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('portList',selVal) %>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <tr>
      <th><%= LabelLeft(lang('stp','lblState')) %></th>
      <td class="formContentTD">
        <%= Checkbox('enable',lang('common','txtEnable'),data.enable) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortPathCost')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("pathcost", data.pathcost, 9) %></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArg',[data.pathcost_min,data.pathcost_max])) %> (0 = Auto)</td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortPriority')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td>
              <select name="pri" id="pri">
              <% for(i = data.pri_min; i <= data.pri_max; i+= 16){ %>
              <option value=<%= i %> <%= i === data.pri ? "selected" : "" %>><%= i %></option>
              <% } %>
              </select>
            </td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortEdge')) %></th>
      <td class="formContentTD">
        <!--<%= Checkbox('edge',lang('common','txtEnable'),data.edge) %>-->
        <%= RadioGroup('edge',data.edge,['auto',lang('common','txtAuto')],['enable',lang('common','txtEnable')],['disable',lang('common','txtDisable')]) %>
      </td>
    </tr>
<!--#ifdef CONFIG_SYS_STP_BPDU_FILTER-->
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortBpduFilter')) %></th>
      <td class="formContentTD">
        <%= Checkbox('bpduFilter',lang('common','txtEnable'),data.bpduFilter) %>
      </td>
    </tr>
<!--#endif-->
<!--#ifdef CONFIG_SYS_STP_BPDU_GUARD-->
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortBpduGuard')) %></th>
      <td class="formContentTD">
        <%= Checkbox('bpduGuard',lang('common','txtEnable'),data.bpduGuard) %>
      </td>
    </tr>
<!--#endif-->
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortP2P')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('p2p',data.p2p,['auto',lang('common','txtAuto')],['enable',lang('common','txtEnable')],['disable',lang('common','txtDisable')]) %>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortState')) %></th>
      <td class="formContentTD">
        <%= !IsUndefOrNull(data.state) ? show(data.state) : lang('common','txtDisable') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortDesignatedBridge')) %></th>
      <td class="formContentTD">
        <%= !IsUndefOrNull(data.desgBridge) ? data.desgBridge : lang('common','lblNA') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortDesignatedPortId')) %></th>
      <td class="formContentTD">
        <%= !IsUndefOrNull(data.desgPortId) ? data.desgPortId : lang('common','lblNA') %>
      </td>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortDesignatedCost')) %></th>
      <td class="formContentTD">
        <%= data.desgCost %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortEdgeOper')) %></th>
      <td class="formContentTD">
        <%= data.edge_oper ? lang('stp','lblTrue') : lang('stp','lblFalse') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblPortP2POper')) %></th>
      <td class="formContentTD">
        <%= data.p2p_oper ? lang('stp','lblTrue') : lang('stp','lblFalse') %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>

</body>
</html>
