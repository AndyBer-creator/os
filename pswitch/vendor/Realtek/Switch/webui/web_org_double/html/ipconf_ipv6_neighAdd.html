<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_ipconfIpv6NeighAdd')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    var flag = true;
    if (this.checkValid())
    {
      var ip = $('#ipv6').val();
      _.each(parent.data.entries, function(entry, idx)
      {
        if (ip == entry.ipv6 && entry.static)
        {
          if (flag)
            ShowStatusError("Entry already exists");
          flag = false;
        }
      });

      if (flag)
        dataSet(url('set_ipconfIpv6NeighAdd'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validIPv6Addr('ipv6');
    valid &= validMacAddr('mac', true);
    return valid;
  }
});
mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<%= DialogHead(lang('ipconf','titAddIPv6Neigh')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblIntf')) %></th>
      <td class="formContentTD">
        <table><tr>
          <td class="right"><%= lang('common','lblVLAN') %></td>
          <td class="right"><%= SelectArry('vlan', data.vlan) %></td>
        </tr></table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblIPAddr')) %></th>
      <td class="formContentTD">
        <%= InputTextIPv6('ipv6') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblMacAddr')) %></th>
      <td class='formContentTD'>
        <%= InputTextMac('mac') %>
      </td>
    </tr>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
