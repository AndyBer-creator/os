<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var selVal;
var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlGetPortList('port');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_vlanPortEdit'), urlGetSelSouce())).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
<!--#ifdef CONFIG_SYS_VLAN_QINQ-->
        that.mode();
        that.uplink();
<!--#endif-->
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'click input[name=mode]':'mode',
<!--#ifdef CONFIG_SYS_VLAN_QINQ-->
    'click input[name=uplink]':'uplink',
<!--#endif-->
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_vlanPortEdit'), formDataGet('setform'));
  },
  mode: function() {
<!--#ifdef CONFIG_SYS_VLAN_QINQ-->
      DisableCheckbox('uplink');
      DisableSelect('tpid');
<!--#endif-->

    if (0 == GetRadioVal('mode')) // hybrid
    {
      EnableRadioGroup('accFrameType');
      EnableCheckbox('ingressFilter');
    }
    else
    {
      DisableRadioGroup('accFrameType');
      DisableCheckbox('ingressFilter');

<!--#ifdef CONFIG_SYS_VLAN_QINQ-->
      if (2 == GetRadioVal('mode')) // trunk
      {
        EnableCheckbox('uplink');
        this.uplink();
      }
<!--#endif-->
    }
  },
<!--#ifdef CONFIG_SYS_VLAN_QINQ-->
  uplink: function() {
      if (IsCheckboxChecked('uplink'))
        EnableSelect('tpid');
      else
        DisableSelect('tpid');
  },
<!--#endif-->
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validRange('pvid',1 ,4094);
    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('vlan','titVLANPortEdit')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('portList',selVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vlan','lblVlanMode')) %></th>
      <td class="formContentTD">
      <%= RadioGroup('mode', data.mode, [0,lang('vlan','lblVlanHybrid')], [1,lang('vlan','lblVlanAccess')], [2,lang('vlan','lblVlanTrunk')]) %>
<!--#ifdef CONFIG_SYS_VLAN_QINQ-->
      <table><tr><td class='radioSpacing'>
      <%= RadioGroup('mode', data.mode, [3,lang('vlan','lblVlanTunnel')]) %>
      </td></tr></table>
<!--#endif-->
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vlan','lblVlanPVID')) %></th>
      <td class="formContentTD">
        <%= InputTextDigit('pvid', data.pvid, 4) %>
        <%= LabelHint(lang('common', 'txtRangeArg', [1, 4094])) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vlan','lblVlanAcceptFrameType')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('accFrameType', data.accFrameType, [0,lang('vlan','lblVlanAll')], [1,lang('vlan','lblVlanTagOnly')], [2,lang('vlan','lblVlanUntagOnly')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vlan','lblVlanIngressFiltering')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('ingressFilter', data.ingressFilter) %>
      </td>
    </tr>
<!--#ifdef CONFIG_SYS_VLAN_QINQ-->
    <tr>
      <th><%= LabelLeft(lang('vlan','lblVlanUplink')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('uplink', data.uplink) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vlan','lblVlanTPID')) %></th>
      <td class="formContentTD">
        <%= Select("tpid", data.tpids, data.tpid) %>
      </td>
    </tr>
<!--#endif-->
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
