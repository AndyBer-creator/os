<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

var violateLang =
[
  "lang('psecure','lblViolateProtect')",
  "lang('psecure','lblViolateRestrict')",
  "lang('psecure','lblViolateShutdown')"
];

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_secPort')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnEdit':'edit'
  },
  apply:function(e){
    dataSet(url('set_secPort'), formDataGet('setform'));
  },
  edit:function(e){
    if(!CheckTableEdit())
      return;
    OpenDialog(urlAppend('sec_portEdit.html', GetTableMultiSelectVals('port')));
  }
});

mainFrame = new mainView();

EnterKeyEvent('edit');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('psecure','lblState')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('state', data.state) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('psecure','lblRateLimit')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit("rateLimit", data.rateLimit, 20) %></td>
          <td class="right"><%= LabelHint(lang('psecure', 'lblPps')) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.rateLimit_min,data.rateLimit_max,data.rateLimit_dflt])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

<%= TableHead(lang('psecure','titSettingTable')) %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('port','lblEntryNo') %></th>
    <th><%= lang('port','lblPort') %></th>
    <th><%= lang('psecure','lblState') %></th>
    <th><%= lang('psecure','lblAddrLimit') %></th>
    <th><%= lang('psecure','lblTotalAddr') %></th>
    <th><%= lang('psecure','lblConfigAddr') %></th>
    <th><%= lang('psecure','lblViolateNum') %></th>
    <th><%= lang('psecure','lblViolateAction') %></th>
    <th><%= lang('psecure','lblSticky') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="BinaryCell"><%= (port.state ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>
    <td class="NumberCell"><%= port.addrLimit %></td>
    <td class="NumberCell"><%= port.total %></td>
    <td class="NumberCell"><%= port.config %></td>
    <td class="NumberCell"><%= port.violateNum %></td>
    <td class="StringCell"><%= show(violateLang[port.violate]) %></td>
    <td class="BinaryCell"><%= (port.sticky ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonEdit('btnEdit')) %>
</form>
</script>
</body>
</html>
