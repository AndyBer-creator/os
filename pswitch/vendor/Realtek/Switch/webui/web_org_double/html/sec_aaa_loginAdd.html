<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_secAaaLoginAdd')).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
    {
      dataSet(url('set_secAaaLoginAdd'), formDataGet('setform'));
    }
  },
  checkValid: function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validString('list');
    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('aaa','titAddLoginList')) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('aaa','lblListName')) %></th>
      <td class="formContentTD">
        <%= InputText('list','',data.maxlen_list) %>
      </td>
    </tr>
  <% for (var i = 0; i < data.methods.length - 2; i++) { %>
    <tr>
      <th><%= LabelLeft(lang('aaa','lblMethod', [i + 1])) %></th>
      <td class="formContentTD">
        <% for (var j = 0; j < data.methods.length; j++) { %>
          <%= Radio("method"+i, show(data.methods[j].name), data.methods[j].val, (data.methods[j].val == 0)) %>
        <% } %>
      </td>
    </tr>
  <% } %>
    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
