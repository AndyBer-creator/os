<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var targetVal = 0;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render(url('get_mcastGroup'));
  },
  render: function(_url) {
    var that = this;
    dataGet(_url).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        targetVal = get_mcast_ipVersion(_url);
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    'click #btnRefresh':'refresh',
    <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    'change #target':'selTarget',
    <!--#endif-->
    'click #btnDel':'del'
  },
  add:function(e){
     OpenDialog('mcast_general_groupAdd.html');
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    OpenDialog(urlParamAppend('mcast_general_groupEdit.html', 'idx', GetTableSelectVal('idx')));
  },
  del:function(e){
    dataSet(url('set_mcastGroupDel'), urlDataGen(GetTableMultiSelectVals('idx')));
  },
  <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
  selTarget:function(e){
    var urlFinal = url('get_mcastGroup');
    targetVal = GetSelectVal('target');
    urlFinal = mcastUrl_append_ipVer(urlFinal,targetVal);
    this.render(urlFinal);
  },
  <!--#endif-->
  refresh:function(e){
    var urlFinal = url('get_mcastGroup');
    urlFinal = mcastUrl_append_ipVer(urlFinal,targetVal);
    this.render(urlFinal);
  }
});

EnterKeyEvent('refresh');
mainFrame = new mainView();
mainFrameGetUrl = urlParamAppend(url('get_mcastGroup'), 'ipType', targetVal);
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('mcast','lblMcastGrpTable')) %>

<!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
<table>
<tr>
    <td><%= lang('common','lblIPVersion') %></td>
    <td class="right">
    <select name="target" id="target">
       <option value=0 <%= (targetVal === 0) ? "selected" : "" %>><%= lang('mcast','txtIPv4') %></option>
       <option value=1 <%= (targetVal === 1) ? "selected" : "" %>><%= lang('mcast','txtIPv6') %></option>
    </select>
    </td>
    </tr>
</table>
<br>
<!--#endif-->
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('common','lblVLAN') %></th>
    <th><%= lang('mcast','lblMcastGroupAddr') %></th>
    <th><%= lang('mcast','lblMemberPort') %></th>
    <th><%= lang('mcast','lblType') %></th>
    <th><%= lang('mcast','lblLifeSec') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.groups)) { %>
  <% _.each(data.groups, function(group, idx) { %>
    <tr>
      <td class="StringCell"><%= (1 == group.typeStatic) ?  TableCheckbox(group.idx):TableCheckboxDisable(group.idx) %></td>
      <td class="NumberCell"><%= group.vid %></td>
      <td class="StringCell"><%= group.addr %></td>
      <td class="StringCell"><%= showList(group.mbrPort) %></td>
      <td class="StringCell"><%= str2var(group.type) %></td>
      <td class="NumberCell"><%= group.lifeTime %></td>
      <%= TableLastTd() %>
    </tr>
  <% }); } %>
</tbody>
</table>

<%= TableFoot(ButtonGroup(ButtonAdd('btnAdd'),ButtonEdit('btnEdit'),ButtonDel('btnDel') , ButtonRefresh('btnRefresh'))) %>
</form>
</script>
</body>
</html>
