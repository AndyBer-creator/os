<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var selVal;
var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlGetPortList('port');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_discoveryLldpMedPortEdit'), urlGetSelSouce())).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'change #avaiOpts':'mbrSelected',
    'change #selOpts':'mbrSelected',
    'click #btnAdd':'mbrSelected',
    'click #btnRem':'mbrSelected',
    'change #avaiPolicies':'policySelected',
    'change #selPolicies':'policySelected',
    'click #btnAddPolicy':'policySelected',
    'click #btnRemPolicy':'policySelected',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      MultiSelectApplySelect('selOpts');
      MultiSelectApplySelect('selPolicies');
      dataSet(url('set_discoveryLldpMedPortEdit'), formDataGet('setform'));
      MultiSelectDeselectAll('selOpts', 'avaiOpts');
      MultiSelectDeselectAll('selPolicies', 'avaiPolicies');
    }
  },
  mbrSelected: function(e) {
    MultiSelectTransferUpdate(e.currentTarget.id, 'btnAdd', 'btnRem', 'avaiOpts', 'selOpts');
  },
  policySelected: function(e) {
    MultiSelectTransferUpdate(e.currentTarget.id, 'btnAddPolicy', 'btnRemPolicy', 'avaiPolicies', 'selPolicies');
  },
  checkValid: function(e){
    valid = true;
    clearAllErrMsg();
    valid &= validHexPair('coordinate',16);
    valid &= validHexPair('civic',6,160);
    valid &= validHexPair('ecs',10,25);
    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('lldp','titEditLLDPMEDPortSettings')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('portList',selVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblLLDPMEDStatus')) %></th>
      <td class="formContentTD">
        <%= Checkbox('medStatus',lang('common','txtEnable'),data.medStatus) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblTLVs')) %></th>
      <td class="formContentTD">
        <table>
        <thead>
        <tr>
          <td class='ctrlSpacing'><%= LabelTopMulti(lang('lldp','lblAvailableOptionTLVs')) %></td>
          <td class='ctrlSpacing'></td>
          <td class='ctrlSpacing right'><%= LabelTopMulti(lang('lldp','lblSelOptionTLVs')) %></td>
        </tr>
        </thead >
        <tbody >
        <tr>
          <td rowspan="2">
            <select name="avaiOpts" id="avaiOpts" style="WIDTH: 185px" multiple size="5">
            <% _.each(data.avaiTlvs, function(entry, idx) { %>
              <option value=<%= entry.val %>><%= show(entry.tlv)  %></option>
            <% }); %>
            </select>
          </td>
          <td valign="middle" class=right>
            <%= ButtonTransferDisabled('btnAdd', 'btnRem') %>
          </td>
          <td rowspan="2" class=right>
            <select name="selOpts" id="selOpts" style="WIDTH: 185px" multiple size="5">
            <% _.each(data.selTlvs, function(entry, index) { %>
              <option value=<%= entry.val %>><%= show(entry.tlv) %></option>
            <% }); %>
            </select>
          </td>
        </tr>
        </tbody >
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblNetworkPolicy')) %></th>
      <td class="formContentTD">
        <table>
        <thead>
        <tr>
          <td class='ctrlSpacing'><%= LabelTopMulti(lang('lldp','lblAvailableNetworkPolicies')) %></td>
          <td class='ctrlSpacing'></td>
          <td class='ctrlSpacing right'><%= LabelTopMulti(lang('lldp','lblSelNetworkPolicies')) %></td>
        </tr>
        </thead >
        <tbody >
        <tr>
          <td rowspan="2">
            <select name="avaiPolicies" id="avaiPolicies" style="WIDTH: 185px" multiple size="5">
            <% _.each(data.avaiPolicies, function(entry, idx) { %>
              <option value=<%= entry.policyNum %>><%= entry.policyNum+' ('+show(entry.app)+')' %></option>
            <% }); %>
            </select>
          </td>
          <td rowspan="2" valign="middle" class=right>
            <%= ButtonTransferDisabled('btnAddPolicy', 'btnRemPolicy') %>
          </td>
          <td rowspan="2" class=right>
            <select name="selPolicies" id="selPolicies" style="WIDTH: 185px" multiple size="5">
            <% _.each(data.selPolicies, function(entry, index) { %>
              <option value=<%= entry.policyNum %>><%= entry.policyNum+' ('+show(entry.app)+')' %></option>
            <% }); %>
            </select>
          </td>
        </tr>
        </tbody >
        </table>
      </td>
    </tr>

    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('lldp','lblLocation')) %>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblCoordinates')) %></th>
      <td class="formContentTD">
      	  <%= InputTextHex("coordinate",data.coordinate, 32, 44) %><%= LabelHint(lang('lldp','lbl16PairsHexChars',[data.max_coordinate])) %>
      </td>
	</tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblCivic')) %></th>
      <td class="formContentTD">
      	  <%= InputTextHex("civic",data.civic, 320, 44) %><%= LabelHint(lang('lldp','lbl6to160PairsHexChars',[data.min_civic,data.max_civic])) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblECSELIN')) %></th>
      <td class="formContentTD">
      	  <%= InputTextHex("ecs",data.ecs, 50, 44) %><%= LabelHint(lang('lldp','lbl10to25PairsHexChars',[data.min_ecs,data.max_ecs])) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
