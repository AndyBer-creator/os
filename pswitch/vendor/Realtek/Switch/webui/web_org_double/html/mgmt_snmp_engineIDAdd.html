<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_snmpEngineIDAdd')).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'click input[name=srvDef]':'chgSrvDef',
    'blur input':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
    {
      dataSet(url('set_snmpEngineIDAdd'), formDataGet('setform'));
    }
  },
  chgSrvDef:function(){
    ChageServerInputType('srvHost', GetRadioGroupCheckedVal('srvDef'));
  },
  checkValid: function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validSrvAddr('srvHost', GetRadioGroupCheckedVal('srvDef'));
    valid &= validSnmpEngineId('engineId');
    return valid;
  }
});

EnterKeyEvent('apply');
mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('snmp','titAddRemtEngineID')) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('common','lblSrvAddrType')) %></th>
      <td class="formContentTD">
        <%= RadioGroupSrvAddrType('host','ipv4','ipv6') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('common','lblSrvIPHost')) %></th>
      <td class="formContentTD">
        <%= InputTextHost("srvHost", "", data.maxlen_srvHost) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('snmp','lblEngineID')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextHex('engineId', '', data.maxlen_engineId) %></td>
            <td class="right"><%= LabelHint(lang('common','txtHexRangeArg',[data.minlen_engineId,data.maxlen_engineId])) %></td>
          </tr>
        </table>
      </td>
    </tr>

    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
