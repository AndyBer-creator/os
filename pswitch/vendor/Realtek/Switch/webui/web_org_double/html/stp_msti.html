<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_stpMsti')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'click #btnEdit':'edit'
  },
  edit:function(e){
    if (!CheckTableEdit())
      return;
    OpenDialog(urlParamAppend('stp_mstiEdit.html', 'msti', GetTableSelectVal()));
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('stp','txtMstiTable')) %>
<table class="dataTable" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><img src="../images/empty.gif"/></th>
    <th><%= lang('stp','lblMsti') %></th>
    <th><%= lang('stp','lblPriority') %></th>
    <th><%= lang('stp','lblBridgeId') %></th>
    <th><%= lang('stp','lblRootBridgeId') %></th>
    <th><%= lang('stp','lblRootPort') %></th>
    <th><%= lang('stp','lblRootCost') %></th>
    <th><%= lang('stp','lblRemainingHop') %></th>
    <th><%= lang('common','lblVLAN') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.instances, function(entry, idx) { %>
  <tr>
    <td class="StringCell"><%= TableRadio(idx) %></td>
    <td class="NumberCell"><%= idx %></td>
    <td class="NumberCell"><%= entry.pri %></td>
    <td class="StringCell"><%= !IsUndefOrNull(entry.bridgeId) ? entry.bridgeId : lang('common','lblNA') %></td>
    <td class="StringCell"><%= !IsUndefOrNull(entry.rootBridgeId) ? entry.rootBridgeId : lang('common','lblNA') %></td>
    <td class="StringCell"><%= !IsUndefOrNull(entry.rootPort) ? entry.rootPort : lang('common','lblNA') %></td>
    <td class="NumberCell"><%= entry.rootCost %></td>
    <td class="NumberCell"><%= entry.remainingHop %></td>
    <td class="StringCell"><%= entry.vlans %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonEdit('btnEdit')) %>
</form>
</script>
</body>
</html>
