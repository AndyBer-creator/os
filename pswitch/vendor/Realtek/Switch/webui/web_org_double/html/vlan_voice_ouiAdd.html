<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    this.$el.html(this.template());
    PagePostInit();
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
        dataSet(url('set_vlanVoiceOui'), formDataGet('setform'));
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;

    valid &= validRange('oui1', 0, 0xff, false, false, true);
    valid &= validRange('oui2', 0, 0xff, false, false, true);
    valid &= validRange('oui3', 0, 0xff, false, false, true);
    valid &= validString('desp', false, false, true);

    if (parseInt($('#oui1').val(),16) & 0x1)
    {
      //ShowStatusWarning(" OUI MAC must be unicast");
	  ShowStatusWarning(lang('sysError','errVoiceOUImcast'));
      return false;
    }

    if (!IsUndefOrNull(parent.data.ouis))
    {
      for (var i = 0 ; i < parent.data.ouis.length; i++)
      {
        if ((parent.data.ouis[i].oui1 == $('#oui1').val().toUpperCase()) &&
              (parent.data.ouis[i].oui2 == $('#oui2').val().toUpperCase()) &&
              (parent.data.ouis[i].oui3 == $('#oui3').val().toUpperCase()))
        {
          //ShowStatusWarning("Voice VLAN OUI entry is exist in database");
		  ShowStatusWarning(lang('sysError','errVoiceOUIexist'));
          return;
        }
      }
    }

    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('vlanvoice','titVVOUIAdd')) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('vlanvoice','lblVVOUIAddress')) %></th>
      <td class="formContentTD">
        <%= InputTextHex('oui1', '' , 2, 1) %>&#32;:&#32;
        <%= InputTextHex('oui2', '' , 2, 1) %>&#32;:&#32;
        <%= InputTextHex('oui3', '' , 2, 1) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vlanvoice','lblVVDescription')) %></th>
      <td class="formContentTD">
        <%= InputText('desp', '', parent.data.maxlen, parent.data.maxlen) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
