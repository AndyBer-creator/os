<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_portLAGPort')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'click #btnEdit':'edit'
  },
  edit:function(e){
    if(!CheckTableEdit())
      return;
    OpenDialog(urlAppend('port_lag_portEdit.html', GetTableMultiSelectVals('port')));
  }
});

mainFrame = new mainView();

EnterKeyEvent('edit');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('lag','titLAGPortTbl')) %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th>LAG</th>
    <th><%= lang('port','lblPortType') %></th>
    <th><%= lang('port','lblDescription') %></th>
    <th><%= lang('port','lblAdminStatus') %></th>
    <th><%= lang('port','lblOperStatus') %></th>
    <th><%= lang('port','lblSpeed') %></th>
    <th><%= lang('port','lblDuplex') %></th>
    <th><%= lang('port','lblFlowCtrl') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="StringCell"><%= 'LAG '+getLagId(idx) %></td>
    <td class="StringCell"><%= !IsUndefOrNull(port.type) ? show(port.type) : "" %></td>
    <td class="StringCell"><%= show(port.descp) %></td>
    <td class="BinaryCell"><%= (port.adminStatus ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>
    <td class="BinaryCell"><%= (port.operStatus ? lang('port','txtUp') : lang('port','txtDown')) %></td>
    <td class="StringCell"><%= show(port.adminSpeed) + (IsUndefOrNull(port.operSpeed) ? '' : ' (' + show(port.operSpeed) + ')') %></td>
    <td class="StringCell"><%= show(port.adminDuplex) + (IsUndefOrNull(port.operDuplex) ? '' : ' (' + show(port.operDuplex) + ')') %></td>
    <td class="StringCell"><%= show(port.adminFlowCtrl) + (IsUndefOrNull(port.operFlowCtrl) ? '' : ' (' + (port.operFlowCtrl ? lang('common','txtEnabled') : lang('common','txtDisabled')) + ')') %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonEdit('btnEdit')) %>
</form>
</script>
</body>
</html>
