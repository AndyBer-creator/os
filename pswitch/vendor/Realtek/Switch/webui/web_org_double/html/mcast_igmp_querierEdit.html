<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();
var selVal ;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlParamGetByName('vlanList');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_mcastIgmpQuerierEdit'), urlGetSelSouce())).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
        that.chgState();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click input[name=qryState]':'chgState',
    'click #btnClose':'close'
  },
  close: function() {
    CloseDialog();
  },
  chgState: function() {
    if(IsCheckboxChecked('qryState'))
    {
      EnableLabel('lblQryVer');
      EnableRadio('querierVer');
    }
    else
    {
      DisableLabel('lblQryVer');
      DisableRadio('querierVer');
    }
  },
  apply: function() {
      dataSet(url('set_mcastIgmpQuerierEdit'), formDataGet('setform'));
  }
});
EnterKeyEvent('apply');
mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('mcast','titQuerierTableEdit')) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('common','lblVLAN')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('vlanList',selVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('mcast','lblMcastState')) %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('qryState', data.qryState) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('mcast','lblIGMPQuerierVersion'),'lblQryVer') %></th>
      <td class="formContentTD">
        <%= RadioGroup('querierVer',data.querierVer,[2,lang('mcast','lblIGMPv2')],[3,lang('mcast','lblIGMPv3')]) %>
      </td>
    </tr>

    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
