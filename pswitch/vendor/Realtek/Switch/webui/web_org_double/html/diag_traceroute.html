<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

var host = '';
var ttl = 0;
var ttlUser = false;
var ch = 0;

var stop = false;
var executing = false;

function getTraceResult()
{
  if (stop)
  {
    stop = false;
    executing = false;
    DisableButton('btnStop');
    EnableButton('btnApply');
    return;
  }

  dataGet(urlParamAppend(url('get_diagTracerouteResult'),'traceResultLen',ch)).fetch({
    success: function(model, resp){
      if (IsUndefOrNull(resp.data.empty))
      {
        $('#result').append(resp.data.traceResult);
        ch += str2int(resp.data.traceResultLen);
      }

      if (resp.data.running)
      {
        executing = true;
        setTimeout(getTraceResult, 900);
      }
      else
      {
        executing = false;
        DisableButton('btnStop');
        EnableButton('btnApply');
      }
    }
  });
}

function setTrace()
{
  var urlFinal = url('set_diagTraceroute');
  var _data = formDataGet('setform');
  var Datas = Backbone.Model.extend({
      url: urlFinal,
      parse: function(resp, xhr){
        if (resp.status == "ok")
        {
          setTimeout(getTraceResult, 1000);
        }
        else
        {
          $('#result').html(lang('diag','txtTraceFailed'));
          DisableButton('btnStop');
          EnableButton('btnApply');
        }
        return;
    }
  });
  var dataModel = new Datas();
  dataModel.save(_data,{});
}

function traceroute()
{
  ch = 0;
  $('#result').html('');

  dataGet(url('get_diagTracerouteRunning')).fetch({
    success: function(model, resp){
      if (resp.data.running)
      {
        ShowStatusNotice(str2var("lang('diag','txtTraceInProgress')"));
        return;
      }
      DisableButton('btnApply');
      EnableButton('btnStop');
      setTrace();
    },
    error: function(model, resp){
      ShowStatusNotice(str2var("lang('diag','txtTraceInProgress')"));
    }
  });
}

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_diagTraceroute')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;

        that.chkTTLUser();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnStop':'stop',
    'click input[name=srvDef]':'chgSrvDef',
    'click input[name=ttlUser]':'chkTTLUser',
    'blur input[type=text]':'checkValid'
  },
  apply: function() {
    if (!IsButtonDisabled('btnApply') && this.checkValid()) {
      host = $('#srvHost').val();
      ttl = $('#ttl').val();
      ttlUser = IsCheckboxChecked('ttlUser') ? true : false;
      traceroute();
    }
  },
  stop: function(){
    if (IsButtonDisabled('btnStop') || !executing)
      return;

    var urlFinal = url('set_diagTracerouteAbort');
    var _data = formDataGet('setform');
    var Datas = Backbone.Model.extend({
      url: urlFinal,
      parse: function(resp, xhr){
        stop = true;
        return;
      }
    });
    var dataModel = new Datas();
    dataModel.save(_data,{});
  },
  chgSrvDef:function(){
    ChageServerInputType('srvHost', GetRadioGroupCheckedVal('srvDef'));
  },
  chkTTLUser:function(){
    if (IsCheckboxChecked('ttlUser'))
    {
      EnableInputText('ttl');
    }
    else
    {
      DisableInputText('ttl');
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validSrvAddr('srvHost', GetRadioGroupCheckedVal('srvDef'));
    valid &= validRange('ttl', data.ttl_min, data.ttl_max);
    return valid;
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('common','lblSrvAddrType')) %></th>
      <td class="formContentTD">
        <%= RadioGroupSrvAddrType('host','ipv4') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('common','lblSrvIPHost')) %></th>
      <td class="formContentTD">
        <%= InputTextHost("srvHost", host, data.host_maxlen) %>
      </td>
    </tr>
    <tr>
      <th rowspan=2><%= LabelLeft(lang('diag','lblTraceTTL')) %></th>
      <td class="formContentTD">
        <%= Checkbox("ttlUser", lang('common','lblUserDefined'), ttlUser) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit("ttl", ttl ? ttl : data.ttl_dflt) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.ttl_min,data.ttl_max,data.ttl_dflt])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<table class="formButtons">
  <tr><tbody>
    <td><%= ButtonShort(lang('common','btnApply'), 'btnApply') %></td>
    <td><%= ButtonShort(lang('diag','btnStop'), 'btnStop', true) %></td>
  </tbody></tr>
</table>

<%= TableHead(lang('diag','lblTraceResult')) %>
<br>

<table style="width:100%">
<tr>
  <td><textarea cols="96" rows="16" name="result" id="result" readonly></textarea></td>
</tr>
</table>
</form>
</script>
</body>
</html>
