<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_qosQueue')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
        that.refreshWeight();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click input':'refreshWeight',
    'blur input':'refreshWeight'
  },
  apply:function(e){
    var invalidQueue = "'";
    var invalidVal = false;
    var invalidEmpty = false;
    for (i = 1; i <= 8; i++)
    {
      if($('#wrr_'+i).prop('checked'))
      {
        var weightVal = $('#weight_'+i).val();
        if (weightVal.length == 0) {
          invalidEmpty = true;
          if (invalidQueue.length == 1)
            invalidQueue += i;
          else
            invalidQueue += ', '+i;
        }
        else if (weightVal < 1 || weightVal > 127) {
          invalidVal = true;
          if (invalidQueue.length == 1)
            invalidQueue += i;
          else
            invalidQueue += ', '+i;
        }
      }
    }

    if (invalidVal) {
      invalidQueue += "'";
      status_print('error',"lang('qos','errQueueWeightValue',["+invalidQueue+"])");
    } else if (invalidEmpty) {
      invalidQueue += "'";
      status_print('error',"lang('qos','errQueueWeightEmpty',["+invalidQueue+"])");
    } else {
      dataSet(url('set_qosQueue'), formDataGet('setform'), 'status_container');
    }
  },
  refreshWeight:function(e){
    var sum = 0;
    var checkedQueue = 0;
    var checkedType = '';
    var percent;
    var isWrrInvalid = false;
    if (IsUndefOrNull(e))
    {
      checkedQueue = 0;
      checkedType='sp';
    }
    else
    {
      var strTok = e.currentTarget.id.split("_");
      checkedQueue = str2int(strTok[1]);
      checkedType = strTok[0];
    }
    for (i = 1; i <= 8; i++)
    {
      if (checkedQueue != 0)
      {
        if (checkedType == 'sp' && (i >= checkedQueue || checkedQueue == 2))
        {
          DisableInputText('weight_'+i);
          $('#wrr_'+i).prop('checked', false);
          $('#sp_'+i).prop('checked', true);
        }
        else if (checkedType == 'wrr' && (i <= checkedQueue || i == 2))
        {
          EnableInputText('weight_'+i);
          $('#wrr_'+i).prop('checked', true);
          $('#sp_'+i).prop('checked', false);
        }
      }
      else
      {
        if(!$('#wrr_'+i).prop('checked'))
          DisableInputText('weight_'+i);
      }

      if($('#wrr_'+i).prop('checked'))
        sum += str2int($('#weight_'+i).val());
    }

    for (i = 1; i <= 8; i++)
    {
      if($('#wrr_'+i).prop('checked'))
      {
        var weightVal = $('#weight_'+i).val();
        if (weightVal < 1 || weightVal > 127) {
          isWrrInvalid = true;
        }
      }
    }

    for (i = 1; i <= 8; i++)
    {
      if($('#wrr_'+i).prop('checked'))
      {
        if (true == isWrrInvalid) {
          $('#percent_'+i).html(lang('common','lblNA'));
        } else {
          percent= Math.round(parseFloat($('#weight_'+i).val())/sum * 10000)/100.00;
          $('#percent_'+i).html(percent+'%');
        }
      }
      else
      {
        $('#percent_'+i).html('');
      }
    }
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('qos','titQueueTable')) %>
<table class="dataTable func" cellpadding="0" cellspacing="0">
<thead>
<tr>
  <th rowspan="2" id="lblQueue"><%= lang('qos','lblQueue') %></th>
  <th colspan="4" id="lblSched"><%= lang('qos','lblScheduleMethod') %></th>
  <%= TableLastTh(2) %>
</tr>
<tr>
  <th><%= lang('qos','lblStrictPriority') %></th>
  <th><%= lang('qos','lblWrr') %></th>
  <th><%= lang('qos','lblWrrWeight') %></th>
  <th><%= lang('qos','lblWrrBandwidthPercent') %></th>
</tr>
</thead>
<tbody>
  <% _.each(data.queues, function(queue, idx) { %>
    <tr>
      <td class='NumberCell'><%= queue.qid %></td>
      <td><input type="radio" name=<%= "type_"+queue.qid %> id=<%= "sp_"+queue.qid %> value=<%= queue.qid %> <%= (queue.type=="sp")?"checked":"" %>></td>
      <td><input type="radio" name=<%= "type_"+queue.qid %> id=<%= "wrr_"+queue.qid %> value=<%= queue.qid %> <%= (queue.type=="wrr")?"checked":"" %>></td>
      <td><input type="text" digitonly name=<%= "weight_"+queue.qid %> id=<%= "weight_"+queue.qid %> size=3 maxlen=3 value=<%= queue.weight %>></td>
      <td><span id=<%= "percent_"+queue.qid %>></span></td>
      <%= TableLastTd() %>
    </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonApply('btnApply')) %>
</form>
</script>
</body>
</html>
