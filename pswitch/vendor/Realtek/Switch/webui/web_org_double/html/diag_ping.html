<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

var stop = false;
var executing = false;

function setPing()
{
  var urlFinal = url('set_diagPing');
  var _data = formDataGet('setform');
  var Datas = Backbone.Model.extend({
      url: urlFinal,
      parse: function(resp, xhr){
        if (resp.status == "ok")
        {
          setTimeout(getPingResult, 1000);
        }
        else
        {
          $('#status').html(lang('diag','lblPingUH'));
          DisableButton('btnStop');
          EnableButton('btnApply');
        }
        return;
    }
  });
  var dataModel = new Datas();
  dataModel.save(_data,{});
}

function ping()
{
  $('#status').html(lang('diag','lblPingRun'));
  $('#tx').html("0");
  $('#rx').html("0");
  $('#loss').html("0 %");
  $('#min').html("0 " + lang('diag','lblPingMs'));
  $('#max').html("0 " + lang('diag','lblPingMs'));
  $('#avg').html("0 " + lang('diag','lblPingMs'));

  dataGet(url('get_diagPingRunning')).fetch({
    success: function(model, resp){
      if (resp.data.running)
      {
        ShowStatusNotice(str2var("lang('diag','txtPingInProgress')"));
        return;
      }
      DisableButton('btnApply');
      EnableButton('btnStop');
      setPing();
    },
    error: function(model, resp){
      ShowStatusNotice(str2var("lang('diag','txtPingInProgress')"));
    }
  });
}

function getPingResult()
{
  if (stop)
  {
    stop = false;
    executing = false;
    DisableButton('btnStop');
    EnableButton('btnApply');
    return;
  }

  dataGet(url('get_diagPingResult')).fetch({
    success: function(model, resp){
      if (IsUndefOrNull(resp.data.empty))
      {
        $('#tx').html(resp.data.tx);
        $('#rx').html(resp.data.rx);
        $('#loss').html(resp.data.loss + " %");
        $('#min').html(resp.data.min + " " + lang('diag','lblPingMs'));
        $('#max').html(resp.data.max + " " + lang('diag','lblPingMs'));
        $('#avg').html(resp.data.avg + " " + lang('diag','lblPingMs'));
      }

      if (resp.data.running)
      {
        executing = true;
        $('#status').html(lang('diag','lblPingRun'));
        setTimeout(getPingResult, 900);
      }
      else
      {
        executing = false;
        DisableButton('btnStop');
        EnableButton('btnApply');

        if (IsUndefOrNull(resp.data.empty))
          $('#status').html((0 == resp.data.status) ? lang('common','msgSuccess') : lang('diag','lblPingTimeout'));
        else
          $('#status').html(lang('diag','lblPingUH'));
      }
    }
  });
}

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_diagPing')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;

        if (data.running)
          ShowStatusNotice(str2var("lang('diag','txtPingInProgress')"));
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnStop':'stop',
    'click input[name=srvDef]':'chgSrvDef',
    'blur input[type=text]':'checkValid'
  },
  apply: function() {
    if (!IsButtonDisabled('btnApply') && this.checkValid()) {
      ping();
    }
  },
  stop: function(){
    if (IsButtonDisabled('btnStop') || !executing)
      return;

    var urlFinal = url('set_diagPingAbort');
    var _data = formDataGet('setform');
    var Datas = Backbone.Model.extend({
      url: urlFinal,
      parse: function(resp, xhr){
        $('#status').html(lang('diag','lblPingAbort'));
        stop = true;
        return;
      }
    });
    var dataModel = new Datas();
    dataModel.save(_data,{});
  },
  chgSrvDef:function(){
    ChageServerInputType('srvHost', GetRadioGroupCheckedVal('srvDef'));
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validSrvAddr('srvHost', GetRadioGroupCheckedVal('srvDef'));
    valid &= validRange('count', data.count_min, data.count_max);
    return valid;
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="status_container"></td></tr>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('common','lblSrvAddrType')) %></th>
      <td class="formContentTD">
        <%= RadioGroupSrvAddrType('host','ipv4','ipv6') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('common','lblSrvIPHost')) %></th>
      <td class="formContentTD">
        <%= InputTextHost("srvHost", "", data.host_maxlen) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('diag','lblPingNum')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit("count", data.count_dflt) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArg',[data.count_min,data.count_max])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<table class="formButtons">
  <tr><tbody>
    <td><%= ButtonShort(lang('diag','btnActivePing'), 'btnApply') %></td>
    <td><%= ButtonShort(lang('diag','btnStop'), 'btnStop', true) %></td>
  </tbody></tr>
</table>

<br>
<%= TableHead(lang('diag','lblPingResult')) %>
<br>

<table>
<tr>
  <td class="formBody">
    <table class="formContent">
      <tbody>
      <%= ShowFormTitle(lang('diag','lblPingPktStatus')) %>
      <tr>
        <th><%= LabelLeft(lang('diag','lblPingStatus')) %></th>
        <td class="formContentTD" id="status"><%= lang('diag', 'lblNA') %></td>
      </tr>
      <tr>
        <th><%= LabelLeft(lang('diag','lblPingTx')) %></th>
        <td class="formContentTD" id="tx"><%= "0" %></td>
      </tr>
      <tr>
        <th><%= LabelLeft(lang('diag','lblPingRx')) %></th>
        <td class="formContentTD" id="rx"><%= "0" %></td>
      </tr>
      <tr>
        <th><%= LabelLeft(lang('diag','lblPingLoss')) %></th>
        <td class="formContentTD" id="loss"><%= "0%" %></td>
      </tr>
      <%= ShowFormContentGap() %>
      <%= ShowFormTitle(lang('diag','lblPingRTT')) %>
      <tr>
        <th><%= LabelLeft(lang('diag','lblPingMinRTT')) %></th>
        <td class="formContentTD" id="min"><%= "0.0 " + lang('diag', 'lblPingMs') %></td>
      </tr>
      <tr>
        <th><%= LabelLeft(lang('diag','lblPingMaxRTT')) %></th>
        <td class="formContentTD" id="max"><%= "0.0 " + lang('diag', 'lblPingMs') %></td>
      </tr>
      <tr>
        <th><%= LabelLeft(lang('diag','lblPingAvgRTT')) %></th>
        <td class="formContentTD" id="avg"><%= "0.0 " + lang('diag', 'lblPingMs') %></td>
      </tr>
      </tbody>
    </table>
  </td>
</tr>
</table>
</form>
</script>
</body>
</html>
