<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var vlan = 4095;
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    if (vlan == 4095)
      var urlFinal = url('get_vlanConf');
    else
     var urlFinal = urlParamAppend(url('get_vlanConf'), 'vlan', vlan);
    dataGet(urlFinal).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp));
        PagePostInit();

        for (var i =0; i < data.ports.length; i++)
        {
            //console.log("Port: " + i + " mode " + data.ports[i].mode + " mem " + data.ports[i].membership);

            SelectRadio('membership_' + i, data.ports[i].membership);

            switch (data.ports[i].mode)
            {
                case 0: // hybrid
                    if (data.vlan == _top.data.defVlan)
                      $('#membership_' + i + '_' + 0).attr('disabled', true); // exclude
                    break;

                case 1: //access
                    $('#membership_' + i + '_' + 0).attr('disabled', true); // exclude
                    $('#membership_' + i + '_' + 2).attr('disabled', true); //tagged
                    break;

                case 2: // trunk
                    if (data.vlan == _top.data.defVlan)
                    {
                      $('#membership_' + i + '_' + 0).attr('disabled', true); // exclude
                      $('#membership_' + i + '_' + 2).attr('disabled', true); // tagged
                    }

                    if (data.ports[i].pvid )
                      $('#membership_' + i + '_' + 2).attr('disabled', true); // exclude

                    break;

                case 3: // tunnel
                    $('#membership_' + i + '_' + 0).attr('disabled', true); // exclude
                    $('#membership_' + i + '_' + 2).attr('disabled', true); //tagged
                    break;

                default:
                    break;
            }
        }
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'change #vlan':'selvlan'
  },
  apply: function() {
    dataSet(url('set_vlanConf'), formDataGet('setform'));
  },
  selvlan:function(e){
    vlan = GetSelectVal('vlan');
    this.render();
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}

function selMembership(port)
{
    //console.log(GetRadioGroupCheckedVal('membership_' + port));
    switch (data.ports[port].mode)
    {
        case 0: // hybird
          if (data.vlan == _top.data.defVlan)
          {
            var tmp = GetRadioGroupCheckedVal('membership_' + port);
            $('#pvid_' + port).prop('checked', (2 == tmp || 3 == tmp));
          }

          break;

        default:
          $('#pvid_' + port).prop('checked', (3 == GetRadioGroupCheckedVal('membership_' + port)));
          break;
    }
}

</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>
<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('vlan','titVLANConfigurationTable')) %>
<table>
<tr>
  <td><%= lang('common','lblVLAN')%></td>
  <td class="right">
    <%= Select('vlan', data.vlans, data.vlan) %>
  </td>
</tr>
</table>
<table class="dataTable" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= lang('port','lblEntryNo') %></th>
    <th><%= lang('port','lblPort') %></th>
    <th><%= lang('vlan','lblVlanMode') %></th>
    <th><%= lang('vlan','lblVlanMembership') %></th>
    <th><%= lang('vlan','lblVlanPVID') %></th>
    <th><%= lang('vlan','lblVlanForbidden') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="StringCell">
    <% if (port.mode == 0) { %>
      <%= lang('vlan', 'lblVlanHybrid') %>
    <% } else if (port.mode == 1) { %>
      <%= lang('vlan', 'lblVlanAccess') %>
    <% } else if (port.mode == 2) { %>
      <%= lang('vlan', 'lblVlanTrunk') %>
    <% } else if (port.mode == 3) { %>
      <%= lang('vlan', 'lblVlanTunnel') %>
    <% } %>
    </td>
    <td class="StringCell">
      &nbsp;&nbsp;&nbsp;
      <input type="radio" name="membership_<%= idx %>" id="membership_<%= idx %>_0" value="0" onclick='selMembership(<%= idx %>)'>
      <label for="membership_<%= idx %>_0" name="membership_<%= idx %>_label" id="membership_<%= idx %>_0_label"><%= lang('vlan', 'lblVlanExcluded') %></label>
      &nbsp;&nbsp;&nbsp;
      <input type="radio" name="membership_<%= idx %>" id="membership_<%= idx %>_2" value="2" onclick='selMembership(<%= idx %>)'>
      <label for="membership_<%= idx %>_2" name="membership_<%= idx %>_label" id="membership_<%= idx %>_2_label"><%= lang('vlan', 'lblVlanTagged') %></label>
      &nbsp;&nbsp;&nbsp;
      <input type="radio" name="membership_<%= idx %>" id="membership_<%= idx %>_3" value="3" onclick='selMembership(<%= idx %>)'>
      <label for="membership_<%= idx %>_3" name="membership_<%= idx %>_label" id="membership_<%= idx %>_3_label"><%= lang('vlan', 'lblVlanUntagged') %></label>
      &nbsp;&nbsp;&nbsp;
    </td>
    <td class="BinaryCell"><%= CheckboxDisabled('pvid_'+ idx, '', port.pvid) %></td>
    <td class="BinaryCell"><%= Checkbox('forbidden_'+ idx, '', port.forbidden) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonGroupApply('btnApply')) %>
</form>
</script>
</body>
</html>
