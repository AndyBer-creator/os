<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var selVal = 0;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    if (urlParamGetByName('entry').length != 0)
        selVal = urlParamGetByName('entry');
    else
        CloseDialog();

    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlParamAppend(url('get_mgmtRmonEventLog'),'entry',selVal)).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'click #btnClose':'close'
  },
  close:function(){
    CloseDialog();
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('rmon','txtEventLogTable')) %>
<table>
<tbody>
  <tr>
    <td><%= lang('rmon','thEventIdx') %>: </td>
    <td id="idx"><%= selVal %></td>
  </tr>
</tbody>
</table>
</br>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th class=NumberCell><%= lang('rmon','thLogNum') %></th>
    <th class=StringCell><%= lang('rmon','thLogTime') %></th>
    <th class=StringCell><%= lang('rmon','thDescription') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.entries)) { %>
  <% _.each(data.entries, function(entry, idx) { %>
  <tr>
    <td class="NumberCell"><%= entry.logNum %></td>
    <td class="StringCell"><%= entry.time %></td>
    <td class="StringCell"><%= entry.desc %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); } %>
</tbody>
</table>
<%= TableFoot(ButtonClose('btnClose')) %>
</form>
</script>
</body>
</html>
