<html>
<head>
<meta http-equiv="Content-Type" content="text/html;charset=utf-8" >
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    this.$el.html(this.template());
    ChangePageTitle(_top.STYLING.alertBox.title);
    $('#msg').html(_top.STYLING.alertBox.msg);
  },
  events: {
    'click #btnOk':'okClick',
    'click #btnCancel':'cancelClick'
  },
  okClick: function(e){
    if (!IsUndefOrNull(_top.STYLING.alertBox.func))
      _top.STYLING.alertBox.func();

    window.close();
  },
  cancelClick: function(){
    window.close();
  }
});
mainFrame = new mainView();
}
</script>
</head>
<body class="alertBox" onload="init();">

<div id="main_container"></div>

<script id="main_content" type="text/template">
<form>
<table>
<tr>
<td style="padding-right:15px; padding-bottom:20px; vertical-align:top;"><img src="../images/empty.gif" id="warnIcon" width="32" height="32"></td>
<td style="padding-bottom:20px; vertical-align:top; white-space:normal;" id="msg">
</td>
</tr>
</table>
<table align="center" style="margin:auto;" class="formButtons">
<tr>
<td>
<%= ButtonShort(lang("common", "btnOK"), "btnOk") %>
</td>
<td>
<%= (_top.STYLING.alertBox.hasCancel) ? ButtonShort(lang("common", "btnCancel"), "btnCancel") : ""%>
</td>
</tr>
</table>
</form>
</script>
</body>
</html>
