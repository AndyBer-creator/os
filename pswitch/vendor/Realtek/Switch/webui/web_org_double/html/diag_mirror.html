<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_diagMirror')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'click #btnEdit':'edit'
  },
  edit:function(e){
    if(!CheckTableEdit())
      return;
    OpenDialog(urlParamAppend('diag_mirrorEdit.html', 'mirror', GetTableSelectVal()));
  }
});

mainFrame = new mainView();

EnterKeyEvent('edit');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('mirror','titMirrorSettingTbl')) %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><img src="../images/empty.gif"></img></th>
    <th><%= lang('mirror','lblMirrorSessionId') %></th>
    <th><%= lang('common','lblState') %></th>
    <th><%= lang('mirror','lblMirrorDestPort') %></th>
    <th><%= lang('mirror','lblMirrorSourceRXPort') %></th>
    <th><%= lang('mirror','lblMirrorSourceTXPort') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.sessions, function(session, idx) { %>
  <tr>
    <td class="StringCell"><input type="radio" name="rdoMirrorEntry" id=<%= "rdoMirror_" + idx %> value=<%= getPortEntry(idx) %>></input></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="BinaryCell"><%= show(session.state) %></td>
    <td class="StringCell"><%= session.dstPort + show(session.ingressState) %></td>
    <td class="StringCell"><%= showList(session.sourceRxPort,8) %></td>
    <td class="StringCell"><%= showList(session.sourceTxPort,8) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>

<%= TableFoot(ButtonEdit('btnEdit')) %>

<table>
  <td class="formContentTD"><%= LabelLeft(lang('mirror','lblMirrorIngressStateHint')) %></td>
</table>


</form>
</script>
</body>
</html>
