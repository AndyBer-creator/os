<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var data;
var ipType = 0;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_mcastRouterAdd')).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
        that.chgType();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'change #notMbrs':'mbrSelected',
    'change #mbrPort':'mbrSelected',
    'click #btnAdd':'mbrSelected',
    'click #btnRem':'mbrSelected',

    'change #avlVlans':'vlanSelected',
    'change #selVlans':'vlanSelected',
    'click #btnVlanAdd':'vlanSelected',
    'click #btnVlanRem':'vlanSelected',
    <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    'change #ipType':'chgType',
    'change #avlv6Vlans':'vlanv6Selected',
    'change #selv6Vlans':'vlanv6Selected',
    'click #btnVlanv6Add':'vlanv6Selected',
    'click #btnVlanv6Rem':'vlanv6Selected',
    <!--#endif-->
    'click #btnClose':'close'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
      var ipVer = GetSelectVal('ipType');
      MultiSelectApplySelect('mbrPort');
      if ("IPv4" == ipVer)
      {
        dataMultiSelectVlanList('selVlans');
      }
      <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
      else
      {
        dataMultiSelectVlanList('selv6Vlans');
      }
      <!--#endif-->
      var urlFinal = url('set_mcastRouterAdd');
      urlFinal = urlParamAppend(urlFinal,'ipType',ipVer);
      urlFinal = urlParamAppend(urlFinal,'portType', GetRadioVal('rtPortType'));
      dataSet(urlFinal, formDataGet('setform'));

      MultiSelectDeselectAll('mbrPort', 'notMbrs');
      if ("IPv4" == ipVer)
      {
        MultiSelectDeselectAll('selVlans', 'avlVlans');
      }
      <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
      else
      {
        MultiSelectDeselectAll('selv6Vlans', 'avlv6Vlans');
      }
      <!--#endif-->
  },
  mbrSelected: function(e) {
    MultiSelectTransferUpdate(e.currentTarget.id, 'btnAdd', 'btnRem', 'notMbrs', 'mbrPort');
  },
  <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
  chgType: function() {
    if ('IPv4' == GetSelectVal('ipType'))
    {
      $('#showIpv4').css('display','');
      $('#showIpv6').css('display','none');
    }
    else
    {
      $('#showIpv4').css('display','none');
      $('#showIpv6').css('display','');
    }
  },
  vlanv6Selected: function(e) {
    MultiSelectTransferUpdate(e.currentTarget.id, 'btnVlanv6Add', 'btnVlanv6Rem', 'avlv6Vlans', 'selv6Vlans');
  },
  <!--#endif-->
  vlanSelected: function(e) {
    MultiSelectTransferUpdate(e.currentTarget.id, 'btnVlanAdd', 'btnVlanRem', 'avlVlans', 'selVlans');
  }
});

EnterKeyEvent('apply');
mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('mcast','titAddRouter')) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>

     <tr>
      <th><%= LabelLeft(lang('common','lblVLAN')) %></th>
      <td class="formContentTD">
      <%= InputHidden('vlanList', '') %>
        <table>
        <thead>
        <tr>
          <td class='ctrlSpacing'><%= LabelTopMulti(lang('common','lblAvailableVlan')) %></td>
          <td class='ctrlSpacing'></td>
          <td class='ctrlSpacing right'><%= LabelTopMulti(lang('common','lblSelVlan')) %></td>
        </tr>
        </thead >
        <tbody >

        <tr id = "showIpv4">
          <td rowspan="2">
            <select name="avlVlans" id="avlVlans" style="WIDTH: 90px" multiple size="8">
            <% _.each(data.avlVlans, function(vlan, index) { %>
              <option value=<%= vlan %>><%= vlan %></option>
            <% }); %>
            </select>
          </td>
          <td class=right>
            <%= ButtonTransferDisabled('btnVlanAdd', 'btnVlanRem') %>
          </td>
          <td rowspan="2" class=right>
            <select name="selVlans" id="selVlans" style="WIDTH: 90px" multiple size="8">
            <% _.each(data.selVlans, function(vlan, index) { %>
              <option value=<%= vlan %>><%= vlan %></option>
            <% }); %>
            </select>
          </td>
        </tr>

        <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
        <tr id = "showIpv6">
          <td rowspan="2">
            <select name="avlv6Vlans" id="avlv6Vlans" style="WIDTH: 90px" multiple size="8">
            <% _.each(data.avlv6Vlans, function(vlan, index) { %>
              <option value=<%= vlan %>><%= vlan %></option>
            <% }); %>
            </select>
          </td>
          <td class=right>
            <%= ButtonTransferDisabled('btnVlanv6Add', 'btnVlanv6Rem') %>
          </td>
          <td rowspan="2" class=right>
            <select name="selv6Vlans" id="selv6Vlans" style="WIDTH: 90px" multiple size="8">
            <% _.each(data.selv6Vlans, function(vlan, index) { %>
              <option value=<%= vlan %>><%= vlan %></option>
            <% }); %>
            </select>
          </td>
        </tr>
        <!--#endif-->

        </tbody >
        </table>
      </td>
    </tr>

    <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    <tr>
      <th><%= LabelLeft(lang('common','lblIPVersion')) %></th>
      <td class="formContentTD">
        <%= SelectArry("ipType", data.iptypes) %>
      </td>
    </tr>
    <!--#endif-->

    <tr>
      <th><%= LabelLeft(lang('mcast','lblRtMbrPortType')) %></th>
      <td class="formContentTD">
         <%= RadioGroup('rtPortType','static',['static',lang('mcast','lblStatic')],['forbid',lang('mcast','lblForbid')]) %>
      </td>
    </tr>

   <tr>
      <th><%= LabelLeft(lang('common','lblPort')) %></th>
      <td class="formContentTD">
        <table>
        <thead>
        <tr>
          <td class='ctrlSpacing'><%= LabelTopMulti(lang('common','lblAvailablePort')) %></td>
          <td class='ctrlSpacing'></td>
          <td class='ctrlSpacing right'><%= LabelTopMulti(lang('common','lblSelPort')) %></td>
        </tr>
        </thead >
        <tbody >
        <tr>
          <td rowspan="2">
            <select name="notMbrs" id="notMbrs" style="WIDTH: 90px" multiple size="8">
            <% _.each(_top.data.ports, function(port, index) { %>
              <option value=<%= port.port %>><%= port.port %></option>
            <% }); %>
            </select>
          </td>
          <td class=right>
            <%= ButtonTransferDisabled('btnAdd', 'btnRem') %>
          </td>
          <td rowspan="2" class=right>
            <select name="mbrPort" id="mbrPort" style="WIDTH: 90px" multiple size="8">
            <% _.each(data.mbrPort, function(port, index) { %>
              <option value=<%= port.port %>><%= port.port %></option>
            <% }); %>
            </select>
          </td>
        </tr>
        </tbody >
        </table>
      </td>
    </tr>

    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
