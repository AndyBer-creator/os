<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var vlan;
var name;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    vlan = urlParamGetByName('vlan');

    for (var i = 0 ; i < parent.data.adminVlans.length; i++)
    {
      if (vlan == parent.data.adminVlans[i].vlan)
      {
          name = parent.data.adminVlans[i].name;
          break;
      }
    }

    this.$el.html(this.template());
    PagePostInit();
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
    {
        name = $('#name').val();

        for (var i = 0 ; i < parent.data.adminVlans.length; i++)
        {
          if (name == parent.data.adminVlans[i].name)
          {
            //ShowStatusWarning("Name had been used by VLAN " + parent.data.adminVlans[i].vlan);
			ShowStatusWarning(lang('warning','warningVlanName'), parent.data.adminVlans[i].vlan);
            return;
          }
        }

        dataSet(url('set_vlanEdit'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validString('name');
    return valid;
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('vlan','titVLANNameEdit')) %>
<%= InputHidden('vlan',vlan) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vlan','lblVlanName')) %></th>
      <td class="formContentTD">
        <%= InputText('name', name, parent.data.maxlen, 40) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
