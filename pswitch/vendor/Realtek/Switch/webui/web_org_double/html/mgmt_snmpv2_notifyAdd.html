<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_snmpv2NotifyAdd')).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
        that.chgVer();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'click input[name=srvDef]':'chgSrvDef',
    'click input[name=snmpVer]':'chgVer',
    'blur input':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
    {
      dataSet(url('set_snmpv2NotifyAdd'), formDataGet('setform'));
    }
  },
  checkValid: function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validSrvAddr('srvHost', GetRadioGroupCheckedVal('srvDef'));
    if (!data.hasCom)
      valid &= validSelString('secName');
    return valid;
  },
 chgVer:function(){
    SelectRadio('notifyType',1);
    if (0 ==  GetRadioVal('snmpVer'))
    {
      DisableRadio('notifyType', 2);
    }
    else
    {
      EnableRadio('notifyType', 2);
    }
  },
  chgSrvDef:function(){
    ChageServerInputType('srvHost', GetRadioGroupCheckedVal('srvDef'));
  }
});


EnterKeyEvent('apply');
mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('snmp','titAddSnmpNotify')) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('common','lblSrvAddrType')) %></th>
      <td class="formContentTD">
        <%= RadioGroupSrvAddrType('host','ipv4','ipv6') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('common','lblSrvIPHost')) %></th>
      <td class="formContentTD">
        <%= InputTextHost("srvHost", "", data.maxlen_srvHost) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('snmp','lblSnmpVer')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('snmpVer','0',['0',lang('snmp','lblSNMPv1')],['1',lang('snmp','lblSNMPv2')]) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('snmp','lblNotifyType')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('notifyType',1,[1,lang('snmp','lblTraps')],[2,lang('snmp','lblInforms')]) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('snmp','lblCommunityName')) %></th>
      <td class="formContentTD">
        <%= SelectArry("secName", data.sec_comms) %>
      </td>
    </tr>

    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
