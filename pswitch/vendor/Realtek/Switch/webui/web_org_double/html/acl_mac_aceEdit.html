<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var ace;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var pri = urlParamGetByName('pri');
    for (var idx = 0 ; idx < parent.data.aces.length; idx++)
    {
      if (pri == parent.data.aces[idx].pri)
      {
        ace = parent.data.aces[idx];
        break;
      }
    }

    this.$el.html( this.template() );
    PagePostInit();
    this.any();
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'click input[type=checkbox]':'any',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_aclACE'), formDataGet('setform'));
  },
  any:function(e){
    if (IsCheckboxChecked('smac_any'))
    {
      DisableInputText('smac');
      DisableInputText('smask');
    }
    else
    {
      EnableInputText('smac');
      EnableInputText('smask');
    }

    if (IsCheckboxChecked('dmac_any'))
    {
      DisableInputText('dmac');
      DisableInputText('dmask');
    }
    else
    {
      EnableInputText('dmac');
      EnableInputText('dmask');
    }

    if (IsCheckboxChecked('eth_any'))
      DisableInputText('eth');
    else
      EnableInputText('eth');

    if (IsCheckboxChecked('vlan_any'))
      DisableInputText('vlan');
    else
      EnableInputText('vlan');

    if (IsCheckboxChecked('dot1p_any'))
    {
      DisableInputText('dot1p');
      DisableInputText('dot1pmask');
    }
    else
    {
      EnableInputText('dot1p');
      EnableInputText('dot1pmask');
    }
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validRange('pri', 1, 2147483647);
    valid &= validMacAddr('smac', false);
    valid &= validMacAddr('smask', false);
    valid &= validMacAddr('dmac', false);
    valid &= validMacAddr('dmask', false);
    valid &= validRange('eth', 0x600, 0xffff, false, false, true);
    valid &= validRange('vlan', 1, 4094);
    valid &= validRange('dot1p', 0, 7);
    valid &= validRange('dot1pmask', 0, 7);
    return valid;
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('acl','titAclACEEdit')) %>
<%= InputHidden('name', parent.data.name) %>
<%= InputHidden('pri', ace.pri) %>
<%= InputHidden('txt', 1) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th><%= LabelLeft(lang('acl','lblAclName')) %></th>
      <td class="formContentTD">
        <%= show(parent.data.name) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('acl','lblAclSequence')) %></th>
      <td class="formContentTD">
        <%= ace.pri %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('acl','lblAclAction')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('action',ace.action ,[0, lang('acl','lblAclPermit')], [1, lang('acl','lblAclDeny')], [2, lang('acl','lblAclShutdown')]) %>
      </td>
    </tr>
    <tr>
      <th rowspan='2'><%= LabelLeft(lang('acl','lblAclSource') + " MAC") %></th>
      <td class="formContentTD">
        <%= Checkbox('smac_any', lang('acl', 'lblAclAny'), (ace.smac == 'Any')) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%= InputTextMac('smac', (ace.smac == 'Any') ? "" : ace.smac, 17, 25) %>
        &#32;&#47;&#32;
        <%= InputTextMac('smask', (ace.smask == 'Any') ? "" : ace.smask, 17, 25) %>
        <%= LabelHint("(" + lang('acl','lblAclAddress') + " / " + lang('acl','lblAclMask') + ")") %>
      </td>
    </tr>
    <tr>
      <th rowspan='2'><%= LabelLeft(lang('acl','lblAclDestination') + " MAC") %></th>
      <td class="formContentTD">
        <%= Checkbox('dmac_any', lang('acl', 'lblAclAny'), (ace.dmac == 'Any')) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%= InputTextMac('dmac', (ace.dmac == 'Any') ? "" : ace.dmac, 17, 25) %>
        &#32;&#47;&#32;
        <%= InputTextMac('dmask', (ace.dmask == 'Any') ? "" : ace.dmask, 17, 25) %>
        <%= LabelHint("(" + lang('acl','lblAclAddress') + " / " + lang('acl','lblAclMask') + ")") %>
      </td>
    </tr>
    <tr>
      <th rowspan='2'><%= LabelLeft(lang('acl','lblAclEth')) %></th>
      <td class="formContentTD">
        <%= Checkbox('eth_any', lang('acl', 'lblAclAny'), (ace.eth == 'Any')) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        0x&#32;&#32;<%= InputTextHex('eth', (ace.eth == 'Any') ? "" : ace.eth, 4, 25) %>
        <%= LabelHint("(0x600 ~ 0xFFFF)") %>
      </td>
    </tr>
    <tr>
      <th rowspan='2'><%= LabelLeft(lang('common','lblVLAN')) %></th>
      <td class="formContentTD">
        <%= Checkbox('vlan_any', lang('acl', 'lblAclAny'), (ace.vlan == 'Any')) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%= InputTextDigit('vlan', (ace.vlan == 'Any') ? "" : ace.vlan, 4, 10) %>
        <%= LabelHint(lang('common','txtRangeArg',[1, 4094])) %>
      </td>
    </tr>
    <tr>
      <th rowspan='2'><%= LabelLeft(lang('acl','lblAcl8021p')) %></th>
      <td class="formContentTD">
        <%= Checkbox('dot1p_any', lang('acl', 'lblAclAny'), (ace.dot1p== 'Any')) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%= InputTextDigit('dot1p', (ace.dot1p == 'Any') ? "" : ace.dot1p, 1, 25) %>
        &#32;&#47;&#32;
        <%= InputTextDigit('dot1pmask', (ace.dot1pmask == 'Any') ? "" : ace.dot1pmask, 1, 25) %>
        <%= LabelHint("(" + lang('acl','lblAclValue') + " / " + lang('acl','lblAclMask') + ")") %>
        <%= LabelHint(lang('common','txtRangeArg',[0, 7])) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>
</body>
</html>
