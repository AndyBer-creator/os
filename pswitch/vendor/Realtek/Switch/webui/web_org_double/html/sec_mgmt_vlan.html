<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_secMgmtVLAN')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply'
  },
  apply: function() {
    dataSet(url('set_secMgmtVLAN'), formDataGet('setform'));
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<script id="main_content" type="text/template">
<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th rowspan='2'><%= LabelLeft(lang('vlan','lblManagementVLAN')) %></th>
      <td class="formContentTD">
        <%= selectOption('mgmtvlan', data.adminVlans, data.mgmtvlan) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%= LabelHint(lang('vlan','errMsgManagementVLAN')) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>
</form>
</script>
</body>
</html>
