<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var selVal = '';
var addrType = [
      "lblGlobal",
      "lblGlobal",
      "txtDHCP",
      "lblLinkLocal",
      "lblDynamic",
      "lblMcast"
    ];
var dadStatus = [
      "lblActive",
      "lblActive",
      "lblTentative",
      "lblDuplicate"
    ];
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    var urlFinal = urlParamAppend(url('get_ipconfIpv6Addr'), 'intf', selVal);
    dataGet(urlFinal).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();

        selVal = GetSelectVal('intf');
      }
    });
  },
  events: {
    'click #btnAdd':'add',
    'click #btnDel':'del',
    'change #intf':'selIntf'
  },

  add:function(e){
    OpenDialog(urlParamAppend('ipconf_ipv6_addrAdd.html', 'intf', GetSelectVal('intf')));
  },
  del:function(e){
    var __data = '';
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    urlFinal = urlParamAppend(url('set_ipconfIpv6AddrDel'), 'intf', GetSelectVal('intf'));
    __data = 'intf=' + GetSelectVal('intf') + '&';
    __data += GetTableMultiSelectVals('addr');

    dataSet(url('set_ipconfIpv6AddrDel'), urlDataGen(__data));
  },
  selIntf:function(e){
    selVal = GetSelectVal('intf');
    this.render();
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('ipconf','lblIPv6AddrTable')) %>
<table>
<tr>
  <th><%= lang('ipconf','lblIntf')%></th>
  <td class="right">
    <%= Select('intf', data.intf, selVal) %>
  </td>
</tr>
</table>
<br>

<table class="dataTable" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('ipconf','lblIPv6AddrType') %></th>
    <th><%= lang('ipconf','lblIPv6Addr') %></th>
    <th><%= lang('ipconf','lblIPv6PrefixLen') %></th>
    <th><%= lang('ipconf','lblDADStatus') %></th>
    <%= TableLastTh(1) %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.addrs)) { %>
  <% _.each(data.addrs, function(addr, idx) { %>
  <tr>
    <td class="StringCell"><%= (1 == addr.addrType) ? TableCheckbox(addr.addr+'_'+addr.plen) : TableCheckboxDisable(addr.addr) %></td>
    <td class="StringCell"><%= show(lang('ipconf',addrType[addr.addrType])) %></td>
    <td class="StringCell"><%= addr.addr %></td>
    <td class="StringCell"><%= IsUndefOrNull(addr.plen) ? '' : addr.plen %></td>
    <td class="StringCell"><%= IsUndefOrNull(addr.dadStatus) ? '' : show(lang('ipconf',dadStatus[addr.dadStatus])) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); } %>
</tbody>
</table>
<%= TableFoot(ButtonGroupAddDel('btnAdd', 'btnDel')) %>
</form>
</script>
</body>
</html>
