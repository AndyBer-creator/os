<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var selQueEntries =
  [
    {"val":1},
    {"val":2},
    {"val":3},
    {"val":4},
    {"val":5},
    {"val":6},
    {"val":7},
    {"val":8}
  ];
var selCosEntries =
  [
    {"val":0},
    {"val":1},
    {"val":2},
    {"val":3},
    {"val":4},
    {"val":5},
    {"val":6},
    {"val":7}
  ];

var data;
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_qosMapCos')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnApply2':'apply2'
  },
  apply:function(e){
    dataSet(url('set_qosMapCos'), formDataGet('setform'), 'status_container');
  },
  apply2:function(e){
    dataSet(url('set_qosMapCos'), formDataGet('setform2'), 'status_container');
  }
});

mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('qos','titCos2QueueMap')) %>
<table class="dataTable func" cellpadding="0" cellspacing="0">
<thead>
<tr>
  <th><%= lang('qos','lblCoS') %></th>
  <th><%= lang('qos','lblQueue') %></th>
  <%= TableLastTh() %>
</tr>
</thead>
<tbody>
  <% _.each(data.cos2que, function(queue, idx) { %>
    <tr>
      <td class='NumberCell'><%= idx %></td>
      <td><%= Select('c2q_'+idx, selQueEntries, queue) %></td>
      <%= TableLastTd() %>
    </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonApply('btnApply')) %>
</form>

<form id="setform2">
<%= TableHead(lang('qos','titQueue2CosMap')) %>
<table class="dataTable func" cellpadding="0" cellspacing="0">
<thead>
<tr>
  <th><%= lang('qos','lblQueue') %></th>
  <th><%= lang('qos','lblCoS') %></th>
  <%= TableLastTh() %>
</tr>
</thead>
<tbody>
  <% _.each(data.que2cos, function(cos, idx) { %>
    <tr>
      <td class='NumberCell'><%= idx + 1 %></td>
      <td><%= Select('q2c_'+(idx+1), selCosEntries, cos) %></td>
      <%= TableLastTd() %>
    </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonApply('btnApply2')) %>
</form>
</script>
</body>
</html>
