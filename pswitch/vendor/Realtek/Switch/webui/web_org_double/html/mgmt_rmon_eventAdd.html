<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_mgmtRmonEventAdd')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;

        that.chkNotifiType();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'click input[name=notifiType]':'chkNotifiType',
    'blur input':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_mgmtRmonEventAdd'), formDataGet('setform'));
    }
  },
  chkNotifiType: function() {
    if ('0' == GetRadioGroupCheckedVal('notifiType') ||
        '1' == GetRadioGroupCheckedVal('notifiType'))
      DisableInputText('community');
    else
      EnableInputText('community');
  },
  checkValid: function() {
    var valid = true;
    clearAllErrMsg();
    valid &= validString('community', false, true);
    valid &= validString('owner', false, false, true);
    valid &= validString('desc', false, false, true);
    return valid;
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<%= DialogHead(lang('rmon','titAddEvent')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblNewEventIdx')) %></th>
      <td class="formContentTD" id="idx">
        <%= data.idx %>
        <%= InputHidden('idx', data.idx) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblNotifiType')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('notifiType', 0, ['0',lang('rmon','lblNotifiTypeNone')], ['1',lang('rmon','lblNotifiTypeLog')], ['2',lang('rmon','lblNotifiTypeTrap')], ['3',lang('rmon','lblNotifiTypeLogTrap')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblCommunity')) %></th>
      <td class="formContentTD">
        <%= InputText("community", "Default Community", data.community_maxlen) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblDescription')) %></th>
      <td class="formContentTD">
        <%= InputText("desc", "Default Description", data.desc_maxlen) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblOwner')) %></th>
      <td class="formContentTD">
        <%= InputText("owner", data.owner, data.owner_maxlen) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
