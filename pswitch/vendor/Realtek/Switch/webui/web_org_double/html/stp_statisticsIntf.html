<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var data;
var portVal;
var time = 0;
var interval;

function reload()
{
  mainFrame.render();
}

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    if (urlParamGetByName('port').length != 0)
      portVal = urlGetPortList('port');
    else
      CloseDialog();

    this.render();
  },
  render: function() {
    var that = this;
    var urlFinal = urlParamAppend(url('get_stpStatsIntf'), 'port', urlParamGetByName('port'));
    urlFinal = urlParamAppend(urlFinal, 'time', time);
    dataGet(urlFinal).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'click #btnRefresh':'refresh',
    'click #btnClear':'clear',
    'click #btnClose':'close',
    'click [name=refreshRate]':'refreshRate'
  },
  refresh:function(e){
    this.render();
  },
  clear:function(e){
    dataSet(url('set_stpStatsIntfClear'), formDataGet('setform'), true);
  },
  close: function() {
    CloseDialog();
  },
  refreshRate: function(e) {
    time = GetRadioVal('refreshRate');
    clearInterval(interval);

    if (0 != time)
      interval = setInterval(reload, time * 1000);
  }
});

mainFrame = new mainView();

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('stp','txtStpIntfStats')) %>

<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD" id="port">
        <%= portVal %>
        <%= InputHidden('portList',portVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('common', 'lblRefreshRate')) %></th>
      <td class="formContentTD">
      <%= RadioGroup('refreshRate',time,[0,lang('common','lblRefreshRateNone')],[5,lang('common','lblRefreshRate5s')],[10,lang('common','lblRefreshRate10s')],[30,lang('common','lblRefreshRate30s')]) %>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('stp','lblRxCnt')) %>
    <tr>
      <th><%= LabelLeft(lang('stp','lblConfigBpdu')) %></th>
      <td class="formContentTD" id="configBpduRx">
        <%= data.configBpduRx %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblTcnBpdu')) %></th>
      <td class="formContentTD" id="tcnBpduRx">
        <%= data.tcnBpduRx %>
      </td>
    </tr>
<!--#ifdef CONFIG_SYS_PROTO_STP_MSTP-->
    <tr>
      <th><%= LabelLeft(lang('stp','lblMstpBpdu')) %></th>
      <td class="formContentTD" id="mstpBpduRx">
        <%= data.mstpBpduRx %>
      </td>
    </tr>
<!--#endif-->
    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('stp','lblTxCnt')) %>
    <tr>
      <th><%= LabelLeft(lang('stp','lblConfigBpdu')) %></th>
      <td class="formContentTD" id="configBpduTx">
        <%= data.configBpduTx %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('stp','lblTcnBpdu')) %></th>
      <td class="formContentTD" id="tcnBpduTx">
        <%= data.tcnBpduTx %>
      </td>
    </tr>
<!--#ifdef CONFIG_SYS_PROTO_STP_MSTP-->
    <tr>
      <th><%= LabelLeft(lang('stp','lblMstpBpdu')) %></th>
      <td class="formContentTD" id="mstpBpduTx">
        <%= data.mstpBpduTx %>
      </td>
    </tr>
<!--#endif-->
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= TableFoot(ButtonGroup(ButtonRefresh('btnRefresh'),ButtonClear('btnClear'),ButtonClose('btnClose'))) %>
</form>
</script>
</body>
</html>
