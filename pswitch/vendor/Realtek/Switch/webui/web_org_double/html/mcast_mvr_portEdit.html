<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var selVal;
var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlGetPortList('port');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_mvrPortEdit'), urlGetSelSouce())).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    dataSet(url('set_mvrPortEdit'), formDataGet('setform'));
  }
});

EnterKeyEvent('apply');
mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('mvr','txtEditPortTable')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('portList',selVal) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('mvr','lblPortType')) %></th>
      <td class="formContentTD">
         <%= RadioGroup('porttype',str2var(data.porttype),['None',lang('mvr','lblNone')],['Receiver',lang('mvr','lblReceiver')],['Source',lang('mvr','lblSource')]) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('mvr','lblPortFastLeave')) %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('immdLeave',data.immdLeave) %>
      </td>
    </tr>


    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>


</form>
</script>

</body>
</html>
