<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var selVal;
var selIdx;
var snmpVersion = 0;
var trapType = 1;
var privModeStr = "noAuth";
var initFinish = false;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlParamGetByName('idx');
    for (i = 0; i < parent.data.notifies.length; i++)
    {
      if (parent.data.notifies[i].idx == selVal)
      {
        selIdx = i;
        if (str2var(parent.data.notifies[i].snmpVer) == 'SNMPv2')
          snmpVersion = 1;
        else if (str2var(parent.data.notifies[i].snmpVer) == 'SNMPv3')
          snmpVersion = 2;

        if (str2var(parent.data.notifies[i].notifyType) == 'Inform')
          trapType = 2;

        if (str2var(parent.data.notifies[i].secLevel) == 'Authentication')
          privModeStr = "authNoPriv";
        else if (str2var(parent.data.notifies[i].secLevel) == 'Authentication and Privacy')
          privModeStr = "authPriv";

        break;
      }
    }
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_snmpNotifyEdit'), 'idx', selVal).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
        that.chgVer();
        that.chkUseDflt();
        initFinish = true;
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click input[type=checkbox]':'chkUseDflt',
    'click input[name=snmpVer]':'chgVer',
    'click input[name=notifyType]':'chgTrapType',
    'change #secName_v3':'seluser',
    'blur input':'checkValid',
    'click #btnClose':'close'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
      if (this.checkValid())
        dataSet(url('set_snmpNotifyEdit'), formDataGet('setform'));
  },
  chkUseDflt: function(){
    if(IsCheckboxChecked('udpPortDflt'))
      DisableInputText('udpPort');
    else
      EnableInputText('udpPort');

    if(IsCheckboxChecked('retryDflt'))
      DisableInputText('retries');
    else
      EnableInputText('retries');

    if(IsCheckboxChecked('timeoutDflt'))
      DisableInputText('timeout');
    else
      EnableInputText('timeout');
  },
  chgVer:function(){
    DisableRadio('privMode', 'authNoPriv');
    DisableRadio('privMode', 'authPriv');
    EnableRadio('notifyType', 2);

    if (0 ==  GetRadioVal('snmpVer') || 1 == GetRadioVal('snmpVer'))
    {
      $('#showSecName_v2').css('display','');
      $('#showSecName_v3').css('display','none');
      DisableSelect('secName_v3');
      EnableSelect('secName');
      if (0 ==  GetRadioVal('snmpVer'))
        DisableRadio('notifyType', 2);

      if (true == initFinish)
      {
        SelectRadio('notifyType',1);
        SelectRadio('privMode','noAuth');
      }
    }
    else
    {
      EnableRadio('privMode', 'authNoPriv');
      EnableRadio('privMode', 'authPriv');
      $('#showSecName_v2').css('display','none');
      $('#showSecName_v3').css('display','');
      EnableSelect('secName_v3');
      DisableSelect('secName');
      this.seluser();
    }
    $('#secName_v3').addClass('inputTextErrMsg');
    $('#secName').addClass('inputTextErrMsg');
    this.chgTrapType();
    this.checkSelValid();
  },
  seluser:function(){
    if (true == initFinish)
      SelectRadio('privMode','noAuth');
    DisableRadio('privMode');
    var seluserName = GetSelectVal('secName_v3');
    if (undefined != seluserName){
    for(i = 0; i < data.users.length; i++){
      if (data.users[i].name == seluserName){
        toIdx = data.users[i].val.lastIndexOf("_");
        selUseSec = str2int(data.users[i].val.substr(toIdx+1));
        if (selUseSec & 0x4) {
          EnableRadio('privMode');
        } else if (selUseSec & 0x2){
          EnableRadio('privMode', 'authNoPriv');
          EnableRadio('privMode', 'noAuth');
        }else{
          EnableRadio('privMode', 'noAuth');
        }
      }
    }
  }
  },
  chgTrapType:function(){
    if (1 == GetRadioVal('notifyType')){
      DisableLabel('lbltimeout');
      DisableLabel('lblretry');
      DisableCheckbox('timeoutDflt');
      DisableCheckbox('retryDflt');
      DisableInputText('timeout');
      DisableInputText('retries');
    }
    else{
      EnableLabel('lbltimeout');
      EnableLabel('lblretry');
      EnableCheckbox('timeoutDflt');
      EnableCheckbox('retryDflt');
      if(IsCheckboxChecked('timeoutDflt'))
        DisableInputText('timeout');
      else
        EnableInputText('timeout');
      if(IsCheckboxChecked('retryDflt'))
        DisableInputText('retries');
      else
        EnableInputText('retries');
    }
  },
  checkSelValid:function(){
    var valid  = true;
    if (!data.hasUser)
      valid &= validSelString('secName_v3');
    if (!data.hasCom)
      valid &= validSelString('secName');
    return valid;
  },
  checkValid: function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validRange('udpPort', data.min_udpport, data.max_udpport);
    valid &= validRange('retries', data.min_retry, data.max_retry);
    valid &= validRange('timeout', data.min_timeout, data.max_timeout);
    if (!data.hasUser)
      valid &= validSelString('secName_v3');
    if (!data.hasCom)
      valid &= validSelString('secName');
    return valid;
  }
});

EnterKeyEvent('apply');
mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('snmp','titEditSnmpNotify')) %>
<%= InputHidden('idx',selVal) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>

    <tr>
      <th><%= LabelLeft(lang('common','lblSrvIPHost')) %></th>
      <td class="formContentTD">
        <%= show(parent.data.notifies[selIdx].recvIp) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('snmp','lblSnmpVer')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('snmpVer',snmpVersion,[0,lang('snmp','lblSNMPv1')],[1,lang('snmp','lblSNMPv2')],[2,lang('snmp','lblSNMPv3')]) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('snmp','lblNotifyType')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('notifyType',trapType,[1,lang('snmp','lblTraps')],[2,lang('snmp','lblInforms')]) %>
      </td>
    </tr>

     <tr id="showSecName_v3">
      <th><%= LabelLeft(lang('snmp','lblSnmpSecName')) %></th>
      <td class="formContentTD">
        <select class="inputTextErrMsg" name="secName_v3" id="secName_v3">
        <% if (!IsUndefOrNull(data.sec_users)) { %>
        <% _.each(data.sec_users, function(entry){ %>
          <option value="<%= entry %>" <%= (entry === parent.data.notifies[selIdx].secStr) ?"selected":"" %>> <%= show(entry) %> </option>
        <% }); }%>
        </select>
      </td>
    </tr>

    <tr id="showSecName_v2">
      <th><%= LabelLeft(lang('snmp','lblSnmpSecName')) %></th>
      <td class="formContentTD">
        <select class="inputTextErrMsg" name="secName" id="secName">
         <% if (!IsUndefOrNull(data.sec_comms)) { %>
        <% _.each(data.sec_comms, function(entry){ %>
           <option value="<%= entry %>" <%= (entry === parent.data.notifies[selIdx].secStr) ?"selected":"" %>> <%= show(entry) %> </option>
        <% }); } %>
        </select>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('snmp','lblSecurityLevel')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('privMode',privModeStr,['noAuth',lang('snmp','lblNoAuth')],['authNoPriv',lang('snmp','lblAuth')],['authPriv',lang('snmp','lblPriv')]) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('common','lblSrvPort')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= Checkbox("udpPortDflt", lang('snmp','lblUseDflt'), (parent.data.notifies[selIdx].udpPort == data.dflt_udpport))  %></td>
          </tr>

          <tr>
            <td class="chkbxSpacing"><%= InputTextDigit("udpPort", parent.data.notifies[selIdx].udpPort) %></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.min_udpport,data.max_udpport,data.dflt_udpport])) %></td>
          </tr>

        </table>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('snmp','lblTimeout'),'lbltimeout') %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= Checkbox("timeoutDflt", lang('snmp','lblUseDflt'), (IsUndefOrNull(parent.data.notifies[selIdx].timeout) ? true : (parent.data.notifies[selIdx].timeout == data.dflt_timeout))) %></td>
          </tr>
          <tr>
            <td class="chkbxSpacing"><%= InputTextDigit("timeout", (IsUndefOrNull(parent.data.notifies[selIdx].timeout) ? data.dflt_timeout : parent.data.notifies[selIdx].timeout)) %></td>
            <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.min_timeout,data.max_timeout,data.dflt_timeout])) %></td>
          </tr>
        </table>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('snmp','lblRetries'),'lblretry') %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= Checkbox("retryDflt", lang('snmp','lblUseDflt'), (IsUndefOrNull(parent.data.notifies[selIdx].retries) ? true : (parent.data.notifies[selIdx].retries == data.dflt_retry))) %></td>
          </tr>
          <tr>
            <td class="chkbxSpacing"><%= InputTextDigit("retries", (IsUndefOrNull(parent.data.notifies[selIdx].retries) ? data.dflt_retry : parent.data.notifies[selIdx].retries)) %></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.min_retry,data.max_retry,data.dflt_retry])) %></td>
          </tr>
        </table>
      </td>
    </tr>

    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
