<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var selIntf = '';

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    if (urlParamGetByName('intf').length != 0)
      selIntf = urlParamGetByName('intf');
    else
      CloseDialog();
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_ipconfIpv6AddrAdd')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;
      }
    });
  },
  events: {
    'change [name=addrType]':'addrTypeChg',
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  addrTypeChg: function() {
    if (1 == GetRadioVal('addrType'))
    {
      EnableCheckbox('eui64');
      EnableInputText('plen');

      EnableLabel('lblPrefixLength');
      EnableLabel('lblEUI64');
    }
    else
    {
      DisableCheckbox('eui64');
      DisableInputText('plen');

      DisableLabel('lblPrefixLength');
      DisableLabel('lblEUI64');
    }
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_ipconfIpv6AddrAdd'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validIPv6Addr('addr');
    valid &= validRange('plen',3,128);
    return valid;
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<%= DialogHead(lang('ipconf','titAddIPv6Intf')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblIntf')) %></th>
      <td class="formContentTD">
        <%= InputHidden('intf', selIntf) %>
        <%= selIntf %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblIPv6AddrType'), 'lblIPv6AddrType') %></th>
      <td class="formContentTD">
        <%= RadioGroup('addrType',1,[1,lang('ipconf','lblGlobal')],[3,lang('ipconf','lblLinkLocal')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblIPv6Addr'), 'lblIPv6Addr') %></th>
      <td class="formContentTD">
        <%= InputTextIPv6('addr', '', 64, 40) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblPrefixLength'), 'lblPrefixLength') %></th>
      <td class="formContentTD">
        <%= InputTextDigit('plen', '', 3) %>
        <%= LabelHint(lang('common','txtRangeArg',[3, 128])) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblEUI64'), 'lblEUI64') %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('eui64', false) %>
      </td>
    </tr>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
