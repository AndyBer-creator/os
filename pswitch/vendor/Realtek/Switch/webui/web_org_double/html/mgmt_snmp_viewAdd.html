<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_snmpViewAdd')).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
    {
        dataSet(url('set_snmpViewAdd'), formDataGet('setform'));
    }
  },

  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validString('viewName', false, true);
    valid &= validMibOid('objSubtree');
    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('snmp','titAddSnmpView')) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('snmp','lblViewName')) %></th>
      <td class="formContentTD">
        <%= InputText('viewName', '', data.maxlen_viewName) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('snmp','lblObjectIDSubtree')) %></th>
      <td class="formContentTD">
        <%= InputTextOid('objSubtree', '') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('snmp','lblObjectIDSubtreeView')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('objSubtreeView',data.included,[1,lang('snmp','lblIncluded')],[2,lang('snmp','lblExcluded')]) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
