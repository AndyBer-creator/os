<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var cos =
{
    "pri": [
      { "name":"0", "val":0 },
      { "name":"1", "val":1 },
      { "name":"2", "val":2 },
      { "name":"3", "val":3 },
      { "name":"4", "val":4 },
      { "name":"5", "val":5 },
      { "name":"6", "val":6 },
      { "name":"7", "val":7 }
    ]
};

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_vlanSurveillanceProp')).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnEdit':'edit',
    'blur input':'checkValid'
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_vlanSurveillanceProp'), formDataGet('setform'));
  },
  edit:function(e){
    if(!CheckTableEdit())
      return;
    OpenDialog(urlAppend('vlan_surveillance_portEdit.html', GetTableMultiSelectVals('port')));
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validRange('agingTime',data.minAgingTime, data.maxAgingTime);
    return valid;
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('vlansurveillance','lblSVState')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('state', data.state) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('common','lblVLAN')) %></th>
      <td class="formContentTD">
        <%= Select("surveillanceVlan", data.vlans, data.surveillanceVlan) %>
      </td>
    </tr>

    <tr>
      <th  rowspan='2'><%= LabelLeft(lang('vlansurveillance','lblSVRemark')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('cosremark', data.cosremark) %>
      </td>
    </tr>

    <tr>
      <td class="formContentTD">
        <%= Select("cos", cos.pri, data.cos) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('vlansurveillance','lblSVAgingTime')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit("agingTime", data.agingTime, 5, 10) %></td>
          <td class="right"><%= LabelHint(lang('common','txtMinRangeArgDefault',[data.minAgingTime, data.maxAgingTime, data.defAgingTime])) %></td>
        </tr>
        </table>
      </td>
    </tr>


    </tbody>
    </table>
  </td>
</tr>
</table>
<%= ButtonGroupApply('btnApply') %>

<%= TableHead(lang('vlansurveillance','titSVPortSettingTable')) %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('port','lblEntryNo') %></th>
    <th><%= lang('port','lblPort') %></th>
    <th><%= lang('vlansurveillance','lblSVPortState') %></th>
    <th><%= lang('vlansurveillance','lblSVPortMode') %></th>
    <th><%= lang('vlansurveillance','lblSVPortCosMdoe') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="NumberCell"><%= getPortEntry(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
    <td class="BinaryCell"><%= (port.state ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>
    <td class="BinaryCell"><%= (port.portMode ? lang('vlansurveillance','lblSVManual') : lang('vlansurveillance','lblSVAuto')) %></td>
    <td class="BinaryCell"><%= (port.cosMode ? lang('vlansurveillance','lblSVAll') : lang('vlansurveillance','lblSVSource')) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>
<%= TableFoot(ButtonEdit('btnEdit')) %>
</form>
</script>
</body>
</html>
