<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_ipconfIpv6IntfAdd')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;

        that.addrTypeChg();
        that.intfTypeChg();
      }
    });
  },
  events: {
    'change [name=intfType]':'intfTypeChg',
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  intfTypeChg: function() {
    ('vlan' == GetRadioVal('intfType')) ? EnableInputText('vid') : DisableInputText('vid');
    if ('lo' == GetRadioVal('intfType'))
    {
      DisableCheckbox('autoconf');
      DisableInput('dadAttempt');
      DisableCheckbox('stateless');
      DisableInput('refresh');
      DisableInput('minrefresh');

      DisableLabel('lblAutoConf');
      DisableLabel('lblDadAttemps');
      DisableLabel('lblStateless');
      DisableLabel('lblRefresh');
      DisableLabel('lblRefreshMin');
    }
    else
    {
      EnableCheckbox('autoconf');
      EnableInput('dadAttempt');
      EnableCheckbox('stateless');
      EnableInput('refresh');
      EnableInput('minrefresh');

      EnableLabel('lblAutoConf');
      EnableLabel('lblDadAttemps');
      EnableLabel('lblStateless');
      EnableLabel('lblRefresh');
      EnableLabel('lblRefreshMin');
    }
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_ipconfIpv6IntfAdd'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validRange('dadAttempt', data.dadAttempt_min, data.dadAttempt_max);
    valid &= validRange('refresh', data.refresh_min, data.refresh_max);
    valid &= validRange('minrefresh', data.minrefresh_min, data.minrefresh_max);
    return valid;
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<%= DialogHead(lang('ipconf','titAddIPv6Intf')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th rowspan=2><%= LabelLeft(lang('ipconf','lblIntf')) %></th>
      <td class="formContentTD">
        <table><tr>
          <td><input type=radio name="intfType" value="vlan" checked></td>
          <td class="right"><%= lang('common','lblVLAN') %></td>
          <td class="right">
            <%= SelectArry('vid', data.vlan) %>
          </td>
        </tr></table>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table><tr>
          <td><input type=radio name="intfType" value=lo></td>
          <td class="right"><%= lang('ipconf','lblLoopback') %></td>
        </tr></table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblAutoConf'), 'lblAutoConf') %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('autoconf', data.autoconf_dflt) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblDadAttemps'), 'lblDadAttemps') %></th>
      <td class="formContentTD">
        <%= InputTextDigit('dadAttempt', data.dadAttempt_dflt, 3) %>
        <%= LabelHint(lang('common','txtRangeArgDefault',[data.dadAttempt_min, data.dadAttempt_max, data.dadAttempt_dflt])) %>
      </td>
    </tr>
    <%= ShowFormTitle(show(lang('ipconf','lblDhcpv6Client'))) %>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblStateless'),'lblStateless') %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('stateless', data.stateless_dflt) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblRefresh'),'lblRefresh') %></th>
      <td class="formContentTD">
        <%= InputTextDigit('refresh', data.refresh_dflt, 10) %>
        <%= LabelHint(lang('common','txtRangeArgDefault',[data.refresh_min, data.refresh_max, data.refresh_dflt])) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblRefreshMin'),'lblRefreshMin') %></th>
      <td class="formContentTD">
        <%= InputTextDigit('minrefresh', data.minrefresh_dflt, 10) %>
        <%= LabelHint(lang('common','txtRangeArgDefault',[data.minrefresh_min, data.minrefresh_max, data.minrefresh_dflt])) %>
      </td>
    </tr>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
