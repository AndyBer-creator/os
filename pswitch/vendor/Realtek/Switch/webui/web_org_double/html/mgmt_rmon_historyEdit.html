<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var selVal;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    if (urlParamGetByName('entry').length != 0)
        selVal = urlParamGetByName('entry');
    else
      CloseDialog();
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlParamAppend(url('get_mgmtRmonHistoryEdit'),'entry',selVal)).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_mgmtRmonHistoryEdit'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validRange('reqBuckets', data.reqBuckets_min, data.reqBuckets_max);
    valid &= validRange('interval', data.interval_min, data.interval_max);
    valid &= validString('owner', false, false, true);
    return valid;
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<%= DialogHead(lang('rmon','titEditHistory')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblEditHisIdx')) %></th>
      <td class="formContentTD" id="idx">
        <%= selVal %>
        <%= InputHidden('idx', selVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblSrcIntf')) %></th>
      <td class="formContentTD">
        <%= printPortSelectOption('port', data.srcIntf) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblReqBuckets')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("reqBuckets", data.reqBuckets) %></td>
            <td class='right'><%= LabelHint(lang('common','txtRangeArgDefault',[data.reqBuckets_min,data.reqBuckets_max,data.reqBuckets_dflt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblInterval')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("interval", data.interval) %></td>
            <td class='right'><%= LabelHint(lang('common','txtRangeArgDefault',[data.interval_min,data.interval_max,data.interval_dflt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('rmon','lblOwner')) %></th>
      <td class="formContentTD">
        <%= InputText("owner", data.owner, data.owner_maxlen) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
