<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

var vifState = [
      "txtInit",
      "txtBackup",
      "txtMaster"
    ];

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_ipv4Vrrp')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'click #btnAdd':'add',
    'click #btnDel':'del'
  },

  add:function(e){
    OpenDialog('ipv4_vrrpAdd.html');
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_ipv4VrrpDel'), urlDataGen(GetTableMultiSelectVals('intf')));
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('vrrp','lblVrrpIntfTable')) %>
<table class="dataTable" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('vrrp','lblVrid') %></th>
    <th><%= lang('vrrp','lblVifaddr') %></th>
    <th><%= lang('vrrp','lblVifState') %></th>
    <th><%= lang('vrrp','lblPri') %></th>
	<th><%= lang('vrrp','lblAdver') %></th>
    <th><%= lang('vrrp','lblPreempt') %></th> 
	<th><%= lang('vrrp','lblDelay') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.intf)) { %>
  <% _.each(data.intf, function(intf, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(intf.vlan+'_'+intf.vrid+'_'+intf.vifaddr) %></td>
    <td class="NumberCell"><%= intf.vrid %></td>    
	<td class="StringCell"><%= show(intf.vifaddr) %></td>
    <td class="StringCell"><%= show(lang('vrrp', vifState[intf.state])) %></td>
    <td class="NumberCell"><%= intf.pri %></td>
    <td class="NumberCell"><%= intf.adver %></td>
	<td class="BinaryCell"><%= (intf.preempt ? lang('common','txtEnabled') : lang('common','txtDisabled')) %></td>	
	<td class="NumberCell"><%= intf.delay %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); } %>
</tbody>
</table>
<%= TableFoot(ButtonGroupAddDel('btnAdd', 'btnDel')) %>
</form>
</script>
</body>
</html>
