<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_mgmtActImg')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply'
  },
  apply: function() {
    dataSet(url('set_mgmtActImg'), formDataGet('setform'));
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th rowspan='2'><%= LabelLeft(lang('file','lblActImg')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('selIdx',data.selIdx,[0,lang('file','lblImgArg',[0])],[1,lang('file','lblImgArg',[1])]) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%= LabelHint(lang('file','lblActImgAfterReboot')) %>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('file','lblImgActName')) %>
    <tr>
      <th><%= LabelLeft(lang('file','lblSelImage')) %></th>
      <td class="formContentTD">
        <%= lang('file','lblImgArg',[data.selIdx]) + (data.actIdx==data.selIdx ? '*' :' ') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('file','lblImgVersion')) %></th>
      <td class='formContentTD'>
        <%= data.actVer %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('file','lblImgName')) %></th>
      <td class='formContentTD'>
        <%= data.actName %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('file','lblImgSize')) %></th>
      <td class="formContentTD">
        <%= lang('file','lblBytesArg',[data.actSize]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('file','lblImgTime')) %></th>
      <td class="formContentTD">
        <%= data.actTime %>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('file','lblImgBakName')) %>
    <tr>
      <th><%= LabelLeft(lang('file','lblSelImage')) %></th>
      <td class="formContentTD">
        <%= lang('file','lblImgArg',[(data.selIdx==0)?'1':'0']) + (data.actIdx!=data.selIdx ? '*' : ' ') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('file','lblImgVersion')) %></th>
      <td class='formContentTD'>
        <%= data.bakVer %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('file','lblImgName')) %></th>
      <td class='formContentTD'>
        <%= data.bakName %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('file','lblImgSize')) %></th>
      <td class="formContentTD">
        <%= lang('file','lblBytesArg',[data.bakSize]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('file','lblImgTime')) %></th>
      <td class="formContentTD">
        <%= data.bakTime %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

</form>
</script>
</body>
</html>
