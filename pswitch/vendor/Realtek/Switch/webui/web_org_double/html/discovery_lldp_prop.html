<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_discoveryLldpProp')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data = resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();

        that.lldpStatus();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'blur input[type=text]':'checkValid',
    'click #lldpStatus':'lldpStatus'
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_discoveryLldpProp'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validRange('tlvAdvIntv', data.min_tlvAdvIntv, data.max_tlvAdvIntv);
    valid &= validRange('holdMulti',  data.min_holdMulti, data.max_holdMulti);
    valid &= validRange('reinitDelay', data.min_reinitDelay, data.max_reinitDelay);
    valid &= validRange('transDelay',  data.min_transDelay, data.max_transDelay);
<!--#ifdef CONFIG_SYS_PROTO_LLDP_MED-->
    valid &= validRange('startCnt', data.min_startCnt, data.max_startCnt);
<!--#endif-->
    return valid;
  },

  lldpStatus: function(e) {
    var isChecked;
    if (IsUndefOrNull(e)) {
      isChecked = $('#lldpStatus').prop('checked');
    } else {
      isChecked = e.currentTarget.checked;
    }
    if (isChecked) {
      DisableLabel('lblFrmHandle');
      DisableRadioGroup('frmHandle');

      EnableLabel('lblTLVAdvertiseInterval');
      EnableInputText('tlvAdvIntv');
      EnableLabel('lblHoldMultiplier');
      EnableInputText('holdMulti');
      EnableLabel('lblReinitialDelay');
      EnableInputText('reinitDelay');
      EnableLabel('lblTransmitDelay');
      EnableInputText('transDelay');
      EnableLabel('lblFastStartRepeatCount');
<!--#ifdef CONFIG_SYS_PROTO_LLDP_MED-->
      EnableInputText('startCnt');
<!--#endif-->
    } else {
      EnableLabel('lblFrmHandle');
      EnableRadioGroup('frmHandle');

      DisableLabel('lblTLVAdvertiseInterval');
      DisableRadio('tlvAdvIntvType');
      DisableInputText('tlvAdvIntv');
      DisableLabel('lblTopologyChgSNMPNotifyInterval');
      DisableInputText('tcNotifyIntv');
      DisableLabel('lblHoldMultiplier');
      DisableRadio('holdMultiType');
      DisableInputText('holdMulti');
      DisableLabel('lblReinitialDelay');
      DisableRadio('reinitDelayType');
      DisableInputText('reinitDelay');
      DisableLabel('lblTransmitDelay');
      DisableRadio('transDelayType');
      DisableInputText('transDelay');
      DisableLabel('lblFastStartRepeatCount');
<!--#ifdef CONFIG_SYS_PROTO_LLDP_MED-->
      DisableInputText('startCnt');
<!--#endif-->
    }
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <%= ShowFormTitle(lang('lldp','lblLLDPProp')) %>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblLLDPStatus')) %></th>
      <td class="formContentTD">
        <%= Checkbox('lldpStatus',lang('common','txtEnable'),data.lldpStatus) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblLLDPFramesHandling'), 'lblFrmHandle') %></th>
      <td class="formContentTD">
        <%= RadioGroup('frmHandle',data.frmHandle,['filter',lang('lldp','lblFiltering')],['bridge',lang('lldp','lblBridging')],['flood',lang('lldp','lblFlooding')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblTLVAdvertiseInterval'), 'lblTLVAdvertiseInterval') %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><input type="text" digitonly name="tlvAdvIntv" id="tlvAdvIntv" value=<%= IsUndefOrNull(data.tlvAdvIntv)?"":data.tlvAdvIntv %>></td>
            <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.min_tlvAdvIntv,data.max_tlvAdvIntv,data.dflt_tlvAdvIntv])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblHoldMultiplier'),'lblHoldMultiplier') %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><input type="text" digitonly name="holdMulti" id="holdMulti" value=<%= IsUndefOrNull(data.holdMulti)?"":data.holdMulti %>></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.min_holdMulti,data.max_holdMulti,data.dflt_holdMulti])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblReinitialDelay'),'lblReinitialDelay') %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><input type="text" digitonly name="reinitDelay" id="reinitDelay" value=<%= IsUndefOrNull(data.reinitDelay)?"":data.reinitDelay %>></td>
            <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.min_reinitDelay,data.max_reinitDelay,data.dflt_reinitDelay])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblTransmitDelay'),'lblTransmitDelay') %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><input type="text" digitonly name="transDelay" id="transDelay" value=<%= IsUndefOrNull(data.transDelay)?"":data.transDelay %>></td>
            <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.min_transDelay,data.max_transDelay,data.dflt_transDelay])) %></td>
          </tr>
        </table>
      </td>
    </tr>
<!--#ifdef CONFIG_SYS_PROTO_LLDP_MED-->
    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('lldp','lblLLDPMEDProp')) %>
    <tr>
      <th><%= LabelLeft(lang('lldp','lblFastStartRepeatCount'),'lblFastStartRepeatCount') %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><input type="text" digitonly name="startCnt" id="startCnt" value=<%= data.startCnt %>></td>
            <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.min_startCnt, data.max_startCnt, data.dflt_startCnt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
<!--#endif-->
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

</form>
</script>
</body>
</html>
