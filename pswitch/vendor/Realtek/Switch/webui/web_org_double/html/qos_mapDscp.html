function init(){

  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_qosMapDscp')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();

    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnApply2':'apply2'
  },
  apply:function(e){
    dataSet(url('set_qosMapDscp'), formDataGet('setform'), 'status_container');

<script id="main_content" type="text/template">

  <%= TableLastTh() %>

</thead>

      <td class='StringCell'><%= selDscpEntries[i].name %></td>
      <td><%= Select('d2q_'+i, selQueEntries, data.dscp2que[i]) %></td>

      <td><%= Select('d2q_'+(i+16), selQueEntries, data.dscp2que[i+16]) %></td>
      <td class='StringCell'><%= selDscpEntries[i+32].name %></td>

      <td class='StringCell'><%= selDscpEntries[i+48].name %></td>
      <td><%= Select('d2q_'+(i+48), selQueEntries, data.dscp2que[i+48]) %></td>
      <%= TableLastTd() %>
    </tr>
  <% } %>
</tbody>
</table>
<%= TableFoot(ButtonApply('btnApply')) %>
