<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_snmpTrapEvent')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply'
  },
  apply: function() {
    dataSet(url('set_snmpTrapEvent'), formDataGet('setform'));
  }
 });

EnterKeyEvent('apply');
mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('snmp','lblAuthFail')) %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('authFailed',data.authFailed) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('snmp','lblLinkUpDown')) %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('linkUpDown',data.linkUpDown) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('snmp','lblColdStart')) %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('coldStart',data.coldStart) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('snmp','lblWarmStart')) %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('warmStart',data.warmStart) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

</form>
</script>
</body>
</html>
