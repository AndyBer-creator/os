<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var vlanif = 33;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlParamAppend(url('get_dhcpRelayvlanifPool'), 'vlanif', vlanif)).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;
		//console.log(data);
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_dhcpRelayStaticBindAdd'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validIPv4Addr('ipaddr');
	valid &= validRange('username', 0, 32);
	valid &= validString('username');
    return valid;
  }
  
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<%= DialogHead(lang('dr','lblDrClientStaticAdd')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('mac','lblMac')) %></th>
      <td class="formContentTD">
        <%= InputTextMac('macAddr', '', 17, 32) %>
      </td>
	</tr>
	<tr>
	  <th><%= LabelLeft(lang('common','lblVLAN')) %></th>
	  <td class="formContentTD">
	    <%= InputTextDigit('vlan', '', 4,32) %>
	    <%= LabelHint(lang('common', 'txtRangeArg', [1, 4094])) %>
	  </td>
	</tr>
	<tr>
	  <th><%= LabelLeft(lang('sys','lblIPv4Addr'),'lblIPv4Addr') %></th>
	  <td class='formContentTD'>
	    <%= InputTextIPv4('ipaddr','',15,32) %>
	  </td>
	</tr>
	<tr>
	  <th><%= LabelLeft(lang('dr','lblDrUserName')) %></th>
	  <td class="formContentTD">
	    <%= InputText('username', '', 32,32) %>
	    <%= LabelHint(lang('common', 'txtRangeArg', [1, 32])) %>
	  </td>
	</tr>
	</tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
