<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_ipconfIpv4Arp')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnCancel':'cancel',
    'click #btnAdd':'add',
    'click #btnEdit':'edit',
    'click #btnDel':'del'
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_ipconfIpv4Arp'), formDataGet('setform'));
    }
  },
  cancel: function() {
    $('#aging').val(data.aging);
    SelectRadio('clearType', 3);
  },
  add:function(e){
    OpenDialog('ipconf_ipv4_arpAdd.html');
  },
  edit:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    OpenDialog(urlParamAppend('ipconf_ipv4_arpEdit.html', 'entries', GetTableSelectVal()));
  },
  del:function(e){
    if(!CheckTableAddEditDel(e.currentTarget.id))
      return;
    dataSet(url('set_ipconfIpv4ArpDel'), urlDataGen(GetTableMultiSelectVals('entries')));
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validRange('aging', data.aging_min, data.aging_max);
    return valid;

  }
});
mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblArpAgingTime')) %></th>
      <td class="formContentTD">
        <table>
          <tr>
            <td><%= InputTextDigit("aging", data.aging, 8) %></td>
            <td class="right"><%= LabelHint(lang('common','txtSecRangeArgDefault',[data.aging_min,data.aging_max,data.aging_dflt])) %></td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblArpClear')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('clearType', 3,
          [0,lang('common','txtAll')],
          [1,lang('ipconf','lblDynamic')],
          [2,lang('ipconf','lblStatic')],
          [3,lang('ipconf','lblNormalAging')]) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= ButtonGroupApplyCancel('btnApply', 'btnCancel') %>

<%= TableHead(lang('ipconf','lblIPv4ArpTable')) %>
<table class="dataTable" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('ipconf','lblIntf') %></th>
    <th><%= lang('ipconf','lblIPAddr') %></th>
    <th><%= lang('ipconf','lblMacAddr') %></th>
    <th><%= lang('ipconf','lblStatus') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.entries)) { %>
  <% _.each(data.entries, function(entry, idx) { %>
  <tr>
    <td class="StringCell">
      <input type="checkbox"  name="selEntry" id=<%= "selEntry_"+ idx %> value=<%= entry.vlan + '_' + entry.ip + '_' + entry.mac %>></input>
    </td>
    <td class="StringCell"><%= show(entry.intf) %></td>
    <td class="StringCell"><%= show(entry.ip) %></td>
    <td class="StringCell"><%= show(entry.mac) %></td>
    <td class="StringCell"><%= show(lang('ipconf', entry.static ? 'lblStatic' : 'lblDynamic')) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); } %>
</tbody>
</table>
<%= TableFoot(ButtonGroupAddEditDel('btnAdd', 'btnEdit', 'btnDel')) %>
</form>
</script>
</body>
</html>
