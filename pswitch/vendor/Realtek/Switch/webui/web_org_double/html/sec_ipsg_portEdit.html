<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var selVal;
var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlGetPortList('port');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_secIpsgPortEdit'), urlGetSelSouce())).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
      dataSet(url('set_secIpsgPortEdit'), formDataGet('setform'));
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validRange('maxEntry',data.minEntry ,data.maxEntry);
    valid |= ($('#maxEntry').val() == 0); // unlimit

    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('ipsg','titIPSGEditPortSetting')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('portList',selVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipsg','lblStatus')) %></th>
      <td class="formContentTD">
        <%=  CheckboxTxtEnable('status', data.status) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipsg','lblVerifySrc')) %></th>
      <td class="formContentTD">
      <%= RadioGroup('verifySrcMac',data.verifySrcMac,[0,lang('ipsg','lblVerifySrcIP')],[1,lang('ipsg','lblVerifySrcMACIP')]) %>
      </td>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ipsg','lblMaxEntryNo')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit("maxEntry", data.curEntry, 2, 10) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.minEntry, data.maxEntry, data.defEntry]) + ", " + lang('common','lblHintUnLimited')) %></td>
        </tr>
        </table>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
