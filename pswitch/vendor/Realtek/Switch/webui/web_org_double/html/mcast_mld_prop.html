<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_mcastMldProp')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnEdit':'edit'
  },
  apply: function() {
      dataSet(url('set_mcastMldProp'), formDataGet('setform'));
  },
  edit:function(e){
    if(!CheckTableEdit())
      return;

    OpenDialog(urlAppend('mcast_mld_propEdit.html', dataVlanListSrc('vlan', GetTableMultiSelectVals('vlan'))));
  }
});

EnterKeyEvent('apply');
mainFrame = new mainView();

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('mcast','lblMcastState')) %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('state',data.state) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('mcast','lblMcastVersion')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('ver', data.ver, [1,lang('mcast','lblMLDv1')],[2,lang('mcast','lblMLDv2')]) %>
      </td>
    </tr>

    <tr>
      <th><%= LabelLeft(lang('mcast','lblReportSuppression')) %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('reportSup',data.reportSup) %>
      </td>
    </tr>

    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

<%= TableHead(lang('mcast','titMcastVlan')) %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('common','lblVLAN') %></th>
    <th><%= lang('common','lblOperationalStatus') %></th>
    <th><%= lang('mcast','tblMRouterPortsAutoLearn') %></th>
    <th><%= lang('mcast','tblQueryRobustness') %></th>
    <th><%= lang('mcast','tblQueryInterval') %></th>
    <th><%= lang('mcast','tblQueryMaxResponseInterval') %></th>
    <th><%= lang('mcast','tblLastMemberQueryCounter') %></th>
    <th><%= lang('mcast','tblLastMemberQueryInterval') %></th>
    <th><%= lang('mcast','tblImmediateLeave') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.vlans)) { %>
  <% _.each(data.vlans, function(vlan, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(vlan.vid) %></td>
    <td class="NumberCell"><%= vlan.vid %></td>
    <td class="BinaryCell"><%= lang('common',(vlan.operStatus)?'txtEnabled':'txtDisabled') %></td>
    <td class="BinaryCell"><%= lang('common',(vlan.autoLearn)?'txtEnabled':'txtDisabled') %></td>
    <td class="NumberCell"><%= vlan.robust %></td>
    <td class="NumberCell"><%= vlan.interval %></td>
    <td class="NumberCell"><%= vlan.maxRespInterval %></td>
    <td class="NumberCell"><%= vlan.lastMbrCnt %></td>
    <td class="NumberCell"><%= vlan.lastMbrInterval %></td>
    <td class="BinaryCell"><%= lang('common',(vlan.immedLeave)?'txtEnabled':'txtDisabled') %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>
<%= TableFoot(ButtonGroup(ButtonEdit('btnEdit'))) %>

</form>
</script>
</body>
</html>
