<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var data;
var portVal;
var ipType = 0;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    ipType = get_mcastEdit_ipVersion();
    portVal = urlGetPortList('port');
    this.render();
  },
  render: function() {
    var that = this;
    var urlFinal;
    urlFinal = mcastUrl_append_ipVer(url('get_mcastFilterEdit'), ipType);
    urlFinal = urlAppend(urlFinal, urlGetSelSouce());
    dataGet(urlFinal).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
        that.chkFilter();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click input[name=filter]':'chkFilter',
    'click #btnClose':'close'
  },
  close: function() {
    CloseDialog();
  },
  chkFilter: function() {
    if(IsCheckboxChecked('filter'))
    {
      EnableLabel('lblipVer');
      EnableSelect('idx');
    }
    else
    {
      DisableLabel('lblipVer');
      DisableSelect('idx');
    }
  },
  apply: function() {
    dataSet(url('set_mcastFilterEdit'), formDataGet('setform'));
  }
});

EnterKeyEvent('apply');
mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('mcast','titEditFilterSettings')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= portVal %>
        <%= InputHidden('portList',portVal) %>
      </td>
    </tr>

    <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    <tr>
      <th><%= LabelLeft(lang('common','lblIPVersion')) %></th>
      <td class="formContentTD">
        <%= (0 == ipType) ? lang('mcast','txtIPv4') : lang('mcast','txtIPv6')  %>
        <%= InputHidden('ipType',ipType) %>
      </td>
    </tr>
    <!--#endif-->

     <tr>
      <th rowspan=2><%= LabelLeft(lang('mcast','lblFilterProfileIndex')) %></th>
      <td class="formContentTD">
        <%= CheckboxTxtEnable('filter', data.filter) %>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <%= SelectArry('idx', data.idxs, data.idx) %>
      </td>
    </tr>

    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
