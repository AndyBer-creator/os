<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var data;
var portVal;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    if (urlParamGetByName('port').length != 0)
      portVal = urlGetPortList('port');
    else
      CloseDialog();

    this.render();
  },
  render: function() {
    var that = this;
    var urlFinal = urlParamAppend(url('get_diagOpticalIntf'), 'port', urlParamGetByName('port'));
    dataGet(urlFinal).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );

        PagePostInit();
      }
    });
  },
  events: {
    'click #btnRefresh':'refresh',
    'click #btnClose':'close'
  },
  refresh:function(e){
    this.render();
  },
  close: function() {
    CloseDialog();
  }
});

mainFrame = new mainView();

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('diag','txtOpticalIntfStatus')) %>

<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>

      <th><%= LabelLeft(lang('diag','lblOePresent')) %></th>

      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= TableFoot(ButtonGroup(ButtonRefresh('btnRefresh'),ButtonClose('btnClose'))) %>
</form>
</script>
</body>
</html>
