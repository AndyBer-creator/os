<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var selVal;
var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlGetPortList('port');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_portLAGLacpEdit'), urlGetSelSouce())).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_portLAGLacpEdit'), formDataGet('setform'));
    }
  },
  checkValid: function() {
    clearAllErrMsg();
    var valid;
    valid = true;
    valid &= validRange('portPri',data.min_portPri,data.max_portPri);
    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('lag','titEditLACPPort')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('portList',selVal) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lag','lblPortPriority')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit('portPri',data.portPri,5) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[data.min_portPri,data.max_portPri,data.dflt_portPri])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('lag','lblLACPTimeout')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('timeout',data.timeout,['long',lang('lag','lblLong')],['short',lang('lag','lblShort')]) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
