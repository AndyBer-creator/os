<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    this.$el.html(this.template());
    PagePostInit();
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
        dataSet(url('add_vlanMacGroup'), formDataGet('setform'));
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validRange('gid', parent.data.minIdx, parent.data.maxIdx);
    valid &= validMacAddr('mac', true);
    valid &= validRange('mask', 9, 48);
    return valid;
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('vlanmac','titMVAddGroup')) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('vlanmac','lblMVGroup')) %></th>
      <td class="formContentTD">
        <%= InputTextDigit('gid', '', 10, 32) %>
        <%= LabelHint(lang('common','txtRangeArg',[parent.data.minIdx, parent.data.maxIdx])) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vlanmac','lblMVMac')) %></th>
      <td class="formContentTD">
        <%= InputTextMac('mac', '', 17, 32) %>
        <%= LabelHint("(A:B:C:D:E:F)") %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vlanmac','lblMVMacMask')) %></th>
      <td class="formContentTD">
        <%= InputTextDigit('mask', '', 2, 32) %>
        <%= LabelHint(lang('common','txtRangeArg',[9, 48])) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
