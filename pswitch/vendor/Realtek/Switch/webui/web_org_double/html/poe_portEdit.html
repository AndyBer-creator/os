<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var selVal;
var data=null;

var treeSelColor = '#464646';
var treeSelBackground = '#ffeeb8';
var treeSelDocFontWeight = 'bold';

function PoeWatchDogConfig(watchDog, portWD)
{     
  if(watchDog)
  {
	  var txt = '';
	  txt += '<tr><th>';
	  txt += LabelLeft(lang('poe','lblPoePortWatchDog'));
	  txt += '</th><td class="formContentTD">'
	  txt += RadioGroup('portWatchDog', portWD, [1,lang('common','txtEnable')], [0,lang('common','txtDisable')]);
	  txt += '</td></tr>';
	  return txt;
  }
}
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlGetPortList('port');
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(urlAppend(url('get_poePortEdit'), urlGetSelSouce())).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close'
//    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    //if (this.checkValid())
    //{
      dataSet(url('set_poePortEdit'), formDataGet('setform'));
    }
  //},
  //checkValid:function(){
  //  var valid = true;
  //  clearAllErrMsg();
  //  valid &= validRange('portPowerLimit',data.portPowerLimit_min,data.portPowerLimit_max);
  //  return valid;
  //}
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}

</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('poe','titPoeEditPortSetting')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= selVal %>
        <%= InputHidden('portList',selVal) %>
      </td>
    </tr>	
    <tr>
      <th><%= LabelLeft(lang('poe','lblPoePortEnable')) %></th>
      <td class="formContentTD">
		<%= RadioGroup('portEnable', data.portEnable, [1,lang('common','txtEnable')], [0,lang('common','txtDisable')]) %>
      </td>
    </tr>
    <!--<tr>
      <th><%= LabelLeft(lang('poe','lblPoePortWatchDog')) %></th>
      <td class="formContentTD">
	  <%= RadioGroup('portWatchDog', data.portWatchDog, [1,lang('common','txtEnable')], [0,lang('common','txtDisable')]) %>
      </td>
    </tr>-->
	<%= PoeWatchDogConfig(data.watchDog, data.portWatchDog) %>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
