<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function(_url) {
    var that = this;
    dataGet(url('get_diagOptical')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
    'click #btnView':'view',
    'click #btnRefresh':'refresh'
  },
  view:function(e){
    if (!CheckTableEdit())
      return;
    OpenDialog(urlParamAppend('diag_opticalIntf.html', 'port', GetTableSelectVal()));
  },
  refresh:function(e){
    this.render();
  }
});

mainFrame = new mainView();

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">
<%= TableHead(lang('diag','lblOpticalModuleStatusTable')) %>
<table class="dataTable" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><img src="../images/empty.gif"/></th>
    <th><%= lang('port','lblPort') %></th>
    <th><%= lang('diag','lblTemperature') %></th>
    <th><%= lang('diag','lblVoltage') %></th>
    <th><%= lang('diag','lblCurrent') %></th>
    <th><%= lang('diag','lblOutputPower') %></th>
    <th><%= lang('diag','lblInputPower') %></th>
    <th><%= lang('diag','lblOePresent') %></th>
    <th><%= lang('diag','lblLossOfSignal') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.ports)) { %>
  <% _.each(data.ports, function(port, idx) { %>
    <tr>
      <td class="StringCell"><%= TableRadio(port.port) %></td>
      <td class="StringCell"><%= getPortId(port.port) %></td>
      <td class="StringCell"><%= show(port.temp) %></td>
      <td class="StringCell"><%= show(port.volt) %></td>
      <td class="StringCell"><%= show(port.bias) %></td>
      <td class="StringCell"><%= show(port.txPwr) %></td>
      <td class="StringCell"><%= show(port.rxPwr) %></td>
      <td class="StringCell"><%= show(port.oe) %></td>
      <td class="StringCell"><%= show(port.los) %></td>
      <%= TableLastTd() %>
    </tr>
  <% }); } %>
</tbody>
</table>
<%= TableFoot(ButtonGroup(ButtonRefresh('btnRefresh'),ButtonShort(lang('diag','btnDetail'),'btnView'))) %>
</form>
</script>
</body>
</html>
