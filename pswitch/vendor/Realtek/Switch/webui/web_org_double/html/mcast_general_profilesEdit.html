<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var data;
var selVal;
var selIdx;
var ipType = 0;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    selVal = urlParamGetByName('idx');
    for (i = 0; i < parent.data.profiles.length; i++)
    {
      if (parent.data.profiles[i].idx == selVal)
        selIdx = i;
    }
    ipType = get_mcastEdit_ipVersion();
    this.render();
  },
  render: function() {
    var that = this;
    var urlFinal = urlParamAppend(url('get_mcastProfilesEdit'), 'idx', selVal);
        urlFinal = mcastUrl_append_ipVer(urlFinal,ipType);
    dataGet(urlFinal).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
        <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
        that.display();
        <!--#endif-->
      }
    });
  },
  events: {
    'click #btnApply':'applyClick',
    'click #btnClose':'closeClick',
    'blur input[type=text]':'checkValid'
  },
  closeClick: function() {
    CloseDialog();
  },
  applyClick: function() {
    if (this.checkValid())
      dataSet(url('set_mcastProfilesEdit'), formDataGet('setform'));
  },
  <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
  display:function(){
    if (0 == ipType)
    {
      $('#showStartIpv4').css('display','');
      $('#showEndIpv4').css('display','');
      $('#showStartIpv6').css('display','none');
      $('#showEndIpv6').css('display','none');
    }
    else
    {
      $('#showStartIpv4').css('display','none');
      $('#showEndIpv4').css('display','none');
      $('#showStartIpv6').css('display','');
      $('#showEndIpv6').css('display','');
    }
  },
  <!--#endif-->
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    if (0 == ipType)
    {
      valid &= validIPv4McastAddr('mcastAddrStartv4');
      valid &= validIPv4McastAddr('mcastAddrEndv4');
    }
    <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    else
    {
      valid &= validIPv6McastAddr('mcastAddrStartv6');
      valid &= validIPv6McastAddr('mcastAddrEndv6');
    }
    <!--#endif-->
    return valid;
  }
});

EnterKeyEvent('applyClick');
mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('mcast','titEditProfile')) %>
<%= InputHidden('idx',selVal) %>
<%= InputHidden('ipType',ipType) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">

    <tr>
      <th><%= LabelLeft(lang('mcast','lblProfileIndex')) %></th>
      <td class="formContentTD">
        <%= selVal %>
      </td>
    </tr>

    <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    <tr>
      <th><%= LabelLeft(lang('common','lblIPVersion')) %></th>
      <td class="formContentTD">
        <%= (0 == ipType) ? lang('mcast','txtIPv4') : lang('mcast','txtIPv6')  %>
      </td>
    </tr>
    <!--#endif-->

    <tr id="showStartIpv4">
      <th><%= LabelLeft(lang('mcast','lblStartMulticastAddr')) %></th>
      <td class="formContentTD">
      <%= InputTextIPv4('mcastAddrStartv4', parent.data.profiles[selIdx].startAddr, data.max_ipv4strlenth) %>
      </td>
    </tr>

    <tr id="showEndIpv4">
      <th><%= LabelLeft(lang('mcast','lblEndMulticastAddr')) %></th>
      <td class="formContentTD">
      <%= InputTextIPv4('mcastAddrEndv4', parent.data.profiles[selIdx].endAddr, data.max_ipv4strlenth) %>
      </td>
    </tr>

    <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    <tr id = "showStartIpv6">
      <th><%= LabelLeft(lang('mcast','lblStartMulticastAddr')) %></th>
      <td class="formContentTD">
      <%= InputTextIPv6('mcastAddrStartv6', parent.data.profiles[selIdx].startAddr, data.max_ipv6strlenth) %>
      </td>
    </tr>


    <tr id = "showEndIpv6">
      <th><%= LabelLeft(lang('mcast','lblEndMulticastAddr')) %></th>
      <td class="formContentTD">
      <%= InputTextIPv6('mcastAddrEndv6', parent.data.profiles[selIdx].endAddr, data.max_ipv6strlenth) %>
      </td>
    </tr>
    <!--#endif-->

    <tr>
      <th><%= LabelLeft(lang('mcast','lblAction')) %></th>
      <td class="formContentTD">
         <%= RadioGroup('act',str2var(parent.data.profiles[selIdx].act),['Allow',lang('mcast','lblAllow')],['Deny',lang('mcast','lblProfDeny')]) %>
      </td>
    </tr>

    </table>
  </td>
</tr>
</table>

<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>


</form>
</script>

</body>
</html>
