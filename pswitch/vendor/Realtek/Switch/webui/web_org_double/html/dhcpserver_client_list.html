<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_dhcpRelayClients')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();
      }
    });
  },
  events: {
	'click #btnRefresh':'refresh'
  },
  refresh:function(e){
    this.render();
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('dr','lblDrclients')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th rowspan="1"><%= TableCheckboxAll() %></th>
    <th rowspan="1"><%= lang('mac','titMacAddressTable') %></th>
    <th rowspan="1"><%= lang('sys','lblIPv4Addr') %></th>
    <th rowspan="1"><%= lang('dr','lblDrVlanid') %></th>
    <th rowspan="1"><%= lang('common','lblHostname') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.clientList)) { %>
  <% _.each(data.clientList, function(client, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(client.macAddr) %></td>
    <td class="StringCell"><%= show(client.macAddr) %></td>
    <td class="StringCell"><%= show(client.ipaddr) %></td>
    <td class="NumberCell"><%= client.vlan %></td>
    <td class="StringCell"><%= show(client.hostname) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); } %>
</tbody>
</table>
<%= TableFoot(ButtonGroup(ButtonRefresh('btnRefresh'))) %>
</form>
</script>
</body>
</html>
