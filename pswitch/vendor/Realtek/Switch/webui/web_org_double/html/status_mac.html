<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_statusMac')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        if (isIE() && isIE() < 9 && !IsUndefOrNull(data.entries) && data.entries.length > 2000)
        {
          $('.dataTable').find('tbody').find('tr').each(function(idx){
            if (idx % 2 == 0) {
              $(this).prop('className','odd');
            } else {
              $(this).prop('className','even');
            }
          });
          _top.progressDisable();
        }
        else
        {
          PagePostInit();
        }
      }
    });
  },
  events: {
    'click #btnRefresh':'refresh',
    'click #btnClear':'clear',
    'blur input:text':'checkValid'
  },
  refresh:function(e){
    this.render();
  },
  clear: function() {
    dataSet(url('set_statusMac'), formDataGet('setform'));
  },
  checkValid: function(){
    clearAllErrMsg();
    var valid = true;

    return valid;
  }
});

mainFrame = new mainView();
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= TableHead(lang('mac','titMacAddressTable')) %>
<table class="dataTable paging" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= lang('common','lblVLAN') %></th>
    <th><%= lang('mac','lblMac') %></th>
    <th><%= lang('mac','lblType') %></th>
    <th><%= lang('common','lblPort') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% _.each(data.entries, function(entry, idx) { %>
  <tr>
    <td class="NumberCell"><%= entry.vlan %></td>
    <td class="StringCell"><%= entry.macAddr %></td>
    <td class="StringCell"><%= show(entry.type) %></td>
    <td class="StringCell"><%= show(entry.port) %></td>
    <%= TableLastTd() %>
  </tr>
  <% }); %>
</tbody>
</table>

<%= TableFoot(ButtonGroup(ButtonClear('btnClear'),ButtonRefresh('btnRefresh'))) %>

</form>
</script>
</body>
</html>
