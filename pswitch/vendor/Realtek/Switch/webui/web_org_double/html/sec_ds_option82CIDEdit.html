<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var port;
var vlan;
var cid;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var key = decodeURIComponent(location.search).replace('?idx=', '');
    var strTok = key.split("?");
    port = getPortId(strTok[0]);
    vlan = strTok[1];
    cid = strTok[2];

    if (vlan == '4095')
      vlan = '';

    this.$el.html(this.template());
    PagePostInit();
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
        dataSet(url('set_secDsOption82CID'), formDataGet('setform'), false);
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validRange('vlan',1 ,4094, false, true);
    valid &= validString('cid');
    return valid;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('ds','titEditOption82CID')) %>
<%= InputHidden('port', port) %>
<%= InputHidden('vlan', vlan) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <%= port %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('common','lblVLAN')) %></th>
      <td class="formContentTD">
        <%= vlan %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('ds','lblCircuitID')) %></th>
      <td class="formContentTD">
        <%= InputText('cid', cid, parent.data.maxlen, 30) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>

</form>
</script>

</body>
</html>
