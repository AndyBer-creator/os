<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();
function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    this.$el.html(this.template());
    PagePostInit();
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'change #notMbrs':'mbrSelected',
    'change #mbrs':'mbrSelected',
    'click #btnAdd':'mbrSelected',
    'click #btnRem':'mbrSelected',
    'blur input':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
    {
      MultiSelectApplySelect('mbrs');
      dataSet(url('set_vlanProtocolBinding'), formDataGet('setform'));
      MultiSelectDeselectAll('mbrs');
    }
  },
  mbrSelected: function(e) {
    MultiSelectTransferUpdate(e.currentTarget.id, 'btnAdd', 'btnRem', 'notMbrs', 'mbrs');
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validVlanRange('vlan');
    return valid;
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('vlanprotocol','titPVAddBinding')) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th rowspan='2'><%= LabelLeft(lang('port','lblPort')) %></th>
      <td class="formContentTD">
        <table>
        <thead>
        <tr>
          <td class='ctrlSpacing'><%= LabelTopMulti(lang('common','lblAvailablePort')) %></td>
          <td class='ctrlSpacing'></td>
          <td class='ctrlSpacing right'><%= LabelTopMulti(lang('common','lblSelPort')) %></td>
        </tr>
        </thead >
        <tbody >
        <tr>
          <td rowspan="2">
            <select name="notMbrs" id="notMbrs" style="WIDTH: 90px" multiple size="8">
            <% _.each(parent.data.notMbrs, function(port, index) { %>
              <option value=<%= port.port %>><%= port.port %></option>
            <% }); %>
            </select>
          </td>
          <td class=right>
            <%= ButtonTransferDisabled('btnAdd', 'btnRem') %>
          </td>
          <td rowspan="2" class=right>
            <select name="mbrs" id="mbrs" style="WIDTH: 90px" multiple size="8">
            </select>
          </td>
        </tr>
        </tbody >
        </table>
      </td>
    </tr>
    <tr>
      <td class="formContentTD"><%= LabelHint(lang('vlanprotocol', 'msgPVHybridPort')) %></td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vlanprotocol','lblPVGroup')) %></th>
      <td class="formContentTD">
        <%= Select("gid", parent.data.groups) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('common','lblVLAN')) %></th>
      <td class="formContentTD">
        <%= InputTextDigit('vlan', '', 4, 10) %>
        <%= LabelHint(lang('common','txtRangeArg',[1, 4094])) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
