<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var frameTypes =
{
    "frameType": [
      { "name":"Ethernet_II", "val":1 },
      { "name":"IEEE802.3_LLC_Other", "val":5 },
      { "name":"RFC_1042", "val":2 }
    ]
};

var group;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var gid = urlParamGetByName('gid');

    if (!IsUndefOrNull(parent.data.groups))
    {
      for (var i = 0 ; i < parent.data.groups.length; i++)
      {
        if (parent.data.groups[i].gid == gid)
        {
          group = parent.data.groups[i];
          break;
        }
      }
    }

    this.$el.html(this.template());
    PagePostInit();
    DisableSelect('gid');
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
    {
        EnableSelect('gid');
        dataSet(url('set_vlanProtocolGroup'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;

    valid &= validRange('protocolvalue', 0x600, 0xfffe, false, false, true);

    if (!IsUndefOrNull(parent.data.groups))
    {
      for (var i = 0 ; i < parent.data.groups.length; i++)
      {
        if ((parent.data.groups[i].frameType == GetSelectVal('frameType')) &&
              (parent.data.groups[i].protocolvalue == $('#protocolvalue').val().toUpperCase()))
        {
          //ShowStatusWarning("Protocol group settings is same as group id " + parent.data.groups[i].gid);
		  ShowStatusWarning(lang('warning','warningProtocolGroup', parent.data.groups[i].gid));
          return;
        }
      }
    }

    return valid;
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('vlanprotocol','titPVEditGroup')) %>
<%= InputHidden('gid', group.gid) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('vlanprotocol','lblPVGroup')) %></th>
      <td class="formContentTD">
        <%= group.gid %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vlanprotocol','lblPVFrameType')) %></th>
      <td class="formContentTD">
        <%= Select("frameType", frameTypes.frameType, group.frameType) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vlanprotocol','lblPVProtocolValue')) %></th>
      <td class="formContentTD">
        0x&#32;&#32;<%= InputTextHex('protocolvalue', group.protocolvalue, 4, 32) %>
        <%= LabelHint("(0x600 ~ 0xFFFE)") %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
