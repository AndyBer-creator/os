<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadDialog();

var data;
var ipType;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_mcastGroupAdd')).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();
        that.chgType();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    'change #ipType':'chgType',
    <!--#endif-->
    'change #notMbrs':'mbrSelected',
    'change #grpMbrs':'mbrSelected',
    'click #btnAdd':'mbrSelected',
    'click #btnRem':'mbrSelected',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid())
    {
      MultiSelectApplySelect('grpMbrs');
      dataSet(url('set_mcastGroupAdd'), formDataGet('setform'));
      MultiSelectDeselectAll('grpMbrs', 'notMbrs');
    }
  },
  <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
  chgType: function() {
    if ('IPv4' == GetSelectVal('ipType'))
    {
      $('#showIpv4').css('display','');
      $('#showIpv6').css('display','none');
    }
    else
    {
      $('#showIpv4').css('display','none');
      $('#showIpv6').css('display','');
    }
  },
  <!--#endif-->
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    var ipVer = 'IPv4';
    <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    ipVer = GetSelectVal('ipType');
    <!--#endif-->

    if ('IPv4'== ipVer)
      valid &= validIPv4McastAddr('mcastAddrv4');

    <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    else
      valid &= validIPv6McastAddr('mcastAddrv6');
    <!--#endif-->

    return valid;
  },
  mbrSelected: function(e) {
    MultiSelectTransferUpdate(e.currentTarget.id, 'btnAdd', 'btnRem', 'notMbrs', 'grpMbrs');
  }
});

EnterKeyEvent('apply');
mainFrame = new mainView();
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">
<form id="setform">
<%= DialogHead(lang('mcast','titAddGroup')) %>
<table>
<tbody>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>

    <tr>
      <th><%= LabelLeft(lang('common','lblVLAN')) %></th>
      <td class="formContentTD">
        <%= SelectArry("vid", data.vids) %>
      </td>
    </tr>

   <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    <tr>
      <th><%= LabelLeft(lang('common','lblIPVersion')) %></th>
      <td class="formContentTD">
        <%= SelectArry("ipType", data.iptypes) %>
      </td>
    </tr>
    <!--#endif-->

    <tr id = "showIpv4">
      <th><%= LabelLeft(lang('mcast','lblMcastGroupAddr')) %></th>
      <td class="formContentTD">
      <%= InputTextIPv4('mcastAddrv4', '') %>
      </td>
    </tr>

    <!--#ifdef CONFIG_SYS_PROTO_MLD_SNOOPING-->
    <tr id = "showIpv6">
      <th><%= LabelLeft(lang('mcast','lblMcastGroupAddr')) %></th>
      <td class="formContentTD">
      <%= InputTextIPv6('mcastAddrv6', '') %>
      </td>
    </tr>
    <!--#endif-->

   <tr>
      <th><%= LabelLeft(lang('common','lblMbrPorts')) %></th>
      <td class="formContentTD">
        <table>
        <thead>
        <tr>
          <td class='ctrlSpacing'><%= LabelTopMulti(lang('common','lblAvailablePort')) %></td>
          <td class='ctrlSpacing'></td>
          <td class='ctrlSpacing right'><%= LabelTopMulti(lang('common','lblSelPort')) %></td>
        </tr>
        </thead >
        <tbody >
        <tr>
          <td rowspan="2">
            <select name="notMbrs" id="notMbrs" style="WIDTH: 90px" multiple size="8">
            <% _.each(_top.data.ports, function(port, index) { %>
              <option value=<%= port.port %>><%= port.port %></option>
            <% }); %>
            </select>
          </td>
          <td class=right>
            <%= ButtonTransferDisabled('btnAdd', 'btnRem') %>
          </td>
          <td rowspan="2" class=right>
            <select name="grpMbrs" id="grpMbrs" style="WIDTH: 90px" multiple size="8">
            <% _.each(data.grpMbrs, function(port, index) { %>
              <option value=<%= port.port %>><%= port.port %></option>
            <% }); %>
            </select>
          </td>
        </tr>
        </tbody >
        </table>
      </td>
    </tr>

    </tbody>
    </table>
  </td>
</tr>
</tbody>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>


</form>
</script>

</body>
</html>
