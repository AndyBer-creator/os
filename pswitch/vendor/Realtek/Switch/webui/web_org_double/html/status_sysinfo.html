function _xPos(port, layout)
{
  var relatedPort = port - layout.portStart + 1;
  var xpos = 0;
  switch (layout.alignType)
  {
    case 0: /*ALIGN_TYPE_PLAIN*/
      xpos = layout.baseXpos + (relatedPort * layout.imgWidth);
      if (layout.gapWidth > 0)
      {
        gapCount = parseInt((relatedPort - 1) / layout.groupNum);
        xpos += gapCount * layout.gapWidth;
      }
      if (layout.imgType == 5) /*IMG_TYPE_PORTNUM*/
      {
        xpos = xpos + 13;
        if (port >= 10)
          xpos = xpos - 3;
      }
      break;

    case 1: /*ALIGN_TYPE_STACK*/
    case 2: /*ALIGN_TYPE_STACK_REV*/
      xpos = layout.baseXpos + (parseInt((relatedPort - 1) / 2) * layout.imgWidth);
      if (layout.gapWidth > 0)
      {
        gapCount = parseInt((relatedPort - 1) / layout.groupNum);
        xpos += gapCount * layout.gapWidth;
      }
      if (layout.imgType == 5) /*IMG_TYPE_PORTNUM*/
      {
          xpos = xpos + 8;
          if (port >= 10)
              xpos = xpos - 3;
      }
      break;

    default:
      break;
  }
  return parseInt(xpos);
}

function _yPos(port, layout)
{
  var ypos = 0;
  switch (layout.alignType)
  {
    case 0: /*ALIGN_TYPE_PLAIN*/
      ypos = layout.oddYpos;
      if (layout.imgType == 5) /*IMG_TYPE_PORTNUM*/
      {
        ypos = ypos + 19;
      }
      break;

    case 1: /*ALIGN_TYPE_STACK*/
      if ((port % 2) == 0)
        ypos = layout.oddYpos;
      else
        ypos = layout.evenYpos;
      if (layout.imgType == 5) /*IMG_TYPE_PORTNUM*/
      {
        if ((port % 2) == 0)
          ypos = ypos + 19;
        else
          ypos = ypos - 14;
      }
      break;

    case 2: /*ALIGN_TYPE_STACK_REV*/
      if ((port % 2) == 1)
        ypos = layout.oddYpos;
      else
        ypos = layout.evenYpos;
      if (layout.imgType == 5) /*IMG_TYPE_PORTNUM*/
      {
        if ((port % 2) == 1)
          ypos = ypos + 19;
        else
          ypos = ypos - 14;
      }
      break;

    default:
      break;
  }
  return parseInt(ypos) + 10;
}

function _speedDuplexStr(portInfo)
{
  var sd = '';
  if (portInfo.linkup){
    sd += portInfo.speed + 'Mbps';
    if (portInfo.dupFull)
      sd += 'FullDuplex';
    else
      sd += 'HalfDuplex';
  }

  return sd;
}

function showDeivce()
{
  var txt = '';
  var portnum = _top.devPortNum;

  txt += '<img id="panel" src="'+panelImgPrefix+dev_layout.bgImg+'">';
  <!-- txt += '<div style="position: absolute; top: 26px; left: 30px;"><img src="../images/logo/'+dev_layout.logoImg+'"></div>';-->

  for (port = 1; port <= portnum; port++)
  {
    var portIdx = port - 1;
    for (i = 0; i < dev_layout.layout.length; i++)
    {
      var layout = dev_layout.layout[i];
      if (port >= layout.portStart && port <= layout.portEnd)
      {
        if (layout.imgType == 5) { /*IMG_TYPE_PORTNUM*/
          txt += '<div style="position:absolute;top:'+_yPos(port,layout)+'px;left:'+_xPos(port,layout)+'px;">';
          txt += port +'</div>'
        }
        else if(layout.imgType == 8) { /*IMG_TYPE_FONT*/
          txt += '<div style="position:absolute;top:'+_yPos(port,layout)+'px;left:'+_xPos(port,layout)+'px;">';
          txt += layout.showDes +'</div>'
        }
        else if(layout.imgType == 9) { /*IMG_TYPE_CONSOLE*/
          txt += '<div style="position:absolute;top:'+_yPos(port,layout)+'px;left:'+_xPos(port,layout)+'px;" id="port_'+portIdx+'_'+layout.imgType+'">';
          txt += '<img border="0" id="img_'+portIdx+'_'+layout.imgType+'" src="'+_imgName(port, layout)+'">';
          txt += '</div>';
        }
        else if(layout.imgType == 10) { /*IMG_TYPE_USB*/
          txt += '<div style="position:absolute;top:'+_yPos(port,layout)+'px;left:'+_xPos(port,layout)+'px;" id="port_'+portIdx+'_'+layout.imgType+'">';
          txt += '<img border="0" id="img_'+portIdx+'_'+layout.imgType+'" src="'+_imgName(port, layout)+'">';
          txt += '</div>';
        }
        else {
          txt += '<div style="position:absolute;top:'+_yPos(port,layout)+'px;left:'+_xPos(port,layout)+'px;" id="port_'+portIdx+'_'+layout.imgType+'">';
          txt += '<img border="0" id="img_'+portIdx+'_'+layout.imgType+'" src="'+_imgName(port, layout)+'">';
          txt += '</div>';
        }
      }
    }
  }

  $('#deviceTD').html(txt);
}

function updatePortInfo()
{
  var portnum = _top.devPortNum;

  for (port = 1; port <= portnum; port++)
  {
    var portIdx = port - 1;

    if (!IsUndefOrNull(old_dev_data) && (JSON.stringify(old_dev_data.ports[portIdx]) == JSON.stringify(dev_data.ports[portIdx])))
    {
      continue;
    }

    for (i = 0; i < dev_layout.layout.length; i++)
    {
      var layout = dev_layout.layout[i];
      if (port >= layout.portStart && port <= layout.portEnd)
      {
        var portInfo = '';
        var txt = '';
        
        if((layout.imgType == 9) || (layout.imgType == 7) || (layout.imgType == 6) || (layout.imgType == 10)){ 
          /*IMG_TYPE_CONSOLE*/  /*IMG_TYPE_SYS_LED*/  /*IMG_TYPE_POE_LED*/ /*IMG_TYPE_USB*/
            txt += '<img border="0" id="img_'+portIdx+'_'+layout.imgType+'" src="'+_imgName(port, layout)+'">';
        }
        else{
            if (!IsUndefOrNull(dev_data)) {
            portInfo += "<b>Auto Nego : </b>"+((dev_data.ports[portIdx].autoNego)?lang('common', 'txtEnabled'):lang('common', 'txtDisabled'))+"<BR>";
            portInfo += "<b>Speed : </b>"+_speedDuplexStr(dev_data.ports[portIdx])+"<BR>";
          }
          txt += '<a href="/html/port_port.html?port='+portIdx+'"';
          txt += ' onmouseover="hideMenu();overlib(\''+portInfo+'\', BGCOLOR, \'#2B60DE\', CAPTION, \'Port : '+getPortId(portIdx)+'\', CAPCOLOR , \'#FFFFFF\', ABOVE, WIDTH, 200)"';
          txt += ' onmouseout="return nd();"';
          txt += ' onclick="return gotoPortSretting('+portIdx+');"';
          txt += ' oncontextmenu="javascript:nd();showContext(event,\''+portIdx+'\')" >';
          txt += '<img border="0" id="img_'+portIdx+'_'+layout.imgType+'" src="'+_imgName(port, layout)+'">';
          txt += '</a>';
        }
        $('#port_'+portIdx+'_'+layout.imgType).html(txt);
      }
    }
  }
}

function refreshDevice()
{
  dataGet(url('get_statusPanel')).fetch({
    success: function(model, resp){
      logoutCheck(resp);
      old_dev_data = dev_data;
      dev_data = resp.data;
      updatePortInfo();
      if (_top.panelRefresh)
        setTimeout(refreshDevice, 5000);
    },
    error: function(model, resp){
      if (_top.panelRefresh)
        setTimeout(refreshDevice, 5000);
    }
  });
}

/* CPU and Memory Usage (Start) */
var cpudata = [];
var memdata = [];
var cpudataset;
var memdataset;
var totalPoints = 50;
var updateInterval = 5000;
//var now = new Date().getTime();
var now;
function GetData() {
  var c;
  var m;
  var cObj;
  var mObj;
  var currTime = now;
  now += updateInterval;
  if (cpudata.length == 0) {
    for (var i = 0; i < totalPoints; i++) {
      cObj = [currTime - ((totalPoints - i)*updateInterval), 0];
      cpudata.push(cObj);
      memdata.push(cObj);
    }
  }
  if (_top.MockupMode) {
    c = Math.random() * 100;
    m = Math.random() * 100;
    cObj = [currTime, c];
    mObj = [currTime, m];
    cpudata.shift();
    cpudata.push(cObj);
    memdata.shift();
    memdata.push(mObj);
  } else {
    dataGet(url('get_statusCpuMem')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        cObj = [currTime, resp.data.cpu];
        mObj = [currTime, resp.data.mem];
        cpudata.shift();
        cpudata.push(cObj);
        memdata.shift();
        memdata.push(mObj);
      }
    });
  }
}

var options = {
	v:now,
    series: {
        lines: {
            show: true,
            lineWidth: 1.2,
            fill: true
        }
    },
    xaxis: {
        mode: "time",
        tickSize: [30, "second"],
        tickFormatter: function (v, axis) {
            var date = new Date(v);
            if (date.getUTCSeconds() % 20 == 0) {
                var hours = date.getUTCHours() < 10 ? "0" + date.getUTCHours() : date.getUTCHours();
                var minutes = date.getUTCMinutes() < 10 ? "0" + date.getUTCMinutes() : date.getUTCMinutes();
                var seconds = date.getUTCSeconds() < 10 ? "0" + date.getUTCSeconds() : date.getUTCSeconds();

                return hours + ":" + minutes + ":" + seconds;
            } else {
                return "";
            }
        },
        //axisLabel: "Time",
        axisLabelUseCanvas: true,
        axisLabelFontSizePixels: 12,
        axisLabelFontFamily: 'Verdana, Arial',
        axisLabelPadding: 10,
        color: "#4F4F4F"
    },
    yaxis: {
        min: 0,
        max: 100,
        tickSize: 5,
        tickFormatter: function (v, axis) {
            if (v % 10 == 0) {
                return v + "%";
            } else {
                return "";
            }
        },
        axisLabel: "",
        axisLabelUseCanvas: true,
        axisLabelFontSizePixels: 12,
        axisLabelFontFamily: 'Verdana, Arial',
        axisLabelPadding: 6,
        color: "#4F4F4F"
    },
    legend: {
        labelBoxBorderColor: "#fff"
    },
    grid: {
        hoverable: true,
        borderWidth: 2,
        backgroundColor: { colors: ["#DBDFE2", "#DBDFE2"] }
    }
};

function update() {
    GetData();

    $.plot($("#cpu_usage"), cpudataset, options);
    $.plot($("#mem_usage"), memdataset, options);

    setTimeout(update, updateInterval);
}
/* CPU and Memory Usage (End) */

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_statusSysinfo')).fetch({
      success: function(model, resp){
        logoutCheck(resp, top);
        data = resp.data;
        ipv6Row = data.currIpv6.length;
        if (0 == ipv6Row)
          ipv6Row = 1;
		now=data.sec*1000;
        that.$el.html( that.template(resp) );
        PagePostInit();

        dataGet(url('get_statusPanelLayout')).fetch({
          success: function(model, resp){
            dev_layout = resp.data;

            showDeivce();
            refreshDevice();
            _top.panelRefresh = true;

            /* CPU Usage */
            cpudataset = [
                { label: "CPU", color:"#41A4B9", data: cpudata }
            ];
            memdataset = [
                { label: "MEM", color:"#41A4B9", data: memdata }
            ];
            options.xaxis.axisLabel=lang('sys','lblTime');
            update();
			timeRefresh();
          }
        });
      }
    });
  },
  events: {
    'click #btnEdit':'edit'
  },
  edit: function() {
    OpenDialog('status_sysinfoEdit.html');
    //dataSet(url('set_statusSysinfo'), formDataGet('setform'));
  }
});
mainFrame = new mainView();

EnterKeyEvent('edit');
}

function varticalGetData()
{
	dataGet(url('get_statusSysTime')).fetch({
	success: function(model, resp){
	logoutCheck(resp, top);
	data = resp.data;
	}
	});
}

function timeRefresh()
{
	varticalGetData();
	$("#currTime_refresh").html(data.sysCurrTime);
	$("#upTime_refresh").html(show(data.sysUpTime));
	setTimeout(timeRefresh,2000);		
}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="panelPortMenu">
<table>
<tr><td>
  <table>
    <tr>
      <td onMouseOver="bgColor='#79BAEC'" onMouseOut="bgColor=''" onClick="gotoPortSretting();">Port Configuration</td>
    </tr>
    <tr>
       <td onMouseOver="bgColor='#79BAEC'" onMouseOut="bgColor=''" onClick="gotoPortStatistic();">Port Statistics</td>
    </tr>
  </table>
</td></tr>
</table>
</div>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<table>
  <tbody>
  <tr>
    <td id="deviceTD">
    </td>
  </tr>
  </tbody>
</table>
<hr>

<br>

            <%= data.fwVer %>
          </td>
        </tr>
        <tr>
          <th><%= LabelLeft(lang('sys','lblFwDate')) %></th>
          <td class="formContentTD">
            <%= data.fwDate %>
          </td>
        </tr>
        <%= ShowFormContentGap() %>
      <% _.each(data.methods, function(entry, idx) { %>
        <tr>
          <th><%= LabelLeft(show(entry.txt)) %></th>
          <td class="formContentTD">
            <%= entry.state ? lang('common','txtEnabled') : lang('common','txtDisabled') %>
          </td>
        </tr>
      <% });%>
        </tbody>
        </table>
      </td>
    </tr>
    </table>
  </td>
  <td>
    <div style="width:350px;height:250px;text-align:center;margin:10px">
      <div id="cpu_usage" style="width:100%;height:100%;"></div>
    </div>
  </td>
</tr>
<tr>
  <td>
    <div style="width:350px;height:250px;text-align:center;margin:10px">
      <div id="mem_usage" style="width:100%;height:100%;"></div>

</form>
