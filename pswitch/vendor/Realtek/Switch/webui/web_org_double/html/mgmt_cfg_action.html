<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var type;
var fileType='running';
var bakCfg = false;
var isImg = false;

function operDone(sts)
{
  var finalMsg = '';
  var fileTypeStr = '';
  _top.progressDisable();

  $('#mainDiv').css('display','none');
  $('#statusDiv').css('display','');

  if (_top.MockupMode) {
    if ('running' == GetRadioVal('fileType')) {
      fileTypeStr = lang('file','lblRunningCfg');
    } else if ('startup' == GetRadioVal('fileType')) {
      fileTypeStr = lang('file','lblStartupCfg');
    }
<!--#ifdef CONFIG_SYS_BACKUP_CONFIGURATION-->
    else if ('backup' == GetRadioVal('fileType')) {
      fileTypeStr = lang('file','lblBackupCfg');
    }
<!--#endif-->
    else if ('logBuffer' == GetRadioVal('fileType')) {
      fileTypeStr = lang('file','lblBufferLog');
    } else if ('logFlash' == GetRadioVal('fileType')) {
      fileTypeStr = lang('file','lblFlashLog');
    }
    finalMsg += lang('file','txtUpgradeOK',[fileTypeStr]);
  } else {
    if ('running' == fileType) {
      fileTypeStr = lang('file','lblRunningCfg');
    } else if ('startup' == fileType) {
      fileTypeStr = lang('file','lblStartupCfg');
    }
<!--#ifdef CONFIG_SYS_BACKUP_CONFIGURATION-->
    else if ('backup' == fileType) {
      fileTypeStr = lang('file','lblBackupCfg');
    }
<!--#endif-->
    else if ('logBuffer' == fileType) {
      fileTypeStr = lang('file','lblBufferLog');
    } else if ('logFlash' == fileType) {
      fileTypeStr = lang('file','lblFlashLog');
    }

    if ('fail' == sts.status || 'error' == sts.status) {
      if ('upgrade' == GetRadioVal('cfg_action'))
        finalMsg += lang('file','txtUpgradeFail',[fileTypeStr]);
      else
        finalMsg += lang('file','txtBackupFail',[fileTypeStr]);
      ShowStatusError(sts.msg);
    } else {
      if ('upgrade' == GetRadioVal('cfg_action'))
        finalMsg += lang('file','txtUpgradeOK',[fileTypeStr]);
      else
        finalMsg += lang('file','txtBackupOK',[fileTypeStr]);
      ShowStatusSuccess(lang('common','msgSuccess'));
    }
  }

  finalMsg += '<div style="height:20px;">&nbsp;</div>';
  finalMsg += ButtonShort(lang('common','btnDone'), 'btnDone');
  $('#statusDiv').html(finalMsg);
}

function checkBackupStatus()
{
  dataGet(url('get_mgmtBackupStatus')).fetch({
    success: function(model, resp){
      data = resp.data;
      if ('downloading' == data.status)
      {
        $('#statusDiv').html(lang('file','txtDownloadInProgress'));
        setTimeout(checkBackupStatus, 3000);
      }
      else
      {
        operDone(data);
      }
    }
  });
}

function checkUpgradeStatus()
{
  var urlFinal = urlParamAppend(url('get_mgmtUpgradeStatus'), 'fileType', fileType);
  var timeout = (isImg) ? 4000 : 1000;

  if (isImg)
    urlFinal = urlParamAppend(urlFinal, 'type', type);

  dataGet(urlFinal).fetch({
    success: function(model, resp){
      data = resp.data;
      if ('uploading' == data.status) {
        $('#statusDiv').html(lang('file','txtUploadInProgress'));
        setTimeout(checkUpgradeStatus, timeout);
      } else {
        operDone(data);
      }
    },
    error: function(model, resp){
      setTimeout(checkUpgradeStatus, timeout);
    }
  });
}

function doHttpBackup()
{
  $('#mainDiv').prop('style').display = 'none';
  $('#statusDiv').prop('style').display = '';
  _top.progressEnable();

  $('#statusDiv').html(lang('file','txtDownloadInProgress'));

  if (_top.MockupMode) {
    setTimeout(operDone, 1000);
  }
  else
  {
    type = 'http';
    fileType = GetRadioVal('fileType');
    var Datas = Backbone.Model.extend({
    url: url('set_mgmtBackup'),
    parse: function(resp, xhr){
      if ('fail' == resp.status || 'error' == resp.status) {
        operDone(resp);
      } else {
        window.location.href = resp.filename;

       operDone(resp);
      }
      return;
    }
  });
  var dataModel = new Datas();
  dataModel.save(formDataGet('setform'), {});
  }
}

function doTftpBackup()
{
  $('#mainDiv').prop('style').display = 'none';
  $('#statusDiv').prop('style').display = '';
  _top.progressEnable();

  if (_top.MockupMode)
  {
    setTimeout(operDone, 1000);
    $('#statusDiv').html(lang('file','txtDownloadInProgress'));
  }
  else
  {
    type = 'tftp';
    fileType = GetRadioVal('fileType');
    if('img' == GetRadioVal('fileType')) {
      isImg = true;
      setTimeout(checkBackupStatus, 4000);
    }
    var Datas = Backbone.Model.extend({
      url: url('set_mgmtBackup'),
      parse: function(resp, xhr){
        if (!isImg)
          operDone(resp);
        return;
      }
    });
    var dataModel = new Datas();
    dataModel.save(formDataGet('setform'), {});
  }
}

function doHttpUpgrade()
{
  $('#mainDiv').prop('style').display = 'none';
  $('#statusDiv').prop('style').display = '';
  _top.progressEnable();

  $('#statusDiv').html(lang('file','txtUploadInProgress'));

  if (_top.MockupMode) {
    setTimeout(operDone, 1000);
  }
  else
  {
    type = 'http';
    document.forms[0].enctype = "multipart/form-data";
    document.forms[0].encoding = "multipart/form-data";
    if (GetRadioVal('fileType') == 'startup')
      document.forms[0].action = "/cgi/httprestorecfg.cgi";
    else if (GetRadioVal('fileType') == 'backup')
      document.forms[0].action = "/cgi/httpuploadbakcfg.cgi";
    else if (GetRadioVal('fileType') == 'running')
      document.forms[0].action = "/cgi/httpuploadruncfg.cgi";

    document.forms[0].submit();
  }
}

function doTftpUpgrade()
{
  $('#mainDiv').prop('style').display = 'none';
  $('#statusDiv').prop('style').display = '';
  _top.progressEnable();

  if (_top.MockupMode)
  {
    setTimeout(operDone, 1000);
    $('#statusDiv').html(lang('file','txtUploadInProgress'));
  }
  else
  {
    type = 'tftp';
    fileType = GetRadioVal('fileType');
    if('img' == GetRadioVal('fileType')) {
      isImg = true;
      setTimeout(checkUpgradeStatus, 4000);
    } else if ('running' == GetRadioVal('fileType')) {
      setTimeout(checkUpgradeStatus, 1000);
    }
    var Datas = Backbone.Model.extend({
      url: url('set_mgmtUpgrade'),
      parse: function(resp, xhr){
        if (!isImg)
          operDone(resp);
        return;
      }
    });
    var dataModel = new Datas();
    dataModel.save(formDataGet('setform'), {});
  }
}

function genConfigRadio()
{
<!--#ifdef CONFIG_SYS_BACKUP_CONFIGURATION-->
    if (bakCfg)
    {
      txt = RadioGroup('fileType',fileType,['running',lang('file','lblRunningCfg')],['startup',lang('file','lblStartupCfg')],['backup',lang('file','lblBackupCfg')],['logBuffer',lang('file','lblBufferLog')],['logFlash',lang('file','lblFlashLog')]);
    }
    else
<!--#endif-->
    {
      txt = RadioGroup('fileType',fileType,['running',lang('file','lblRunningCfg')],['startup',lang('file','lblStartupCfg')],['logBuffer',lang('file','lblBufferLog')],['logFlash',lang('file','lblFlashLog')]);
    }

  return txt;
}

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_mgmtCfg')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        bakCfg = (!IsUndefOrNull(resp.data.bakCfg) && resp.data.bakCfg) ? true : false;
        that.$el.html( that.template(resp) );
        data = resp.data;
        PagePostInit();

        that.chgAction();

        if ("" != urlParamGetByName('httprestorecfg')) {
          type = 'http';
          fileType = 'startup';
          checkUpgradeStatus();
        } else if ("" != urlParamGetByName('httpuploadruncfg')) {
          type = 'http';
          fileType = 'running';
          checkUpgradeStatus();
        }
      <!--#ifdef CONFIG_SYS_BACKUP_CONFIGURATION-->
        else if ("" != urlParamGetByName('httpuploadbakcfg')) {
          type = 'http';
          fileType = 'backup';
          checkUpgradeStatus();
        }
      <!--#endif-->
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click [name=cfg_action]':'chgAction',
    'click [name=method]':'chgAction',
    'blur input[type=text]':'checkValid',
    'click input[name=srvDef]':'chgSrvDef',
    'click #btnDone':'btnDone'
  },
  apply: function() {
    if (this.checkValid()) {
      if ('upgrade' == GetRadioVal('cfg_action')) {
        if ('http' == GetRadioVal('method'))
          doHttpUpgrade();
        else
          doTftpUpgrade();
      } else {
        if ('http' == GetRadioVal('method'))
          doHttpBackup();
        else
          doTftpBackup();
      }
    }
  },
  chgAction:function(){
    clearAllErrMsg();
    if('backup' == GetRadioVal('cfg_action')) {
      $('#trImage').css('display','');
      $('#trFileName').css('display','none');

      EnableRadio('fileType','logBuffer');
      EnableRadio('fileType','logFlash');
    } else {
      $('#trImage').css('display','none');
      $('#trFileName').css('display','');

      DisableRadio('fileType','logBuffer');
      DisableRadio('fileType','logFlash');
    }
    if('http' == GetRadioVal('method')) {
      $('#trTftpSrvDef').css('display','none');
      $('#trTftpSrvHost').css('display','none');
      $('#trTftpDstFileName').css('display','none');
      $('#trTftpSrcFileName').css('display','none');
      $('#fileName').attr('disabled', false);
      DisableInputText('srvHost');
      DisableInputText('dstFileName');
      DisableInputText('srcFileName');
      DisableRadio('srvDef');
    } else {
      $('#trTftpSrvDef').css('display','');
      $('#trTftpSrvHost').css('display','');
      $('#fileName').attr('disabled', true);
      EnableInputText('srvHost');
      EnableInputText('dstFileName');
      EnableRadio('srvDef');

      $('#trFileName').css('display','none');

      if('backup' == GetRadioVal('cfg_action')) {
        $('#trTftpDstFileName').css('display','');
        $('#trTftpSrcFileName').css('display','none');
        EnableInputText('dstFileName');
        DisableInputText('srcFileName');
      } else {
        $('#trTftpDstFileName').css('display','none');
        $('#trTftpSrcFileName').css('display','');
        DisableInputText('dstFileName');
        EnableInputText('srcFileName');
      }
    }

  },
  chgSrvDef:function(){
    ChageServerInputType('srvHost', GetRadioGroupCheckedVal('srvDef'));
  },
  checkValid:function(){
    clearAllErrMsg();
    var valid = true;
    valid &= validSrvAddr('srvHost', GetRadioGroupCheckedVal('srvDef'));
    valid &= validString('srcFileName',true);
    valid &= validString('dstFileName',true);
    return valid;
  },

  btnDone:function(){
    openLink('html/mgmt_cfg_action.html');
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform" method="post">

<div id="mainDiv">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('file','lblAction')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('cfg_action','upgrade',['upgrade',lang('file','lblUpgrade')],['backup',lang('file','lblBackup')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('file','lblTransferMethod')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('method','http',['tftp',lang('file','lblTFTP')],['http',lang('file','lblHTTP')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('file','lblFileType')) %></th>
      <td class="formContentTD">
        <%= genConfigRadio() %>
      </td>
    </tr>
    <tr id="trFileName">
      <th><%= LabelLeft(lang('file','lblBrowseFile')) %></th>
      <td class="formContentTD">
        <input type="file" id="fileName" name="fileName" style="background-color: #FFFFFF;color: #000000;" class=" text">
      </td>
    </tr>
    <tr id="trTftpSrvDef">
      <th><%= LabelLeft(lang('common','lblSrvAddrType')) %></th>
      <td class="formContentTD">
        <%= RadioGroupSrvAddrType('host','ipv4','ipv6') %>
      </td>
    </tr>
    <tr id="trTftpSrvHost">
      <th><%= LabelLeft(lang('common','lblSrvIPHost')) %></th>
      <td class="formContentTD">
        <%= InputTextHost("srvHost", "", data.maxlen_srvHost, 40) %>
      </td>
    </tr>
    <tr id="trTftpSrcFileName">
      <th id="tdTftpSrvFileName"><%= LabelLeft(lang('file','lblSrcFileName')) %></th>
      <td class="formContentTD">
        <%= InputText("srcFileName", "", data.maxlen_fileName, 40) %>
      </td>
    </tr>
    <tr id="trTftpDstFileName">
      <th><%= LabelLeft(lang('file','lblDstFileName')) %></th>
      <td class="formContentTD">
        <%= InputText("dstFileName", "", data.maxlen_fileName, 40) %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>
</div>

<div id="statusDiv" class="statusDiv" style="display:none;"></div>

</form>
</script>
</body>
</html>
