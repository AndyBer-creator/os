<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

function reboot_trigger() {
   dataSet(url('set_diagReboot'), formDataGet('setform'), false, rebooting);
}

function rebooting(resp) {
  if (resp.status == "ok") {
       _top.progressEnable();
     $('#mainDiv').css('display','none');
     $('#statusDiv').css('display','');
     $('#statusDiv').html(lang('sys','msgRebooting'));
  }
}

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
    if (urlParamGetByName('reboot'))
      reboot_trigger();
  },
  render: function() {
    this.$el.html( this.template() );
    PagePostInit();
  },
  events: {
    'click #btnReboot':'reboot'
  },
  reboot: function() {
    OpenConfirmBox(lang('sys','msgConfirmReboot'),
      function(){
        dataSet(url('set_diagReboot'), formDataGet('setform'), false, rebooting);
      }
    );
  }
});
mainFrame = new mainView();

EnterKeyEvent('reboot');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<div id="mainDiv">
<form id="setform">

<table class="formButtons">
<tr>
  <td><%= ButtonShort(lang('sys','btnReboot'), 'btnReboot') %></td>
</tr>
</table>

</form>
</div>

<div id="statusDiv" class="statusDiv" style="display:none;"></div>
</script>

</body>
</html>
