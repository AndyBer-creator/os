<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var interval;

function reload()
{
  dataGet(url('get_statusPortErrorDisabled')).fetch({
    success: function(model, resp){
      logoutCheck(resp);
      data=resp.data;

      for (var i = 0; i < data.ports.length; i++) {

      	if (data.ports[i].reason != '') {
        	$('#reason_'+i).html(show(data.ports[i].reason));
        	$('#timeLeft_'+i).html(data.ports[i].timeLeft);
        }

      	if (data.ports[i].reason == '') {
        	$('#reason_'+i).html("---");
        	$('#timeLeft_'+i).html("---");
        }

      }
    }
  });
}

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_statusPortErrorDisabled')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();

      	clearInterval(interval);
  	    interval = setInterval(reload, 2 * 1000);
      }
    });
  },
  events: {
    'click #btnRefresh':'refresh',
    'click #btnRecover':'recover'
  },
  refresh:function(e){
	this.render();
  },
  recover:function(e){
    if(!CheckTableEdit())
      return;

    $('#portList').val(urlGetPortList('port', GetTableMultiSelectVals('port')));
    dataSet(url('set_statusPortErrorDisabled'), formDataGet('setform'));
  }
});

mainFrame = new mainView();

EnterKeyEvent('recover');

}
</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>

<script id="main_content" type="text/template">
<form id="setform">

<%= InputHidden('portList','') %>

<%= TableHead(lang('port','titPortErrorDisabledTable')) %>
<table class="dataTable copy" cellspacing="0" cellpadding="0">
<thead>
  <tr>
    <th><%= TableCheckboxAll() %></th>
    <th><%= lang('port','lblPort') %></th>
    <th><%= lang('port','lblErrorDisableReason') %></th>
    <th><%= lang('port','lblTimeLeft') %></th>
    <%= TableLastTh() %>
  </tr>
</thead>
<tbody>
  <% if (!IsUndefOrNull(data.ports)) { %>
  <% _.each(data.ports, function(port, idx) { %>
  <tr>
    <td class="StringCell"><%= TableCheckbox(idx) %></td>
    <td class="StringCell"><%= getPortId(idx) %></td>
  <% if (port.reason != '')  { %>
    <td class="BinaryCell" id=<%="reason_"+idx%>><%= show(port.reason) %></td>
    <td class="NumberCell" id=<%="timeLeft_"+idx%>><%= port.timeLeft %></td>
  <% }%>
  <% if (port.reason == '')  { %>
    <td class="BinaryCell" id=<%="reason_"+idx%>><%= "---" %></td>
    <td class="NumberCell" id=<%="timeLeft_"+idx%>><%= "---" %></td>
  <% }%>

    <%= TableLastTd() %>
  </tr>
  <% }); }%>
</tbody>
</table>

<%= TableFoot(ButtonGroup(ButtonRefresh('btnRefresh'), Button('Recover','btnRecover'))) %>

</form>
</script>
</body>
</html>
