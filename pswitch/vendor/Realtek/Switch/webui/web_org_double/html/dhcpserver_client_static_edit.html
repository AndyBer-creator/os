<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;
var vlan;
var macAddr;
var username;
var ipv4;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
		var key = urlParamGetByName('idx');
		var strTok = key.split("_");
		macAddr = strTok[0];
		vlan = strTok[1];
		ipv4 = strTok[2];
		username = strTok[3];
		
		if (vlan == '4095')
		  vlan = '';
		this.$el.html(this.template());
		PagePostInit();
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_dhcpRelayStaticBindEdit'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validIPv4Addr('ipaddr');
    return valid;
  },
  infShow: function()
  {
    if (IsChecked('status'))
    {
      EnableInputText('groupIntf');
    }
    else
    {
      DisableInputText('groupIntf');
    }
  }
});
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<%= DialogHead(lang('dr','lblDrClientStaticEdit')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('mac','lblMac')) %></th>
      <td class="formContentTD">
        <%= macAddr %>
		<%= InputHidden('macAddr', macAddr) %>
      </td>
    </tr>
	<tr>
	  <th><%= LabelLeft(lang('common','lblVLAN')) %></th>
	  <td class="formContentTD">
	    <%= InputTextDigit('vlan', vlan, 4,32) %>
	    <%= LabelHint(lang('common', 'txtRangeArg', [1, 4094])) %>
	  </td>
	</tr>
	<tr>
	  <th><%= LabelLeft(lang('sys','lblIPv4Addr'),'lblIPv4Addr') %></th>
	  <td class='formContentTD'>
	    <%= InputTextIPv4('ipaddr',ipv4,15,32) %>
	  </td>
	</tr>
	<tr>
	  <th><%= LabelLeft(lang('dr','lblDrUserName')) %></th>
	  <td class="formContentTD">
	    <%= InputText('username', username, 32,32) %>
	    <%= LabelHint(lang('common', 'txtRangeArg', [1, 32])) %>
	  </td>
	</tr>
    </tbody>
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
