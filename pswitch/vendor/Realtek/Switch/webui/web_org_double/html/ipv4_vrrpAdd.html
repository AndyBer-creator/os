<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script>
fileLoadMainFrame();

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_ipv4VrrpAdd')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        PagePostInit();
        data = resp.data;
        PagePostInit();

        that.preempt();
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'click #btnClose':'close',
    'blur input[type=text]':'checkValid',
    'click #preempt':'preempt'
  },
  close: function() {
    CloseDialog();
  },
  apply: function() {
    if (this.checkValid()) {
      dataSet(url('set_ipv4VrrpAdd'), formDataGet('setform'));
    }
  },
  checkValid:function(){
    var valid = true;
    clearAllErrMsg();
    valid &= validIPv4Addr('vifaddr');
    return valid;
  },
  preempt: function(e) {
    var isChecked;
    if (IsUndefOrNull(e)) {
      isChecked = $('#preempt').prop('checked');
    } else {
      isChecked = e.currentTarget.checked;
    }
    if (isChecked) {
      EnableLabel('lblDelay');
      EnableInputText('tlvDelay');
    } else {      
      DisableLabel('lblDelay');
      DisableInputText('tlvDelay');
    }
  }
 });
mainFrame = new mainView();

EnterKeyEvent('apply');
}
</script>
</head>
<body onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>

<script id="main_content" type="text/template">

<form id="setform">
<%= DialogHead(lang('vrrp','titAddIPv4Intf')) %>
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('ipconf','lblIntf')) %></th>
      <td class="formContentTD">
        <table><tr>
          <td class="right"><%= lang('common','lblVLAN') %></td>
          <td class="right">
            <%= SelectArry('vlan', data.vlan) %>
          </td>
        </tr></table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vrrp','lblVrid')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit('vrid', data.vrid, 2) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArg',[1, 5])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vrrp','lblVifaddr'),'lblVifaddr') %></th>
      <td class="formContentTD">
        <%= InputTextIPv4('vifaddr') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vrrp','lblPri')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit('pri', data.pri, 3) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[1, 254, data.defPri])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vrrp','lblAdver')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit('adver', data.adver, 3) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[1, 255, data.defAdver])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vrrp','lblPreempt')) %></th>
      <td class="formContentTD">
        <%= Checkbox('preempt',lang('common','txtEnable'),data.preempt) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('vrrp','lblDelay')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><input type="text" digitonly name="tlvDelay" id="tlvDelay" value=<%= IsUndefOrNull(data.delay)?"":data.delay %>></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArg',[1, 255])) %></td>
        </tr>
        </table>
      </td>
    </tr>
    
    </table>
  </td>
</tr>
</table>
<%= DialogFoot(ButtonGroupApplyClose('btnApply', 'btnClose')) %>
</form>
</script>
</body>
</html>
