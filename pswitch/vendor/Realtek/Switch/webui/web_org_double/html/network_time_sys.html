<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<script src="../js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="../js/underscore-1.5.1.min.js" type="text/javascript"></script>
<script src="../js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="../js/fileload.js" type="text/javascript"></script>
<script src="../js/date.format.js" type="text/javascript"></script>
<script type="text/javascript" src="../js/timepicker/jquery.timepicker.js"></script>
<script type="text/javascript" src="../js/timepicker/bootstrap-datepicker.js"></script>
<link rel="stylesheet" type="text/css" href="../js/timepicker/jquery.timepicker.css" />
<link rel="stylesheet" type="text/css" href="../js/timepicker/bootstrap-datepicker.css" />
<script>
fileLoadMainFrame();

var tz =
[
    {"name":"UTC -12:00",   "val":-720},
    {"name":"UTC -11:00",   "val":-660},
    {"name":"UTC -10:00",   "val":-600},
    {"name":"UTC -9:00",   "val":-540},
    {"name":"UTC -8:00",   "val":-480},
    {"name":"UTC -7:00",   "val":-420},
    {"name":"UTC -6:00",   "val":-360},
    {"name":"UTC -5:00",   "val":-300},
    {"name":"UTC -4:30",   "val":-270},
    {"name":"UTC -4:00",   "val":-240},
    {"name":"UTC -3:30",   "val":-210},
    {"name":"UTC -3:00",   "val":-180},
    {"name":"UTC -2:00",   "val":-120},
    {"name":"UTC -1:00",   "val":-60},
    {"name":"UTC",        "val":0},
    {"name":"UTC +1:00",   "val":60},
    {"name":"UTC +2:00",   "val":120},
    {"name":"UTC +3:00",   "val":180},
    {"name":"UTC +3:30",   "val":210},
    {"name":"UTC +4:00",   "val":240},
    {"name":"UTC +4:30",   "val":270},
    {"name":"UTC +5:00",   "val":300},
    {"name":"UTC +5:30",   "val":330},
    {"name":"UTC +5:45",   "val":345},
    {"name":"UTC +6:00",   "val":360},
    {"name":"UTC +6:30",   "val":390},
    {"name":"UTC +7:00",   "val":420},
    {"name":"UTC +8:00",   "val":480},
    {"name":"UTC +9:00",   "val":540},
    {"name":"UTC +9:30",   "val":570},
    {"name":"UTC +10:00",   "val":600},
    {"name":"UTC +11:00",   "val":660},
    {"name":"UTC +12:00",   "val":720},
    {"name":"UTC +13:00",   "val":780}
];

var weekday =
[
    {"name":"lang('time', 'lblSun')",   "val":0},
    {"name":"lang('time', 'lblMon')",   "val":1},
    {"name":"lang('time', 'lblTue')",   "val":2},
    {"name":"lang('time', 'lblWed')",   "val":3},
    {"name":"lang('time', 'lblThu')",   "val":4},
    {"name":"lang('time', 'lblFri')",   "val":5},
    {"name":"lang('time', 'lblSat')",   "val":6}
];

var week =
[
    {"name":"lang('time', 'lblFirst')",   "val":1},
    {"name":"2",   "val":2},
    {"name":"3",   "val":3},
    {"name":"4",   "val":4},
    {"name":"lang('time', 'lblLast')",   "val":5}
];

var month =
[
    {"name":"lang('time', 'lblJan')",   "val":1},
    {"name":"lang('time', 'lblFeb')",   "val":2},
    {"name":"lang('time', 'lblMar')",   "val":3},
    {"name":"lang('time', 'lblApr')",   "val":4},
    {"name":"lang('time', 'lblMay')",   "val":5},
    {"name":"lang('time', 'lblJun')",   "val":6},
    {"name":"lang('time', 'lblJul')",   "val":7},
    {"name":"lang('time', 'lblAug')",   "val":8},
    {"name":"lang('time', 'lblSep')",   "val":9},
    {"name":"lang('time', 'lblOct')",   "val":10},
    {"name":"lang('time', 'lblNov')",   "val":11},
    {"name":"lang('time', 'lblDec')",   "val":12}
];

var data;

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_networkTime')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        data=resp.data;
        that.$el.html( that.template(resp) );
        PagePostInit();

        if (data.isv4)
          SelectRadio('srvDef', 'ipv4');
        else
          SelectRadio('srvDef', 'host');

        that.chgSrvDef();

        var dateParam;

        if (isIE() < 10)
        {
          dateParam =  {  format: 'yyyy-mm-dd',
                          todayHighlight: true,
                          autoclose: true,
                          forceParse: false,
                          orientation: "top left"
                        };
        }
        else
        {
          dateParam =  {  format: 'yyyy-mm-dd',
                          todayHighlight: true,
                          autoclose: true,
                          forceParse: true,
                          orientation: "top left"
                        };
        }


        $('#date').datepicker(dateParam);
        $('#dlsStaticDateS').datepicker(dateParam);
        $('#dlsStaticTimeS').timepicker({ 'timeFormat': 'H:i', 'step': 60 });
        $('#dlsStaticDateE').datepicker(dateParam);
        $('#dlsStaticTimeE').timepicker({ 'timeFormat': 'H:i', 'step': 60 });
        $('#dlsRecTimeS').timepicker({ 'timeFormat': 'H:i', 'step': 60 });
        $('#dlsRecTimeE').timepicker({ 'timeFormat': 'H:i', 'step': 60 });

        if (isIE() < 10)
        {
          $('#dlsRecTimeS').timepicker('show');
          $('#dlsRecTimeE').timepicker('show');
          $('#dlsStaticTimeS').timepicker('show');
          $('#dlsStaticTimeE').timepicker('show');
          $('#dlsStaticTimeE').timepicker('hide');
        }

        if (!data.sntp)
          SelectRadio('sntp', 0);

        that.sntp();
        that.refreshdlsType();

        $('#date').val(time2DateStr(data.time));
        $('#time').val(time2TimeStr(data.time, null, false));

        if (data.dlsType == 2)
        {
          $('#dlsStaticDateS').val(time2DateStr(data.dlsStaticSecS));
          $('#dlsStaticTimeS').val(time2TimeStr(data.dlsStaticSecS, null, true));
          $('#dlsStaticDateE').val(time2DateStr(data.dlsStaticSecE));
          $('#dlsStaticTimeE').val(time2TimeStr(data.dlsStaticSecE, null, true));
        }

        if (data.dlsType == 1)
        {
          $('#dlsRecTimeS').val(data.dlsRecTimeS);
          $('#dlsRecTimeE').val(data.dlsRecTimeE);
        }
        clearAllErrMsg();
      }
    });
  },
  events: {
    'click [name=sntp]':'sntp',
    'click [name=dlsType]':'refreshdlsType',
    'click [name=srvDef]':'chgSrvDef',
    'click #btnApply':'apply',
    'blur input:text':'checkValid'
  },
  sntp: function() {
    clearAllErrMsg();
    if (1 == GetRadioGroupCheckedVal('sntp'))
    {
      DisableInputText('date');
      DisableInputText('time');

      EnableRadioGroup('srvDef');
      EnableInputText('srvHost');
      EnableInputText('port');
    }
    else if (2 == GetRadioGroupCheckedVal('sntp'))
    {
      setTimeFromComputer(true);
      DisableInputText('date');
      DisableInputText('time');

      DisableRadioGroup('srvDef');
      DisableInputText('srvHost');
      DisableInputText('port');
    }
    else
    {
      EnableInputText('date');
      EnableInputText('time');

      DisableRadioGroup('srvDef');
      DisableInputText('srvHost');
      DisableInputText('port');
    }
    this.checkValid()
  },
  refreshdlsType: function(e) {
    clearAllErrMsg();
    var val = GetRadioGroupCheckedVal('dlsType');

    DisableInputText('dlsOffset');
    DisableInputText('dlsStaticDateS');
    DisableInputText('dlsStaticDateE');
    DisableInputText('dlsStaticTimeS');
    DisableInputText('dlsStaticTimeE');
    DisableInputText('dlsRecTimeS');
    DisableInputText('dlsRecTimeE');

    DisableSelect('dlsRecDayS');
    DisableSelect('dlsRecWeekS');
    DisableSelect('dlsRecMonthS');
    DisableSelect('dlsRecDayE');
    DisableSelect('dlsRecWeekE');
    DisableSelect('dlsRecMonthE');

    if (0 == val) // disable
    {
      this.checkValid()
      return;
    }

    EnableInputText('dlsOffset');

    if (3 == val) // USA
    {
      $('#dlsRecDayS').val(0);
      $('#dlsRecWeekS').val(2);
      $('#dlsRecMonthS').val(3);
      $('#dlsRecDayE').val(0);
      $('#dlsRecWeekE').val(1);
      $('#dlsRecMonthE').val(11);
      $('#dlsRecTimeS').val('02:00');
      $('#dlsRecTimeE').val('02:00');
    }
    else if (4 == val) // eu
    {
      $('#dlsRecDayS').val(0);
      $('#dlsRecWeekS').val(5);
      $('#dlsRecMonthS').val(3);
      $('#dlsRecDayE').val(0);
      $('#dlsRecWeekE').val(5);
      $('#dlsRecMonthE').val(10);
      $('#dlsRecTimeS').val('01:00');
      $('#dlsRecTimeE').val('01:00');
    }
    else if (2 == val)
    {
      EnableInputText('dlsStaticDateS');
      EnableInputText('dlsStaticDateE');
      EnableInputText('dlsStaticTimeS');
      EnableInputText('dlsStaticTimeE');

      DisableInputText('dlsRecTimeS');
      DisableInputText('dlsRecTimeE');
      DisableSelect('dlsRecDayS');
      DisableSelect('dlsRecWeekS');
      DisableSelect('dlsRecMonthS');
      DisableSelect('dlsRecDayE');
      DisableSelect('dlsRecWeekE');
      DisableSelect('dlsRecMonthE');
    }
    else if (1 == val)
    {
      DisableInputText('dlsStaticDateS');
      DisableInputText('dlsStaticDateE');
      DisableInputText('dlsStaticTimeS');
      DisableInputText('dlsStaticTimeE');

      EnableInputText('dlsRecTimeS');
      EnableInputText('dlsRecTimeE');
      EnableSelect('dlsRecDayS');
      EnableSelect('dlsRecWeekS');
      EnableSelect('dlsRecMonthS');
      EnableSelect('dlsRecDayE');
      EnableSelect('dlsRecWeekE');
      EnableSelect('dlsRecMonthE');
    }
    this.checkValid()
  },
  apply: function() {
    if(this.checkValid())
    {
      if (2 == GetRadioGroupCheckedVal('sntp'))
      {
        setTimeFromComputer(true);
        EnableInputText('date');
        EnableInputText('time');
        EnableSelect('timezone');
      }

      dataSet(url('set_networkTime'), formDataGet('setform'));
    }
  },
  chgSrvDef:function(){
    clearAllErrMsg();
    ChageServerInputType('srvHost', GetRadioGroupCheckedVal('srvDef'));
    this.checkValid()
  },
  checkValid: function() {
    clearAllErrMsg();
    var valid = true;
    valid &= validSrvAddr('srvHost', GetRadioGroupCheckedVal('srvDef'), true);
    valid &= validRange('port', 1, 65535);

    valid &= validTimeYYYYMMDD('date', false, false);
    valid &= validTimeHHMMSS('time', true, false, false);

    valid &= validRange('dlsOffset', 1, 1440);
    valid &= validTimeYYYYMMDD('dlsStaticDateS', false, false);
    valid &= validTimeYYYYMMDD('dlsStaticDateE', false, false);
    valid &= validTimeHHMMSS('dlsStaticTimeS', false, false, false);
    valid &= validTimeHHMMSS('dlsStaticTimeE', false, false, false);

    valid &= validTimeHHMMSS('dlsRecTimeS', false, false, false);
    valid &= validTimeHHMMSS('dlsRecTimeE', false, false, false);
    return valid;
  }
});

mainFrame = new mainView();
EnterKeyEvent('apply');
}

function setTimeFromComputer()
{
  var date = new Date();
  var currentDate = (date.getTime())/1000;
  currentDate-= date.getTimezoneOffset() * 60;
  $('#date').val(time2DateStr(currentDate))
  $('#time').val(time2TimeStr(currentDate));
}

</script>
</head>
<body id="main_body" onload="init();">
<table id="main_table"><tbody>
<tr><td id="main_container"></td></tr>
</tbody></table>
<div id="dialog_container"></div>
<script id="main_content" type="text/template">
<form id="setform">
<table>
<tr>
  <td class="formBody">
    <table class="formContent">
    <tbody>
    <tr>
      <th><%= LabelLeft(lang('time','lbltimeSrc')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('sntp', data.sntp ,[1, lang('time','lbltimeSntp')], [2, lang('time','lbltimeHost')],[0,lang('time','lbltimeManual')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('time','lbltimeTZ')) %></th>
      <td class="formContentTD">
        <%= Select("timezone", tz, data.timezone) %>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('time','lbltimeSntp')) %>
    <tr>
      <th><%= LabelLeft(lang('common','lblSrvAddrType')) %></th>
      <td class="formContentTD">
        <%= RadioGroupSrvAddrType('host','ipv4') %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('common','lblSrvIPHost')) %></th>
      <td class="formContentTD">
        <%= InputTextHost("srvHost", data.srvHost, 256) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('time','lblSntpServerPort')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <td><%= InputTextDigit('port', data.port, 5) %></td>
          <td class="right"><%= LabelHint(lang('common','txtRangeArgDefault',[1, 65535, data.defPort])) %></td>
        </tr>
        </table>
      </td>
    </tr>

    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('time','lbltimeManual')) %>
    <tr>
      <th><%= LabelLeft(lang('time','lblDate')) %></th>
      <td class="formContentTD">
        <input name='date' id="date" type="text" maxlength='10' class="date" dateonly/>
        <%= LabelHint("YYYY-MM-DD") %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('time','lblTime')) %></th>
      <td class="formContentTD">
        <input name='time' id="time" type="text" maxlength="8" timeonly/>
        <%= LabelHint("HH:MM:SS") %>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('time','lbltimeDST')) %>
    <tr>
      <th><%= LabelLeft(lang('time','lbltimeType')) %></th>
      <td class="formContentTD">
        <%= RadioGroup('dlsType', data.dlsType ,[0, lang('time','lbltimeDSNone')], [1, lang('time','lbltimeDSRec')],[2,lang('time','lbltimeDSNRec')],[3,lang('time','lbltimeDSUSA')],[4,lang('time','lbltimeDSEU')]) %>
      </td>
    </tr>
    <tr>
      <th><%= LabelLeft(lang('time','lbltimeDSO')) %></th>
      <td class="formContentTD">
        <%= InputTextDigit('dlsOffset', data.dlsOffset, 4) %>
        <%= LabelHint(lang('common','txtMinRangeArgDefault',[1,1440,60])) %>
      </td>
    </tr>
    <tr>
      <th rowspan='2'><%= LabelLeft(lang('time','lbltimeDSRec')) %></th>
      <td class="formContentTD">
        <table>
        <tr>
          <tr><td width=30><%= lang('time','lbltimeFrom') + ":" %></td>
          <td><%= LabelLeft(lang('time','lblDay'), 'lblDayS') %></td>
          <td><%= selectOption('dlsRecDayS', weekday, data.dlsRecDayS) %></td>
          <td><%= LabelLeft(lang('time','lblWeek'), 'lblWeekS') %></td>
          <td><%= selectOption('dlsRecWeekS', week, data.dlsRecWeekS) %></td>
          <td><%= LabelLeft(lang('time','lblMonth'), 'lblMonthS') %></td>
          <td><%= selectOption('dlsRecMonthS', month, data.dlsRecMonthS) %></td>
          <td><%= LabelLeft(lang('time','lblTime'), 'lblTimeS') %></td>
          <td class="">
            <table>
            <tr>
              <input name='dlsRecTimeS' id="dlsRecTimeS" type="text" maxlength='5' class="time" timeonly/>
            </tr>
            </table>
          </td>
        </tr>
        </table>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table>
        <tr>
          <tr><td width=30><%= lang('time','lbltimeTo') + ":" %></td>
          <td><%= LabelLeft(lang('time','lblDay'), 'lblDayE') %></td>
          <td><%= selectOption('dlsRecDayE', weekday, data.dlsRecDayE) %></td>
          <td><%= LabelLeft(lang('time','lblWeek'), 'lblWeekE') %></td>
          <td><%= selectOption('dlsRecWeekE', week, data.dlsRecWeekE) %></td>
          <td><%= LabelLeft(lang('time','lblMonth'), 'lblMonthE') %></td>
          <td><%= selectOption('dlsRecMonthE', month, data.dlsRecMonthE) %></td>
          <td><%= LabelLeft(lang('time','lblTime'), 'lblTimeE') %></td>
          <td class="">
            <table>
            <tr>
              <input name='dlsRecTimeE' id="dlsRecTimeE" type="text" maxlength='5' class="time" timeonly/>
            </tr>
            </table>
          </td>
        </tr>
        </table>
      </td>
    </tr>
    <tr>
      <th rowspan='2'><%= LabelLeft(lang('time','lbltimeDSNRec')) %></th>
      <td class="formContentTD">
        <table>
        <tr><td width=40><%= lang('time','lbltimeFrom') + ":" %></td>
        <td>
          <input name='dlsStaticDateS' id="dlsStaticDateS" type="text" maxlength='10' class="date" dateonly/>
          <%= LabelHint("YYYY-MM-DD") %>
          &nbsp;&nbsp;&nbsp;
          <input name='dlsStaticTimeS' id="dlsStaticTimeS" type="text" maxlength='5' class="time" timeonly/>
          <%= LabelHint("HH:MM") %>
        </td></tr></table>
      </td>
    </tr>
    <tr>
      <td class="formContentTD">
        <table>
        <tr>
        <td width=40><%= lang('time','lbltimeTo') + ":" %></td>
        <td>
          <input name='dlsStaticDateE' id="dlsStaticDateE" type="text" maxlength='10' class="date" dateonly/>
          <%= LabelHint("YYYY-MM-DD") %>
          &nbsp;&nbsp;&nbsp;
          <input name='dlsStaticTimeE' id="dlsStaticTimeE" type="text" maxlength='5' class="time" timeonly/>
          <%= LabelHint("HH:MM") %>
        </td></tr></table>
      </td>
    </tr>
    <%= ShowFormContentGap() %>
    <%= ShowFormTitle(lang('common','lblOperationalStatus')) %>
    <tr>
      <th><%= LabelLeft(lang('time','lbltimeDevice')) %></th>
      <td class="formContentTD">
        <%= data.timeStr %>
      </td>
    </tr>
    </tbody>
    </table>
  </td>
</tr>
</table>

<%= ButtonGroupApply('btnApply') %>

</form>
</script>
</body>
</html>
