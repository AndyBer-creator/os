<html>
<head>
<title></title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<link href="css/login-box.css" rel="stylesheet" type="text/css">
<link href="css/jquery.toastmessage.css" rel="stylesheet" type="text/css">
<script src="js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="js/underscore-1.5.1.min.js" type="text/javascript"></script>

<script src="js/backbone-1.0.0.min.js" type="text/javascript"></script>
<script src="js/fileload.js" type="text/javascript"></script>
<script src="js/login.js" type="text/javascript"></script>
<script type="text/javascript" src="js/crypt/jsbn.js"></script>
<script type="text/javascript" src="js/crypt/prng4.js"></script>
<script type="text/javascript" src="js/crypt/rng.js"></script>
<script type="text/javascript" src="js/crypt/rsa.js"></script>
<script type="text/javascript" src="js/crypt/base64.js"></script>
<script src="js/jquery.confirmon.min.js" type="text/javascript"></script>
<script src="js/jquery.toastmessage-min.js" type="text/javascript"></script>
<script src="js/spin.js" type="text/javascript"></script>
<script>
var RootFrame = true;
var MockupMode = false;
var DebugMode = false;
var fileVer = (new Date().getTime());

fileLoad("js/home.js", "js");
fileLoad("css/home.css", "css");
fileLoad("js/ie8.js","js");
fileLoad("js/utility.js", "js");
fileLoad("lang/defLoginLang.js", "js");
fileLoad("js/styling.js", "js");
if (MockupMode)
  fileLoad("js/url_mockup.js", "js");
else
  fileLoad("js/url.js", "js");

if (MockupMode)
{
  fileVer = (new Date().getTime());
}

var data;

var infoMsg = '';
var loginBanner = '';
var isLangRender = false;

function doHttpUpgrade()
{
  {
    type = 'http';
    document.forms[0].enctype = "multipart/form-data";
    document.forms[0].encoding = "multipart/form-data";
    if($('#logotype').val() == 'usr_config')
        document.forms[0].action = "/cgi/httpuploadusrcfg.cgi";
    else
        document.forms[0].action = "/cgi/httpuploadlogo.cgi";
    document.forms[0].submit();
  }
}

function init(){
  fileLoadWait();
var mainView = Backbone.View.extend({
  el: '#main_container',
  template: _.template($('#main_content').html()),
  initialize: function() {
    this.render();
  },
  render: function() {
    var that = this;
    dataGet(url('get_sysOemSet')).fetch({
      success: function(model, resp){
        logoutCheck(resp);
        that.$el.html( that.template(resp) );
        data = resp.data;
      }
    });
  },
  events: {
    'click #btnApply':'apply',
    'blur input':'checkValid'
  },
  apply: function() {	
      var __url = url_set_sysOemSet+'&dummy='+(new Date().getTime());
	  $('#setform').append("<input type='text' name='logo' value='"+$('#logotype').val()+"'/>");
      var _data = formDataGet('setform');
      var Datas = Backbone.Model.extend({
        url: __url,
        parse: function(resp, xhr){
          return;
        }
      });
      var dataModel = new Datas();
      dataModel.save(_data,{});
	  if(this.checkValid())
	  {
		doHttpUpgrade();
	  }
  },
  checkValid:function(){
	if(setform.fileName.value)
		return true;
	else
		return false;
  }
});

mainFrame = new mainView();

EnterKeyEvent('apply');
}

</script>
 
</head>
<body onload="init();">
<div id="main_container"></div>
<script id="main_content" type="text/template">
<form id="setform" method="post">
<table id='mainTable' width="100%" height="100%">
  <tr align="center"><td height="80"></td></tr>
  <tr align="center">
    <td style="vertical-align:top;">
      <div id="login-box">
        <%= lang('login','lblLogoSet') %>
        <br><br><br><br><br><br><br>
        <table>
          <tr>
            <td>
				<color="black"><%= lang('login','lblLogoType') %></font>
			</td>
            <td>
			<select  id="logotype" style="width:246.22px;height: 21.53px;" maxlength="32" >
				<option value ="logo_ch.png"><%= lang('login','lblLogoCh') %></option>
				<option value ="usr_config"><%= lang('login','lblUsrCfg') %></option>
			</select>
			</td>
          </tr>
		  <tr>
			<td>
				<br>
			</td>
		  </tr>
		  <tr id="trFileName">
		    <td><%= lang('login','lblUploadLogo') %></td>
		    <td class="formContentTD">
		      <input type="file" id="fileName" name="fileName" accept=".png,.cfg" style="background-color: #FFFFFF;color: #000000;width:246.22px;height: 21.53px;" class=" text">
		    </td>
		  </tr>
		  <tr>
			 <td></td>
		  	<td>
		  		<span><%= lang('login','msgNote') %></span>
		  	</td>
		  </tr>
        </table>
        <br><br>
        <table>
        <tr>
          <td style="width:30px;"></td>
          <td>
            <table class="btn_normal" id="btnApply" onmouseout="SetNormalClass(this)" onmouseover="SetHoverClass(this)" onmouseup="SetHoverClass(this)" onmousedown="SetPressedClass(this)">
            <tbody>
            <tr>

            <td id="btnApply_tdNode" class="btnTD2" width="62"><a id="btnApply_tdNode" title="<%= lang('login','tipApply') %>" href="javascript:void(0)"><%= lang('login','btnApply') %></a></td>
            </tr>
            </tbody>
            </table>
          </td>

        </tr>
        </table>
      </div>
    </td>
</tr>
</table>
</form>
</script>
</body>
</html>
